      font-size: 0.75rem;

    "abstract": "Oligodendrocyte precursor cells (OPCs) are highly adaptable, engaging in diverse functions beyond myelination. However, how OPCs adjust their roles after ischemic stroke and contribute to recovery remains largely unknown. To address this gap, we constructed a \"transient middle cerebral artery occlusion (tMCAO) atlas\" by integrating mouse single-cell RNA sequencing (scRNA-seq) datasets and combined it with ex vivo OPC cultures and in vivo cell transplantation experiments. This approach revealed the emergence of \"angiogenic\" OPCs in the subacute phase and \"oligogenic\" OPCs in the chronic phase, driven by distinct levels of hypoxia-severe hypoxia inducing angiogenic OPCs and mild hypoxia promoting oligogenic OPCs. Ex vivo, severe hypoxic preconditioning faithfully induced angiogenic OPCs, and their intravenous transplantation enhanced angiogenesis and improved recovery in tMCAO mice. These findings highlight \"oxygen tone\" as a key regulator of OPC dynamic adaptation after ischemic stroke, offering a promising strategy to harness OPCs for stroke cell therapy.",

    "title": "Maternal effects and recessive epistasis govern green, yellow and brown seed coat color inheritance in soybean [Glycine max (L.) Merr.].",
    "abstract": "Seed coat color is crucial for consumer preference in soybeans. This study explores the genetic mechanisms underlying yellow, green, and brown seed coats through reciprocal crosses, revealing that seed coat color is maternally inherited, with F1 seeds matching the female parental phenotype. In the F2 generation, all seeds had green coats, while F3 segregation patterns followed a two-gene epistatic model. The yellow (SKAF148) x brown (AGS457) cross segregated in a 9:3:4 ratio (green: yellow: brown), while yellow x green (SKAF148 x AGS346) segregated in a 3:1 ratio (green: yellow). Here, we report that two loci, G1 and G2, govern color expression. Dominant alleles at both loci (G1_G2_) produced green seed coats, while yellow required G1_g2g2 and brown required homozygous recessive g1g1 alleles, demonstrating recessive epistasis where g1g1 masked G2 effects. This research establishes a genetic pathway from brown to yellow to green, offering key insights into the digenic inheritance of seed coat color. The parental genotypes were inferred as G1G1g2g2 (yellow), G1G1G2G2 (green), and g1g1G2G2 (brown). These findings provide valuable guidance for breeding programs targeting consumer-preferred seed coat colors in soybeans.",

    "title": "Kidney transplantation across ABO-H incompatibility in a recipient with Bombay blood group: A novel report.",
    "abstract": "The Bombay blood group is an exceptionally rare phenotype characterized by the absence of H antigen on red blood cells due to mutations in the FUT1 gene and absence of H substance in secretions from concurrent FUT2 deficiency. These individuals produce potent anti-H antibodies in addition to anti-A and anti-B antibodies, posing unique challenges in transfusion and solid organ transplantation. We report a successful ABO-H-incompatible renal transplantation in a patient with genetically confirmed Bombay phenotype. A 30-year-old man with end-stage kidney disease secondary to immunoglobulin A nephropathy was evaluated for transplantation with his mother as a potential donor. Serologic and molecular studies identified a FUT1 homozygous missense variant (p.Leu242Arg) and a FUT2 homozygous deletion consistent with the classical digenic Bombay phenotype. The patient underwent a structured desensitization protocol with rituximab, plasma exchange, and intravenous immunoglobulin prior to transplantation. The postoperative course was uneventful, with stable graft function. This ground-breaking case demonstrates that, with appropriate desensitization, anti-H antibodies can be safely managed, thereby expanding the feasibility of renal transplantation in recipients with the Bombay phenotype.",

    "title": "Fine mapping and functional annotation of a QTL for resistance to tilapia lake virus in Nile tilapia (Oreochromis niloticus).",
    "abstract": "Disease resistance is one of the main targets of animal breeding programs. In recent years, incorporating genomic information to accelerate genetic progress has become one of the priorities of the industry. Here, we combined population-scale whole-genome sequencing with differential gene expression and functional annotation analyses to study resistance to tilapia lake virus (TiLV) in a breeding Nile tilapia (Oreochromis niloticus) GIFT population. Fish with survival data from a natural TiLV outbreak were sampled and genotyped for 6.7\u2005M SNPs using whole-genome resequencing and imputation. Our results confirmed a QTL located in the proximal end of Oni22, identifying 74 out of the top 99 markers associated with binary survival within a 10\u2005Mb window. The marker explaining the highest genetic variance of TiLV resistance is located at 1.7\u2005Mb and presents a substitution effect of 0.15. Additionally, other SNPs in several other chromosomes explained a high percentage of the genetic variance, with an important number located in 2 separate regions of Oni09. These results suggest an oligogenic architecture underlying resistance to TiLV, with several QTLs with moderate effect and many with small effect. Host transcriptomic analyses identified genes differentially expressed between resistant and susceptible genotypes according to the QTL in Oni22, highlighting proteosome subunit beta type-9a, and ha1f as potential causal genes. This is the first study combining whole-genome sequencing at a population scale with genomic approaches to assess the underlying genomic basis for TiLV resistance. Our results confirm and narrow down a QTL underlying this key trait in a major aquaculture species worldwide, and found novel QTLs in other chromosomes. The identified markers and genes have the potential to improve resistance to TiLV in Nile tilapia, significantly improving animal health and welfare.",

    "title": "Exome Sequencing Uncovers Genetic Drivers of Multiple Sclerosis in a Multiplex Family.",
    "abstract": "Background: Multiple Sclerosis (MS) is a chronic, autoimmune, multifactorial, and complex disorder of the central nervous system (CNS), affecting more than 2 million individuals globally. Genome-wide association studies (GWAS) have explained only a small fraction of its high heritability, highlighting the need for alternative approaches to identify rare genetic variants that contribute to its etiology. To address this, we performed whole-exome sequencing (WES) in a multi-affected family. Methods: WES was performed in a MS multigenerational family comprising two affected sisters, their two healthy brothers, and one affected son. Results: Bioinformatics analysis identified 47 co-segregating rare variants. Three missense variants in genes involved in inflammation, autoimmunity, and demyelinization were identified as the most promising candidates: c.443 C>T, p.Pro148Leu in the RTN4 gene, c.1678 T>G, p.Phe560Val in the JAK2 gene, and c.3449 A>G, p.Tyr1150Cys in the DUOX2 gene. Protein modeling and in silico tools suggest that the three selected variants may have a significant impact on protein function. Conclusions: We identified novel candidate genes for MS in a multiplex family, providing evidence for an oligogenic model of disease susceptibility. Further replication and functional studies are required to validate these preliminary results.",

    "title": "Common Variable Immunodeficiency Disorders: A perspective from New Zealand.",
    "abstract": "Common Variable Immunodeficiency Disorders (CVID) are the most frequent symptomatic Primary Immunodeficiency (PID) in adults and children. Patients with CVID present with predominant antibody deficiency with varying degrees of impaired cellular immunity. CVID was previously a diagnosis of exclusion, which led to considerable uncertainty about which patients would qualify for subcutaneous or intravenous immunoglobulin (SCIG/IVIG) replacement. Over the last twelve years, several sets of diagnostic criteria have been published which identify these disorders with greater precision. These new CVID diagnostic criteria assist with decisions on treatment, particularly SCIG/IVIG replacement. With the advent of massively parallel genome sequencing technologies, it has become apparent that a significant proportion of individuals with a CVID phenotype have an underlying causative genetic defect. If such a pathogenic variant is identified, these individuals are removed from the overarching diagnosis of CVID and are deemed to have a CVID-like disorder caused by a specific Inborn Error of Immunity (IEI). New Zealand has had a long-standing customized PID genetic testing program. Two novel autosomal dominant pathogenic variants causing CVID-like disorders, consequent to haploinsufficiency of Nuclear Factor kappa-light-chain-enhancer of activated B cells (NFKB1) and Transcription Factor 3 (TCF3), were identified in New Zealand families. The latter pathogenic variant was shown to have an epistatic interaction with TNFRSF13B (TACI) in a patient with a digenic CVID-like disorder. Epistasis is the synergistic, non-linear interaction between two or more genetic loci, leading to much more severe (or much milder) disease. This perspective reviews the current understanding of these disorders with contributions from three New Zealand-based studies: The Prospective NZ CVID and the NZ hypogammaglobulinemia sub-studies as well as a large retrospective case series of Transient H     "title": "Blurring the Lines: Co-Occurrence of MSH6 Variant and MLH1 Constitutional Epimutation in a Young Colorectal Cancer Patient.",
    "abstract": "Lynch syndrome (LS) is an autosomal dominant hereditary cancer predisposition syndrome caused by germline pathogenic variants in DNA mismatch repair (MMR) genes. We report a 27-year-old woman with right-sided colorectal cancer, caf\u00e9-au-lait macules, and an occipital neurofibroma. Tumor testing revealed microsatellite instability, loss of MLH1 and PMS2 expression, high tumor mutational burden (21.87 mutations/Mb), and wild-type BRAF. Germline analysis revealed a heterozygous MSH6 pathogenic variant inherited from her father. Additionally, MLH1 promoter hypermethylation was detected in peripheral blood DNA, consistent with constitutional mosaic epimutation. Constitutional epigenetic silencing of MLH1 is a rare but established cause of LS. This is the first reported case of a dual mechanism involving both a germline MSH6 variant and constitutional MLH1 methylation. The patient's unique clinical presentation and molecular profile challenged the conventional binary classification of MMR deficiency as either hereditary or sporadic, and highlight the complexity of MMR-related tumorigenesis. This case underscores the importance of comprehensive assessment integrating tumor and germline molecular data, particularly when clinical or molecular findings are atypical or discordant. The digenic etiology also raises questions regarding cancer surveillance and management strategies in such individuals.",

    "abstract": "Hypoplastic left heart syndrome (HLHS) is the most lethal congenital heart disease (CHD) whose genetic basis remains elusive, likely due to oligogenic complexity. To identify regulators of cardiomyocyte (CM) proliferation relevant to HLHS, we performed a genome-wide siRNA screen in human iPSC-derived CMs, revealing ribosomal protein (RP) genes as the most prominent effectors of CM proliferation. Whole-genome sequencing of 25 HLHS proband-parent trios similarly showed enrichment of rare RP gene variants, including a damaging RPS15A promoter variant shared in a familial CHD case. Cross-species functional analyses demonstrated that perturbation of RP genes impairs cardiac growth: knockdown of RPS15A, RPS17, RPL26L1, RPL39, or RPS15 reduced CM proliferation, caused cardiac malformations in Drosophila, and produced hypoplastic or dysfunctional hearts in zebrafish. Genetic interactions between RP genes and key cardiac transcription factors (TBX5 and NKX2-7) further support their developmental role. Importantly, p53 suppression or Hippo activation partially rescued RP deficiency phenotypes. Together, these findings implicate RP genes as critical regulators of cardiogenesis and candidate contributors to HLHS.",

    "title": "The oligogenic inheritance test GCOD detects risk genes and their interactions in congenital heart defects.",
    "abstract": "Exome sequencing of thousands of families has revealed many risk genes for congenital heart defects (CHDs), yet most cases cannot be explained by a single causal mutation. Even within the same family, individuals carrying a particular mutation in a known risk gene often demonstrate variable phenotypes, suggesting the presence of genetic modifiers. To explore oligogenic causes of CHD without assessing billions of variant combinations, we develop an efficient, simulation-based method to detect gene sets that carry co-occurring damaging variants in probands at a higher rate than expected given parental genotypes. We implement this approach in software called Gene Combinations in Oligogenic Disease (GCOD) and apply it to a cohort of 3377 CHD trios with exome sequencing. This analysis detects 160 gene pairs in which damaging variants are transmitted with higher-than-expected frequency to CHD probands but rarely or never appear in combination in their unaffected parents. Stratifying by specific phenotypes and considering gene combinations of higher orders yields an additional 6026 gene sets. Genes found in oligogenic sets are overrepresented in pathways related to heart development and often co-occur in sets of cell type marker genes from single-cell expression data. Compound heterozygosity of the newly identified digenic pair Gata6-Por leads to higher CHD incidence in mice compared with single hemizygotes, validating predicted genetic interactions. As genome sequencing is applied to more families and other disorders, GCOD will enable detection of increasingly large, novel gene combinations, shedding light on combinatorial causes of genetic diseases.",

    "abstract": "Albinism is a heterogeneous inherited disorder with at least 21 known causative genes. Clinically, interpreting the potential digenic or oligogenic effects of the variants is a big challenge. We identified digenic mutations in a Chinese individual with oculocutaneous albinism, carrying a loss-of-function mutation in the Cl- (chloride) channel gene OCA2 (c.808-3C>G) and an unreported gain-of-function mutation in the Na+/Ca2+ channel gene TPCN2 (p.Ala24Val), which was confirmed by patch-clamp analysis. We further demonstrated that Cl- bilaterally modulated TPC2 activity by patch clamping: cytosolic high Cl- inhibited but luminal high Cl- enhanced TPC2 channel activity. Using CRISPR/Cas9-mediated knockout cell models and knockin mouse models, we confirmed that OCA2 modulated TPC2 activity by influencing melanosomal pH and pigment production. Mice mimicking double heterozygotes for the OCA2 loss-of-function p.Val443Ile and the TPCN2 gain-of-function p.Arg210Cys exhibited synergistic hypopigmentation in both fur and retina, phenocopying the albinism patient with digenic loss-of-function OCA2 and gain-of-function TPCN2 heterozygous mutations. This study provides experimental evidence supporting an oligogenic mode of inheritance in albinism, pinpoints melanosomal ion homeostasis as a key pathogenic mechanism and potential therapeutic target, and establishes a generalized research framework for elucidating gene-gene interactions in heterogeneous inherited disorders, especially for the channelopathies.",

    "abstract": "During spermiogenesis, round spermatids differentiate into spermatozoa. This involves nuclear elongation and condensation, acrosome spreading, and flagellum formation, orchestrated by cytoskeletal elements-acroplaxome and manchette-that attach to the nuclear envelope (NE) except at the caudal pole where nuclear pore complexes (NPCs) form a dense array. Evidence that the NPC contributes structurally to nuclear remodelling comes from a unique case of human male infertility, lacking the spermatid-specific nucleoporin NUP210L, where most sperm heads are round and uncondensed. Mice lacking NUP210L are fertile, however, producing essentially normal spermatozoa. Here, we reveal function at the caudal NE in mice lacking NUP210L and BAF-L, a spermatid-specific paralogue, and interactor, of chromatin protein BAF. Like NUP210L, BAF-L localises at the caudal NE in human elongating spermatids, and its inactivation in mouse has little impact on sperm morphology or fertility. We show here, however, that in mice lacking NUP210L, two copies of BAF-L become essential for fertility. In Banf2+/-, Nup210l-/- and Banf2-/-, Nup210l-/- mice, most spermatids arrest during elongation (step 10-11), manchette microtubules frequently invaginate elongating nuclei from the caudal pole, and the NPC array forms at steps 8-10 but shows reduced stability later at steps 12-16. We show that BAF-L interactor, BAF, also concentrates at the caudal pole (step 8-9), independently of NPCs. We propose that BAF-L and NUP210L optimise interactions between NPC, chromatin and the cytoskeleton, to ensure nuclear integrity and fertility. Our study implies that digenic inheritance of mutations in non-homologous genes should be considered when investigating genetic causes of human male infertility.",

    "abstract": "Background/Objectives: In digenic populations, all females produce males and females in their offspring. Monogenic populations are composed of gynogenic (female-producing) and androgenic (male-producing) females. A theoretical population genetic model for evolution of digenic to monogenic populations is presented here. Methods: A controlling gene was associated with each of the four processes that characterise monogenic populations: (1) oogenesis is conventional, whereas spermatogenesis is unusual and it is characterised by the exclusive formation of X-bearing sperm (gene (s)), i.e., the paternal chromosomes are eliminated so that only the maternal ones are transmitted to the next generation; (2) the X chromosome that is eliminated in the zygote is the one inherited from the father (gene r); (3) an imprinting process occurs in the mother (gene g), which protects the maternally inherited X chromosome from elimination in the zygote and the whole maternal chromosome complement in spermatogenesis; (4) a maternal factor is produced during oogenesis (gene e), which inactivates the elimination factor [r] in the zygote, thus controlling the elimination of the paternal X chromosome. The sequences of emergence of the genes (e s r g) that transform a digenic population into a monogenic one were analysed. Results: The following evolutionary sequences were found: (1) the sequence (r s e) under dominant conditions of gene (s) and recessive conditions of gene (r); and (2) the sequences (s r e), (r s e), and (e s r) under recessive conditions of gene (s) and gene (r). It was also found that the process of genomic imprinting is a necessary condition for the generation of a monogenic population. Furthermore, a quantitative change in the interaction between the elimination factor and its maternal inhibitor modifies the genotypic formula of the monogenic state. Conclusions: The number and types of evolutionary transitions of a digenic to a monogenic population depends     "abstract": "Variants in the SLC26A4 gene are the most common cause of hereditary hearing loss in Pakistan, and the second most common cause worldwide. Advances in genetic diagnosis can make it more time-efficient, cost-effective, and accessible to clinicians and patients. The study aimed to screen 260 consanguineous Pakistani families with hereditary hearing loss for the DFNB4/PDS locus and to detect pathogenic SLC26A4 variants across different castes. We used homozygosity mapping to predict pathogenic variants and selected seven SLC26A4 exons for direct sequencing in 19 of the 23 DFNB4/PDS-linked families, based on haplotype comparison. Sequencing data were analyzed using Chromas software (Technelysium Pty. Ltd, version 1.45), and the detected variants were stratified by castes of the enrolled families. Four missense variations (c.269C>T, c.716T>A, c.1337A>G, and c.1667A>G) were identified in 16 families, as predicted by haplotype analysis, in exons 3, 6, 11, and 15 of SLC26A4. The Q446R (c.1337A>G) variant was identified in eight families, all belonging to the Arain caste of Pakistan. Caste data from a previous study of Pakistani patients similarly supported its potential role in caste-based genetic diagnosis. In PKDF497, six double heterozygotes for variants of GJB2 and SLC26A4 were detected without hearing loss. We present evidence supporting caste-based targeted variant screening for hereditary hearing loss. Following additional validation studies, caste-based targeted variant screening for common hereditary disorders could be implemented in developing countries, particularly in South Asia, to provide faster and more cost-effective molecular diagnosis compared to whole-genome or whole-exome sequencing.",

    "title": "Benchmarking knowledge graph embedding models for the prediction of oligogenic combinations.",
    "abstract": "Identifying the potential oligogenic causes of rare diseases remains a challenge, notwithstanding the advancements made in the last decade. While a variety of predictive and ranking approaches have been proposed, their precision remains limited, as only a small number of high-quality training cases are available and it remains difficult to know which features may be most relevant for the design of new predictors. We hypothesize here that structured biological information, which provides an integration of various relevant biological networks and ontologies in a single heterogeneous knowledge graph, can make a difference as it allows for learning a relevant genetic representation through KGE methods. An exhaustive benchmarking is performed here wherein we assess the performance of various state-of-the-art embedding models for the task of identifying potentially pathogenic gene pairs. The results obtained show that these KGE provide highly accurate predictions, leading to an Area Under the Precision-Recall Curve of up to $0.93$, representing also a significant advancement over previous approaches for predicting gene pairs involved in oligogenic diseases. We show nonetheless that care needs to be taken in the cross-validation when using embeddings, as data leakage between folds in embedding space will reveal overly optimistic results. The further evaluation of the methods on a holdout set as well as on a group of new male infertility cases show that three Translational Distance models (TransE, MurE, and RotatE) and two of the Semantic Matching models (DisMult and QuatE) provide the better results. The analysis is concluded by comparing all known gene combinations for these top-ranking models, examining their similarities and differences. Overall, KGE provide a predictive advancement but new steps will need to be taken generate explanations as to why the pairs are relevant for oligogenic diseases.",

    "abstract": "Congenital hypogonadotropic hypogonadism (CHH) is a rare and genetically heterogeneous disorder characterized by absent or incomplete puberty due to impaired gonadotropin-releasing hormone (GnRH) function. A subset of individuals with CHH also present with developmental anomalies, including midline defects such as cleft lip and/or palate (CLP). This study investigates the genetic overlap between CHH and CLP. A total of 336 individuals diagnosed with CHH were clinically assessed for associated phenotypes, including CLP. High-throughput sequencing was performed using a targeted gene panel encompassing known CHH- and CLP-related genes. Variants were analyzed and classified according to the American College of Medical Genetics and Genomics (ACMG) criteria for pathogenicity. CLP was present in 21 patients with CHH (6%). Pathogenic or likely pathogenic variants in genes associated with both CHH and CLP-such as FGFR1 and CHD7-were identified in eight individuals. Furthermore, 17% of the patients with CHH without CLP harbored deleterious variants in genes implicated in clefting, including DVL3, PLCB4, NIPBL, and EDNRA. Evidence of digenic inheritance involving both CHH- and CLP-related genes was observed in multiple cases. FGFR1 variants were the most frequently detected and were commonly associated with anosmia and additional developmental anomalies. These findings highlight a genetic and phenotypic continuum between CHH and CLP, underscoring the involvement of shared developmental pathways. The high prevalence of FGFR1 variants in patients with CHH and CLP supports its role as a pleiotropic gene. Understanding the overlapping genetic mechanisms may enhance diagnostic precision and inform personalized management strategies for affected individuals.",

    "title": "Clinical and genetic determinants of survival in amyotrophic lateral sclerosis patients from North India.",
    "abstract": "Amyotrophic lateral sclerosis (ALS) is a fatal neurodegenerative disease characterized by progressive motor neuron degeneration, with significant clinical and genetic variability. While the role of genetic factors is well-established in ALS pathogenesis, their impact on survival outcomes remains poorly understood, particularly in the Indian population. We performed whole-exome sequencing in 159 ALS patients from North India (familial = 2, sporadic = 157). Clinical parameters, including age at onset, site of onset, sex, family history and survival, were recorded. Males exhibited shorter survival than females, but did not achieve statistical significance (median: 48 versus 60 years, P = 0.05). Bulbar-onset patients developed ALS at a significantly older age (mean: 59.7 versus 54 years, P = 0.007) and experienced poorer survival outcomes than spinal-onset patients (median: 48 versus 60 months, P = 0.03). A small subset of ALS patients (6.3%, n = 10) had very long survival duration of more than 10 years. We identified 102 genetic variants in 92 ALS patients, of which 45 variants were novel. According to American College of Medical Genetics and Genomics guidelines, 13.5% of total variants were pathogenic, 19.8% were likely pathogenic, and 66.7% were variants of uncertain significance. The presence of genetic variations was significantly associated with delayed onset (mean: 53.4 versus 57.1 years, P = 0.049) and diminished life expectancy (median: 48 versus 60 months, P = 0.029). Variations in more than one gene were detected in 16.7% of the patients, supporting the theory of oligogenic basis for ALS. After adjusting for age at onset, increased risk of mortality was associated with males [hazard ratio = 1.740, 95% confidence interval (CI) = 1.105-2.740] and rare genetic variations (hazard ratio = 1.533, 95% CI = 1.001-2.350). Furthermore, bulbar onset (hazard ratio = 1.75, 95% CI = 1.11-2.75) was found to be a negative prognostic factor for survival. Our     "title": "Benchmarking long-read sequencing approaches to resolve facioscapulohumeral dystrophy locus complexity.",
    "abstract": "Facioscapulohumeral dystrophy (FSHD) is primarily associated with contraction of the D4Z4 macrosatellite array at the 4q35 locus. While unaffected individuals carry 11 to 150 D4Z4 repeats, approximately 95% of FSHD patients (FSHD1) exhibit a contraction to 1-10 units, along with reduced DNA methylation. In another \u223c3% of patients (FSHD2), the disease results from a digenic mechanism associated with the presence of a pathogenic variant in the SMCHD1 gene, leading to the epigenetic deregulation of the 4q35 locus. However, 1-2% of clinically diagnosed patients lack a defined genetic cause, highlighting diagnostic gaps. In prior work, we identified over 70 patients, clinically diagnosed with FSHD and carrying a complex structural variant of the 4q35 or 10q26 loci. A potential pathogenicity of these structural variants was evoked in some cases, in the absence of other FSHD-associated genetic features. Given their diagnostic relevance, we performed here detailed structural analyses of these rearrangements, in 7 representative cases carrying different structural variants of the 4q35 or 10q26 loci using high-resolution long-read sequencing technologies (Oxford Nanopore and PacBio) and suspected of FSHD. By comparing the advantages and limitations of several methodological long read sequencing strategies, we resolved the architecture and methylation patterns across the 4q35 and 10q26 loci at the nucleotide-level. We show that duplicated alleles arise from intrachromosomal recombination between LSau elements contained within D4Z4 and distal subtelomeric \u03b2-satellite elements, producing variable deletions within the proximal D4Z4 region, with breakpoints differing among patients. These complex structural variants are not detectable using standard technologies like Bionano Optical Genome Mapping and require manual curation for identification during routine molecular diagnosis procedures. Importantly, determining the pathogenic relevance of these rearrangements necessitates integrating structural and epigenetic features typically associated with FSHD. Our results underscore the importance of in-depth molecular characterization for patients with clinical FSHD who test negative for FSHD1/FSHD2 by conventional diagnosis methods. We further show that structural variants might be considered as likely pathogenic, in the absence of SMCHD1 variant. Overall, as structural variants at 4q35 are increasingly identified in patients clinically diagnosed with FSHD, their comprehensive analysis is crucial to refine diagnosis, guide genetic counseling, and ultimately improve clinical care for individuals clinically suspected of FSHD but presenting an atypical molecular profile.",

    "title": "Expanded chromatin accessibility mapping explains genetic variation associated with complex traits in liver.",
    "abstract": "Genome-wide association studies (GWASs) have identified thousands of loci associated with a variety of common, complex human traits. Recent efforts have focused on characterizing chromatin accessibility to discover regulatory elements that modify the expression of nearby genes, suggesting that trait associations are mediated through changes in gene regulation. Genetic variants associated with differences in chromatin accessibility, known as chromatin accessibility quantitative trait loci (caQTLs), are established contributors to gene expression differences, providing mechanistic hypotheses for signals identified by GWAS. Using the assay for transposase-accessible chromatin with sequencing (ATAC-seq), we assessed chromatin accessibility in 189 diverse human liver samples, identifying over 2 million accessible chromatin regions enriched for gene regulatory features and, in 175 of these samples, over 14,000 caQTLs. Focusing subsequently on liver-relevant complex traits, we obtained publicly available blood lipid GWAS data and identified 157 loci where caQTLs, expression quantitative trait loci (eQTLs), and GWAS signals colocalized. This generated specific molecular hypotheses about regulatory elements, affected genes, and, in some cases, implicated transcription factors. Finally, we enumerated the set of blood lipid trait signals that lack an obvious proposed mechanism beyond catalogs of liver caQTLs and eQTLs. After integrating 10 multi-omic quantitative trait locus (QTL) regulatory mechanism datasets while considering limitations in statistical power, we found that approximately 20% of blood lipid GWAS signals lacked a statistical link to a proposed mechanism. Our results demonstrate the value of integrating multiple genomic datasets to improve understanding of GWAS signals while emphasizing the need for additional experimental approaches to fully characterize complex trait associations.",

    "title": "Validation and context-dependent effects of a prostate cancer polygenic risk score in the All of Us Research Program.",
    "abstract": "Polygenic risk scores (PRSs) have demonstrated strong potential for improving prostate cancer risk stratification. However, it is unknown whether the clinical utility of prostate cancer PRS varies by demographic, lifestyle, and socioeconomic factors. We validated a previously developed multi-ancestry PRS of 451 prostate cancer risk variants and evaluated context-dependent effects using genetic and clinical data from the diverse All of Us Research Program, including 7,577 indivisuals with prostate cancer and 90,608 control individuals across six genetic ancestry groups. In ancestry-stratified testing, the PRS showed strong associations with prostate cancer risk, with odds ratios (ORs) per standard deviation (SD) increase ranging from 1.61 (95% confidence interval [CI] = 1.02-2.64, p = 0.05) in Middle Eastern to 2.19 (95% CI = 1.98-2.42, p = 2.2 \u00d7 10-51) in American populations. Age-stratified analyses showed reduced PRS effects with increasing age. Across modifiable lifestyle and healthcare access factors, PRS effects were larger in those with a higher body mass index (OR = 2.15 vs. 1.96 in individuals with obesity and normal weight, respectively, p = 0.03), in never or former smokers vs. current smokers (OR = 2.06, 2.37, and 1.93, respectively, p = 0.06), and in those recently accessing healthcare (OR = 2.21 vs. 1.88, p = 0.05), highlighting important context-specific modifiers. We did not observe context-dependent effects of other socioeconomic factors, such as income, education, and insurance. In a phenome-wide association study (PheWAS), the PRS was associated with 14 clinical outcomes, including known prostate cancer-related conditions. These findings confirm the predictive strength of the multi-ancestry prostate cancer PRS across diverse populations and underscore the importance of accounting for demographic-, lifestyle-, and healthcare-related contexts when applying PRSs in clinical and public health settings.",

    "title": "Leveraging polygenic risk scores to infer causal directions in genotype-by-environment interactions between complex traits.",
    "abstract": "Most existing genotype-by-environment interaction (G\u00d7E) methods assume a known causal direction as an assumption that often does not hold and can lead to biased estimates and spurious findings. To address this, we introduce the Genetic Causality Inference Model (GCIM), a novel approach designed to infer causal directions in G\u00d7E studies. GCIM integrates polygenic risk scores (PRS) for both the exposure and the outcome to strengthen causal inference and reduce spurious interaction signals. We evaluated GCIM using simulated data across varying genetic and residual correlation settings and compared its performance to existing PRS-by-environment (PRS\u00d7E) models under both null and alternative G\u00d7E scenarios. GCIM was also applied to real-world UK Biobank data in both causal directions. GCIM consistently outperformed existing methods by accurately identifying the absence of G\u00d7E variance and avoiding false positives, even in the presence of strong phenotypic heteroscedasticity due to residual heterogeneity. Other methods often generated spurious associations, especially under reverse causality. Applying GCIM to UK Biobank data, we investigated 11 circulating biomarkers (including liver enzymes, lipids, and inflammatory markers) and three anthropometric traits (BMI, body fat, and waist-to-hip ratio [WHR]). GCIM identified that bilirubin modulates genetic effects on BMI and WHR, while body fat modulates genetic effects on C-reactive protein, with associations remaining significant after multiple testing corrections. Overall, GCIM provides a more reliable framework for GxE analysis, particularly under challenging conditions such as residual heterogeneity and uncertain causal direction. However, further development is needed to improve its statistical power.",

    "abstract": "Pharmacological treatments for attention-deficit/hyperactivity disorder (ADHD) are efficacious and safe; however, substantial interindividual variability in treatment response persists, with many patients experiencing suboptimal outcomes or early discontinuation. Although genetic factors have been proposed as contributors to this variability, clinically actionable predictors remain elusive. Here, we present the first meta-analysis evaluating whether polygenic liability for ADHD and related psychiatric and behavioral-cognitive phenotypes is associated with clinically meaningful response to methylphenidate in 1000 ADHD cases from Norway, Brazil, and Spain assessed in real-world settings. Polygenic scores (PGS) for ADHD, autism, bipolar disorder, educational attainment, major depressive disorder, neuroticism, and schizophrenia were calculated separately for each cohort. Treatment response was assessed using evaluations of global clinical improvement and harmonized by categorizing individuals as responders or non-responders. Cohort-specific associations were combined using fixed-effects meta-analysis. No PGS showed a significant association with treatment response. Effect sizes were small, consistent across cohorts, and characterized by minimal between-study heterogeneity. Sensitivity analyses incorporating clinical and treatment-related covariates yielded convergent results. As the first meta-analytic evaluation of polygenic predictors evaluating clinically meaningful ADHD stimulant response, these findings delineate the current limits of PGS in pharmacogenomic applications. Rather than supporting immediate clinical utility, our results highlight key methodological and conceptual constraints, including limited sample sizes, heterogeneous outcome definitions, and the indirect nature of susceptibility-based PGS for predicting treatment response. By mapping these boundaries, this study provides a framework to recalibrate research priorities and guide the     "title": "Partitioned polygenic scores show mechanistic heterogeneity in type 2 diabetes and hypertension comorbidity.",
    "abstract": "Type 2 diabetes and hypertension are common health conditions that often occur together, suggesting shared biological mechanisms. To explore this relationship, we analyse large-scale multiomic data to uncover genetic factors underlying type 2 diabetes and blood pressure comorbidity. We curate 1304 independent single-nucleotide variants associated with type 2 diabetes and blood pressure, grouping them into five clusters related to metabolic syndrome, inverse type 2 diabetes/blood pressure risk, impaired pancreatic beta-cell function, higher adiposity, and vascular dysfunction. Colocalization with tissue-specific gene expression highlights significant enrichment in pathways related to thyroid function and fetal development. Partitioned polygenic scores derived from these clusters improve risk prediction for type 2 diabetes/hypertension comorbidity, identifying individuals with more than twice the usual susceptibility. These results reveal a mechanistically heterogeneous genetic architecture shared between type 2 diabetes and blood pressure, enhancing comorbidity risk prediction. Partitioned polygenic risk scores offer a promising approach for early risk stratification, personalised prevention, and improved management of these interconnected conditions.",

    "title": "Biological underpinnings and genetic predisposition to schizophrenia within microrna-137 regulatory pathways across brain development.",
    "abstract": "Previous studies have evaluated the role of the microRNA-137 (miRNA137) regulatory pathway in schizophrenia by using in silico or in vitro predicted target genes. These approaches do not capture the dynamic spatiotemporal nature of the miRNA137 regulatory pathway or tend to overestimate direct miRNA binding sites. To provide a more accurate representation of the miRNA137 pathway during human brain development, we evaluated the biological functionality of direct ex vivo miRNA137 targets previously documented in the early prenatal and adult brain. We studied the role of differential expression and genetic predisposing variation to schizophrenia and related disorders within these miRNA137 targets by gene set enrichment analyses (GSEA) and gene-set based polygenic score predictions in an independent schizophrenia case-control cohort. All results were compared to those from in silico or in vitro predicted targets. Only direct miRNA137 targets at prenatal and adult human brain displayed significant enrichments in synaptic and neuronal functions and captured the transcriptomic and genetic predisposing variation to schizophrenia. Furthermore, while adult target genes showed a more consistent enrichment in predisposing variation to schizophrenia and bipolar disorder in case/control polygenic models, prenatal target genes predicted negative symptomatology in schizophrenia patients. Our results suggest that using direct, temporally specific miRNA137 targets significantly improved the detection of biological mechanisms underlying its relationship with psychosis, clarified the association between schizophrenia and related conditions, and suggested association with specific symptomatology domains at different developmental stages of the disorder.",

    "abstract": "Metabolic dysfunction-associated steatotic liver disease (MASLD) is a globally prevalent disease, yet its genetic architecture remains incompletely characterized. We integrated genome-wide association study data from multiple cohorts totaling nearly 3 million individuals of European ancestry and applied cross-trait genomic modeling of hepatic fat and seven cardiometabolic traits to construct an MASLD-specific polygenic architecture. We identified 128 risk variants across 100 loci and prioritized 55 effector genes, including established (e.g., PNPLA3 and TM6SF2) and previously unreported candidates (e.g., NRXN3 and FRMD5). A phenome-wide scan of the MASLD polygenic risk score revealed broad associations spanning hepatic, cardiometabolic, renal, endocrine, and neuropsychiatric systems. Using a two-step, proteome-wide Mendelian randomization across >4900 plasma proteins, we identified potential mediators linking MASLD to disease. Validation in population-based cohort pinpointed seven proteins (e.g., FURIN, aldehyde dehydrogenase 2, and apolipoprotein M) mediating up to 50.6% of the cardiometabolic risk attributable to MASLD. Our findings delineate the polygenic architecture of MASLD, highlight its multisystem consequences, and nominate translational biomarkers for precision prevention.",

    "title": "Natural history and phenotype-genotype correlations in GJB2-related hearing loss: a systematic and comprehensive review.",
    "abstract": "GJB2-related hearing loss is the most common type of hereditary deafness worldwide. However, its complex inheritance patterns, diverse phenotypic manifestations, and population-specific variant spectrum present significant challenges for both clinical practice and research. This review synthesizes evidence from 215 studies (7967 patients) to quantitatively analyze the natural history and genotype-phenotype correlations across different inheritance patterns, including recessive, dominant, and digenic forms. Among V37I, the V37I/NT genotype is associated with a high proportion of mild-to-moderate hearing loss (84.15%), and the V37I/T genotype shows a flatter configuration than V37I/V37I. An analysis of 178 syndromic cases reveals complex phenotypes involving both the skin and auditory system, characterized by early-onset and severe hearing loss, with clear genotype-phenotype correlations for specific variants. We also summarize genomic and epigenetic mechanisms contributing to phenotypic severity. With a focus on clinical translation, we review the trajectory of GJB2 gene therapy research, from foundational animal studies to innovative therapeutic strategies approaching clinical application. By evaluating the natural history and genotype-specific auditory profiles, this work provides a practical evidence base to guide prognosis, genetic counseling, and crucially, the design of upcoming clinical trials, including patient selection and efficacy assessment. This review is registered with PROSPERO (CRD420251243620).",

    "abstract": "Albizia julibrissin is an ecologically and economically significant tree species in the arid regions of Xinjiang, China, valued for its ornamental, medicinal, and environmental functions. In recent years, symptoms of canker disease have been observed on A. julibrissin across multiple locations in Xinjiang, raising concerns about tree health and survival. During the 2023 and 2024 growing seasons, symptomatic branch and trunk samples were collected from three representative regions (Aksu, Kashi, and Tumushuk), where field incidence of canker disease ranged from 16 to 20% based on visual assessments. A total of 128 fungal isolates were obtained from 85 symptomatic samples. Among these, 112 isolates belonged to the Botryosphaeriaceae family, with Botryosphaeria dothidea (81.3%), Diplodia seriata (10.7%), and Neoscytalidium dimidiatum (8.0%) being the dominant species consistently recovered from canker lesions. The main fungal species were identified through phenotypic observations; multilocus DNA analysis targeting the internal transcribed spacer, beta-tubulin, and translation elongation factor gene regions; and pathogenicity testing. Pathogenicity assays were conducted by inoculating mycelial plugs onto wounded branches of healthy A. julibrissin saplings under controlled conditions. Disease progression was monitored, and virulence was quantified based on lesion length. Results confirmed that B. dothidea, N. dimidiatum, and D. seriata are the primary causal agents of A. julibrissin canker disease in Xinjiang, with B. dothidea being the most frequently isolated and most virulent species. This is the first report of these pathogens causing canker on A. julibrissin in Xinjiang, providing a foundation for further studies on disease epidemiology and control in arid regions.",

    "title": "Tissue Type and Cultivar-by-Isolate Interactions Govern Walnut (Juglans regia) Resistance to Diaporthe eres in T\u00fcrkiye.",
    "abstract": "Diaporthe eres is increasingly reported as a causal agent of canker, shoot dieback, and fruit rot of walnut (Juglans regia L.) in diverse production regions. In this study, multi-locus phylogenetic analysis using ITS, tef1, and tub2 gene sequences confirmed that two isolates, ED 5/4 (Edirne) and BUR 7/4 (Bursa), belong to D. eres sensu stricto, showing 99-100% sequence identity with ex-type strain AR5193 in BLASTn analysis and clustering with high bootstrap support in Maximum Likelihood phylogenetic trees. Pathogenicity assays conducted on green fruits, current-season shoots, and one-year-old dormant branches of seven cultivars revealed strong and statistically significant cultivar \u00d7 isolate interactions, demonstrating that resistance responses were highly isolate-specific. Isolate BUR 7/4 displayed higher virulence overall than ED 5/4. Lesion development differed markedly among tissue types, with current-season shoots consistently exhibiting substantially greater necrosis than one-year-old dormant branches, indicating a pronounced influence of tissue ontogeny on host susceptibility. Cultivar performance varied among tissues: 'Chandler' showed the greatest resistance in woody tissues, whereas 'Fernor' and 'Orman 77' were consistently susceptible. Fruit assays demonstrated variable husk susceptibility but uniformly severe, cultivar-independent kernel decay, indicating the absence of internal resistance once the husk barrier was breached. D. eres was re-isolated from all symptomatic tissues while controls remained healthy, fulfilling Koch's postulates. These results establish D. eres as an important contributor to walnut canker and fruit rot in T\u00fcrkiye and emphasize the roles of tissue-specific susceptibility, isolate diversity, and cultivar-dependent responses in shaping disease outcomes and informing resistance-based management strategies.",

    "title": "High-resolution SNP genotyping provides insight into the introduction and dissemination of Grapevine flavescence dor\u00e9e phytoplasma in Switzerland.",
    "abstract": "Flavescence dor\u00e9e is a quarantine grapevine disease transmitted by Scaphoideus titanus that was first detected north of the Swiss Alps in 2015 and has since progressively spread in western Switzerland, while its introduction routes and local dissemination dynamics remained poorly understood. To clarify these processes, we applied a molecular epidemiology approach combining MLST based on established markers (map, dnaK, vmpA, malG) with high-resolution SNP genotyping using newly developed loci to investigate FDp spatiotemporal dynamics and genetic diversity. Between 2015 and 2022, 4,212 symptomatic grapevines were sampled across Vaud, Valais, and Geneva, of which 26.3% tested positive for FDp. Established markers revealed highly homogeneous profiles, with all samples sharing the same genotypes (map M54, dnaK1, vmpA group II), supporting introduction through infected planting material. The malG locus alone distinguished only three profiles, but when combined with eight novel SNP markers, nine multilocus genotypes were identified, providing a finer resolution of FDp population structure. Our results provide the first genome-informed overview of FDp epidemiology in Swiss vineyards north of the Alps, highlighting the combined roles of planting material and local dissemination in shaping epidemic dynamics. The newly identified SNP markers enhance genotyping resolution and provide valuable tools for investigating phytoplasma spread and improving future surveillance strategies.",

    "title": "Dissecting the shared genetic architecture of bipolar disorder, major depressive disorder, and attention-deficit hyperactivity disorder.",
    "abstract": "Major depressive disorder (MDD), bipolar disorder (BPD), and attention-deficit hyperactivity disorder (ADHD) are prevalent, highly heritable psychiatric disorders with significant degrees of genetic overlap. Using open-sourced summary statistics from the Psychiatric Genomics Consortium and 1000 Genomes European reference panel, we fit a latent factor model (F1) capturing the shared genetic liability across MDD, BPD, and ADHD. Multivariate GWAS identified 350 linkage disequilibrium-independent loci, 105 of which have not been previously reported by the contributing univariate GWASs. Univariate, bivariate, and trivariate mixture models elucidated both shared and trait-specific polygenicity across the disorders. Gene-level analysis with Hi-C coupled MAGMA identified a total of 2936 novel dopaminergic associations across the constituent disorders that went undetected in univariate analyses. Among the top genes associated with F1, protein tyrosine phosphatase receptor type D emerged as a promising candidate. Cell typing and brain tissue enrichment for F1 further implicated the cerebellum and cholinergic neurons. These findings demonstrate how multivariate approaches can elucidate shared biological mechanisms, providing new etiological insights into individual disorders and implicating therapeutic targets for the treatment of psychiatric comorbidity.",

    "abstract": "A novel Synchytrium species, Synchytrium gangeticum, sp. nov. (Chytridiomycota: Synchytriaceae), is described as the causal agent of wart disease in Andrographis paniculata (a medicinally important herb) in northern India. Synchytrium gangeticum exhibits host specificity toward A. paniculata, inducing the formation of small, raised, red/brown galls on leaves and stems, with rapid spread observed during early rainy seasons. The microscopic analysis revealed distinct spore morphology and gall development, characteristic of a long-cycled Synchytrium species. It is distinguished by unique resting spore dimensions (90-170\u00a0\u00b5m) and sporangium size (40-70\u00a0\u00b5m) and produces uniflagellate zoospores measuring 1-3\u00a0\u00b5m. Phylogenetic analyses, based on rDNA gene cluster (internal transcribed spacer [ITS], 18S, and 28S), positioned S. gangeticum closest to Synchytrium collapsum, but with significant morphological, and genetic divergence. This study presents the first comprehensive description of a Synchytrium species pathogenic to A. paniculata, providing insights into its host specificity, life cycle, and phylogenetic relationship within the genus.",

    "title": "Genomic characterization of multidrug-resistant Klebsiella pneumoniae from an outbreak in Northeastern Brazil: mechanisms of virulence and resistance.",
    "abstract": "Klebsiella pneumoniae is an important nosocomial pathogen, considered a critical threat to public health, but its genomic data are scarce in Brazil. Therefore, the aim of this study was to identify the mechanisms of virulence and antimicrobial resistance and to evaluate the molecular epidemiology of K. pneumoniae isolates from an outbreak in a university hospital in Brazil. The DNA of the 25 isolates was sequenced, the functional annotation of the genome was performed in Prokka, for virulence and resistance analyses PanViTa was used, and for Multilocus Sequence Typing analyses pyMLST was used. The isolates presented several virulence genes such as those of the fim operon, ecp operon, and T6SS (identified in all isolates), which are related to adhesion, biofilm formation, and toxin delivery. Other predicted virulence genes involve nutritional/metabolic factors, effector delivery systems, and immune modulation, while resistance genes mainly involve efflux (AcrAB-TolC, KpnGH-TolC, OqxAB, and KpnEF), antibiotic target alteration, reduced permeability, and antibiotic inactivation. In addition, the resistance genes identified in K. pneumoniae isolates are related to a total of 28 antimicrobials from different classes. The sequence types (ST) 11, 273, 395, 5209 and 636 were identified, this being the first report of the ST636 in Brazil. Genomic analysis confirmed the presence of complex virulence and antimicrobial resistance mechanisms, highlighting the threat these pathogens pose and raising concerns about the introduction of ST636 into Brazil, emphasizing the complexity of local strains and the need for continuous surveillance.",

    "abstract": "Species of the ascomycetous genus Cladobotryum (Hypocreales, Hypocreaceae) are ecologically and economically important mycoparasites that cause cobweb disease in cultivated and wild mushrooms. Despite their significance as fungal pathogens and producers of bioactive metabolites, the taxonomy of Cladobotryum remains unresolved due to extensive morphological plasticity, complex teleomorph-anamorph connections, and the presence of cryptic species. This study employs an integrative approach combining micro- and macromorphological characterization, multi-locus phylogeny (ITS, rpb2, and tef-1a), and comparative genomics to clarify the taxonomic position of the Greek isolate Cladobotryum sp. ATHUM 6904, previously designated as an unclassified red-pigmented (URP) strain. Phylogenetic analyses demonstrated that URP strains form a distinct, well-supported clade closely related to C. tenue and C. rubrobrunnescens, yet genetically and morphologically distinct from both. Comparative genomic analyses of isolate ATHUM 6904 and the ex-type strains of C. tenue and C. rubrobrunnescens revealed pronounced divergence in transposable element content, mitochondrial genome architecture, gene order, orthologous gene composition, secondary metabolite biosynthetic potential, and overall genomic distance. Micro- and macromorphological comparisons further supported the differentiation of isolate ATHUM 6904 from both reference species. Based on the combined molecular, morphological, and genomic evidence, the Greek isolate ATHUM 6904 is described as a novel species, Cladobotryum rhodochroum sp. nov.",

    "title": "Comparative genomic surveillance of carbapenem-resistant Acinetobacter baumannii in the Netherlands in 2015-2017 and 2022-2024.",
    "abstract": "We investigated the genomic epidemiology of carbapenem-resistant Acinetobacter baumannii (CRAb) during two surveillance periods: 2015-2017 (pilot 1) and 2022-2024 (pilot 2) in an international context to identify potential circulating high-risk lineages in the Netherlands. A total of 204 CRAb isolates were all analyzed by the carbapenem inactivation method, meropenem Etest, and whole-genome sequencing (combining Illumina and Nanopore). Comparative resistome, multilocus sequence typing (MLST), and whole-genome MLST (wgMLST) analyses were performed between pilots and compared to 577 international CRAb genomes. The Dutch CRAb population remained genetically diverse and stable between pilots and was dominated by international clone (IC)2 (61.8%), followed by IC9 (11.3%), IC1 (6.4%), and IC6 (5.9%). Also, epidemiological and clinical characteristics remained stable across both pilots. In contrast, CRAb in patients from Ukraine was genetically diverse and an epidemiologically distinct group. wgMLST indicated an increase in genetic clustering in 2022-2024, with unique CRAb clusters associated with Ukrainian patients. Of 26 identified clusters, 69% were linked to international sources. Differences in resistomes were observed between CRAb in patients from the Netherlands and Ukraine, and between pilots. Overall, 75% of isolates harbored blaOXA-23-like genes, and blaNDM genes increased from 16% to 21%. None of the CRAb isolates from Ukrainian patients carried blaNDM genes; instead, they harbored blaOXA-23-like and blaOXA-24-like genes. Hybrid assemblies showed that carbapenemase genes were predominantly chromosomal. In conclusion, CRAb in the Netherlands showed genetic stability over time, yet the presence of New Delhi metallo-\u03b2-lactamase-carbapenemases and import of strains from high-risk regions underline the necessity for ongoing national surveillance.IMPORTANCEIn 2015-2017 and 2022-2024, pilot surveillance of carbapenem-resistant Acinetobacter baumannii (CRAb) was performed in the Netherlands. Three distinct groups were compared based on epidemiological and genomic data: CRAb from 2015 to 2017 and for the 2022-2024 period, CRAb in patients from the Netherlands, and CRAb in patients from Ukraine in the Netherlands. The genomic epidemiology of CRAb has been mostly stable between 2015-2017 and 2022-2024 but seems to be strongly affected by the introduction of CRAb from foreign countries. A proportion of the 2022-2024 isolates were from Ukrainian patients. The resistance genes of CRAb from Ukrainian patients were different from those of the Netherlands. CRAb in the Netherlands are acquiring New Delhi metallo-\u03b2-lactamase-carbapenemase genes, aided by the introduction of CRAb from foreign countries. Healthcare professionals should remain aware of the risk of hospitalization in a high-risk country and the potential secondary transmission of CRAb to patients in countries with a low prevalence of this organism.",

    "abstract": "Phytoplasmas are obligate bacterial pathogens transmitted by phloem-feeding insects and responsible for severe diseases in numerous crops worldwide. In Iran, insect-associated phytoplasma transmission pathways remain poorly resolved, particularly at fine phylogenetic and vector-specific scales. Here, we investigated phytoplasma strains detected in four plant species, grapevine (Vitis vinifera), soybean (Glycine max), barberry (Berberis vulgaris), and the weed Conyza canadensis, and in three potential insect vectors (Tropidocephala prasina, Eysarcoris ventralis, and Nysius graminicola) collected from distinct agroecosystems across Iran. Phytoplasmas were characterized by using nearly full-length 16S rRNA gene sequences and a multilocus dataset of protein-coding genes obtained through a targeted next-generation sequencing approach. Five phytoplasma strains belonging to ribosomal groups 16SrI, 16SrVI, 16SrIX, and 16SrXII were identified, including two novel ribosomal subgroups, 16SrI-AS and 16SrIX-K. Several previously unreported plant-phytoplasma and insect-phytoplasma associations were documented. Comparative phylogenetic analyses revealed that ribosomal and multilocus markers capture complementary evolutionary signals, with protein-coding genes providing additional resolution beyond 16S-based classification. These findings highlight the potential role of diverse hosts and polyphagous insects, not yet confirmed as vectors, in phytoplasma circulation and underscore how high-throughput next-generation sequencing and multilocus approaches advance our understanding of phytoplasma diversity and evolution.",

    "abstract": "Invasive pneumococcal disease (IPD) results from the dissemination of Streptococcus pneumoniae to normally sterile anatomical sites such as the bloodstream or cerebrospinal fluid. One of the primary roles of pneumococcal conjugate vaccines (PCVs) used in Romania is to reduce the burden of pneumococcal disease. This single-center retrospective study provides an updated overview of IPD epidemiology in a Romanian tertiary hospital. We analyzed 67 IPD cases identified between 2017 and 2023, of which 45 isolates underwent whole-genome sequencing followed by multilocus sequence typing. Results of genome sequence analysis revealed a diverse population of pneumococci, underlining the importance of continuous genomic surveillance. Expanded-valency pneumococcal conjugate vaccines (PCVs), particularly PCV20, showed markedly improved serotype coverage compared to PCV7 and PCV13, while PCV21 showed serotype coverage comparable to that of PCV13. Antimicrobial susceptibility testing revealed sustained resistance to beta-lactams, particularly among meningitis isolates, underscoring the need for targeted antibiotic stewardship and continuous monitoring of local resistance trends. Overall, these findings highlight the evolving epidemiology of invasive pneumococcal disease in Romania, in the post-PCV era, and the need to adapt vaccination and treatment strategies accordingly.",

    "title": "Isolation, Identification, and Molecular Characterization of Mycoplasma bovis from Beef Cattle in Kunming, and Development of a SYBR Green qPCR Assay.",
    "abstract": "Mycoplasma bovis (M. bovis) is a major pathogen responsible for bovine respiratory disease, mastitis, and arthritis, causing significant economic losses to the cattle industry worldwide. To elucidate the genetic and biological characteristics of M. bovis circulating in Yunnan Province, China, twenty PCR-positive bovine respiratory samples were collected from cattle farms in Kunming; three isolates-M.bo-YNXD-1, A1, and A8-were successfully cultured and identified through colony morphology, biochemical assays, and molecular characterization. Antimicrobial susceptibility testing showed that M.bo-YNXD-1 exhibited multidrug resistance to six antibiotics, including ciprofloxacin and lincomycin, while A1 and A8 were resistant to one or two agents, respectively. Multilocus sequence typing (MLST) analysis revealed that isolates M.bo-YNXD-1 and M.bo-YNXD-A8 belonged to sequence type ST52, whereas isolate M.bo-YNXD-A1 was assigned to ST90, indicating the coexistence of distinct genetic lineages in this region. Virulence gene screening showed that isolate M.bo-YNXD-A8 was positive for VspX and p81, whereas all three isolates were positive for p48 and Vpam. A SYBR Green I-based quantitative PCR (qPCR) assay targeting the oppD/F gene was established, exhibiting high specificity, a detection limit of 10 copies/\u03bcL, and intra-/inter-assay variation below 3%. Validation using clinical samples demonstrated superior sensitivity compared with conventional PCR. Taken together, these findings indicate the presence of distinct MLST genotypes and virulence-associated genetic heterogeneity among regional Mycoplasma bovis isolates, and introduce a rapid, sensitive, and reliable qPCR assay for early detection and epidemiological surveillance. This study provides critical insights for rational antimicrobial use and targeted control strategies against M. bovis infections.",

    "abstract": "Staphylococcus aureus (S. aureus), especially Methicillin-resistant Staphylococcus aureus (MRSA), remains a major public health concern both in hospital and community settings. The MRSA carriage situation among schoolchildren in Vietnam is limited. A cross-sectional study was conducted in March 2023 to assess the prevalence, antimicrobial resistance patterns, and molecular characteristics of MRSA among schoolchildren in Nha Trang, Vietnam. Schoolchildren from grades 1 to 12 (ages 6-18 yrs) were enrolled. Background epidemiological data and nasal swabs were collected. Nasal samples were processed at the Pasteur Institute in Nha Trang, Vietnam, for S. aureus culture. Out of 1210 participants enrolled, S. aureus prevalence was 18.3% (222/1210), of which 41% (91/222) were MRSA. Primary school children showed the highest prevalence of MRSA colonization (48%), 32.8% in secondary, and 27.8% in high school. Among MRSA isolates, high levels of resistance were detected against trimethoprim-sulfamethoxazole (100%), erythromycin (68.2%) and clindamycin (45.1%). Multidrug resistance (MDR) occurred in 30% (27/90) of MRSA isolates. Staphylococcal cassette chromosome mec (SCCmec) subtype IVa was dominant (66.0%), followed by type IV (7.0%) and type V (6.0%). MLST data revealed genetic diversity whereby ST45 dominated, followed by ST546 and ST188. Continuous MRSA surveillance is essential to monitor emerging strains in the communities.",

    "abstract": "Global warming has changed snowfall patterns in recent years worldwide, which affected the timing and severity of wheat stripe rust outbreaks. In wheat-growing areas of Xinjiang, China, where cold temperatures prevail and snow typically accumulates after cultivation, stripe rust epidemics have traditionally emerged after snowmelt. However, the recently delayed snowfall in some regions has led to earlier-than-expected outbreaks. The role of spores of different Puccinia striiformis f.sp. tritici (Pst) genotypes surviving under snow remains largely unexplored. We performed Pst sampling at three stages in the Yili region of Xinjiang: (i) previous crop in summer May 2023, (ii) early infection before snowfall in the next winter cropping season during December 2023, and (iii) post-snowmelt sampling from the same crop in March 2024. We used 17 SSR markers to genotype 486 Pst isolates. Our findings revealed that snow survival enables cold-tolerant strains of Pst, contributing to the early stripe rust epidemics in the Yili region of Xinjiang in December 2023. Structure analysis revealed a similar genetic group across different seasons and before and after snowmelt populations. MLG analysis identified that MLG-1 and MLG-2 persisted from the summer 2023 crop, early winter seedlings before snow, and after snowmelt in the 2024 crop. While some multilocus genotypes, such as MLG_60, MLG_62, MLG_67, and MLG_83, are not viable under snow cover, the genetic diversity of Pst declined between summer and early winter crops (Simpson diversity = 0.8 to 0.7). The genetic diversity of Pst increased between before and after the snowmelt crop (Simpson diversity = 0.7 to 0.9). It suggested that a possible invasion of migratory genotypes or continued sporulation happened after infection beneath the snow. The cold-tolerant strains of Pst (MLG1 and MLG2) are responsible for the early epidemic in the Yili region of Xinjiang during seedling stage, where temperatures are below freezi     "abstract": "The genus Mycobacterium, including Mycobacterium tuberculosis and over 200 nontuberculous mycobacteria (NTM), shows wide variability in clinical outcomes and drug susceptibility. Although culture-based identification remains the gold standard, slow mycobacterial growth delays diagnosis and treatment. In this study, we evaluated a novel culture-free method for subspecies-level identification directly from sputum. In this single-center prospective cohort study at Osaka Toneyama Medical Center, we analyzed 125 sputum samples from 115 patients with NTM pulmonary disease and 10 with non-NTM respiratory conditions. Samples were decontaminated using N-acetyl-L-cysteine-sodium hydroxide (NALC-NaOH) or succinic acid. We compared the reference culture method (mycobacterial culture plus whole-genome sequencing) and a culture-free direct target capture sequencing method. Core genome multi-locus sequence typing identified subspecies in both workflows, covering 186 mycobacterial species, including M. tuberculosis. The 115 NTM cohort specimens yielded 57 smear-positive and 93 culture-positive results. The identified subspecies included 48 Mycobacterium avium subsp. hominissuis, 22 Mycobacterium intracellulare subsp. intracellulare, 5 subsp. chimaera, 7 Mycobacterium abscessus subsp. abscessus, 5 subsp. massiliense, 1 M. tuberculosis, and 5 other NTM species. The culture-free method showed a high identification rate for smear-positive specimens (75.4%) but a low identification rate for smear-negative specimens (13.9%). NALC-NaOH pretreatment resulted in higher accuracy (90.5%) than did succinic acid pretreatment (66.7%). Thus, our culture-free subspecies-level identification method achieved high accuracy, especially in alkaline-treated smear-positive sputum samples, achieving rates above 90%. This method is recommended in clinical practice for patients who require rapid diagnosis and timely initiation of appropriate treatment, bypassing time-consuming culture steps     let currentCategory = 'all';
    let searchQuery = '';
    let yearFilter = '';
    let sortOrder = 'newest';

    function renderPapers() {
      const container = document.getElementById('papers-container');
      
      let filtered = papersData.filter(p => {
        // Category filter
        if (currentCategory !== 'all' && p.category !== currentCategory) return false;
        
        // Year filter
        if (yearFilter && p.year != yearFilter) return false;
        
        // Search filter
        if (searchQuery) {
          const query = searchQuery.toLowerCase();
          const text = (p.title + ' ' + p.authors + ' ' + p.journal + ' ' + p.abstract).toLowerCase();
          return text.includes(query);
        }
        
        return true;
      });
      
      // Sort
      filtered.sort((a, b) => {
        if (sortOrder === 'newest') {
          return (b.year || 0) - (a.year || 0);
        } else {
          return (a.year || 0) - (b.year || 0);
        }
      });
      
      if (filtered.length === 0) {
        container.innerHTML = '<div class="no-results">No papers found matching your criteria.</div>';
        return;
      }
      
      container.innerHTML = filtered.map(paper => `
        <div class="paper-card" data-category="${paper.category}">
          <div class="paper-header">
            <div class="paper-meta">
              <span class="paper-year">${paper.year || 'N/A'}</span>
              <span class="category-badge ${paper.category}">${paper.category}</span>
            </div>
          </div>
          <div class="paper-title-container">
            <div class="paper-title">${paper.title}</div>
            <button class="copy-btn" onclick="copyToClipboard('${paper.PMID}', this)">📋 Copy PMID</button>
          </div>
          <div class="paper-authors">${paper.authors}</div>
          <div class="paper-journal">${paper.journal}</div>
          ${paper.abstract ? `<div class="paper-abstract">${paper.abstract}</div>` : ''}
          <div class="paper-links">
            ${paper.PMID ? `<a href="https://pubmed.ncbi.nlm.nih.gov/${paper.PMID}/" target="_blank">🔗 PubMed</a>` : ''}
            ${paper.DOI ? `<a href="https://doi.org/${paper.DOI}" target="_blank">📄 DOI</a>` : ''}
          </div>
        </div>
      `).join('');
    }

    function filterByCategory(category) {
      currentCategory = category;
      document.querySelectorAll('.category-tab').forEach(tab => {
        tab.classList.toggle('active', tab.dataset.category === category);
      });
      renderPapers();
    }

    function copyToClipboard(text, btn) {
      navigator.clipboard.writeText(text).then(() => {
        btn.textContent = '✓ Copied!';
        btn.classList.add('copied');
        showToast();
        setTimeout(() => {
          btn.textContent = '📋 Copy PMID';
          btn.classList.remove('copied');
        }, 2000);
      });
    }

    function showToast() {
      const toast = document.getElementById('toast');
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2000);
    }

    function exportData() {
      const dataStr = JSON.stringify(papersData, null, 2);
      const blob = new Blob([dataStr], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'digenic_oligogenic_papers.json';
      a.click();
      URL.revokeObjectURL(url);
    }

    // Event listeners
    document.getElementById('search-input').addEventListener('input', (e) => {
      searchQuery = e.target.value;
      renderPapers();
    });

    document.getElementById('year-input').addEventListener('input', (e) => {
      yearFilter = e.target.value;
      renderPapers();
    });

    document.getElementById('sort-order').addEventListener('change', (e) => {
      sortOrder = e.target.value;
      renderPapers();
    });

    // Initial render
    renderPapers();
  </script>
