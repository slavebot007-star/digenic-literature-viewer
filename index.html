  <style>
    :root {

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {

      color: var(--text-primary);

      text-align: center;

      margin-bottom: 2rem;

      -webkit-text-fill-color: transparent;
    }

    .subtitle { color: var(--text-secondary); font-size: 1.1rem; }

    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 1rem;
      margin: 2rem 0;
    }

    .stat-card {
      background: var(--bg-secondary);
      padding: 1.5rem;
      border-radius: 12px;
      border: 1px solid var(--border);
      text-align: center;
    }

    .stat-value { font-size: 2rem; font-weight: 700; color: var(--accent); }
    .stat-label { color: var(--text-secondary); font-size: 0.9rem; }

      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      margin-bottom: 2rem;
      padding: 1.5rem;
      background: var(--bg-secondary);
      border-radius: 12px;
      border: 1px solid var(--border);
    }

      background: var(--bg-primary);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-primary);
      font-size: 1rem;

      left: 0.75rem;

      border-radius: 8px;
      color: var(--text-primary);
      cursor: pointer;
      font-size: 0.9rem;
      transition: all 0.2s;
    }

    button:hover, select:hover { border-color: var(--accent); }
    button.primary { background: var(--accent); border-color: var(--accent); }
    button.primary:hover { background: var(--accent-hover); }

    .category-tabs {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 2rem;
      flex-wrap: wrap;
    }

    .category-tab {
      padding: 0.75rem 1.5rem;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .category-tab.active {
      background: var(--accent);
      border-color: var(--accent);
    }

    .category-tab[data-category="tools"].active { background: var(--category-tools); border-color: var(--category-tools); }
    .category-tab[data-category="clinical"].active { background: var(--category-clinical); border-color: var(--category-clinical); }
    .category-tab[data-category="review"].active { background: var(--category-review); border-color: var(--category-review); }

    .category-badge {
      display: inline-block;
      padding: 0.25rem 0.75rem;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
    }
    .category-badge.tools { background: var(--category-tools); color: white; }
    .category-badge.clinical { background: var(--category-clinical); color: white; }
    .category-badge.review { background: var(--category-review); color: white; }

    .papers-list { display: flex; flex-direction: column; gap: 1rem; }

    .paper-card {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
      transition: all 0.2s;
    }
    .paper-card:hover { border-color: var(--accent); transform: translateY(-2px); }

      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 0.75rem;
      flex-wrap: wrap;
      gap: 0.5rem;

    .paper-year {
      background: var(--accent);
      color: white;
      padding: 0.25rem 0.75rem;
      border-radius: 20px;
      font-size: 0.85rem;
      font-weight: 600;

      align-items: flex-start;

      margin-bottom: 0.5rem;

      font-weight: 600;
      color: var(--text-primary);
      line-height: 1.4;
      flex: 1;

      padding: 0.25rem 0.5rem;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 4px;
      font-size: 0.75rem;
      color: var(--text-muted);
      cursor: pointer;
      white-space: nowrap;

    .copy-btn:hover { border-color: var(--accent); color: var(--accent); }
    .copy-btn.copied { background: var(--success); border-color: var(--success); color: white; }

    .paper-authors { color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 0.25rem; }
    .paper-journal { color: var(--text-muted); font-size: 0.85rem; font-style: italic; margin-bottom: 0.75rem; }

    .paper-abstract {
      background: var(--bg-primary);
      padding: 1rem;
      border-radius: 8px;
      border-left: 3px solid var(--accent);
      font-size: 0.9rem;
      color: var(--text-secondary);
      margin-bottom: 0.75rem;
      max-height: 200px;
      overflow-y: auto;
    }

    .paper-links { display: flex; gap: 0.75rem; margin-top: 1rem; }
    .paper-links a {
      color: var(--accent);
      text-decoration: none;
      font-size: 0.85rem;
      display: flex;
      align-items: center;
      gap: 0.25rem;
    }
    .paper-links a:hover { text-decoration: underline; }

    .no-results { text-align: center; padding: 3rem; color: var(--text-muted); }

    .toast {

      right: 2rem;
      background: var(--success);
      color: white;
      padding: 1rem 1.5rem;
      border-radius: 8px;

    }
    .toast.show { opacity: 1; transform: translateY(0); }

    @media (max-width: 768px) {
      .container { padding: 1rem; }
      h1 { font-size: 1.75rem; }
      .controls { flex-direction: column; }
      .search-box { min-width: 100%; }
      .category-tabs { justify-content: center; }
    }
  </style>
</head>

    "title": "Nucleoporin NUP210L and BAF-paralogue BAF-L redundantly ensure nuclear integrity and manchette microtubule organisation in mouse spermatids.",
    "authors": "Maha Al Dala Ali; Guy Longepied; Nicolas L\u00e9vy; Catherine Metzler-Guillemain; Michael J Mitchell",

    "doi": "10.1093/hmg/ddaf194",
    "abstract": "During spermiogenesis, round spermatids differentiate into spermatozoa. This involves nuclear elongation and condensation, acrosome spreading, and flagellum formation, orchestrated by cytoskeletal elements-acroplaxome and manchette-that attach to the nuclear envelope (NE) except at the caudal pole where nuclear pore complexes (NPCs) form a dense array. Evidence that the NPC contributes structurally to nuclear remodelling comes from a unique case of human male infertility, lacking the spermatid-specific nucleoporin NUP210L, where most sperm heads are round and uncondensed. Mice lacking NUP210L are fertile, however, producing essentially normal spermatozoa. Here, we reveal function at the caudal NE in mice lacking NUP210L and BAF-L, a spermatid-specific paralogue, and interactor, of chromatin protein BAF. Like NUP210L, BAF-L localises at the caudal NE in human elongating spermatids, and its inactivation in mouse has little impact on sperm morphology or fertility. We show here, however, that in mice lacking NUP210L, two copies of BAF-L become essential for fertility. In Banf2+/-, Nup210l-/- and Banf2-/-, Nup210l-/- mice, most spermatids arrest during elongation (step 10-11), manchette microtubules frequently invaginate elongating nuclei from the caudal pole, and the NPC array forms at steps 8-10 but shows reduced stability later at steps 12-16. We show that BAF-L interactor, BAF, also concentrates at the caudal pole (step 8-9), independently of NPCs. We propose that BAF-L and NUP210L optimise interactions between NPC, chromatin and the cytoskeleton, to ensure nuclear integrity and fertility. Our study implies that digenic inheritance of mutations in non-homologous genes should be considered when investigating genetic causes of human male infertility.",
    "source": "pubmed_2019_2026",

    "PMID": "41386981",
    "title": "The oligogenic inheritance test GCOD detects risk genes and their interactions in congenital heart defects.",
    "authors": "Maureen Pittman; Kihyun Lee; Franco Felix; Yu Huang; Adrienne Lam et al. (8 authors)",
    "journal": "Genome research",
    "year": "2026",
    "doi": "10.1101/gr.281141.125",
    "abstract": "Exome sequencing of thousands of families has revealed many risk genes for congenital heart defects (CHDs), yet most cases cannot be explained by a single causal mutation. Even within the same family, individuals carrying a particular mutation in a known risk gene often demonstrate variable phenotypes, suggesting the presence of genetic modifiers. To explore oligogenic causes of CHD without assessing billions of variant combinations, we develop an efficient, simulation-based method to detect gene sets that carry co-occurring damaging variants in probands at a higher rate than expected given parental genotypes. We implement this approach in software called Gene Combinations in Oligogenic Disease (GCOD) and apply it to a cohort of 3377 CHD trios with exome sequencing. This analysis detects 160 gene pairs in which damaging variants are transmitted with higher-than-expected frequency to CHD probands but rarely or never appear in combination in their unaffected parents. Stratifying by specific phenotypes and considering gene combinations of higher orders yields an additional 6026 gene sets. Genes found in oligogenic sets are overrepresented in pathways related to heart development and often co-occur in sets of cell type marker genes from single-cell expression data. Compound heterozygosity of the newly identified digenic pair Gata6-Por leads to higher CHD incidence in mice compared with single hemizygotes, validating predicted genetic interactions. As genome sequencing is applied to more families and other disorders, GCOD will enable detection of increasingly large, novel gene combinations, shedding light on combinatorial causes of genetic diseases.",
    "source": "pubmed_2019_2026",
    "category": "clinical"

  {
    "PMID": "41167194",
    "title": "Revealing the nervous system requirements of Alzheimer disease risk genes in Drosophila.",
    "authors": "Jennifer M Deger; Shabab B Hannan; Mingxue Gu; Colleen E Strohlein; Lindsey D Goodman et al. (19 authors)",
    "journal": "American journal of human genetics",
    "year": "2025",
    "doi": "10.1016/j.ajhg.2025.10.003",
    "abstract": "Most Alzheimer disease (AD) susceptibility genes have poorly understood roles in the central nervous system (CNS). To address this gap, we systematically characterized 100 conserved candidate AD risk genes using a cross-species strategy in the fruit fly, Drosophila melanogaster. Genes were prioritized based primarily on human functional genomic evidence. We generated custom loss-of-function alleles for each of the conserved fly orthologs. Most of the genes are expressed in the adult brain, including 24 neuron- and 13 glia-specific expression patterns. Overall, we identify 50 candidate AD risk gene homologs with requirements for CNS structure or function, including 18 whose loss of function causes neurodegeneration (e.g., Snx6/SNX32 and ClC-a/CLCN1), 35 required for neurophysiology (e.g., Arr1/ARRB2 and stai/STMN4), and eight with diminished CNS resilience following a thermal or mechanical stress (e.g., cindr/CD2AP and Amph/BIN1). In a parallel screen, we found 28 AD risk gene homologs (e.g., Ets98B/SPI1 and Yod1/YOD1) that modify the neurotoxicity of either amyloid-\u03b2 peptide or tau protein, which aggregate to form AD pathology. To translate our findings back to human AD, we used oligogenic risk scores based on gene clusters with shared nervous system phenotypes in flies, pinpointing functional pathways that differentially drive AD risk. Our results-available online via the Alzheimer's Locus Integrative Cross-species Explorer portal-reveal nervous system requirements for dozens of AD risk genes and may enable dissection of causal heterogeneity in AD.",

  {
    "PMID": "40934922",
    "title": "Global impact of micronutrients in modern human evolution.",
    "authors": "Jasmin Rees; Sergi Castellano; Aida M Andr\u00e9s",

    "doi": "10.1016/j.ajhg.2025.08.005",
    "abstract": "Micronutrients are essential components of the human diet, but dietary levels above or below their narrow, recommended range are harmful. Deficiencies increase the risk of stunted growth and metabolic, infectious, and respiratory disorders, and have likely been pervasive in human history, as local soils poor in micronutrients are widespread. Deficiencies are also common today, affecting approximately 2 billion people. Limited evidence exists for selenium, zinc, iodine, and iron deficiencies driving local adaptation in a few human populations, but the broader potential role of micronutrients in shaping modern human evolution remains unclear. Here, we investigate signatures of positive selection in 276 genes associated with 13 micronutrients and evaluate whether human adaptation across global populations has been driven by micronutrients. We identify known and previously undescribed instances of rapid local adaptation in micronutrient-associated genes in particular populations, including previously undescribed individual signatures of adaptation across most of the world. Further, we identify signatures of oligogenic-positive selection in multiple populations at different geographic and temporal scales, with some recapitulating known associations of geology and micronutrient deficiencies. We conclude that micronutrient deficiencies have likely shaped worldwide human evolution more directly than previously appreciated and, given the ongoing depletion of soil quality from over-farming and climate change, caution that some populations may be at higher risk of suffering from micronutrient-driven disorders going forward.",
    "source": "pubmed_2019_2026",
    "category": "clinical"

  {
    "PMID": "40845847",
    "title": "SPINK1-related chronic pancreatitis: A model that encapsulates the spectrum of variant effects, genetic complexity, and classificatory challenges.",
    "authors": "Yuan-Chen Wang; Emmanuelle Masson; Qi-Wen Wang; Emmanuelle G\u00e9nin; G\u00e9rald Le Gac et al. (11 authors)",
    "journal": "American journal of human genetics",
    "year": "2025",
    "doi": "10.1016/j.ajhg.2025.07.013",
    "abstract": "The widely used American College of Medical Genetics and Genomics (ACMG)/Association for Molecular Pathology (AMP) variant classification system is inherently limited by its binary categorization of variants as \"pathogenic\" or \"benign,\" failing to account for the full spectrum of variant effects within the complex genetic architecture of human disease. Although various refinements have been proposed, a framework that adequately captures this continuum remains to be established. To address this limitation, we conducted an in-depth analysis of SPINK1 variants associated with chronic pancreatitis (CP), a disorder ranging from Mendelian to environmentally influenced forms. We collated and reviewed SPINK1 variants identified in both genome-wide association studies (GWASs) and non-GWASs. Focusing on predicted loss-of-function (LoF) and experimentally characterized variants, we demonstrated through aggregation analysis that complete- or near-complete-LoF SPINK1 variants cause autosomal-dominant disease with moderate penetrance (\u223c55%). This finding establishes a critical baseline for comprehensively deciphering the genetic complexity underlying SPINK1-related CP. Concentrating on two well-characterized partial-LoF (hypomorphic) variants, c.194+2T>C and c.-4141G>T (enhancer), we present converging evidence for a distinct variant category that neither aligns with the ACMG/AMP binary classifications nor fits the recently proposed \"risk alleles\" category. Although some variants remain classified as variants of uncertain significance (VUSs), we propose a refined classificatory framework that integrates \"risk,\" \"predisposing,\" and \"pathogenic\" variants to accommodate the full spectrum of clinically relevant SPINK1 variants. This refined framework is expected to serve as a model for variant interpretation beyond SPINK1, providing insights into the issue of \"missing heritability\" and fostering further exploration of variant effects and genetic complexity across different contexts of human disease.",

  {
    "PMID": "40829599",
    "title": "The Causal Pivot: A structural approach to genetic heterogeneity and variant discovery in complex diseases.",
    "authors": "Chad A Shaw; C J Williams; Taotao Tan; Daniel Illera; Nicholas Di et al. (7 authors)",
    "journal": "American journal of human genetics",
    "year": "2025",
    "doi": "10.1016/j.ajhg.2025.07.012",
    "abstract": "We present the Causal Pivot (CP) as a structural causal model (SCM) for analyzing genetic heterogeneity in complex diseases. The CP leverages an established causal factor or factors to detect the contribution of additional suspected causes. Specifically, polygenic risk scores (PRSs) serve as known causes, while rare variants (RVs) or RV ensembles are evaluated as candidate causes. The CP incorporates outcome-induced association by conditioning on disease status. We derive a conditional maximum-likelihood procedure for binary and quantitative traits and develop the Causal Pivot likelihood ratio test (CP-LRT) to detect causal signals. Through simulations, we demonstrate the CP-LRT's robust power and superior error control compared to alternatives. We apply the CP-LRT to UK Biobank (UKB) data, analyzing three exemplar diseases: hypercholesterolemia (HC, low-density lipoprotein cholesterol \u22654.9 mmol/L; nc = 24,656), breast cancer (BC, ICD-10 C50; nc = 12,479), and Parkinson disease (PD, ICD-10 G20; nc = 2,940). For PRS, we utilize UKB-derived values, and for RVs, we analyze ClinVar pathogenic/likely pathogenic variants and loss-of-function mutations in disease-relevant genes: LDLR for HC, BRCA1 for BC, and GBA1 for PD. Significant CP-LRT signals were detected for all three diseases. Cross-disease and synonymous variant analyses serve as controls. We further develop ancestry adjustment using matching and inverse probability weighting as well as regression and doubly robust methods; we extend this to examine oligogenic burden in the lysosomal storage pathway in PD. The CP reveals an approach to address heterogeneity and is an extensible method for inference and discovery in complex disease genetics.",
    "source": "pubmed_2019_2026",
    "category": "tools"

    "PMID": "40543504",
    "title": "Genomic rare variant mechanisms for congenital cardiac laterality defect: A digenic model approach.",
    "authors": "Archana Rai; Jonathan Klonowski; Bo Yuan; Karen J Coveler; Zain Dardas et al. (20 authors)",
    "journal": "American journal of human genetics",
    "year": "2025",
    "doi": "10.1016/j.ajhg.2025.05.014",
    "abstract": "Laterality defects are defined by perturbations in the usual left-right asymmetry of organs. The genetic etiology that underlies congenital heart disease (CHD) is often unknown (less than 40%), so we used a digenic model approach for the identification of contributing variants in known laterality-defect-associated genes (n = 115) in the exome/genome sequencing (ES/GS) data from individuals with clinically diagnosed laterality defects. The unsolved ES/GS data were analyzed from three CHD cohorts: Baylor College of Medicine-Genomics Research to Elucidate the Genetics of Rare Diseases (BCM-GREGoR; n= 251 proband ES), Gabriella Miller Kids First Pediatric Research Program (Kids First; n = 158 trio GS), and Pediatric Cardiac Genomics Consortium (PCGC; n = 163 trio ES). trans-heterozygous digenic variants were identified in 2.8% (inherited digenic variants in 0.4%), 8.2%, and 13.5% of individuals, respectively; this was significantly higher than in 602 control trios provided by the 1000 Genomes Project (p = 0.001, 1.4e-07, and 8.9e-13, respectively). trans-heterozygous digenic variants were also identified in 0.4% and 1.4% of individuals with non-laterality CHD in Kids First and PCGC datasets, respectively, which was not statistically significant as compared to control trios (p = 1 and 0.059, respectively). Altogether, in laterality cohorts, 23% of digenic pairs were in the same structural complex of motile cilia. Out of 39 unique digenic pairs in laterality CHD, 29 are more likely to be potential digenic hits as predicted by the DiGePred tool. These findings provide further evidence that digenic epistatic interactions can contribute to the complex genetics of laterality defects.",

    "category": "tools"

    "authors": "Meltem Ece Kars; David Stein; Peter D Stenson; David N Cooper; Wendy K Chung et al. (11 authors)",
    "journal": "American journal of human genetics",
    "year": "2025",
    "doi": "10.1016/j.ajhg.2025.01.024",
    "abstract": "Congenital heart disease (CHD) is the most common congenital anomaly and a leading cause of infant morbidity and mortality. Despite extensive exploration of the monogenic causes of CHD over the last decades, \u223c55% of cases still lack a molecular diagnosis. Investigating digenic interactions, the simplest form of oligogenic interactions, using high-throughput sequencing data can elucidate additional genetic factors contributing to the disease. Here, we conducted a comprehensive analysis of digenic interactions in CHD by utilizing a large CHD trio exome sequencing cohort, comprising 3,910 CHD and 3,644 control trios. We extracted pairs of presumably deleterious rare variants observed in CHD-affected and unaffected children but not in a single parent. Burden testing of gene pairs derived from these variant pairs revealed 29 nominally significant gene pairs. These gene pairs showed a significant enrichment for known CHD genes (p\u00a0<\u00a01.0\u00a0\u00d7\u00a010-4) and exhibited a shorter average biological distance to known CHD genes than expected by chance (p\u00a0= 3.0\u00a0\u00d7\u00a010-4). Utilizing three complementary biological relatedness approaches including network analyses, biological distance calculations, and candidate gene prioritization methods, we prioritized 10 final gene pairs that are likely to underlie CHD. Analysis of bulk RNA-sequencing data showed that these genes are highly expressed in the developing embryonic heart (p\u00a0<\u00a01\u00a0\u00d7\u00a010-4). In conclusion, our findings suggest the potential role of digenic interactions in CHD pathogenesis and provide insights into unresolved molecular diagnoses. We suggest that the application of the digenic approach to additional disease cohorts will significantly enhance genetic discovery rates.",
