    "year": "2025",
    "doi": "10.1093/hmg/ddaf088",
    "abstract": "Mutations in superoxide dismutase-1 (SOD1) are a common cause of amyotrophic lateral sclerosis (ALS). Inheritance is as a rule dominant, but in carriers of the most common mutation, D90A, disease can develop in both homozygous and, more rarely, in heterozygous individuals with unexplained differences in clinical presentation. There is mounting evidence that prion-like spread of SOD1 aggregation is the primary cause of the disease. Two different strains of aggregates have been found to arise in human SOD1 (hSOD1) transgenic mouse models of ALS. Strain A is formed by most mutants including hSOD1G85R and hSOD1WT, whereas hSOD1D90A transgenic mice form a distinct strain B in addition to A. To explore the effects of aggregate strain propensities when hSOD1 variants are coexpressed, we generated digenic hSOD1G85R/WT and hSOD1G85R/D90A mice. Coexpression of hSOD1WT considerably shortened the lifespan of hSOD1G85R mice to the extent expected from the neurotoxicities of the variants alone. In contrast, coexpression of hSOD1D90A had a minimal effect on survival, far smaller than expected. Moreover, time from onset to the end stage was markedly prolonged in the hSOD1G85R/D90A mice. Aggregation of hSOD1 developed concomitantly with motor neuron disease, and the aggregates contained large amounts of both coexpressed variants in both digenic models. Our findings suggest that hSOD1WT has high a capacity to coaggregate with mutants and enhance neurotoxicity. Such interactions may be restricted by differences in strain propensities, which may contribute to the primarily recessive inheritance associated with the hSOD1D90A mutation.",
    "source": "pubmed_2019_2026",
    "category": "clinical"
  },
  {
    "PMID": "40615675",
    "title": "The synthetic lethal interaction between CDS1 and CDS2 is a vulnerability in uveal melanoma and across multiple tumor types.",
    "authors": "Pui Ying Chan; Diana Alexander; Ishan Mehta; Larissa Satiko Alcantara Sekimoto Matsuyama; Victoria Harle et al. (35 authors)",
    "journal": "Nature genetics",
    "year": "2025",
    "doi": "10.1038/s41588-025-02222-1",
    "abstract": "Metastatic uveal melanoma is an aggressive disease with limited effective therapeutic options. To comprehensively map monogenic and digenic dependencies, we performed CRISPR-Cas9 screening in ten extensively profiled human uveal melanoma cell line models. Analysis involved genome-wide single-gene and combinatorial paired-gene CRISPR libraries. Among our 76 uveal melanoma-specific essential genes and 105 synthetic lethal gene pairs, we identified and validated the CDP-diacylglycerol synthase 2 gene (CDS2) as a genetic dependency in the context of low CDP-diacylglycerol synthase 1 gene (CDS1) expression. We further demonstrate that CDS1/CDS2 forms a synthetic lethal interaction in vivo and reveal that CDS2 knockout results in the disruption of phosphoinositide synthesis and increased cellular apoptosis and that re-expression of CDS1 rescues this cell fitness defect. We extend our analysis using pan-cancer data, confirming increased CDS2 essentiality in diverse tumor types with low CDS1 expression. Thus, the CDS1/CDS2 axis is a therapeutic target across a range of cancers.",
    "source": "pubmed_2019_2026",
    "category": "review"
  },
  {
    "PMID": "38805753",
    "title": "DUVEL: an active-learning annotated biomedical corpus for the recognition of oligogenic combinations.",
    "authors": "Charlotte Nachtegael; Jacopo De Stefani; Anthony Cnudde; Tom Lenaerts",
    "journal": "Database : the journal of biological databases and curation",
    "year": "2024",
    "doi": "10.1093/database/baae039",
    "abstract": "While biomedical relation extraction (bioRE) datasets have been instrumental in the development of methods to support biocuration of single variants from texts, no datasets are currently available for the extraction of digenic or even oligogenic variant relations, despite the reports in literature that epistatic effects between combinations of variants in different loci (or genes) are important to understand disease etiologies. This work presents the creation of a unique dataset of oligogenic variant combinations, geared to train tools to help in the curation of scientific literature. To overcome the hurdles associated with the number of unlabelled instances and the cost of expertise, active learning (AL) was used to optimize the annotation, thus getting assistance in finding the most informative subset of samples to label. By pre-annotating 85 full-text articles containing the relevant relations from the Oligogenic Diseases Database (OLIDA) with PubTator, text fragments featuring potential digenic variant combinations, i.e. gene-variant-gene-variant, were extracted. The resulting fragments of texts were annotated with ALAMBIC, an AL-based annotation platform. The resulting dataset, called DUVEL, is used to fine-tune four state-of-the-art biomedical language models: BiomedBERT, BiomedBERT-large, BioLinkBERT and BioM-BERT. More than 500\u2009000 text fragments were considered for annotation, finally resulting in a dataset with 8442 fragments, 794 of them being positive instances, covering 95% of the original annotated articles. When applied to gene-variant pair detection, BiomedBERT-large achieves the highest F1 score (0.84) after fine-tuning, demonstrating significant improvement compared to the non-fine-tuned model, underlining the relevance of the DUVEL dataset. This study shows how AL may play an important role in the creation of bioRE dataset relevant for biomedical curation applications. DUVEL provides a unique biomedical corpus focusing on 4-ary relations between two genes and two variants. It is made freely available for research on GitHub and Hugging Face. Database URL: https://huggingface.co/datasets/cnachteg/duvel or https://doi.org/10.57967/hf/1571.",
    "source": "pubmed_2019_2026",
    "category": "tools"
  },
  {
    "PMID": "38614076",
    "title": "Toward clinical exomes in diagnostics and management of male infertility.",
    "authors": "Kristiina Lillepea; Anna-Grete Juchnewitsch; Laura Kasak; Anu Valkna; Avirup Dutta et al. (27 authors)",
    "journal": "American journal of human genetics",
    "year": "2024",
    "doi": "10.1016/j.ajhg.2024.03.013",
    "abstract": "Infertility, affecting \u223c10% of men, is predominantly caused by primary spermatogenic failure (SPGF). We screened likely pathogenic and pathogenic (LP/P) variants in 638 candidate genes for male infertility in 521 individuals presenting idiopathic SPGF and 323 normozoospermic men in the ESTAND cohort. Molecular diagnosis was reached for 64 men with SPGF (12%), with findings in 39 genes (6%). The yield did not differ significantly between the subgroups with azoospermia (20/185, 11%), oligozoospermia (18/181, 10%), and primary cryptorchidism with SPGF (26/155, 17%). Notably, 19 of 64 LP/P variants (30%) identified in 28 subjects represented recurrent findings in this study and/or with other male infertility cohorts. NR5A1 was the most frequently affected gene, with seven LP/P variants in six SPGF-affected men and two normozoospermic men. The link to SPGF was validated for recently proposed candidate genes ACTRT1, ASZ1, GLUD2, GREB1L, LEO1, RBM5, ROS1, and TGIF2LY. Heterozygous truncating variants in BNC1, reported in female infertility, emerged as plausible causes of severe oligozoospermia. Data suggested that several infertile men may present congenital conditions with less pronounced or pleiotropic phenotypes affecting the development and function of the reproductive system. Genes regulating the hypothalamic-pituitary-gonadal axis were affected in >30% of subjects with LP/P variants. Six individuals had more than one LP/P variant, including five with two findings from the gene panel. A 4-fold increased prevalence of cancer was observed in men with genetic infertility compared to the general male population (8% vs. 2%; p\u00a0= 4.4\u00a0\u00d7\u00a010-3). Expanding genetic testing in andrology will contribute to the multidisciplinary management of SPGF.",
    "source": "pubmed_2019_2026",
    "category": "clinical"
  },
  {
    "PMID": "38429495",
    "title": "Digenic inheritance involving a muscle-specific protein kinase and the giant titin protein causes a skeletal muscle myopathy.",
    "authors": "Ana T\u00f6pf; Dan Cox; Irina T Zaharieva; Valeria Di Leo; Jaakko Sarparanta et al. (85 authors)",
    "journal": "Nature genetics",
    "year": "2024",
    "doi": "10.1038/s41588-023-01651-0",
    "abstract": "In digenic inheritance, pathogenic variants in two genes must be inherited together to cause disease. Only very few examples of digenic inheritance have been described in the neuromuscular disease field. Here we show that predicted deleterious variants in SRPK3, encoding the X-linked serine/argenine protein kinase 3, lead to a progressive early onset skeletal muscle myopathy only when in combination with heterozygous variants in the TTN gene. The co-occurrence of predicted deleterious SRPK3/TTN variants was not seen among 76,702 healthy male individuals, and statistical modeling strongly supported digenic inheritance as the best-fitting model. Furthermore, double-mutant zebrafish (srpk3-/-; ttn.1+/-) replicated the myopathic phenotype and showed myofibrillar disorganization. Transcriptome data suggest that the interaction of srpk3 and ttn.1 in zebrafish occurs at a post-transcriptional level. We propose that digenic inheritance of deleterious changes impacting both the protein kinase SRPK3 and the giant muscle protein titin causes a skeletal myopathy and might serve as a model for other genetic diseases.",
    "source": "pubmed_2019_2026",
    "category": "clinical"
  },
  {
    "PMID": "39349469",
    "title": "The co-occurrence of genetic variants in the TYR and OCA2 genes confers susceptibility to albinism.",
    "authors": "David J Green; Vincent Michaud; Eulalie Lasseaux; Claudio Plaisant; Tomas Fitzgerald et al. (9 authors)",
    "journal": "Nature communications",
    "year": "2024",
    "doi": "10.1038/s41467-024-52763-y",
    "abstract": "Although rare genetic conditions are mostly caused by DNA sequence alterations that functionally disrupt individual genes, large-scale studies using genome sequencing have started to unmask additional complexity. Understanding how combinations of variants in different genes shape human phenotypes is expected to provide important insights into the clinical and genetic heterogeneity of rare disorders. Here, we use albinism, an archetypal rare condition associated with hypopigmentation, as an exemplar for the study of genetic interactions. We analyse data from the Genomics England 100,000 Genomes Project alongside a cohort of 1120 individuals with albinism, and investigate the effect of dual heterozygosity for the combination of two established albinism-related variants: TYR:c.1205\u2009G\u2009>\u2009A (p.Arg402Gln) [rs1126809] and OCA2:c.1327\u2009G\u2009>\u2009A (p.Val443Ile) [rs74653330]. As each of these changes alone is insufficient to cause disease when present in the heterozygous state, we sought evidence of synergistic effects. We show that, when both variants are present, the probability of receiving a diagnosis of albinism is significantly increased (odds ratio 12.8; 95% confidence interval 6.0 - 24.7; p-value 2.1 \u00d710-8). Further analyses in an independent cohort, the UK Biobank, support this finding and highlight that heterozygosity for the TYR:c.1205\u2009G\u2009>\u2009A and OCA2:c.1327\u2009G\u2009>\u2009A variant combination is associated with statistically significant alterations in visual acuity and central retinal thickness (traits that are considered albinism endophenotypes). The approach discussed in this report opens up new avenues for the investigation of oligogenic patterns in apparently Mendelian disorders.",
    "source": "pubmed_2019_2026",
    "category": "clinical"
  },
  {
    "PMID": "38603604",
    "title": "Prioritization of oligogenic variant combinations in whole exomes.",
    "authors": "Barbara Gravel; Alexandre Renaux; Sofia Papadimitriou; Guillaume Smits; Ann Now\u00e9 et al. (6 authors)",
    "journal": "Bioinformatics (Oxford, England)",
    "year": "2024",
    "doi": "10.1093/bioinformatics/btae184",
    "abstract": "Whole exome sequencing (WES) has emerged as a powerful tool for genetic research, enabling the collection of a tremendous amount of data about human genetic variation. However, properly identifying which variants are causative of a genetic disease remains an important challenge, often due to the number of variants that need to be screened. Expanding the screening to combinations of variants in two or more genes, as would be required under the oligogenic inheritance model, simply blows this problem out of proportion. We present here the High-throughput oligogenic prioritizer (Hop), a novel prioritization method that uses direct oligogenic information at the variant, gene and gene pair level to detect digenic variant combinations in WES data. This method leverages information from a knowledge graph, together with specialized pathogenicity predictions in order to effectively rank variant combinations based on how likely they are to explain the patient's phenotype. The performance of Hop is evaluated in cross-validation on 36\u00a0120 synthetic exomes for training and 14\u00a0280 additional synthetic exomes for independent testing. Whereas the known pathogenic variant combinations are found in the top 20 in approximately 60% of the cross-validation exomes, 71% are found in the same ranking range when considering the independent set. These results provide a significant improvement over alternative approaches that depend simply on a monogenic assessment of pathogenicity, including early attempts for digenic ranking using monogenic pathogenicity scores. Hop is available at https://github.com/oligogenic/HOP.",
    "source": "pubmed_2019_2026",
    "category": "tools"
  },
  {
    "PMID": "36951959",
    "title": "Natural disease history of a canine model of oligogenic RPGRIP1-cone-rod dystrophy establishes variable effects of previously and newly mapped modifier loci.",
    "authors": "Ana Ripolles-Garcia; Leonardo Murgiano; Natalia Ziolkowska; Felipe Pompeo Marinho; Karolina Roszak et al. (8 authors)",
    "journal": "Human molecular genetics",
    "year": "2023",
    "doi": "10.1093/hmg/ddad046",
    "abstract": "Canine RPGRIP1-cone-rod dystrophy (CRD), a model for human inherited retinal diseases (IRDs), was originally identified as autosomal recessive early-onset blindness. However, later studies revealed extensive phenotypic variability among RPGRIP1 mutants. This led to the identification of a homozygous MAP9 variant as a modifier associated with early-onset disease. Based on further phenotypic variation affecting cone photoreceptor function, we report mapping of L3 as an additional modifier locus, within a 4.1-Mb locus on canine chromosome 30. We establish the natural disease history of RPGRIP1-CRD based on up to 9-year long-term functional and structural retinal data from 58 dogs including 44 RPGRIP1 mutants grouped according to the modifier status. RPGRIP1 mutants affected by both MAP9 and L3 modifiers exhibited the most severe phenotypes with rapid disease progression. MAP9 alone was found to act as an overall accelerator of rod and cone diseases, while L3 had a cone-specific effect. Ultrastructural analysis of photoreceptors revealed varying degrees of rod and cone damage, while the connecting cilia appeared structurally preserved in all groups. We conclude that RPGRIP1-CRD is an oligogenic disease with at least three loci contributing to the pathogenesis. While the RPGRIP1 variant is required for developing the disease, MAP9 and L3 modifiers exacerbate the phenotype, individually and cumulatively. Oligogenic canine RPGRIP1-CRD illustrates the impact of multiple genetic modifiers on disease phenotype and thus has the potential to reveal new targets for broad-spectrum therapies for oligogenic or polygenic forms of human IRDs.",
    "source": "pubmed_2019_2026",
    "category": "clinical"
  },
  {
    "PMID": "35951005",
    "title": "Heterozygous variants in SIX3 and POU1F1 cause pituitary hormone deficiency in mouse and man.",
    "authors": "Hironori Bando; Michelle L Brinkmeier; Frederic Castinetti; Qing Fang; Mi-Sun Lee et al. (10 authors)",
    "journal": "Human molecular genetics",
    "year": "2023",
    "doi": "10.1093/hmg/ddac192",
    "abstract": "Congenital hypopituitarism is a genetically heterogeneous condition that is part of a spectrum disorder that can include holoprosencephaly. Heterozygous mutations in SIX3 cause variable holoprosencephaly in humans and mice. We identified two children with neonatal hypopituitarism and thin pituitary stalk who were doubly heterozygous for rare, likely deleterious variants in the transcription factors SIX3 and POU1F1. We used genetically engineered mice to understand the disease pathophysiology. Pou1f1 loss-of-function heterozygotes are unaffected; Six3 heterozygotes have pituitary gland dysmorphology and incompletely ossified palate; and the Six3+/-; Pou1f1+/dw double heterozygote mice have a pronounced phenotype, including pituitary growth through the palate. The interaction of Pou1f1 and Six3 in mice supports the possibility of digenic pituitary disease in children. Disruption of Six3 expression in the oral ectoderm completely ablated anterior pituitary development, and deletion of Six3 in the neural ectoderm blocked the development of the pituitary stalk and both anterior and posterior pituitary lobes. Six3 is required in both oral and neural ectodermal tissues for the activation of signaling pathways and transcription factors necessary for pituitary cell fate. These studies clarify the mechanism of SIX3 action in pituitary development and provide support for a digenic basis for hypopituitarism.",
    "source": "pubmed_2019_2026",
    "category": "clinical"
  },
  {
    "PMID": "37582836",
    "title": "Treatment of monogenic and digenic dominant genetic hearing loss by CRISPR-Cas9 ribonucleoprotein delivery in vivo.",
    "authors": "Yong Tao; Veronica Lamas; Wan Du; Wenliang Zhu; Yiran Li et al. (19 authors)",
    "journal": "Nature communications",
    "year": "2023",
    "doi": "10.1038/s41467-023-40476-7",
    "abstract": "Mutations in Atp2b2, an outer hair cell gene, cause dominant hearing loss in humans. Using a mouse model Atp2b2Obl/+, with a dominant hearing loss mutation (Oblivion), we show that liposome-mediated in vivo delivery of CRISPR-Cas9 ribonucleoprotein complexes leads to specific editing of the Obl allele. Large deletions encompassing the Obl locus and indels were identified as the result of editing. In vivo genome editing promotes outer hair cell survival and restores their function, leading to hearing recovery. We further show that in a double-dominant mutant mouse model, in which the Tmc1 Beethoven mutation and the Atp2b2 Oblivion mutation cause digenic genetic hearing loss, Cas9/sgRNA delivery targeting both mutations leads to partial hearing recovery. These findings suggest that liposome-RNP delivery can be used as a strategy to recover hearing with dominant mutations in OHC genes and with digenic mutations in the auditory hair cells, potentially expanding therapeutics of gene editing to treat hearing loss.",
    "source": "pubmed_2019_2026",
    "category": "clinical"
  },
  {
    "PMID": "37644440",
    "title": "A knowledge graph approach to predict and interpret disease-causing gene interactions.",
    "authors": "Alexandre Renaux; Chlo\u00e9 Terwagne; Michael Cochez; Ilaria Tiddi; Ann Now\u00e9 et al. (6 authors)",
    "journal": "BMC bioinformatics",
    "year": "2023",
    "doi": "10.1186/s12859-023-05451-5",
    "abstract": "Understanding the impact of gene interactions on disease phenotypes is increasingly recognised as a crucial aspect of genetic disease research. This trend is reflected by the growing amount of clinical research on oligogenic diseases, where disease manifestations are influenced by combinations of variants on a few specific genes. Although statistical machine-learning methods have been developed to identify relevant genetic variant or gene combinations associated with oligogenic diseases, they rely on abstract features and black-box models, posing challenges to interpretability for medical experts and impeding their ability to comprehend and validate predictions. In this work, we present a novel, interpretable predictive approach based on a knowledge graph that not only provides accurate predictions of disease-causing gene interactions but also offers explanations for these results. We introduce BOCK, a knowledge graph constructed to explore disease-causing genetic interactions, integrating curated information on oligogenic diseases from clinical cases with relevant biomedical networks and ontologies. Using this graph, we developed a novel predictive framework based on heterogenous paths connecting gene pairs. This method trains an interpretable decision set model that not only accurately predicts pathogenic gene interactions, but also unveils the patterns associated with these diseases. A unique aspect of our approach is its ability to offer, along with each positive prediction, explanations in the form of subgraphs, revealing the specific entities and relationships that led to each pathogenic prediction. Our method, built with interpretability in mind, leverages heterogenous path information in knowledge graphs to predict pathogenic gene interactions and generate meaningful explanations. This not only broadens our understanding of the molecular mechanisms underlying oligogenic diseases, but also presents a novel application of knowledge graphs in creating more transparent and insightful predictors for genetic research.",
    "source": "pubmed_2019_2026",
    "category": "tools"
  },
  {
    "PMID": "37127601",
    "title": "Faster and more accurate pathogenic combination predictions with VarCoPP2.0.",
    "authors": "Nassim Versbraegen; Barbara Gravel; Charlotte Nachtegael; Alexandre Renaux; Emma Verkinderen et al. (8 authors)",
    "journal": "BMC bioinformatics",
    "year": "2023",
    "doi": "10.1186/s12859-023-05291-3",
    "abstract": "The prediction of potentially pathogenic variant combinations in patients remains a key task in the field of medical genetics for the understanding and detection of oligogenic/multilocus diseases. Models tailored towards such cases can help shorten the gap of missing diagnoses and can aid researchers in dealing with the high complexity of the derived data. The predictor VarCoPP (Variant Combinations Pathogenicity Predictor) that was published in 2019 and identified potentially pathogenic variant combinations in gene pairs (bilocus variant combinations), was the first important step in this direction. Despite its usefulness and applicability, several issues still remained that hindered a better performance, such as its False Positive (FP) rate, the quality of its training set and its complex architecture. We present VarCoPP2.0: the successor of VarCoPP that is a simplified, faster and more accurate predictive model identifying potentially pathogenic bilocus variant combinations. Results from cross-validation and on independent data sets reveal that VarCoPP2.0 has improved in terms of both sensitivity (95% in cross-validation and 98% during testing) and specificity (5% FP rate). At the same time, its running time shows a significant 150-fold decrease due to the selection of a simpler Balanced Random Forest model. Its positive training set now consists of variant combinations that are more confidently linked with evidence of pathogenicity, based on the confidence scores present in OLIDA, the Oligogenic Diseases Database ( https://olida.ibsquare.be ). The improvement of its performance is also attributed to a more careful selection of up-to-date features identified via an original wrapper method. We show that the combination of different variant and gene pair features together is important for predictions, highlighting the usefulness of integrating biological information at different levels. Through its improved performance and faster execution time, VarCoPP2.0 enables a more accurate analysis of larger data sets linked to oligogenic diseases. Users can access the ORVAL platform ( https://orval.ibsquare.be ) to apply VarCoPP2.0 on their data.",
    "source": "pubmed_2019_2026",
    "category": "tools"
  },
  {
    "PMID": "35411390",
    "title": "Scaling up oligogenic diseases research with OLIDA: the Oligogenic Diseases Database.",
    "authors": "Charlotte Nachtegael; Barbara Gravel; Arnau Dillen; Guillaume Smits; Ann Now\u00e9 et al. (7 authors)",
    "journal": "Database : the journal of biological databases and curation",
    "year": "2022",
    "doi": "10.1093/database/baac023",
    "abstract": "Improving the understanding of the oligogenic nature of diseases requires access to high-quality, well-curated Findable, Accessible, Interoperable, Reusable (FAIR) data. Although first steps were taken with the development of the Digenic Diseases Database, leading to novel computational advancements to assist the field, these were also linked with a number of limitations, for instance, the ad hoc curation protocol and the inclusion of only digenic cases. The OLIgogenic diseases DAtabase (OLIDA) presents a novel, transparent and rigorous curation protocol, introducing a confidence scoring mechanism for the published oligogenic literature. The application of this protocol on the oligogenic literature generated a new repository containing 916 oligogenic variant combinations linked to 159 distinct diseases. Information extracted from the scientific literature is supplemented with current knowledge support obtained from public databases. Each entry is an oligogenic combination linked to a disease, labelled with a confidence score based on the level of genetic and functional evidence that supports its involvement in this disease. These scores allow users to assess the relevance and proof of pathogenicity of each oligogenic combination in the database, constituting markers for reporting improvements on disease-causing oligogenic variant combinations. OLIDA follows the FAIR principles, providing detailed documentation, easy data access through its application programming interface and website, use of unique identifiers and links to existing ontologies. https://olida.ibsquare.be.",
    "source": "pubmed_2019_2026",
    "category": "tools"
  },
  {
    "PMID": "35931051",
    "title": "Germline thymidylate synthase deficiency impacts nucleotide metabolism and causes dyskeratosis congenita.",
    "authors": "Hemanth Tummala; Amanda Walne; Roberto Buccafusca; Jenna Alnajar; Anita Szabo et al. (17 authors)",
    "journal": "American journal of human genetics",
    "year": "2022",
    "doi": "10.1016/j.ajhg.2022.06.014",
    "abstract": "Dyskeratosis congenita (DC) is an inherited bone-marrow-failure disorder characterized by a triad of mucocutaneous features that include abnormal skin pigmentation, nail dystrophy, and oral leucoplakia. Despite the identification of several genetic variants that cause DC, a significant proportion of probands remain without a molecular diagnosis. In a cohort of eight independent DC-affected families, we have identified a remarkable series of heterozygous germline variants in the gene encoding thymidylate synthase (TYMS). Although the inheritance appeared to be autosomal recessive, one parent in each family had a wild-type TYMS coding sequence. Targeted genomic sequencing identified a specific haplotype and rare variants in the naturally occurring TYMS antisense regulator ENOSF1 (enolase super family 1) inherited from the other parent. Lymphoblastoid cells from affected probands have severe TYMS deficiency, altered cellular deoxyribonucleotide triphosphate pools, and hypersensitivity to the TYMS-specific inhibitor 5-fluorouracil. These defects in the nucleotide metabolism pathway resulted in genotoxic stress, defective transcription, and abnormal telomere maintenance. Gene-rescue studies in cells from affected probands revealed that post-transcriptional epistatic silencing of TYMS is occurring via elevated ENOSF1. These cell and molecular abnormalities generated by the combination of germline digenic variants at the TYMS-ENOSF1 locus represent a unique pathogenetic pathway for DC causation in these affected individuals, whereas the parents who are carriers of either of these variants in a singular fashion remain unaffected.",
    "source": "pubmed_2019_2026",
    "category": "clinical"
  },
  {
    "PMID": "35904628",
    "title": "Clinical implications of genetic testing in familial intermediate and late-onset colorectal cancer.",
    "authors": "Malene Djursby; Thomas van Overeem Hansen; Karin A W Wadt; Majbritt Busk Madsen; Lukas Adrian Berchtold et al. (13 authors)",
    "journal": "Human genetics",
    "year": "2022",
    "doi": "10.1007/s00439-022-02470-9",
    "abstract": "The genetic background of familial, late-onset colorectal cancer (CRC) (i.e., onset\u2009>\u2009age 50\u00a0years) has not been studied as thoroughly as other subgroups of familial CRC, and the proportion of families with a germline genetic predisposition to CRC remains to be defined. To define the contribution of known or suggested CRC predisposition genes to familial late-onset CRC, we analyzed 32 well-established or candidate CRC predisposition genes in 75 families with late-onset CRC. We identified pathogenic or likely pathogenic variants in five patients in MSH6 (n\u2009=\u20091), MUTYH (monoallelic; n\u2009=\u20092) and NTHL1 (monoallelic; n\u2009=\u20092). In addition, we identified a number of variants of unknown significance in particular in the lower penetrant Lynch syndrome-associated mismatch repair (MMR) gene MSH6 (n\u2009=\u20096). In conclusion, screening using a comprehensive cancer gene panel in families with accumulation of late-onset CRC appears not to have a significant clinical value due to the low level of high-risk pathogenic variants detected. Our data suggest that only patients with abnormal MMR immunohistochemistry (IHC) or microsatellite instability (MSI) analyses, suggestive of Lynch syndrome, or a family history indicating another cancer predisposition syndrome should be prioritized for such genetic evaluations. Variants in MSH6 and MUTYH have previously been proposed to be involved in digenic or oligogenic hereditary predisposition to CRC. Accumulation of variants in MSH6 and monoallelic, pathogenic variants in MUTYH in our study indicates that digenic or oligogenic inheritance might be involved in late-onset CRC and warrants further studies of complex types of inheritance.",
    "source": "pubmed_2019_2026",
    "category": "clinical"
  },
  {
    "PMID": "34498117",
    "title": "Genetics of otosclerosis: finally catching up with other complex traits?",
    "authors": "Lisse J M Tavernier; Erik Fransen; Hanne Valgaeren; Guy Van Camp",
    "journal": "Human genetics",
    "year": "2022",
    "doi": "10.1007/s00439-021-02357-1",
    "abstract": "Otosclerosis is a relatively common cause of hearing impairment, characterized by abnormal bone remodeling of the middle and inner ear. In about 50-60% of the patients, the disease is present in a familial form. In most of these families, otosclerosis seems to be caused by a small number of genetic factors (oligogenic) while only in a small number of families the disease seems to be truly monogenic. In the remaining patients a complex genetic form of otosclerosis is present. Several studies have aimed to identify the genetic factors underlying otosclerosis, which has led to the identification of eight published loci for monogenic otosclerosis, as well as several genes and one chromosomal region (11q13.1) with a clear association with otosclerosis. Implementation of next-generation sequencing (NGS) in otosclerosis research has led to the identification of pathogenic variants in MEPE, ACAN and SERPINF1, although the pathogenic role of the latter is under debate. In addition, a recent GWAS can be considered a breakthrough for otosclerosis as it identified several strong associations with otosclerosis and suggested new potential candidate genes. These recent findings are important for unraveling the genetic architecture of otosclerosis. More future studies will help to understand the complete pathogenesis of the disease.",
    "source": "pubmed_2019_2026",
    "category": "clinical"
  },
  {
    "PMID": "35513429",
    "title": "Comparative optimization of combinatorial CRISPR screens.",
    "authors": "Ruitong Li; Olaf Klingbeil; Davide Monducci; Michael J Young; Diego J Rodriguez et al. (13 authors)",
    "journal": "Nature communications",
    "year": "2022",
    "doi": "10.1038/s41467-022-30196-9",
    "abstract": "Combinatorial CRISPR technologies have emerged as a transformative approach to systematically probe genetic interactions and dependencies of redundant gene pairs. However, the performance of different functional genomic tools for multiplexing sgRNAs vary widely. Here, we generate and benchmark ten distinct pooled combinatorial CRISPR libraries targeting paralog pairs to optimize digenic knockout screens. Libraries composed of dual Streptococcus pyogenes Cas9 (spCas9), orthogonal spCas9 and Staphylococcus aureus (saCas9), and enhanced Cas12a from Acidaminococcus were evaluated. We demonstrate a combination of alternative tracrRNA sequences from spCas9 consistently show superior effect size and positional balance between the sgRNAs as a robust combinatorial approach to profile genetic interactions of multiple genes.",
    "source": "pubmed_2019_2026",
    "category": "tools"
  },
  {
    "PMID": "35301265",
    "title": "A general framework for identifying oligogenic combinations of rare variants in complex disorders.",
    "authors": "Vijay Kumar Pounraja; Santhosh Girirajan",
    "journal": "Genome research",
    "year": "2022",
    "doi": "10.1101/gr.276348.121",
    "abstract": "Genetic studies of complex disorders such as autism and intellectual disability (ID) are often based on enrichment of individual rare variants or their aggregate burden in affected individuals compared to controls. However, these studies overlook the influence of combinations of rare variants that may not be deleterious on their own due to statistical challenges resulting from rarity and combinatorial explosion when enumerating variant combinations, limiting our ability to study oligogenic basis for these disorders. Here, we present RareComb, a framework that combines the Apriori algorithm and statistical inference to identify specific combinations of mutated genes associated with complex phenotypes. RareComb overcomes computational barriers and exhaustively evaluates variant combinations to identify nonadditive relationships between simultaneously mutated genes. Using RareComb, we analyzed 6189 individuals with autism and identified 718 combinations significantly associated with ID, and carriers of these combinations showed lower IQ than expected in an independent cohort of 1878 individuals. These combinations were enriched for nervous system genes such as NIN and NGF, showed complex inheritance patterns, and were depleted in unaffected siblings. We found that an affected individual can carry many oligogenic combinations, each contributing to the same phenotype or distinct phenotypes at varying effect sizes. We also used this framework to identify combinations associated with multiple comorbid phenotypes, including mutations of COL28A1 and MFSD2B for ID and schizophrenia and ABCA4, DNAH10 and MC1R for ID and anxiety/depression. Our framework identifies a key component of missing heritability and provides a novel paradigm to untangle the genetic architecture of complex disorders.",
    "source": "pubmed_2019_2026",
    "category": "clinical"
  },
  {
    "PMID": "34529933",
    "title": "Identifying digenic disease genes via machine learning in the Undiagnosed Diseases Network.",
    "authors": "Souhrid Mukherjee; Joy D Cogan; John H Newman; John A Phillips; Rizwan Hamid et al. (7 authors)",
    "journal": "American journal of human genetics",
    "year": "2021",
    "doi": "10.1016/j.ajhg.2021.08.010",
    "abstract": "Rare diseases affect millions of people worldwide, and discovering their genetic causes is challenging. More than half of the individuals analyzed by the Undiagnosed Diseases Network (UDN) remain undiagnosed. The central hypothesis of this work is that many of these rare genetic disorders are caused by multiple variants in more than one gene. However, given the large number of variants in each individual genome, experimentally evaluating combinations of variants for potential to cause disease is currently infeasible. To address this challenge, we developed the digenic predictor (DiGePred), a random forest classifier for identifying candidate digenic disease gene pairs by features derived from biological networks, genomics, evolutionary history, and functional annotations. We trained the DiGePred classifier by using DIDA, the largest available database of known digenic-disease-causing gene pairs, and several sets of non-digenic gene pairs, including variant pairs derived from unaffected relatives of UDN individuals. DiGePred achieved high precision and recall in cross-validation and on a held-out test set (PR area under the curve > 77%), and we further demonstrate its utility by using digenic pairs from the recent literature. In contrast to other approaches, DiGePred also appropriately controls the number of false positives when applied in realistic clinical settings. Finally, to enable the rapid screening of variant gene pairs for digenic disease potential, we freely provide the predictions of DiGePred on all human gene pairs. Our work enables the discovery of genetic causes for rare non-monogenic diseases by providing a means to rapidly evaluate variant gene pairs for the potential to cause digenic disease.",
    "source": "pubmed_2019_2026",
    "category": "tools"
  },
  {
    "PMID": "33469725",
    "title": "Genetics of agenesis/hypoplasia of the uterus and vagina: narrowing down the number of candidate genes for Mayer-Rokitansky-K\u00fcster-Hauser Syndrome.",
    "authors": "Sasha Mikhael; Sonal Dugar; Madison Morton; Lynn P Chorich; Kerlene Berwick Tam et al. (14 authors)",
    "journal": "Human genetics",
    "year": "2021",
    "doi": "10.1007/s00439-020-02239-y",
    "abstract": "Mayer-Rokitansky-K\u00fcster-Hauser (MRKH) syndrome consists of congenital absence of the uterus and vagina and is often associated with renal, skeletal, cardiac, and auditory defects. The genetic basis is largely unknown except for rare variants in several genes. Many candidate genes have been suggested by mouse models and human studies. The purpose of this study was to narrow down the number of candidate genes. Whole exome sequencing was performed on 111 unrelated individuals with MRKH; variant analysis focused on 72 genes suggested by mouse models, human studies of physiological candidates, or located near translocation breakpoints in t(3;16). Candidate variants (CV) predicted to be deleterious were confirmed by Sanger sequencing. Sanger sequencing verified 54 heterozygous CV from genes identified through mouse (13 CV in 6 genes), human (22 CV in seven genes), and translocation breakpoint (19 CV in 11 genes) studies. Twelve patients had\u2009\u2265\u20092 CVs, including four patients with two variants in the same gene. One likely digenic combination of LAMC1 and MMP14 was identified. We narrowed 72 candidate genes to 10 genes that appear more likely implicated. These candidate genes will require further investigation to elucidate their role in the development of MRKH.",
    "source": "pubmed_2019_2026",
    "category": "clinical"
  },
  {
    "PMID": "32222824",
    "title": "Molecular genetic diagnostics of hypogonadotropic hypogonadism: from panel design towards result interpretation in clinical practice.",
    "authors": "Henriett Butz; G\u00e1bor Ny\u00edr\u0151; Petra Anna Kurucz; Istv\u00e1n Lik\u00f3; Attila Pat\u00f3cs",
    "journal": "Human genetics",
    "year": "2021",
    "doi": "10.1007/s00439-020-02148-0",
    "abstract": "Congenital hypogonadotropic hypogonadism (CHH) is a clinically and genetically heterogeneous congenital disease. Symptoms cover a wide spectrum from mild forms to complex phenotypes due to gonadotropin-releasing hormone (GnRH) deficiency. To date, more than 40 genes have been identified as pathogenic cause of CHH. These genes could be grouped into two major categories: genes controlling development and GnRH neuron migration and genes being responsible for neuroendocrine regulation and GnRH neuron function. High-throughput, next-generation sequencing (NGS) allows to analyze numerous gene sequences at the same time. Nowadays, whole exome or whole genome datasets could be investigated in clinical genetic diagnostics due to their favorable cost-benefit. The increasing genetic data generated by NGS reveal novel candidate genes and gene variants with unknown significance (VUSs). To provide clinically valuable genetic results, complex clinical and bioinformatics work are needed. The multifaceted genetics of CHH, the variable mode of inheritance, the incomplete penetrance, variable expressivity and oligogenic characteristics further complicate the interpretation of the genetic variants detected. The objective of this work, apart from reviewing the currently known genes associated with CHH, was to summarize the advantages and disadvantages of the NGS-based platforms and through the authors' own practice to guide through the whole workflow starting from gene panel design, performance analysis and result interpretation. Based on our results, a genetic diagnosis was clearly identified in 21% of cases tested (8/38).",
    "source": "pubmed_2019_2026",
    "category": "clinical"
  },
  {
    "PMID": "32200437",
    "title": "Genetics of congenital hypogonadotropic hypogonadism: peculiarities and phenotype of an oligogenic disease.",
    "authors": "Biagio Cangiano; Du Soon Swee; Richard Quinton; Marco Bonomi",
    "journal": "Human genetics",
    "year": "2021",
    "doi": "10.1007/s00439-020-02147-1",
    "abstract": "A genetic basis of congenital isolated hypogonadotropic hypogonadism (CHH) can be defined in almost 50% of cases, albeit not necessarily the complete genetic basis. Next-generation sequencing (NGS) techniques have led to the discovery of a great number of loci, each of which has illuminated our understanding of human gonadotropin-releasing hormone (GnRH) neurons, either in respect of their embryonic development or their neuroendocrine regulation as the \"pilot light\" of human reproduction. However, because each new gene linked to CHH only seems to underpin another small percentage of total patient cases, we are still far from achieving a comprehensive understanding of the genetic basis of CHH. Patients have generally not benefited from advances in genetics in respect of novel therapies. In most cases, even genetic counselling is limited by issues of apparent variability in expressivity and penetrance that are likely underpinned by oligogenicity in respect of known and unknown genes. Robust genotype-phenotype relationships can generally only be established for individuals who are homozygous, hemizygous or compound heterozygotes for the same gene of variant alleles that are predicted to be deleterious. While certain genes are purely associated with normosmic CHH (nCHH) some purely with the anosmic form (Kallmann syndrome-KS), other genes can be associated with both nCHH and KS-sometimes even within the same kindred. Even though the anticipated genetic overlap between CHH and constitutional delay in growth and puberty (CDGP) has not materialised, previously unanticipated genetic relationships have emerged, comprising conditions of combined (or multiple) pituitary hormone deficiency (CPHD), hypothalamic amenorrhea (HA) and CHARGE syndrome. In this review, we report the current evidence in relation to phenotype and genetic peculiarities regarding 60 genes whose loss-of-function variants can disrupt the central regulation of reproduction at many levels: impairing GnRH neurons migration, differentiation or activation; disrupting neuroendocrine control of GnRH secretion; preventing GnRH neuron migration or function and/or gonadotropin secretion and action.",
    "source": "pubmed_2019_2026",
    "category": "clinical"
  },
  {
    "PMID": "31955275",
    "title": "Monogenic causes of non-obstructive azoospermia: challenges, established knowledge, limitations and perspectives.",
    "authors": "Laura Kasak; Maris Laan",
    "journal": "Human genetics",
    "year": "2021",
    "doi": "10.1007/s00439-020-02112-y",
    "abstract": "It is estimated that one in 100 men have azoospermia, the complete lack of sperm in the ejaculate. Currently,\u2009~\u200920% of azoospermia cases remain idiopathic. Non-obstructive azoospermia (NOA) is mostly explained by congenital factors leading to spermatogenic failure, such as chromosome abnormalities. The knowledge of the monogenic causes of NOA is very limited. High genetic heterogeneity due to the complexity of spermatogenesis and testicular function, lack of non-consanguineous familial cases and confirmatory studies challenge the field. The reported monogenic defects cause syndromic NOA phenotypes presenting also additional congenital problems and isolated NOA cases, explained by spermatogenic defects. The established and recently reported NOA genes (n\u2009=\u200938) represent essential guardians of meiosis, transcriptional and endocrine regulators of reproduction. Despite the list being short, 92% of these loci are predicted to functionally interact with each other (STRING analysis: average 5.21 connections/gene, enrichment P\u2009<\u200910-16). Notably,\u2009~\u200950% of NOA genes have also been implicated in primary ovarian insufficiency, amenorrhea and female genital anomalies, referring to overlapping mechanisms. Considering the knowledge from respective female phenotypes and animal models, exploring the scenarios of di/oligogenic and de novo mutations represent perspective directions in the genetic research of NOA. Knowing the exact genetic cause in each patient improves the management of infertility and other health risks (e.g., cancer), and facilitates the counseling of family members about their reproductive health. Uncovering the loci and biological processes implicated in NOA will also broaden the understanding of etiologies behind spermatogenic failure and promote the development of novel non-invasive treatments for male infertility.",
    "source": "pubmed_2019_2026",
    "category": "clinical"
  },
  {
    "PMID": "33445179",
    "title": "Novel variants and cellular studies on patients' primary fibroblasts support a role for NEK1 missense variants in ALS pathogenesis.",
    "authors": "Serena Lattante; Paolo Niccol\u00f2 Doronzio; Amelia Conte; Giuseppe Marangi; Francesco Martello et al. (14 authors)",
    "journal": "Human molecular genetics",
    "year": "2021",
    "doi": "10.1093/hmg/ddab015",
    "abstract": "In the last few years, NEK1 has been identified as a new gene related to amyotrophic lateral sclerosis (ALS). Loss-of-function variants have been mostly described, although several missense variants exist, which pathogenic relevance remains to be established. We attempted to determine the contribution of NEK1 gene in an Italian cohort of 531 sporadic and familial amyotrophic lateral sclerosis (ALS) patients applying massive parallel sequencing technologies. We filtered results of NEK1 gene and identified 20 NEK1 rare variants (MAF\u2009<\u20090.01) in 22 patients. In particular, we found two novel frameshift variants (p.Glu929Asnfs*12 and p.Val1030Ilefs*23), 18 missense variants, including the p.Arg261His in three patients, and a novel variant in the start codon, the p.Met1?, which most likely impairs translation initiation. To clarify the role of NEK1 missense variants we investigated NEK1 expression in primary fibroblast cultures. We obtained skin biopsies from four patients with NEK1 variants and we assessed NEK1 expression by western blot and immunofluorescence. We detected a decrease in NEK1 expression in fibroblasts from patients with NEK1 variants, suggesting that missense variants in NEK1 gene may have a pathogenic role. Moreover, we observed additional variants in ALS related genes in seven patients with NEK1 variants (32%), further supporting an oligogenic ALS model.",
    "source": "pubmed_2019_2026",
    "category": "clinical"
  },
  {
    "PMID": "34857952",
    "title": "Paralog knockout profiling identifies DUSP4 and DUSP6 as a digenic dependence in MAPK pathway-driven cancers.",
    "authors": "Takahiro Ito; Michael J Young; Ruitong Li; Sidharth Jain; Andreas Wernitznig et al. (22 authors)",
    "journal": "Nature genetics",
    "year": "2021",
    "doi": "10.1038/s41588-021-00967-z",
    "abstract": "Although single-gene perturbation screens have revealed a number of new targets, vulnerabilities specific to frequently altered drivers have not been uncovered. An important question is whether the compensatory relationship between functionally redundant genes masks potential therapeutic targets in single-gene perturbation studies. To identify digenic dependencies, we developed a CRISPR paralog targeting library to investigate the viability effects of disrupting 3,284 genes, 5,065 paralog pairs and 815 paralog families. We identified that dual inactivation of DUSP4 and DUSP6 selectively impairs growth in NRAS and BRAF mutant cells through the hyperactivation of MAPK signaling. Furthermore, cells resistant to MAPK pathway therapeutics become cross-sensitized to DUSP4 and DUSP6 perturbations such that the mechanisms of resistance to the inhibitors reinforce this mechanism of vulnerability. Together, multigene perturbation technologies unveil previously unrecognized digenic vulnerabilities that may be leveraged as new therapeutic targets in cancer.",
    "source": "pubmed_2019_2026",
    "category": "clinical"
  },
  {
    "PMID": "34702175",
    "title": "A proximal LAVA method for genome-wide association and prediction of traits with mixed inheritance patterns.",
    "authors": "Patrik Waldmann",
    "journal": "BMC bioinformatics",
    "year": "2021",
    "doi": "10.1186/s12859-021-04436-6",
    "abstract": "The genetic basis of phenotypic traits is highly variable and usually divided into mono-, oligo- and polygenic inheritance classes. Relatively few traits are known to be monogenic or oligogeneic. The majority of traits are considered to have a polygenic background. To what extent there are mixtures between these classes is unknown. The rapid advancement of genomic techniques makes it possible to directly map large amounts of genomic markers (GWAS) and predict unknown phenotypes (GWP). Most of the multi-marker methods for GWAS and GWP falls into one of two regularization frameworks. The first framework is based on [Formula: see text]-norm regularization (e.g. the LASSO) and is\u00a0suitable for mono- and oligogenic traits, whereas the second framework regularize with the [Formula: see text]-norm (e.g. ridge regression; RR) and thereby is favourable for polygenic traits. A general framework for mixed inheritance is lacking. We have developed a proximal operator algorithm based on the recent LAVA regularization method that jointly performs [Formula: see text]- and [Formula: see text]-norm regularization. The algorithm is built on the alternating direction method of multipliers and proximal translation mapping (LAVA ADMM). When evaluated on the simulated QTLMAS2010 data, it is shown that the LAVA ADMM together with Bayesian optimization of the regularization parameters provides an efficient approach with lower test prediction mean-squared-error (65.89) than the LASSO (66.11), Ridge regression (83.41) and Elastic net (66.11). For the real pig data the test MSE of the LAVA ADMM is 0.850 compared to the LASSO, RR and EN with 0.875, 0.853 and 0.853, respectively. This study presents the LAVA ADMM that is capable of joint modelling of monogenic major genetic effects and polygenic minor genetic effects which can be used for both genome-wide assoiciation and prediction purposes. The statistical evaluations based on both simulated and real pig data set shows that the LAVA ADMM has better prediction properies than the LASSO, RR and EN. Julia code for the LAVA ADMM is available at: https://github.com/patwa67/LAVAADMM .",
    "source": "pubmed_2019_2026",
    "category": "tools"
  },
  {
    "PMID": "32758447",
    "title": "Myeloperoxidase Modulates Inflammation in Generalized Pustular Psoriasis and Additional Rare Pustular Skin Diseases.",
    "authors": "Stefan Haskamp; Heiko Bruns; Madelaine Hahn; Markus Hoffmann; Anne Gregor et al. (36 authors)",
    "journal": "American journal of human genetics",
    "year": "2020",
    "doi": "10.1016/j.ajhg.2020.07.001",
    "abstract": "Generalized pustular psoriasis (GPP) is a severe multi-systemic inflammatory disease characterized by neutrophilic pustulosis and triggered by pro-inflammatory IL-36 cytokines in skin. While 19%-41% of affected individuals harbor bi-allelic mutations in IL36RN, the genetic cause is not known in most cases. To identify and characterize new pathways involved in the pathogenesis of GPP, we performed whole-exome sequencing in 31 individuals with GPP and demonstrated effects of mutations in MPO encoding the neutrophilic enzyme myeloperoxidase (MPO). We discovered eight MPO mutations resulting in MPO -deficiency in neutrophils and monocytes. MPO mutations, primarily those resulting in complete MPO deficiency, cumulatively associated with GPP (p = 1.85E-08; OR\u00a0= 6.47). The number of mutant MPO alleles significantly differed between 82 affected individuals and >4,900 control subjects (p = 1.04E-09); this effect was stronger when including IL36RN mutations (1.48E-13) and correlated with a younger age of onset (p = 0.0018). The activity of four proteases, previously implicated as activating enzymes of IL-36 precursors, correlated with MPO deficiency. Phorbol-myristate-acetate-induced formation of neutrophil extracellular traps (NETs) was reduced in affected cells (p = 0.015), and phagocytosis assays in MPO-deficient mice and human cells revealed altered neutrophil function and impaired clearance of neutrophils by monocytes (efferocytosis) allowing prolonged neutrophil persistence in inflammatory skin. MPO mutations contribute significantly to GPP's pathogenesis. We implicate MPO as an inflammatory modulator in humans that regulates protease activity and NET formation and modifies efferocytosis. Our findings indicate possible implications for the application of MPO inhibitors in cardiovascular diseases. MPO and affected pathways represent attractive targets for inducing resolution of inflammation in neutrophil-mediated skin diseases.",
    "source": "pubmed_2019_2026",
    "category": "clinical"
  },
  {
    "PMID": "32968074",
    "title": "Risk prediction of late-onset Alzheimer's disease implies an oligogenic architecture.",
    "authors": "Qian Zhang; Julia Sidorenko; Baptiste Couvy-Duchesne; Riccardo E Marioni; Margaret J Wright et al. (20 authors)",
    "journal": "Nature communications",
    "year": "2020",
    "doi": "10.1038/s41467-020-18534-1",
    "abstract": "Genetic association studies have identified 44 common genome-wide significant risk loci for late-onset Alzheimer's disease (LOAD). However, LOAD genetic architecture and prediction are unclear. Here we estimate the optimal P-threshold (Poptimal) of a genetic risk score (GRS) for prediction of LOAD in three independent datasets comprising 676 cases and 35,675 family history proxy cases. We show that the discriminative ability of GRS in LOAD prediction is maximised when selecting a small number of SNPs. Both simulation results and direct estimation indicate that the number of causal common SNPs for LOAD may be less than 100, suggesting LOAD is more oligogenic than polygenic. The best GRS explains approximately 75% of SNP-heritability, and individuals in the top decile of GRS have ten-fold increased odds when compared to those in the bottom decile. In addition, 14 variants are identified that contribute to both LOAD risk and age at onset of LOAD.",
    "source": "pubmed_2019_2026",
    "category": "clinical"
  },
  {
    "PMID": "32165640",
    "title": "Digenic inheritance of mutations in EPHA2 and SLC26A4 in Pendred syndrome.",
    "authors": "Mengnan Li; Shin-Ya Nishio; Chie Naruse; Meghan Riddell; Sabrina Sapski et al. (22 authors)",
    "journal": "Nature communications",
    "year": "2020",
    "doi": "10.1038/s41467-020-15198-9",
    "abstract": "Enlarged vestibular aqueduct (EVA) is one of the most commonly identified inner ear malformations in hearing loss patients including Pendred syndrome. While biallelic mutations of the SLC26A4 gene, encoding pendrin, causes non-syndromic hearing loss with EVA or Pendred syndrome, a considerable number of patients appear to carry mono-allelic mutation. This suggests faulty pendrin regulatory machinery results in hearing loss. Here we identify EPHA2 as another causative gene of Pendred syndrome with SLC26A4. EphA2 forms a protein complex with pendrin controlling pendrin localization, which is disrupted in some pathogenic forms of pendrin. Moreover, point mutations leading to amino acid substitution in the EPHA2 gene are identified from patients bearing mono-allelic mutation of SLC26A4. Ephrin-B2 binds to EphA2 triggering internalization with pendrin inducing EphA2 autophosphorylation weakly. The identified EphA2 mutants attenuate ephrin-B2- but not ephrin-A1-induced EphA2 internalization with pendrin. Our results uncover an unexpected role of the Eph/ephrin system in epithelial function.",
    "source": "pubmed_2019_2026",
    "category": "clinical"
  },
  {
    "PMID": "31504172",
    "title": "A Gaussian process-based definition reveals new and bona fide genetic interactions compared to a multiplicative model in the Gram-negative Escherichia coli.",
    "authors": "Ashwani Kumar; Ali Hosseinnia; Alla Gagarinova; Sadhna Phanse; Sunyoung Kim et al. (8 authors)",
    "journal": "Bioinformatics (Oxford, England)",
    "year": "2020",
    "doi": "10.1093/bioinformatics/btz673",
    "abstract": "A digenic genetic interaction (GI) is observed when mutations in two genes within the same organism yield a phenotype that is different from the expected, given each mutation's individual effects. While multiplicative scoring is widely applied to define GIs, revealing underlying gene functions, it remains unclear if it is the most suitable choice for scoring GIs in Escherichia coli. Here, we assess many different definitions, including the multiplicative model, for mapping functional links between genes and pathways in E.coli. Using our published E.coli GI datasets, we show computationally that a machine learning Gaussian process (GP)-based definition better identifies functional associations among genes than a multiplicative model, which we have experimentally confirmed on a set of gene pairs. Overall, the GP definition improves the detection of GIs, biological reasoning of epistatic connectivity, as well as the quality of GI maps in E.coli, and, potentially, other microbes. The source code and parameters used to generate the machine learning models in WEKA software were provided in the Supplementary information. Supplementary data are available at Bioinformatics online.",
    "source": "pubmed_2019_2026",
    "category": "tools"
  },
  {
    "PMID": "31147699",
    "title": "ORVAL: a novel platform for the prediction and exploration of disease-causing oligogenic variant combinations.",
    "authors": "Alexandre Renaux; Sofia Papadimitriou; Nassim Versbraegen; Charlotte Nachtegael; Simon Boutry et al. (8 authors)",
    "journal": "Nucleic acids research",
    "year": "2019",
    "doi": "10.1093/nar/gkz437",
    "abstract": "A tremendous amount of DNA sequencing data is being produced around the world with the ambition to capture in more detail the mechanisms underlying human diseases. While numerous bioinformatics tools exist that allow the discovery of causal variants in Mendelian diseases, little to no support is provided to do the same for variant combinations, an essential task for the discovery of the causes of oligogenic diseases. ORVAL (the Oligogenic Resource for Variant AnaLysis), which is presented here, provides an answer to this problem by focusing on generating networks of candidate pathogenic variant combinations in gene pairs, as opposed to isolated variants in unique genes. This online platform integrates innovative machine learning methods for combinatorial variant pathogenicity prediction with visualization techniques, offering several interactive and exploratory tools, such as pathogenic gene and protein interaction networks, a ranking of pathogenic gene pairs, as well as visual mappings of the cellular location and pathway information. ORVAL is the first web-based exploration platform dedicated to identifying networks of candidate pathogenic variant combinations with the sole ambition to help in uncovering oligogenic causes for patients that cannot rely on the classical disease analysis tools. ORVAL is available at https://orval.ibsquare.be.",
    "source": "pubmed_2019_2026",
    "category": "tools"
  },
  {
    "PMID": "31230720",
    "title": "The Genomics of Arthrogryposis, a Complex Trait: Candidate Genes and Further Evidence for Oligogenic Inheritance.",
    "authors": "Davut Pehlivan; Yavuz Bayram; Nilay Gunes; Zeynep Coban Akdemir; Anju Shukla et al. (46 authors)",
    "journal": "American journal of human genetics",
    "year": "2019",
    "doi": "10.1016/j.ajhg.2019.05.015",
    "abstract": "Arthrogryposis is a clinical finding that is present either as a feature of a neuromuscular condition or as part of a systemic disease in over 400 Mendelian conditions. The underlying molecular etiology remains largely unknown because of genetic and phenotypic heterogeneity. We applied exome sequencing (ES) in a cohort of 89 families with the clinical sign of arthrogryposis. Additional molecular techniques including array comparative genomic hybridization (aCGH) and Droplet Digital PCR (ddPCR) were performed on individuals who were found to have pathogenic copy number variants (CNVs) and mosaicism, respectively. A molecular diagnosis was established in 65.2% (58/89) of families. Eleven out of 58 families (19.0%) showed evidence for potential involvement of pathogenic variation at more than one locus, probably driven by absence of heterozygosity (AOH) burden due to identity-by-descent (IBD). RYR3, MYOM2, ERGIC1, SPTBN4, and ABCA7 represent genes, identified in two or more families, for which mutations are probably causative for arthrogryposis. We also provide evidence for the involvement of CNVs in the etiology of arthrogryposis and for the idea that both mono-allelic and bi-allelic variants in the same gene cause either similar or distinct syndromes. We were able to identify the molecular etiology in nine out of 20 families who underwent reanalysis. In summary, our data from family-based ES further delineate the molecular etiology of arthrogryposis, yielded several candidate disease-associated genes, and provide evidence for mutational burden in a biological pathway or network. Our study also highlights the importance of reanalysis of individuals with unsolved diagnoses in conjunction with sequencing extended family members.",
    "source": "pubmed_2019_2026",
    "category": "clinical"
  },
  {
    "PMID": "30535804",
    "title": "De novo and inherited loss-of-function variants of ATP2B2 are associated with rapidly progressive hearing impairment.",
    "authors": "Jeroen J Smits; Jaap Oostrik; Andy J Beynon; Sarina G Kant; Pia A M de Koning Gans et al. (19 authors)",
    "journal": "Human genetics",
    "year": "2019",
    "doi": "10.1007/s00439-018-1965-1",
    "abstract": "ATP2B2 encodes the PMCA2 Ca2+ pump that plays an important role in maintaining ion homeostasis in hair cells among others by extrusion of Ca2+ from the stereocilia to the endolymph. Several mouse models have been described for this gene; mice heterozygous for loss-of-function defects display a rapidly progressive high-frequency hearing impairment. Up to now ATP2B2 has only been reported as a modifier, or in a digenic mechanism with CDH23 for hearing impairment in humans. Whole exome sequencing in hearing impaired index cases of Dutch and Polish origins revealed five novel heterozygous (predicted to be) loss-of-function variants of ATP2B2. Two variants, c.1963G>T (p.Glu655*) and c.955delG (p.Ala319fs), occurred de novo. Three variants c.397+1G>A (p.?), c.1998C>A (p.Cys666*), and c.2329C>T (p.Arg777*), were identified in families with an autosomal dominant inheritance pattern of hearing impairment. After normal newborn hearing screening, a rapidly progressive high-frequency hearing impairment was diagnosed at the age of about 3-6 years. Subjects had no balance complaints and vestibular testing did not yield abnormalities. There was no evidence for retrocochlear pathology or structural inner ear abnormalities. Although a digenic inheritance pattern of hearing impairment has been reported for heterozygous missense variants of ATP2B2 and CDH23, our findings indicate a monogenic cause of hearing impairment in cases with loss-of-function variants of ATP2B2.",
    "source": "pubmed_2019_2026",
    "category": "clinical"
  },
  {
    "PMID": "31175295",
    "title": "Comprehensive analysis of coding variants highlights genetic complexity in developmental and epileptic encephalopathy.",
    "authors": "Atsushi Takata; Mitsuko Nakashima; Hirotomo Saitsu; Takeshi Mizuguchi; Satomi Mitsuhashi et al. (65 authors)",
    "journal": "Nature communications",
    "year": "2019",
    "doi": "10.1038/s41467-019-10482-9",
    "abstract": "Although there are many known Mendelian genes linked to epileptic or developmental and epileptic encephalopathy (EE/DEE), its genetic architecture is not fully explained. Here, we address this incompleteness by analyzing exomes of 743 EE/DEE cases and 2366 controls. We observe that damaging ultra-rare variants (dURVs) unique to an individual are significantly overrepresented in EE/DEE, both in known EE/DEE genes and the other non-EE/DEE genes. Importantly, enrichment of dURVs in non-EE/DEE genes is significant, even in the subset of cases with diagnostic dURVs (P\u2009=\u20090.000215), suggesting oligogenic contribution of non-EE/DEE gene dURVs. Gene-based analysis identifies exome-wide significant (P\u2009=\u20092.04\u2009\u00d7\u200910-6) enrichment of damaging de novo mutations in NF1, a gene primarily linked to neurofibromatosis, in infantile spasm. Together with accumulating evidence for roles of oligogenic or modifier variants in severe neurodevelopmental disorders, our results highlight genetic complexity in EE/DEE, and indicate that EE/DEE is not an aggregate of simple Mendelian disorders.",
    "source": "pubmed_2019_2026",
    "category": "clinical"
  },
  {
    "PMID": "30824696",
    "title": "Systematic analysis reveals the prevalence and principles of bypassable gene essentiality.",
    "authors": "Jun Li; Hai-Tao Wang; Wei-Tao Wang; Xiao-Ran Zhang; Fang Suo et al. (11 authors)",
    "journal": "Nature communications",
    "year": "2019",
    "doi": "10.1038/s41467-019-08928-1",
    "abstract": "Gene essentiality is a variable phenotypic trait, but to what extent and how essential genes can become dispensable for viability remain unclear. Here, we investigate 'bypass of essentiality (BOE)' - an underexplored type of digenic genetic interaction that renders essential genes dispensable. Through analyzing essential genes on one of the six chromosome arms of the fission yeast Schizosaccharomyces pombe, we find that, remarkably, as many as 27% of them can be converted to non-essential genes by BOE interactions. Using this dataset we identify three principles of essentiality bypass: bypassable essential genes tend to have lower importance, tend to exhibit differential essentiality between species, and tend to act with other bypassable genes. In addition, we delineate mechanisms underlying bypassable essentiality, including the previously unappreciated mechanism of dormant redundancy between paralogs. The new insights gained on bypassable essentiality deepen our understanding of genotype-phenotype relationships and will facilitate drug development related to essential genes.",
    "source": "pubmed_2019_2026",
    "category": "review"
  }
];

    let currentCategory = 'all';
    let searchQuery = '';
    let yearFilter = '';
    let sortOrder = 'newest';

    function renderPapers() {
      const container = document.getElementById('papers-container');
      
      let filtered = papersData.filter(p => {
        // Category filter
        if (currentCategory !== 'all' && p.category !== currentCategory) return false;
        
        // Year filter
        if (yearFilter && p.year != yearFilter) return false;
        
        // Search filter
        if (searchQuery) {
          const query = searchQuery.toLowerCase();
          const text = (p.title + ' ' + p.authors + ' ' + p.journal + ' ' + p.abstract).toLowerCase();
          return text.includes(query);
        }
        
        return true;
      });
      
      // Sort
      filtered.sort((a, b) => {
        if (sortOrder === 'newest') {
          return (b.year || 0) - (a.year || 0);
        } else {
          return (a.year || 0) - (b.year || 0);
        }
      });
      
      if (filtered.length === 0) {
        container.innerHTML = '<div class="no-results">No papers found matching your criteria.</div>';
        return;
      }
      
      container.innerHTML = filtered.map(paper => `
        <div class="paper-card" data-category="${paper.category}">
          <div class="paper-header">
            <div class="paper-meta">
              <span class="paper-year">${paper.year || 'N/A'}</span>
              <span class="category-badge ${paper.category}">${paper.category}</span>
            </div>
          </div>
          <div class="paper-title-container">
            <div class="paper-title">${paper.title}</div>
            <button class="copy-btn" onclick="copyToClipboard('${paper.PMID}', this)">📋 Copy PMID</button>
          </div>
          <div class="paper-authors">${paper.authors}</div>
          <div class="paper-journal">${paper.journal}</div>
          ${paper.abstract ? `<div class="paper-abstract">${paper.abstract}</div>` : ''}
          <div class="paper-links">
            ${paper.PMID ? `<a href="https://pubmed.ncbi.nlm.nih.gov/${paper.PMID}/" target="_blank">🔗 PubMed</a>` : ''}
            ${paper.DOI ? `<a href="https://doi.org/${paper.DOI}" target="_blank">📄 DOI</a>` : ''}
          </div>
        </div>
      `).join('');
    }

    function filterByCategory(category) {
      currentCategory = category;
      document.querySelectorAll('.category-tab').forEach(tab => {
        tab.classList.toggle('active', tab.dataset.category === category);
      });
      renderPapers();
    }

    function copyToClipboard(text, btn) {
      navigator.clipboard.writeText(text).then(() => {
        btn.textContent = '✓ Copied!';
        btn.classList.add('copied');
        showToast();
        setTimeout(() => {
          btn.textContent = '📋 Copy PMID';
          btn.classList.remove('copied');
        }, 2000);
      });
    }

    function showToast() {
      const toast = document.getElementById('toast');
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2000);
    }

    function exportData() {
      const dataStr = JSON.stringify(papersData, null, 2);
      const blob = new Blob([dataStr], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'digenic_oligogenic_papers.json';
      a.click();
      URL.revokeObjectURL(url);
    }

    // Event listeners
    document.getElementById('search-input').addEventListener('input', (e) => {
      searchQuery = e.target.value;
      renderPapers();
    });

    document.getElementById('year-input').addEventListener('input', (e) => {
      yearFilter = e.target.value;
      renderPapers();
    });

    document.getElementById('sort-order').addEventListener('change', (e) => {
      sortOrder = e.target.value;
      renderPapers();
    });

    // Initial render
    renderPapers();
  </script>
</body>
</html>
