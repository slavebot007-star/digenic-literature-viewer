      gap: 0.5rem;
      flex-wrap: wrap;
    }

      padding: 0.75rem 1rem;
      background: var(--bg-primary);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-primary);
      cursor: pointer;
      font-size: 0.9rem;

    }

    }

    }

      background: var(--bg-secondary);

      padding: 1.5rem;

    "citations": 780,
    "finding": "Only double heterozygotes for mutations in both ROM1 and peripherin/RDS developed retinitis pigmentosa"
  }
];

    function renderPapers(papers) {
      const container = document.getElementById('papers-container');
      
      if (papers.length === 0) {
        container.innerHTML = '<div class="no-results">No papers match your search criteria</div>';
        return;
      }

      // Group by decade
      const grouped = papers.reduce((acc, paper) => {
        const decade = Math.floor(paper.year / 10) * 10;
        if (!acc[decade]) acc[decade] = [];
        acc[decade].push(paper);
        return acc;
      }, {});

      // Sort decades (newest first)
      const sortedDecades = Object.keys(grouped).sort((a, b) => b - a);

      container.innerHTML = sortedDecades.map(decade => `
        <div class="decade-section">
          <h2 class="decade-title">${decade}s</h2>
          <div class="papers-list">
            ${grouped[decade].map(paper => `
              <div class="paper-card" data-year="${paper.year}">
                <div class="paper-header">
                  <span class="paper-year">${paper.year}</span>
                </div>
                <h3 class="paper-title">${paper.title}</h3>
                <p class="paper-authors">${paper.authors}</p>
                <p class="paper-journal">${paper.journal}</p>
                <div class="paper-finding">
                  <strong>Key Finding:</strong> ${paper.finding}
                </div>
                <div class="paper-links">
                  ${paper.doi ? `<a href="https://doi.org/${paper.doi}" target="_blank">🔗 DOI</a>` : ''}
                  ${paper.pmid ? `<a href="https://pubmed.ncbi.nlm.nih.gov/${paper.pmid}/" target="_blank">📄 PubMed</a>` : ''}
                </div>
              </div>
            `).join('')}
          </div>
        </div>
      `).join('');
    }

    function filterPapers() {
      const searchTerm = document.getElementById('search-input').value.toLowerCase();
      const decadeFilter = document.getElementById('decade-filter').value;
      
      let filtered = papersData.filter(paper => {
        const matchesSearch = !searchTerm || 
          paper.title.toLowerCase().includes(searchTerm) ||
          paper.authors.toLowerCase().includes(searchTerm) ||
          paper.finding.toLowerCase().includes(searchTerm) ||
          paper.journal.toLowerCase().includes(searchTerm);
        
        const matchesDecade = decadeFilter === 'all' || 
          Math.floor(paper.year / 10) * 10 === parseInt(decadeFilter);
        
        return matchesSearch && matchesDecade;
      });

      // Sort
      const sortOrder = document.getElementById('sort-order').value;
      filtered.sort((a, b) => sortOrder === 'newest' ? b.year - a.year : a.year - b.year);

      renderPapers(filtered);
    }

    function exportData() {
      const dataStr = JSON.stringify(papersData, null, 2);
      const blob = new Blob([dataStr], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'literature-review.json';
      a.click();
    }

    // Event listeners
    document.getElementById('search-input').addEventListener('input', filterPapers);
    document.getElementById('decade-filter').addEventListener('change', filterPapers);
    document.getElementById('sort-order').addEventListener('change', filterPapers);

    // Initial render
    renderPapers(papersData);
  </script>
</body>
</html>
