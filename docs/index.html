  {
    "PMID": "30508070",
    "title": "Integrated clinical and omics approach to rare diseases: novel genes and oligogenic inheritance in holoprosencephaly.",
    "authors": "Artem Kim; Clara Savary; Christ\u00e8le Dubourg; Wilfrid Carr\u00e9; Charlotte Mouden et al. (22 authors)",
    "journal": "Brain : a journal of neurology",
    "year": "2019",
    "doi": "10.1093/brain/awy290",
    "abstract": "Holoprosencephaly is a pathology of forebrain development characterized by high phenotypic heterogeneity. The disease presents with various clinical manifestations at the cerebral or facial levels. Several genes have been implicated in holoprosencephaly but its genetic basis remains unclear: different transmission patterns have been described including autosomal dominant, recessive and digenic inheritance. Conventional molecular testing approaches result in a very low diagnostic yield and most cases remain unsolved. In our study, we address the possibility that genetically unsolved cases of holoprosencephaly present an oligogenic origin and result from combined inherited mutations in several genes. Twenty-six unrelated families, for whom no genetic cause of holoprosencephaly could be identified in clinical settings [whole exome sequencing and comparative genomic hybridization (CGH)-array analyses], were reanalysed under the hypothesis of oligogenic inheritance. Standard variant analysis was improved with a gene prioritization strategy based on clinical ontologies and gene co-expression networks. Clinical phenotyping and exploration of cross-species similarities were further performed on a family-by-family basis. Statistical validation was performed on 248 ancestrally similar control trios provided by the Genome of the Netherlands project and on 574 ancestrally matched controls provided by the French Exome Project. Variants of clinical interest were identified in 180 genes significantly associated with key pathways of forebrain development including sonic hedgehog (SHH) and primary cilia. Oligogenic events were observed in 10 families and involved both known and novel holoprosencephaly genes including recurrently mutated FAT1, NDST1, COL2A1 and SCUBE2. The incidence of oligogenic combinations was significantly higher in holoprosencephaly patients compared to two control populations (P < 10-9). We also show that depending on the affected genes, patients present with particular clinical features. This study reports novel disease genes and supports oligogenicity as clinically relevant model in holoprosencephaly. It also highlights key roles of SHH signalling and primary cilia in forebrain development. We hypothesize that distinction between different clinical manifestations of holoprosencephaly lies in the degree of overall functional impact on SHH signalling. Finally, we underline that integrating clinical phenotyping in genetic studies is a powerful tool to specify the clinical relevance of certain mutations.",
    "source": "pubmed_2019_2026",
    "category": "clinical"
  },
  {
    "PMID": "30431110",
    "title": "CLCN7 and TCIRG1 mutations in a single family: Evidence for digenic inheritance of osteopetrosis.",
    "authors": "Yongjia Yang; Weihua Ye; Jihong Guo; Liu Zhao; Ming Tu et al. (7 authors)",
    "journal": "Molecular medicine reports",
    "year": "2019",
    "doi": "10.3892/mmr.2018.9648",
    "abstract": "Osteopetrosis is a monogenic condition with various inheritance patterns, including autosomal dominant, autosomal recessive and X\u2011linked. Several disease\u2011causing genes have been identified and three distinguished types of osteopetrosis have been reported. In the present study, a family with osteopetrosis was investigated. Two novel mutations in chloride voltage\u2011gated channel 7 (CLCN7) and T cell immune regulator 1 (TCIRG1) were identified by exome sequencing, Sanger sequencing and microsatellite marker analysis. The CLCN7 mutation occurred in amino acid R286, the same position as previously reported. The TCIRG1 mutation occurred on a splicing site of exon 15, thereby leading to a truncated transcript. These two mutations were undetected in 496 ethnic\u2011matched controls. To the best of our knowledge, this is the first report of human osteopetrosis involving digenic inheritance in a single family, which has important implications for decisions on clinical therapeutic regimen, prognosis evaluation and antenatal diagnosis.",
    "source": "pubmed_2019_2026",
    "category": "clinical"
  },
  {
    "PMID": "30375286",
    "title": "Congenital Hypothyroidism due to Oligogenic Mutations in Two Sudanese Families.",
    "authors": "Yui Watanabe; Ryan J Bruellman; Reham S Ebrhim; Mohamed A Abdullah; Alexandra M Dumitrescu et al. (7 authors)",
    "journal": "Thyroid : official journal of the American Thyroid Association",
    "year": "2019",
    "doi": "10.1089/thy.2018.0295",
    "abstract": "Dyshormonogenic congenital hypothyroidism (CH) generally results from biallelic defects in thyroid hormone synthesis genes. Whole exome sequencing allows easier identification of multiple gene defects. Two Sudanese families with CH resulting from oligogenic defects identified by whole exome sequencing are presented. In family 1, the proposita with CH and goiter was heterozygous for three TPO, one TG, and one DUOX2 mutations, including three novel variants inherited from both parents. In family 2, two brothers with psychomotor delay and goiter were homozygous for digenic mutations in the DUOX2 and DUOX1 genes, while their asymptomatic parents were heterozygous. Accumulation of pathogenic mutations may contribute to CH.",
    "source": "pubmed_2019_2026",
    "category": "clinical"
  },
  {
    "PMID": "30309752",
    "title": "A stochastic epigenetic Mendelian oligogenic disease model for type 1 diabetes.",
    "authors": "Chester A Alper; Charles E Larsen; Michael R Trautwein; Dennis R Alford",
    "journal": "Journal of autoimmunity",
    "year": "2019",
    "doi": "10.1016/j.jaut.2018.09.006",
    "abstract": "The incidence of type 1 diabetes (T1D) and some other complex diseases is increasing. The cause has been attributed to an undefined changing environment. We examine the role of the environment (or any changing non-genetic mechanism) in causing the rising incidence, and find much evidence against it: 1) Dizygotic twin T1D concordance is the same as siblings of patients in general; 2) If the environment is responsible for both the discordance among identical twins of patients with T1D and its rising incidence, the twin concordance rate should be rising, but it is not; 3) Migrants from high-to low-incidence countries continue to have high-incidence children; 4) TID incidence among the offspring of two T1D parents is identical to the monozygotic twin rate. On the other hand, genetic association studies of T1D have revealed strong susceptibility in the major histocompatibility complex and many optional additive genes of small effect throughout the human genome increasing T1D risk. We have, from an analysis of previously published family studies, developed a stochastic epigenetic Mendelian oligogenic (SEMO) model consistent with published observations. The model posits a few required recessive causal genes with incomplete penetrance explaining virtually all of the puzzling features of T1D, including its rising incidence and the specific low T1D incidence rates among first-degree relatives of patients. Since historic selection against any causal gene could prevent T1D, we postulate that the rising incidence is because of increasing population mixing of parents from some previously isolated populations that had selected against different causal genes.",
    "source": "pubmed_2019_2026",
    "category": "clinical"
  },
  {
    "PMID": "29691127",
    "title": "Digenic Heterozigosity in SCN5A and CACNA1C Explains the Variable Expressivity of the Long QT Phenotype in a Spanish Family.",
    "authors": "Paloma Nieto-Mar\u00edn; Juan Jim\u00e9nez-J\u00e1imez; David Tinaquero; Silvia Alfayate; Raquel G Utrilla et al. (14 authors)",
    "journal": "Revista espanola de cardiologia (English ed.)",
    "year": "2019",
    "doi": "10.1016/j.rec.2018.03.012",
    "abstract": "A known long QT syndrome-related mutation in Nav1.5 cardiac channels (p.R1644H) was found in 4 members of a Spanish family but only 1 of them showed prolongation of the QT interval. In the other 3 relatives, a novel missense mutation in Cav1.2 cardiac channels was found (p.S1961N). Here, we functionally analyzed p.S1961N Cav1.2 channels to elucidate whether this mutation regulates the expressivity of the long QT syndrome phenotype in this family. L-type calcium current (ICaL) recordings were performed by using the whole-cell patch-clamp technique in Chinese hamster ovary cells transiently transfected with native and/or p.S1961N Cav1.2 channels. Expression of p.S1961N channels significantly decreased ICaL density. Using Ba as a charge carrier to suppress the Ca-dependent inactivation of Cav1.2 channels, we demonstrated that the mutation significantly accelerates the voltage-dependent inactivation of Cav1.2 channels decreasing the inactivation time constant. As a consequence, the total charge flowing through p.S1961N Cav1.2 channels significantly decreased. The effects of the p.S1961N Cav1.2 and p.R1644H Nav1.5 mutations alone or their combination on the action potential (AP) morphology were simulated using a validated model of the human ventricular AP. The p.S1961N Cav1.2 mutation shortens the AP duration and abrogates the prolongation induced by p.R1644H Nav1.5 channels. The p.S1961N mutation in Cav1.2 channels decreased the ICaL, an effect which might shorten ventricular AP. The presence of the loss-of-function Cav1.2 mutation could functionally compensate the prolonging effects produced by the Nav1.5 gain-of-function mutation.",
    "source": "pubmed_2019_2026",
    "category": "clinical"
  },
  {
    "PMID": "34192699",
    "title": "Putative Digenic GJB2/MYO7A Inheritance of Hearing Loss Detected in a Patient with 48,XXYY Klinefelter Syndrome.",
    "authors": "Qin Zhang; Tiantian Qin; Wenmu Hu; Muhammad Usman Janjua; Ping Jin",
    "journal": "Human heredity",
    "year": "2020",
    "doi": "10.1159/000516854",
    "abstract": "Nonsyndromic hearing loss (NSHL) is the most frequent type of hereditary hearing impairment. Here, we explored the underlying genetic cause of NSHL in a three-generation family using whole-exome sequencing. The proband had concomitant NSHL and rare 48,XXYY Klinefelter syndrome. Genomic DNA was extracted from the peripheral blood of the proband and their family members. Sanger sequencing and pedigree verification were performed on the pathogenic variants filtered by whole-exome sequencing. The function of the variants was analyzed using bioinformatics software. The proband was digenic heterozygous for p.V37I in the GJB2 gene and p.L347I in the MYO7A gene. The proband's mother had normal hearing and did not have any variant. The proband's father and uncle both had NSHL and were compound for the GJB2 p.V37I and MYO7A p.L347I variants, thus indicating a possible GJB2/MYO7A digenic inheritance of NSHL. 48,XXYY Klinefelter syndrome was discovered in the proband after the karyotype analysis, while his parents both had normal karyotypes. Our findings reported a putative GJB2/MYO7A digenic inheritance form of hearing loss, expanding the genotype and phenotype spectrum of NSHL. In addition, this is the first report of concomitant NSHL and 48,XXYY syndrome.",
    "source": "pubmed_2019_2026",
    "category": "clinical"
  },
  {
    "PMID": "33519890",
    "title": "The Digenic Causality in Familial Hypercholesterolemia: Revising the Genotype-Phenotype Correlations of the Disease.",
    "authors": "Amina Kamar; Athar Khalil; Georges Nemer",
    "journal": "Frontiers in genetics",
    "year": "2020",
    "doi": "10.3389/fgene.2020.572045",
    "abstract": "Genetically inherited defects in lipoprotein metabolism affect more than 10 million individuals around the globe with preponderance in some parts where consanguinity played a major role in establishing founder mutations. Mutations in four genes have been so far linked to the dominant and recessive form of the disease. Those players encode major proteins implicated in cholesterol regulation, namely, the low-density lipoprotein receptor (LDLR) and its associate protein 1 (LDLRAP1), the proprotein convertase substilin/kexin type 9 (PCSK9), and the apolipoprotein B (APOB). Single mutations or compound mutations in one of these genes are enough to account for a spectrum of mild to severe phenotypes. However, recently several reports have identified digenic mutations in familial cases that do not necessarily reflect a much severe phenotype. Yet, data in the literature supporting this notion are still lacking. Herein, we review all the reported cases of digenic mutations focusing on the biological impact of gene dosage and the potential protective effects of single-nucleotide polymorphisms linked to hypolipidemia. We also highlight the difficulty of establishing phenotype-genotype correlations in digenic familial hypercholesterolemia cases due to the complexity and heterogeneity of the phenotypes and the still faulty in silico pathogenicity scoring system. We finally emphasize the importance of having a whole exome/genome sequencing approach for all familial cases of familial hyperlipidemia to better understand the genetic and clinical course of the disease.",
    "source": "pubmed_2019_2026",
    "category": "clinical"
  },
  {
    "PMID": "33424767",
    "title": "Disorders of Sex Development in Individuals Harbouring MAMLD1 Variants: WES and Interactome Evidence of Oligogenic Inheritance.",
    "authors": "Lele Li; Fenqi Gao; Lijun Fan; Chang Su; Xuejun Liang et al. (6 authors)",
    "journal": "Frontiers in endocrinology",
    "year": "2020",
    "doi": "10.3389/fendo.2020.582516",
    "abstract": "Mastermind-like domain-containing 1 (MAMLD1) has been shown to play an important role in the process of sexual development and is associated with 46,XY disorders of sex development (DSDs). However, the causative role of MAMLD1 variations in DSDs remains disputable. In this study, we have described a clinical series on children from unrelated families with 46,XY DSD harbouring MAMLD1 variants. Whole exome sequencing (WES) was performed for each patient. WES data were filtered using common tools and disease customisation algorithms, including comparison against lists of known and candidate MAMLD1-related and DSD-related genes. Lastly, we investigated the hypothesis that MAMLD1-related DSD may follow an oligogenic mode of inheritance. Forty-three potentially deleterious/candidate variants of 18 genes (RET, CDH23, MYO7A, NOTCH2, MAML1, MAML2, CYP1A1, WNT9B, GLI2, GLI3, MAML3, WNT9A, FRAS1, PIK3R3, FREM2, PTPN11, EVC, and FLNA) were identified, which may have contributed to the patient phenotypes. MYO7A was the most commonly identified gene. Specific gene combinations were also identified. In the interactome analysis, MAMLD1 exhibited direct connection with MAML1/2/3 and NOTCH1/2. Through NOTCH1/2, the following eight genes were shown to be associated with MAMLD1:WNT9A/9B, GLI2/3, RET, FLNA, PTPN11, and EYA1. Our findings provide further evidence that individuals with MAMLD1-related 46,XY DSD could carry two or more variants of known DSD-related genes, and the phenotypic outcome of affected individuals might be determined by multiple genes.",
    "source": "pubmed_2019_2026",
    "category": "clinical"
  },
  {
    "PMID": "33355142",
    "title": "Digenic mutations in ALDH2 and ADH5 impair formaldehyde clearance and cause a multisystem disorder, AMeD syndrome.",
    "authors": "Yasuyoshi Oka; Motoharu Hamada; Yuka Nakazawa; Hideki Muramatsu; Yusuke Okuno et al. (41 authors)",
    "journal": "Science advances",
    "year": "2020",
    "doi": "10.1126/sciadv.abd7197",
    "abstract": "Rs671 in the aldehyde dehydrogenase 2 gene (ALDH2) is the cause of Asian alcohol flushing response after drinking. ALDH2 detoxifies endogenous aldehydes, which are the major source of DNA damage repaired by the Fanconi anemia pathway. Here, we show that the rs671 defective allele in combination with mutations in the alcohol dehydrogenase 5 gene, which encodes formaldehyde dehydrogenase (ADH5FDH ), causes a previously unidentified disorder, AMeD (aplastic anemia, mental retardation, and dwarfism) syndrome. Cellular studies revealed that a decrease in the formaldehyde tolerance underlies a loss of differentiation and proliferation capacity of hematopoietic stem cells. Moreover, Adh5-/-Aldh2 E506K/E506K double-deficient mice recapitulated key clinical features of AMeDS, showing short life span, dwarfism, and hematopoietic failure. Collectively, our results suggest that the combined deficiency of formaldehyde clearance mechanisms leads to the complex clinical features due to overload of formaldehyde-induced DNA damage, thereby saturation of DNA repair processes.",
    "source": "pubmed_2019_2026",
    "category": "clinical"
  },
  {
    "PMID": "33276358",
    "title": "[Hypertrophic Cardiomyopathy as an Oligogenic Disease: Transcriptomic Arguments].",
    "authors": "N M Baulina; I S Kiselev; O S Chumakova; O O Favorova",
    "journal": "Molekuliarnaia biologiia",
    "year": "2020",
    "doi": "10.31857/S0026898420060026",
    "abstract": "Hypertrophic cardiomyopathy (HCM) is the most common genetically determined heart pathology and is often accompanied by fatal complications. Today, the traditional view of the monogenic origin of HCM is being replaced by the idea of it as an oligogenic disease, the clinical phenotype of which is determined not only by mutations in the genes encoding sarcomere proteins in cardiomyocytes, but also by the contribution of other genes (other sarcomeric genes, non-sarcomeric protein-coding modifier genes, and regulatory non-coding RNA genes). Transcriptome analysis is an informative approach for elucidating the nature of HCM, which allows one to evaluate the expression of all genes, evaluate the effect of mutations in a gene on its transcript level, and reveal the mechanisms involved in the regulation of gene expression. This review presents an analysis of published data on the spectra of genes whose differential expression has been detected in the myocardium during the development of HCM in humans and model animals. Special attention is paid to the genes of non-coding regulatory RNAs: miRNAs and long non-coding RNAs, which may be involved in the pathogenesis of the disease. We analyzed studies devoted to the investigation of miRNA levels in the blood of HCM patients to explore the available diagnostic and prognostic biomarkers of the disease. The totality of the reviewed data, despite their relative scarcity, indicates the effectiveness of transcriptome profiling in studying the molecular mechanisms of HCM pathogenesis.",
    "source": "pubmed_2019_2026",
    "category": "clinical"
  },
  {
    "PMID": "33256177",
    "title": "Multiple Self-Healing Squamous Epithelioma (MSSE): A Digenic Trait Associated with Loss of Function Mutations in TGFBR1 and Variants at a Second Linked Locus on the Long Arm of Chromosome 9.",
    "authors": "David Goudie",
    "journal": "Genes",
    "year": "2020",
    "doi": "10.3390/genes11121410",
    "abstract": "MSSE (Ferguson-Smith disease) is a rare familial condition in which multiple skin tumors resembling squamous carcinomas invade locally and then regress spontaneously after several months, leaving disfiguring scars. We review evidence from haplotype studies in MSSE families with common ancestry that the condition is caused by loss of function mutations in TGFBR1 interacting with permissive variants at a second linked locus on the long arm of chromosome 9. The spectrum of TGFBR1 mutations in MSSE and the allelic disorder Loeys Dietz syndrome (characterized by developmental anomalies and thoracic aortic aneurysms) differ. Reports of patients with both MSSE and Loeys Dietz syndrome are consistent with variants at a second locus determining whether self-healing epitheliomas occur in patients with the loss of function mutations found in most MSSE patients or the missense mutations in the intracellular kinase domain of TGFBR1 that characterize Loeys Dietz syndrome.",
    "source": "pubmed_2019_2026",
    "category": "clinical"
  },
  {
    "PMID": "33210059",
    "title": "Digenic Variants in the FGF21 Signaling Pathway Associated with Severe Insulin Resistance and Pseudoacromegaly.",
    "authors": "Stephen I Stone; Daniel J Wegner; Jennifer A Wambach; F Sessions Cole; Fumihiko Urano et al. (6 authors)",
    "journal": "Journal of the Endocrine Society",
    "year": "2020",
    "doi": "10.1210/jendso/bvaa138",
    "abstract": "Insulin-mediated pseudoacromegaly (IMPA) is a rare disease of unknown etiology. Here we report a 12-year-old female with acanthosis nigricans, hirsutism, and acromegalic features characteristic of IMPA. The subject was noted to have normal growth hormone secretion, with extremely elevated insulin levels. Studies were undertaken to determine a potential genetic etiology for IMPA. The proband and her family members underwent whole exome sequencing. Functional studies were undertaken to validate the pathogenicity of candidate variant alleles. Whole exome sequencing identified monoallelic, predicted deleterious variants in genes that mediate fibroblast growth factor 21 (FGF21) signaling, FGFR1 and KLB, which were inherited in trans from each parent. FGF21 has multiple metabolic functions but no known role in human insulin resistance syndromes. Analysis of the function of the FGFR1 and KLB variants in vitro showed greatly attenuated ERK phosphorylation in response to FGF21, but not FGF2, suggesting that these variants act synergistically to inhibit endocrine FGF21 signaling but not canonical FGF2 signaling. Therefore, digenic variants in FGFR1 and KLB provide a potential explanation for the subject's severe insulin resistance and may represent a novel category of insulin resistance syndromes related to FGF21.",
    "source": "pubmed_2019_2026",
    "category": "clinical"
  },
  {
    "PMID": "33187793",
    "title": "Clinical and molecular evidence of possible digenic inheritance for MFN2/GDAP1 genes in Charcot-Marie-Tooth disease.",
    "authors": "Ren\u00e9e Barreda Fierro; Patricia Herrera Mora; Juan Carlos Zenteno; Camilo E Villarroel Cort\u00e9s",
    "journal": "Neuromuscular disorders : NMD",
    "year": "2020",
    "doi": "10.1016/j.nmd.2020.10.003",
    "abstract": "Charcot Marie Tooth disease (CMT) is a progressive motor and sensory polyneuropathy, it is characterized by a very heterogeneous molecular basis and phenotype. MFN2 and GDAP1 participate in mitochondrial energy metabolism and the rare coinheritance of its pathogenic variants has been associated with a cumulative effect in the observed phenotype. We describe a patient with a severe axonal CMT and inherited heterozygous MFN2 (p.Leu741Val) and GDAP1 (p.Gln163*) variants. In accordance with a possible digenic inheritance, none of the heterozygous carriers in his family were symptomatic or exhibited electrophysiological abnormalities. We also review all of the previously reported patients with coinheritance of variants in these two genes; similar to our patient, all exhibit a predominantly axonal severe CMT phenotype. Our findings expand the genotypic spectrum of CMT and further support that digenic inheritance should be considered for analyzing and counseling CMT patients.",
    "source": "pubmed_2019_2026",
    "category": "clinical"
  },
  {
    "PMID": "32998306",
    "title": "Update on Genetic Basis of Brugada Syndrome: Monogenic, Polygenic or Oligogenic?",
    "authors": "Oscar Campuzano; Georgia Sarquella-Brugada; Sergi Cesar; Elena Arbelo; Josep Brugada et al. (6 authors)",
    "journal": "International journal of molecular sciences",
    "year": "2020",
    "doi": "10.3390/ijms21197155",
    "abstract": "Brugada syndrome is a rare inherited arrhythmogenic disease leading to ventricular fibrillation and high risk of sudden death. In 1998, this syndrome was linked with a genetic variant with an autosomal dominant pattern of inheritance. To date, rare variants identified in more than 40 genes have been potentially associated with this disease. Variants in regulatory regions, combinations of common variants and other genetic alterations are also proposed as potential origins of Brugada syndrome, suggesting a polygenic or oligogenic inheritance pattern. However, most of these genetic alterations remain of questionable causality; indeed, rare pathogenic variants in the SCN5A gene are the only established cause of Brugada syndrome. Comprehensive analysis of all reported genetic alterations identified the origin of disease in no more than 40% of diagnosed cases. Therefore, identifying the cause of this rare arrhythmogenic disease in the many families without a genetic diagnosis is a major current challenge in Brugada syndrome. Additional challenges are interpretation/classification of variants and translation of genetic data into clinical practice. Further studies focused on unraveling the pathophysiological mechanisms underlying the disease are needed. Here we provide an update on the genetic basis of Brugada syndrome.",
    "source": "pubmed_2019_2026",
    "category": "clinical"
  },
  {
    "PMID": "32968074",
    "title": "Risk prediction of late-onset Alzheimer's disease implies an oligogenic architecture.",
    "authors": "Qian Zhang; Julia Sidorenko; Baptiste Couvy-Duchesne; Riccardo E Marioni; Margaret J Wright et al. (20 authors)",
    "journal": "Nature communications",
    "year": "2020",
    "doi": "10.1038/s41467-020-18534-1",
    "abstract": "Genetic association studies have identified 44 common genome-wide significant risk loci for late-onset Alzheimer's disease (LOAD). However, LOAD genetic architecture and prediction are unclear. Here we estimate the optimal P-threshold (Poptimal) of a genetic risk score (GRS) for prediction of LOAD in three independent datasets comprising 676 cases and 35,675 family history proxy cases. We show that the discriminative ability of GRS in LOAD prediction is maximised when selecting a small number of SNPs. Both simulation results and direct estimation indicate that the number of causal common SNPs for LOAD may be less than 100, suggesting LOAD is more oligogenic than polygenic. The best GRS explains approximately 75% of SNP-heritability, and individuals in the top decile of GRS have ten-fold increased odds when compared to those in the bottom decile. In addition, 14 variants are identified that contribute to both LOAD risk and age at onset of LOAD.",
    "source": "pubmed_2019_2026",
    "category": "clinical"
  },
  {
    "PMID": "35316923",
    "title": "New findings in oligogenic inheritance of congenital hypogonadotropic hypogonadism.",
    "authors": "Agnieszka Gach; Iwona Pinkier; Urszula Wysocka; Kinga Sa\u0142aci\u0144ska; Dominik Salachna et al. (14 authors)",
    "journal": "Archives of medical science : AMS",
    "year": "2022",
    "doi": "10.5114/aoms.2020.98909",
    "abstract": "Congenital hypogonadotropic hypogonadism results from a dysfunction of the hypothalamic-pituitary-gonadal axis, which is essential for the development and function of the reproductive system. It may be associated with anosmia, referred to as Kallmann syndrome, or a normal sense of smell. Numerous studies have proven that hypogonadotropic hypogonadism is not simply a monogenic Mendelian disease, but that more than one gene may be involved in its pathogenesis in a single patient. The oligogenic complex architecture underlying the disease is still largely unknown. Targeted next-generation sequencing (NGS) was used to screen for DNA variants in a cohort of 47 patients with congenital hypogonadotropic hypogonadism. The NGS panel consists of over 50 well-known and candidate genes, associated with hypogonadotropic state. Here we report the identification of new oligogenic variants in SPRY4/SEMA3A, SRA1/SEMA7A, CHD7/SEMA7A, CCDC141/POLR3B/POLR3B, and PROKR2/SPRY4/NSMF. These genes are known to contribute to the phenotype of hypogonadotropic hypogonadism, yet our results point to potential new \"partners\" underlying digenic and trigenic patterns. The finding supports the importance of oligogenic inheritance and demonstrates the complexity of genetic architecture in hypogonadotropic hypogonadism. It also underlines the necessity for developing fine-tuned guidelines to provide a tool for adequate and precise sequence variant classification in non-Mendelian conditions.",
    "source": "pubmed_2019_2026",
    "category": "clinical"
  },
  {
    "PMID": "32815649",
    "title": "Mutational burden and potential oligogenic model of TBX6-mediated genes in congenital scoliosis.",
    "authors": "Yang Yang; Sen Zhao; Yuanqiang Zhang; Shengru Wang; Jiashen Shao et al. (16 authors)",
    "journal": "Molecular genetics & genomic medicine",
    "year": "2020",
    "doi": "10.1002/mgg3.1453",
    "abstract": "Congenital scoliosis (CS) is a spinal deformity due to vertebral malformations. Although insufficiency of TBX6 dosage contributes to a substantial proportion of CS, the molecular etiology for the majority of CS remains largely unknown. TBX6-mediated genes involved in the process of somitogenesis represent promising candidates. Individuals affected with CS and without a positive genetic finding were referred to this study. Proband-only exome sequencing (ES) were performed on the recruited individuals, followed by analysis of TBX6-mediated candidate genes, namely MEOX1, MEOX2, MESP2, MYOD1, MYF5, RIPPLY1, and RIPPLY2. A total of 584 patients with CS of unknown molecular etiology were recruited. After ES analysis, protein-truncating variants in RIPPLY1 and MYF5 were identified from two individuals, respectively. In addition, we identified five deleterious missense variants (MYOD1, n\u00a0=\u00a04; RIPPLY2, n\u00a0=\u00a01) in TBX6-mediated genes. We observed a significant mutational burden of MYOD1 in CS (p\u00a0=\u00a00.032) compared with the in-house controls (n\u00a0=\u00a01854). Moreover, a potential oligogenic disease-causing mode was proposed based on the observed mutational co-existence of MYOD1/MEOX1 and MYOD1/RIPPLY1. Our study characterized the mutational spectrum of TBX6-mediated genes, prioritized core candidate genes/variants, and provided insight into a potential oligogenic disease-causing mode in CS.",
    "source": "pubmed_2019_2026",
    "category": "clinical"
  },
  {
    "PMID": "32719112",
    "title": "A genome-wide case-only test for the detection of digenic inheritance in human exomes.",
    "authors": "Gaspard Kerner; Matthieu Bouaziz; Aur\u00e9lie Cobat; Benedetta Bigio; Andrew T Timberlake et al. (9 authors)",
    "journal": "Proceedings of the National Academy of Sciences of the United States of America",
    "year": "2020",
    "doi": "10.1073/pnas.1920650117",
    "abstract": "Whole-exome sequencing (WES) has facilitated the discovery of genetic lesions underlying monogenic disorders. Incomplete penetrance and variable expressivity suggest a contribution of additional genetic lesions to clinical manifestations and outcome. Some monogenic disorders may therefore actually be digenic. However, only a few digenic disorders have been reported, all discovered by candidate gene approaches applied to at least one locus. We propose here a two-locus genome-wide test for detecting digenic inheritance in WES data. This approach uses the gene as the unit of analysis and tests all pairs of genes to detect pairwise gene \u00d7 gene interactions underlying disease. It is a case-only method, which has several advantages over classic case-control tests, in particular by avoiding recruitment of controls. Our simulation studies based on real WES data identified two major sources of type I error inflation in this case-only test: linkage disequilibrium and population stratification. Both were corrected by specific procedures. Moreover, our case-only approach is more powerful than the corresponding case-control test for detecting digenic interactions in various population stratification scenarios. Finally, we confirmed the potential of our unbiased, genome-wide approach by successfully identifying a previously reported digenic lesion in patients with craniosynostosis. Our case-only test is a powerful and timely tool for detecting digenic inheritance in WES data from patients.",
    "source": "pubmed_2019_2026",
    "category": "clinical"
  },
  {
    "PMID": "32713623",
    "title": "The identified clinical features of Parkinson's disease in homo-, heterozygous and digenic variants of PINK1.",
    "authors": "Arisa Hayashida; Yuanzhe Li; Hiroyo Yoshino; Kensuke Daida; Aya Ikeda et al. (54 authors)",
    "journal": "Neurobiology of aging",
    "year": "2021",
    "doi": "10.1016/j.neurobiolaging.2020.06.017",
    "abstract": "To investigate the prevalence and genotype-phenotype correlations of phosphatase and tensin homolog induced putative kinase 1 (PINK1) variants in Parkinson's disease (PD) patients, we analyzed 1700 patients (842 familial PD and 858 sporadic PD patients from Japanese origin). We screened the entire exon and exon-intron boundaries of PINK1 using Sanger sequencing and target sequencing by Ion torrent system. We identified 30 patients with heterozygous variants, 3 with homozygous variants, and 3 with digenic variants of PINK1-PRKN. Patients with homozygous variants presented a significantly younger age at onset than those with heterozygous variants. The allele frequency of heterozygous variants in patients with age at onset at 50\u00a0years and younger with familial PD and sporadic PD showed no differences. [123I]meta-iodobenzylguanidine (MIBG) myocardial scintigraphy indicated that half of patients harboring PINK1 heterozygous variants showed a decreased heart to mediastinum ratio (12/23). Our findings emphasize the importance of PINK1 variants for the onset of PD in patients with age at onset at 50\u00a0years and younger and the broad spectrum of clinical symptoms in patients with PINK1 variants.",
    "source": "pubmed_2019_2026",
    "category": "clinical"
  },
  {
    "PMID": "32615015",
    "title": "Digenic inheritance of MSH6 and MUTYH variants in familial colorectal cancer.",
    "authors": "Stephanie A Schubert; Dina Ruano; Yvonne Tiersma; Mark Drost; Niels de Wind et al. (10 authors)",
    "journal": "Genes, chromosomes & cancer",
    "year": "2020",
    "doi": "10.1002/gcc.22883",
    "abstract": "We describe a family severely affected by colorectal cancer (CRC) where whole-exome sequencing identified the coinheritance of the germline variants encoding MSH6 p.Thr1100Met and MUTYH p.Tyr179Cys in, at least, three CRC patients diagnosed before 60\u2009years of age. Digenic inheritance of monoallelic MSH6 variants of uncertain significance and MUTYH variants has been suggested to predispose to Lynch syndrome-associated cancers; however, cosegregation with disease in the familial setting has not yet been established. The identification of individuals carrying multiple potential cancer risk variants is expected to rise with the increased application of whole-genome sequencing and large multigene panel testing in clinical genetic counseling of familial cancer patients. Here we demonstrate the coinheritance of monoallelic variants in MSH6 and MUTYH consistent with cosegregation with CRC, further supporting a role for digenic inheritance in cancer predisposition.",
    "source": "pubmed_2019_2026",
    "category": "clinical"
  },
  {
    "PMID": "32514133",
    "title": "Digenic inheritance of subclinical variants in Noonan Syndrome patients: an alternative pathogenic model?",
    "authors": "Luca Ferrari; Eleonora Mangano; Maria Teresa Bonati; Ilaria Monterosso; Daniele Capitanio et al. (11 authors)",
    "journal": "European journal of human genetics : EJHG",
    "year": "2020",
    "doi": "10.1038/s41431-020-0658-0",
    "abstract": "Noonan syndrome (NS) is an autosomal-dominant disorder with variable expressivity and locus heterogeneity. Despite several RAS pathway genes were implicated in NS, 20-30% of patients remain without molecular diagnosis, suggesting the involvement of further genes or multiple mechanisms. Eight patients out of 60, negative for conventional NS mutation analysis, with heterogeneous NS phenotype were investigated by means of target resequencing of 26 RAS/MAPK pathway genes. A trio was further characterized by means of whole-exome sequencing. Protein modeling and in silico prediction of protein stability allowed to identify possible pathogenic RAS pathway variants in four NS patients. A new c.355T>C variant in LZTR1 was found in patient 43. Two patients co-inherited variants in LRP1 and LZTR1 (patient 53), or LRP1 and SOS1 genes (patient 67). The forth patient (56) carried a compound heterozygote of RASAL3 gene variants and also an A2ML1 variant. While these subclinical variants are singularly present in healthy parents, they co-segregate in patients, suggesting their addictive effect and supporting a digenic inheritance, as alternative model to a more common monogenic transmission. The ERK1/2 and SAPK/JNK activation state, assessed on immortalized lymphocytes from patients 53 and 67 showed highest phosphorylation levels compared to their asymptomatic parents. These findings together with the lack of their co-occurrence in the 1000Genomes database strengthen the hypothesis of digenic inheritance in a subset of NS patients. This study suggests caution in the exclusion of subclinical variants that might play a pathogenic role providing new insights for alternative hereditary mechanisms.",
    "source": "pubmed_2019_2026",
    "category": "clinical"
  },
  {
    "PMID": "32506365",
    "title": "Bartter syndrome representing digenic-based salt-losing tubulopathies presumably accelerated by renal insufficiency.",
    "authors": "Ryusuke Umene; Mineaki Kitamura; Hideyuki Arai; Kazuki Matsumura; Yuka Ishimaru et al. (12 authors)",
    "journal": "CEN case reports",
    "year": "2020",
    "doi": "10.1007/s13730-020-00489-3",
    "abstract": "Bartter syndrome and Gitelman syndrome (GS) are autosomal recessive disorders usually caused by homozygous or compound heterozygous mutations in causative genes. In some patients, these two syndromes cannot be discriminated based on clinical features or mutation type; thus, a single disease concept, salt-losing tubulopathies (SLTs), has been used instead. Despite the existence of several SLT causative genes, cases of digenic heterozygous mutations in two different genes are extremely rare. Here, we report the case of a 36-year-old woman with renal insufficiency and hypokalemia caused by an SLT. To evaluate the SLT phenotype, we performed next-generation sequencing (NGS) with a gene panel including SLC12A3, SLC12A1, CLCNKB, and CLCNKA as well as laboratory examinations and diuretic loading tests. The results of the diuretic loading tests were consistent with a GS phenotype, while the NGS results showed that the patient had heterozygous mutations in SLC12A1 and CLCNKB. Both genes have been associated with BS, suggesting that the SLT was caused by digenic heterozygous mutations in two different genes. To date, only a few SLT cases caused by digenic heterozygous mutations in two different genes have been reported. The digenic SLT phenotype in the patient was presumably accelerated by moderate renal insufficiency.",
    "source": "pubmed_2019_2026",
    "category": "clinical"
  },
  {
    "PMID": "32409511",
    "title": "Evidence for polygenic and oligogenic basis of Australian sporadic amyotrophic lateral sclerosis.",
    "authors": "Emily P McCann; Lyndal Henden; Jennifer A Fifita; Katharine Y Zhang; Natalie Grima et al. (13 authors)",
    "journal": "Journal of medical genetics",
    "year": "2020",
    "doi": "10.1136/jmedgenet-2020-106866",
    "abstract": "Amyotrophic lateral sclerosis (ALS) is a fatal neurodegenerative disease with phenotypic and genetic heterogeneity. Approximately 10% of cases are familial, while remaining cases are classified as sporadic. To date, >30 genes and several hundred genetic variants have been implicated in ALS. Seven hundred and fifty-seven sporadic ALS cases were recruited from Australian neurology clinics. Detailed clinical data and whole genome sequencing (WGS) data were available from 567 and 616 cases, respectively, of which 426 cases had both datasets available. As part of a comprehensive genetic analysis, 853 genetic variants previously reported as ALS-linked mutations or disease-associated alleles were interrogated in sporadic ALS WGS data. Statistical analyses were performed to identify correlation between clinical variables, and between phenotype and the number of ALS-implicated variants carried by an individual. Relatedness between individuals carrying identical variants was assessed using identity-by-descent analysis. Forty-three ALS-implicated variants from 18 genes, including C9orf72, ATXN2, TARDBP, SOD1, SQSTM1 and SETX, were identified in Australian sporadic ALS cases. One-third of cases carried at least one variant and 6.82% carried two or more variants, implicating a potential oligogenic or polygenic basis of ALS. Relatedness was detected between two sporadic ALS cases carrying a SOD1 p.I114T mutation, and among three cases carrying a SQSTM1 p.K238E mutation. Oligogenic/polygenic sporadic ALS cases showed earlier age of onset than those with no reported variant. We confirm phenotypic associations among ALS cases, and highlight the contribution of genetic variation to all forms of ALS.",
    "source": "pubmed_2019_2026",
    "category": "clinical"
  },
  {
    "PMID": "32389683",
    "title": "Coexistence of digenic mutations in the collagen VI genes (COL6A1 and COL6A3) leads to Bethlem myopathy.",
    "authors": "Eunseok Choi; Soyoung Shin; Sangjee Lee; Sook Joung Lee; Joonhong Park",
    "journal": "Clinica chimica acta; international journal of clinical chemistry",
    "year": "2020",
    "doi": "10.1016/j.cca.2020.05.011",
    "abstract": "Bethlem myopathy is a kind of collagen VI related myopathy which affects proximal skeletal muscles and leads to gait disturbance and multiple joint contractures with an onset in the first two decades of life. Lung function impairment (respiratory muscle and diaphragmatic weakness, ventilatory restriction, hypoxaemia and hypercapnia) and respiratory failure are part of the clinical spectrum and can occur in ambulatory patients. We carried out whole exome sequencing (WES) in combination with neuromuscular diseases-associated genes-filtering to detect the possible causative mutation(s) in a Korean family with Bethlem myopathy. An electrodiagnostic study showed myopathic pattern (normal nerve conduction study, and early recruitment and short amplitude muscle unit action potentials) in the proband. Coexistence of digenic mutations in the collagen VI genes (COL6A1 and COL6A3) was identified by WES in the proband only: heterozygous missense mutations of the COL6A1 (NM_001848.2: c.823G\u00a0>\u00a0T, p.Gly275Trp; rs1556425467) and of the COL6A3 genes (NM_004369.3: c.9349G\u00a0>\u00a0A, p.Asp3117Asn; rs1226664855). COL6A3 mutation may be candidate as disease-associated variant, as far as it was found only in the proband harboring another heterozygous mutation in COL6A1 gene, previously reported as different pathogenic mutations (p.Gly275Arg and p.Gly275Glu) at the same codon in Bethlem myopathy. Our findings suggest that the coexistence of these digenic mutations is rare, but it may be used for the risk evaluation of individuals with a possible susceptibility to Bethlem myopathy. Taken together, genetic diagnosis using WES is a useful approach for the identification of pathogenic mutations associated with Bethlem myopathy.",
    "source": "pubmed_2019_2026",
    "category": "clinical"
  },
  {
    "PMID": "32385536",
    "title": "Oligogenicity, C9orf72 expansion, and variant severity in ALS.",
    "authors": "Jay P Ross; Claire S Leblond; Sandra B Laurent; Dan Spiegelman; Alexandre Dionne-Laporte et al. (9 authors)",
    "journal": "Neurogenetics",
    "year": "2020",
    "doi": "10.1007/s10048-020-00612-7",
    "abstract": "\"Oligogenic inheritance\" is used to describe cases where more than one rare pathogenic variant is observed in the same individual. While multiple variants can alter disease presentation, the necessity of multiple variants to instigate pathogenesis has not been addressed in amyotrophic lateral sclerosis (ALS). We sequenced ALS-associated genes in C9orf72-expansion-positive and negative ALS patients, alongside unaffected controls, to test the importance of oligogenicity and variant deleteriousness in ALS. We found that all groups had similar numbers of rare variants, but that variant severity was significantly higher in C9orf72-negative ALS cases, suggesting sufficiency of C9orf72 expansion to cause ALS alone.",
    "source": "pubmed_2019_2026",
    "category": "clinical"
  },
  {
    "PMID": "32381728",
    "title": "Exome sequencing analysis identifies frequent oligogenic involvement and FLNB variants in adolescent idiopathic scoliosis.",
    "authors": "Heng Jiang; Shulun Liang; Kai He; Jinghua Hu; Enjie Xu et al. (13 authors)",
    "journal": "Journal of medical genetics",
    "year": "2020",
    "doi": "10.1136/jmedgenet-2019-106411",
    "abstract": "Adolescent idiopathic scoliosis (AIS) is a genetically heterogeneous disease characterised by three-dimensional deformity of the spine in the absence of a congenital spinal anomaly or neurological musculoskeletal disorder. The clinical variability and incomplete penetrance of some genes linked with AIS indicate that this disease constitutes an oligogenic trait. We aimed to explore the oligogenic nature of this disease and identify novel AIS genes. We analysed rare damaging variants within AIS-associated genes by using exome sequencing in 40 AIS trios and 183 sporadic patients. Multiple variants within AIS-associated genes were identified in eight AIS trios, and five individuals harboured rare damaging variants in the FLNB gene. The patients showed more frequent oligogenicity than the controls. In the gene-based burden test, the top signal resided in FLNB. In functional studies, we found that the AIS-associated FLNB variants altered the protein's conformation and subcellular localisation and its interaction with other proteins (TTC26 and OFD1) involved in AIS. The most compelling evidence of an oligogenic basis was that the number of rare damaging variants was recognised as an independent prognostic factor for curve progression in Cox regression analysis. Our data indicate that AIS is an oligogenic disease and identify FLNB as a susceptibility gene for AIS.",
    "source": "pubmed_2019_2026",
    "category": "clinical"
  },
  {
    "PMID": "32311027",
    "title": "Digenic Heterozygous Mutations in SLC34A3 and SLC34A1 Cause Dominant Hypophosphatemic Rickets with Hypercalciuria.",
    "authors": "Rebecca J Gordon; Dong Li; Daniel Doyle; Joshua Zaritsky; Michael A Levine",
    "journal": "The Journal of clinical endocrinology and metabolism",
    "year": "2020",
    "doi": "10.1210/clinem/dgaa217",
    "abstract": "Hypophosphatemia and metabolic bone disease are associated with hereditary hypophosphatemic rickets with hypercalciuria (HHRH) due to biallelic mutations of SLC34A3 encoding the NPT2C sodium-phosphate cotransporter and nephrolithiasis/osteoporosis, hypophosphatemic 1 (NPHLOP1) due to monoallelic mutations in SLC34A1 encoding the NPT2A sodium-phosphate cotransporter. To identify a genetic cause of apparent dominant transmission of HHRH. Retrospective and prospective analysis of clinical and molecular characteristics of patients studied in 2 academic medical centers. We recruited 4 affected and 3 unaffected members of a 4-generation family in which the proband presented with apparent HHRH. We performed clinical examinations, biochemical and radiological analyses, and molecular studies of genomic DNA. The proband and her affected sister and mother carried pathogenic heterozygous mutations in 2 related genes, SLC34A1 (exon 13, c.1535G>A; p.R512H) and SLC34A3 (exon 13, c.1561dupC; L521Pfs*72). The proband and her affected sister inherited both gene mutations from their mother, while their clinically less affected brother, father, and paternal grandmother carried only the SLC34A3 mutation. Renal phosphate-wasting exhibited both a gene dosage-effect and an age-dependent attenuation of severity. We describe a kindred with autosomal dominant hypophosphatemic rickets in which whole exome analysis identified digenic heterozygous mutations in SLC34A1 and SLC34A3. Subjects with both mutations were more severely affected than subjects carrying only one mutation. These findings highlight the challenges of assigning causality to plausible genetic variants in the next generation sequencing era.",
    "source": "pubmed_2019_2026",
    "category": "clinical"
  },
  {
    "PMID": "32278351",
    "title": "The mutational burden and oligogenic inheritance in Klippel-Feil syndrome.",
    "authors": "Ziquan Li; Sen Zhao; Siyi Cai; Yuanqiang Zhang; Lianlei Wang et al. (17 authors)",
    "journal": "BMC musculoskeletal disorders",
    "year": "2020",
    "doi": "10.1186/s12891-020-03229-x",
    "abstract": "Klippel-Feil syndrome (KFS) represents a rare anomaly characterized by congenital fusion of the\u00a0cervical vertebrae. The underlying molecular etiology remains largely unknown because of the\u00a0genetic and phenotypic heterogeneity. We consecutively recruited a Chinese cohort of 37 patients with KFS. The clinical manifestations and radiological assessments were analyzed and whole-exome sequencing (WES) was performed. Additionally, rare variants in KFS cases and controls were compared using genetic burden analysis. We primarily examined rare variants in five reported genes (GDF6, MEOX1, GDF3, MYO18B and RIPPLY2) associated with KFS and detected three variants of uncertain significance in MYO18B. Based on rare variant burden analysis of 96 candidate genes related to vertebral segmentation defects, we identified BAZ1B as having the highest probability of association with KFS, followed by FREM2, SUFU, VANGL1 and KMT2D. In addition, seven patients were proposed to show potential oligogenic inheritance involving more than one variants in\u00a0candidate genes, the frequency of which was significantly higher than that in the in-house controls. Our study presents an exome-sequenced cohort and identifies five novel genes potentially associated with KFS, extending the spectrum of known mutations contributing to this syndrome. Furthermore, the genetic burden analysis provides further evidence for potential oligogenic inheritance of KFS.",
    "source": "pubmed_2019_2026",
    "category": "clinical"
  },
  {
    "PMID": "32228225",
    "title": "Congenital fibrinogen disorder caused by digenic mutations of the FGA and FGB genes.",
    "authors": "Xiong Wang; Ning Tang; Na Shen; Yanjun Lu; Dengju Li",
    "journal": "Hematology (Amsterdam, Netherlands)",
    "year": "2020",
    "doi": "10.1080/16078454.2020.1746109",
    "abstract": "Objectives: Congenital fibrinogen disorders (CFDs) are caused by monoallelic or biallelic mutations in FGA, FGB, and FGG genes. Quantitative CFDs include afibrinogenemia and hypofibrinogenemia, while qualitative CFDs consist of dysfibrinogenemia and hypodysfibrinogenemia. Hypofibrinogenemia and dysfibrinogenemia are autosomal dominant disorders while afibrinogenemia is a recessive one. We aimed to perform genetic diagnosis of a Chinese patient with CFD.Methods: DNA was extracted from peripheral blood mononuclear cells (PBMCs) and targeted next generation sequencing (NGS) was applied using amplicon-based panel (www.ampliseq.com) targeting all exons and splice sites of FGA, FGB, and FGG genes. Identified mutations were confirmed by Sanger sequencing.Results: We have identified a novel heterozygous FGB c.560_561delTG (p.Val187GlufsTer2) frameshift deletion and a novel heterozygous FGA c.190T > G (p.Cys64Gly) missense mutations in a Chinese patient with CFD.Conclusion: This is the first report of digenic variants causing CFD, and these findings may improve understanding of the genetic architecture of CFD.",
    "source": "pubmed_2019_2026",
    "category": "clinical"
  },
  {
    "PMID": "32200437",
    "title": "Genetics of congenital hypogonadotropic hypogonadism: peculiarities and phenotype of an oligogenic disease.",
    "authors": "Biagio Cangiano; Du Soon Swee; Richard Quinton; Marco Bonomi",
    "journal": "Human genetics",
    "year": "2021",
    "doi": "10.1007/s00439-020-02147-1",
    "abstract": "A genetic basis of congenital isolated hypogonadotropic hypogonadism (CHH) can be defined in almost 50% of cases, albeit not necessarily the complete genetic basis. Next-generation sequencing (NGS) techniques have led to the discovery of a great number of loci, each of which has illuminated our understanding of human gonadotropin-releasing hormone (GnRH) neurons, either in respect of their embryonic development or their neuroendocrine regulation as the \"pilot light\" of human reproduction. However, because each new gene linked to CHH only seems to underpin another small percentage of total patient cases, we are still far from achieving a comprehensive understanding of the genetic basis of CHH. Patients have generally not benefited from advances in genetics in respect of novel therapies. In most cases, even genetic counselling is limited by issues of apparent variability in expressivity and penetrance that are likely underpinned by oligogenicity in respect of known and unknown genes. Robust genotype-phenotype relationships can generally only be established for individuals who are homozygous, hemizygous or compound heterozygotes for the same gene of variant alleles that are predicted to be deleterious. While certain genes are purely associated with normosmic CHH (nCHH) some purely with the anosmic form (Kallmann syndrome-KS), other genes can be associated with both nCHH and KS-sometimes even within the same kindred. Even though the anticipated genetic overlap between CHH and constitutional delay in growth and puberty (CDGP) has not materialised, previously unanticipated genetic relationships have emerged, comprising conditions of combined (or multiple) pituitary hormone deficiency (CPHD), hypothalamic amenorrhea (HA) and CHARGE syndrome. In this review, we report the current evidence in relation to phenotype and genetic peculiarities regarding 60 genes whose loss-of-function variants can disrupt the central regulation of reproduction at many levels: impairing GnRH neurons migration, differentiation or activation; disrupting neuroendocrine control of GnRH secretion; preventing GnRH neuron migration or function and/or gonadotropin secretion and action.",
    "source": "pubmed_2019_2026",
    "category": "clinical"
  },
  {
    "PMID": "32165640",
    "title": "Digenic inheritance of mutations in EPHA2 and SLC26A4 in Pendred syndrome.",
    "authors": "Mengnan Li; Shin-Ya Nishio; Chie Naruse; Meghan Riddell; Sabrina Sapski et al. (22 authors)",
    "journal": "Nature communications",
    "year": "2020",
    "doi": "10.1038/s41467-020-15198-9",
    "abstract": "Enlarged vestibular aqueduct (EVA) is one of the most commonly identified inner ear malformations in hearing loss patients including Pendred syndrome. While biallelic mutations of the SLC26A4 gene, encoding pendrin, causes non-syndromic hearing loss with EVA or Pendred syndrome, a considerable number of patients appear to carry mono-allelic mutation. This suggests faulty pendrin regulatory machinery results in hearing loss. Here we identify EPHA2 as another causative gene of Pendred syndrome with SLC26A4. EphA2 forms a protein complex with pendrin controlling pendrin localization, which is disrupted in some pathogenic forms of pendrin. Moreover, point mutations leading to amino acid substitution in the EPHA2 gene are identified from patients bearing mono-allelic mutation of SLC26A4. Ephrin-B2 binds to EphA2 triggering internalization with pendrin inducing EphA2 autophosphorylation weakly. The identified EphA2 mutants attenuate ephrin-B2- but not ephrin-A1-induced EphA2 internalization with pendrin. Our results uncover an unexpected role of the Eph/ephrin system in epithelial function.",
    "source": "pubmed_2019_2026",
    "category": "clinical"
  },
  {
    "PMID": "32155719",
    "title": "Oligogenic Origin of Differences of Sex Development in Humans.",
    "authors": "N\u00faria Camats; Christa E Fl\u00fcck; Laura Aud\u00ed",
    "journal": "International journal of molecular sciences",
    "year": "2020",
    "doi": "10.3390/ijms21051809",
    "abstract": "Sex development is a very complex biological event that requires the concerted collaboration of a large network of genes in a spatial and temporal correct fashion. In the past, much has been learned about human sex development from monogenic disorders/differences of sex development (DSD), but the broad spectrum of phenotypes in numerous DSD individuals remains a conundrum. Currently, the genetic cause of less than 50% of DSD individuals has been solved and oligogenic disease has been proposed. In recent years, multiple genetic hits have been found in individuals with DSD thanks to high throughput sequencing. Our group has been searching for additional genetic hits explaining the phenotypic variability over the past years in two cohorts of patients: 46,XY DSD patients carriers of NR5A1 variants and 46,XY DSD and 46,XX DSD with MAMLD1 variants. In both cohorts, our results suggest that the broad phenotypes may be explained by oligogenic origin, in which multiple hits may contribute to a DSD phenotype, unique to each individual. A search for an underlying network of the identified genes also revealed that a considerable number of these genes showed interactions, suggesting that genetic variations in these genes may affect sex development in concert.",
    "source": "pubmed_2019_2026",
    "category": "clinical"
  },
  {
    "PMID": "32121523",
    "title": "Brugada Syndrome: Oligogenic or Mendelian Disease?",
    "authors": "Michelle M Monasky; Emanuele Micaglio; Giuseppe Ciconte; Carlo Pappone",
    "journal": "International journal of molecular sciences",
    "year": "2020",
    "doi": "10.3390/ijms21051687",
    "abstract": "Brugada syndrome (BrS) is diagnosed by a coved-type ST-segment elevation in the right precordial leads on the electrocardiogram (ECG), and it is associated with an increased risk of sudden cardiac death (SCD) compared to the general population. Although BrS is considered a genetic disease, its molecular mechanism remains elusive in about 70-85% of clinically-confirmed cases. Variants occurring in at least 26 different genes have been previously considered causative, although the causative effect of all but the SCN5A gene has been recently challenged, due to the lack of systematic, evidence-based evaluations, such as a variant's frequency among the general population, family segregation analyses, and functional studies. Also, variants within a particular gene can be associated with an array of different phenotypes, even within the same family, preventing a clear genotype-phenotype correlation. Moreover, an emerging concept is that a single mutation may not be enough to cause the BrS phenotype, due to the increasing number of common variants now thought to be clinically relevant. Thus, not only the complete list of genes causative of the BrS phenotype remains to be determined, but also the interplay between rare and common multiple variants. This is particularly true for some common polymorphisms whose roles have been recently re-evaluated by outstanding works, including considering for the first time ever a polygenic risk score derived from the heterozygous state for both common and rare variants. The more common a certain variant is, the less impact this variant might have on heart function. We are aware that further studies are warranted to validate a polygenic risk score, because there is no mutated gene that connects all, or even a majority, of BrS cases. For the same reason, it is currently impossible to create animal and cell line genetic models that represent all BrS cases, which would enable the expansion of studies of this syndrome. Thus, the best model at this point is the human patient population. Further studies should first aim to uncover genetic variants within individuals, as well as to collect family segregation data to identify potential genetic causes of BrS.",
    "source": "pubmed_2019_2026",
    "category": "clinical"
  },
  {
    "PMID": "32102593",
    "title": "Familial Acute Necrotizing Encephalopathy: Evidence From Next Generation Sequencing of Digenic Inheritance.",
    "authors": "Gayatri Iyer; Prashant Utage; Sarah Bailur; Aparna Utage; Annapurna Srirambhatla et al. (6 authors)",
    "journal": "Journal of child neurology",
    "year": "2020",
    "doi": "10.1177/0883073820902308",
    "abstract": "Infection-induced acute encephalopathies (IIAEs) are a group of neurologic disorders caused post infection. They are of 8 types, 6 of which are herpes specific, whereas IIAE3 and IIAE4 can be triggered by infections additional to herpeslike influenza, enterovirus, etc. IIAE3 is also known as acute necrotizing encephalopathy type 1, which is a rare type of encephalopathy that occurs following an infection in infancy or early childhood. Symptoms include fever, cough, congestion, vomiting, and diarrhea followed by seizures, hallucination, ataxia, and abnormal muscle tone, and sometimes it leads to untimely death. Here, we describe a familial case where 3 siblings were clinically diagnosed with acute necrotizing encephalopathy 1. Genetic testing revealed 2 heterozygous variations: RANBP2 c.5249C>G, p.P1750 R, and CPT2 c.365C>T, p.S122F. Variants in RANBP2 and CPT2 have been individually known to be associated with IIAE3 and IIAE4, respectively. Segregation analysis revealed that the RANBP2 variant was inherited from the father and the CPT2 variant from the mother. This case qualifies to be the first of its kind where digenic inheritance (ie, DNA sequence variants in 2 genes are required for the pathogenic phenotypes) appears to cause a lethal class of acute necrotizing encephalopathy.",
    "source": "pubmed_2019_2026",
    "category": "clinical"
  },
  {
    "PMID": "32050993",
    "title": "Unmasking Retinitis Pigmentosa complex cases by a whole genome sequencing algorithm based on open-access tools: hidden recessive inheritance and potential oligogenic variants.",
    "authors": "Mar\u00eda Gonz\u00e1lez-Del Pozo; Elena Fern\u00e1ndez-Su\u00e1rez; Marta Mart\u00edn-S\u00e1nchez; Nereida Bravo-Gil; Cristina M\u00e9ndez-Vidal et al. (8 authors)",
    "journal": "Journal of translational medicine",
    "year": "2020",
    "doi": "10.1186/s12967-020-02258-3",
    "abstract": "Retinitis Pigmentosa (RP) is a clinically and genetically heterogeneous disorder that results in inherited blindness. Despite the large number of genes identified, only ~\u200960% of cases receive a genetic diagnosis using targeted-sequencing. The aim of this study was to design a whole genome sequencing (WGS) based approach to increase the diagnostic yield of complex Retinitis Pigmentosa cases. WGS was conducted in three family members, belonging to one large apparent autosomal dominant RP family that remained unsolved by previous studies, using Illumina TruSeq library preparation kit and Illumina HiSeq X platform. Variant annotation, filtering and prioritization were performed using a number of open-access tools and public databases. Sanger sequencing of candidate variants was conducted in the extended family members. We have developed and optimized an algorithm, based on the combination of different open-access tools, for variant prioritization of WGS data which allowed us to reduce significantly the number of likely causative variants pending to be manually assessed and segregated. Following this algorithm, four heterozygous variants in one autosomal recessive gene (USH2A) were identified, segregating in pairs in the affected members. Additionally, two pathogenic alleles in ADGRV1 and PDZD7 could be contributing to the phenotype in one patient. The optimization of a diagnostic algorithm for WGS data analysis, accompanied by a hypothesis-free approach, have allowed us to unmask the genetic cause of the disease in one large RP family, as well as to reassign its inheritance pattern which implies differences in the clinical management of these cases. These results contribute to increasing the number of cases with apparently dominant inheritance that carry causal mutations in recessive genes, as well as the possible involvement of various genes in the pathogenesis of RP in one patient. Moreover, our WGS-analysis approach, based on open-access tools, can easily be implemented by other researchers and clinicians to improve the diagnostic yield of additional patients with inherited retinal dystrophies.",
    "source": "pubmed_2019_2026",
    "category": "clinical"
  },
  {
    "PMID": "31980012",
    "title": "Osteogenesis imperfecta in a male holstein calf associated with a possible oligogenic origin.",
    "authors": "Xuying Zhang; Marc Hirschfeld; Julia Beck; Alexandra Kupke; Kernt K\u00f6hler et al. (7 authors)",
    "journal": "The veterinary quarterly",
    "year": "2020",
    "doi": "10.1080/01652176.2020.1721611",
    "abstract": "Background: Neuromusculoskeletal anomalies generally in combination with severe clinical symptoms, comprise a heterogeneous group of fairly common and mostly fatal disorders in man and animals. Osteogenesis imperfecta (OI), also known as brittle bone disease, causes bone fragility and deformity. Prominent extra-skeletal accessory manifestations of OI comprise blue/gray sclerae, hearing impairment, lung abnormalities and hypercalciuria. Cases of OI in cattle have been reported. However, no causative mutations have been identified in cattle so far.Aim: To report a possible oligogenic origin identified in a calf from clinically healthy parents suffering from OI.Materials and Methods: A neonatal embryo transfer male Holstein calf developing multiple fractures with bone tissue showing marked osteopenia was used for whole genome re-sequencing as well as its parents. In addition, 2,612 randomly chosen healthy Holstein cattle were genotyped as well as controls.Results: Sixteen candidate genes with potential protein-altering variants were selected revealing non-synonymous variants only within IFITM5 and CRTAP genes. However, in-depth gene analysis did not result in the identification of a single causative mutation in the OI calf.Conclusion: The analysis of the OI case revealed a possible oligogenic origin of the disease attributable to additive effects of three candidate genes, i.e., ABCA13, QRFPR, and IFTIM5.Clinical relevance: Most OI cases in humans and domestic animals reported so far are caused by distinct dominant or recessive monogenic mutations, therefore a potential oligogenic additive genetic effect is a novel finding. Furthermore, the case presented here demonstrates that cross-species genetic analyses might not always be straightforward.",
    "source": "pubmed_2019_2026",
    "category": "clinical"
  },
  {
    "PMID": "31970460",
    "title": "Multiallelic rare variants support an oligogenic origin of sudden cardiac death in the young.",
    "authors": "Hager Jaouadi; Yosra Bouyacoub; Sonia Chabrak; Lilia Kraoua; Amira Zaroui et al. (14 authors)",
    "journal": "Herz",
    "year": "2021",
    "doi": "10.1007/s00059-019-04883-1",
    "abstract": "Unexplained sudden death in the young is cardiovascular in most cases. Structural and conduction defects in cardiac-related genes can conspire to underlie sudden cardiac death. Here we report a\u00a0clinical investigation and an extensive genetic assessment of a\u00a0Tunisian family with sudden cardiac death in young members. In order to identify the family-genetic basis of sudden cardiac death, we performed Whole Exome Sequencing (WES), read depth copy-number-variation (CNV) screening and segregation analysis. We identify\u00a06 ultra-rare pathogenic heterozygous variants in OBSCN, RYR2, DSC2, AKAP9, CACNA1C and RBM20 genes, and one homozygous splicing variant in TECRL gene consistent with an oligogenic model of inheritance. CNV analysis did not reveal any causative CNV consistent with the family phenotype. Overall, our results are highly suggestive for a\u00a0cumulative effect of heterozygous missense variants as disease causation and to account for a\u00a0greater disease severity among offspring. Our study further confirms the complexity of the inheritance of sudden cardiac death and highlights the utility of family-based WES and segregation analysis in the identification of family specific mutations within different cardiac genes pathways.",
    "source": "pubmed_2019_2026",
    "category": "clinical"
  },
  {
    "PMID": "31960626",
    "title": "Potential digenic inheritance of familial hypertrophic cardiomyopathy identified by whole-exome sequencing.",
    "authors": "Ming-Bao Ren; Xiao-Rui Chai; Lin Li; Xin Wang; Chenghong Yin",
    "journal": "Molecular genetics & genomic medicine",
    "year": "2020",
    "doi": "10.1002/mgg3.1150",
    "abstract": "The aim of this study was to identify the genetic causes of patients with hypertrophic cardiomyopathy (HCM) within a family. Most of the previous studies found point mutations as the genetic causes for HCM, whole-gene deletion was rarely reported. Although, clinical genetic testing has been widely used for identifying variants in HCM patients, structural variations are understudied, partly owing to the inadequacy of the available methodology. In the present study, whole-exome sequencing (WES) and Sanger sequencing validation was used to identify the genetic causes in patients with familial HCM. A genomic deletion in Chromosome 19 containing the whole of troponin I3 gene (TNNI3), and the p.Ile736Thr variant in the myosin heavy chain 7 gene (MYH7) were identified in two patients with familial HCM by WES. The p.Ile736Thr variant is further validated by Sanger sequencing and is predicted as a pathogenic variant by in silico analysis. We added the notion that not only p.Ile736Thr variant of MYH7, but also TNNI3 deletion might potentially contribute to HCM pathogenesis. Our study also suggested WES was a powerful tool to identify the genetic variants causing HCM.",
    "source": "pubmed_2019_2026",
