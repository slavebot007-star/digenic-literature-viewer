  {
    "PMID": "37026454",
    "title": "Oligogenic Architecture of Rare Noncoding Variants Distinguishes 4 Congenital Heart Disease Phenotypes.",
    "authors": "Mengyao Yu; Matthew Aguirre; Meiwen Jia; Ketrin Gjoni; Aldo Cordova-Palomera et al. (28 authors)",
    "journal": "Circulation. Genomic and precision medicine",
    "year": "2023",
    "doi": "10.1161/CIRCGEN.122.003968",
    "abstract": "Congenital heart disease (CHD) is highly heritable, but the power to identify inherited risk has been limited to analyses of common variants in small cohorts. We performed reimputation of 4 CHD cohorts (n=55\u2009342) to the TOPMed reference panel (freeze 5), permitting meta-analysis of 14\u2009784\u2009017 variants including 6\u2009035\u2009962 rare variants of high imputation quality as validated by whole genome sequencing. Meta-analysis identified 16 novel loci, including 12 rare variants, which displayed moderate or large effect sizes (median odds ratio, 3.02) for 4 separate CHD categories. Analyses of chromatin structure link 13 of the genome-wide significant loci to key genes in cardiac development; rs373447426 (minor allele frequency, 0.003 [odds ratio, 3.37 for Conotruncal heart disease]; P=1.49\u00d710-8) is predicted to disrupt chromatin structure for 2 nearby genes BDH1 and DLG1 involved in Conotruncal development. A lead variant rs189203952 (minor allele frequency, 0.01 [odds ratio, 2.4 for left ventricular outflow tract obstruction]; P=1.46\u00d710-8) is predicted to disrupt the binding sites of 4 transcription factors known to participate in cardiac development in the promoter of SPAG9. A tissue-specific model of chromatin conformation suggests that common variant rs78256848 (minor allele frequency, 0.11 [odds ratio, 1.4 for Conotruncal heart disease]; P=2.6\u00d710-8) physically interacts with NCAM1 (PFDR=1.86\u00d710-27), a neural adhesion molecule acting in cardiac development. Importantly, while each individual malformation displayed substantial heritability (observed h2 ranging from 0.26 for complex malformations to 0.37 for left ventricular outflow tract obstructive disease) the risk for different CHD malformations appeared to be separate, without genetic correlation measured by linkage disequilibrium score regression or regional colocalization. We describe a set of rare noncoding variants conferring significant risk for individual heart malformations which are linked to genes governing cardiac development. These results illustrate that the oligogenic basis of CHD and significant heritability may be linked to rare variants outside protein-coding regions conferring substantial risk for individual categories of cardiac malformation.",
    "source": "pubmed_2019_2026",
    "category": "clinical"
  },
  {
    "PMID": "36951959",
    "title": "Natural disease history of a canine model of oligogenic RPGRIP1-cone-rod dystrophy establishes variable effects of previously and newly mapped modifier loci.",
    "authors": "Ana Ripolles-Garcia; Leonardo Murgiano; Natalia Ziolkowska; Felipe Pompeo Marinho; Karolina Roszak et al. (8 authors)",
    "journal": "Human molecular genetics",
    "year": "2023",
    "doi": "10.1093/hmg/ddad046",
    "abstract": "Canine RPGRIP1-cone-rod dystrophy (CRD), a model for human inherited retinal diseases (IRDs), was originally identified as autosomal recessive early-onset blindness. However, later studies revealed extensive phenotypic variability among RPGRIP1 mutants. This led to the identification of a homozygous MAP9 variant as a modifier associated with early-onset disease. Based on further phenotypic variation affecting cone photoreceptor function, we report mapping of L3 as an additional modifier locus, within a 4.1-Mb locus on canine chromosome 30. We establish the natural disease history of RPGRIP1-CRD based on up to 9-year long-term functional and structural retinal data from 58 dogs including 44 RPGRIP1 mutants grouped according to the modifier status. RPGRIP1 mutants affected by both MAP9 and L3 modifiers exhibited the most severe phenotypes with rapid disease progression. MAP9 alone was found to act as an overall accelerator of rod and cone diseases, while L3 had a cone-specific effect. Ultrastructural analysis of photoreceptors revealed varying degrees of rod and cone damage, while the connecting cilia appeared structurally preserved in all groups. We conclude that RPGRIP1-CRD is an oligogenic disease with at least three loci contributing to the pathogenesis. While the RPGRIP1 variant is required for developing the disease, MAP9 and L3 modifiers exacerbate the phenotype, individually and cumulatively. Oligogenic canine RPGRIP1-CRD illustrates the impact of multiple genetic modifiers on disease phenotype and thus has the potential to reveal new targets for broad-spectrum therapies for oligogenic or polygenic forms of human IRDs.",
    "source": "pubmed_2019_2026",
    "category": "clinical"
  },
  {
    "PMID": "36948254",
    "title": "Digenic genotypes: The interface of inbreeding, linkage, and linkage disequilibrium.",
    "authors": "Reginald D Smith",
    "journal": "Theoretical population biology",
    "year": "2023",
    "doi": "10.1016/j.tpb.2023.03.003",
    "abstract": "Many traits in populations are well understood as being Mendelian effects at single loci or additive polygenic effects across numerous loci. However, there are important phenomena and traits that are intermediate between these two extremes and are known as oligogenic traits. Here we investigate digenic, or two-locus, traits and how their frequencies in populations are affected by non-random mating, specifically inbreeding, linkage disequilibrium, and selection. These effects are examined both separately and in combination to demonstrate how many digenic traits, especially double homozygous ones, can show significant, sometimes unexpected, changes in population frequency with inbreeding, linkage, and linkage disequilibrium. The effects of selection on deleterious digenic traits are also detailed. These results are applied to both digenic traits of medical significance as well as measuring inbreeding in natural populations.",
    "source": "pubmed_2019_2026",
    "category": "clinical"
  },
  {
    "PMID": "36924516",
    "title": "[Molecular genetics in diagnosis of Coats disease: combination of oligogenic variants associated with different forms of hereditary retinal dystrophy].",
    "authors": "T A Vasilyeva; V V Kadyshev; A V Marakhonov; I V Kanivets; S A Korostelev et al. (10 authors)",
    "journal": "Vestnik oftalmologii",
    "year": "2023",
    "doi": "10.17116/oftalma202313901169",
    "abstract": "Coats disease (OMIM 300216) is a form of hereditary retinal dystrophy, which occurs due to congenital abnormality of retinal vessels and features unilateral exudative vitreoretinopathy. Coats disease mostly occurs sporadically; its genetic cause is still undetermined. Molecular genetic research including whole exome sequencing by the NGS method was used to define a genetic cause of the observed phenotype. Two heterozygous variants in different genomic loci associated with other forms of hereditary retinal dystrophy were detected, a rare variant in the HMCN1 gene c.9571C>T, p.(Arg3191Cys), and a known pathogenic variant in the NPHP4 gene c.2930C>T, p.(Thr977Met). The HMCN1 gene is responsible for dominant age-related macular degeneration (OMIM 603075), pathogenic variants in the NPHP4 gene cause recessive Senior-L\u00f8ken syndrome 4 (OMIM 266900). These genes encode the proteins that are involved in the regulation of integrity of the blood-retinal barrier in the vascular endothelium (NPHP4) and retinal pigment epithelium (HMCN1). The identified mutation in the NPHP4 gene could lead to decreased function of the NPHP4 protein and contribute to the development of retinal degeneration, potentially of oligogenic nature.",
    "source": "pubmed_2019_2026",
    "category": "clinical"
  },
  {
    "PMID": "36859317",
    "title": "Congenital hydrocephalus: new Mendelian mutations and evidence for oligogenic inheritance.",
    "authors": "Valerie Jacquemin; Nassim Versbraegen; Sarah Duerinckx; Annick Massart; Julie Soblet et al. (21 authors)",
    "journal": "Human genomics",
    "year": "2023",
    "doi": "10.1186/s40246-023-00464-w",
    "abstract": "Congenital hydrocephalus is characterized by ventriculomegaly, defined as a dilatation of cerebral ventricles, and thought to be due to impaired cerebrospinal fluid (CSF) homeostasis. Primary congenital hydrocephalus is a subset of cases with prenatal onset and absence of another primary cause, e.g., brain hemorrhage. Published series report a Mendelian cause in only a minority of cases. In this study, we analyzed exome data of PCH patients in search of novel causal genes and addressed the possibility of an underlying oligogenic mode of inheritance for PCH. We sequenced the exome in 28 unrelated probands with PCH, 12 of whom from families with at least two affected siblings and 9 of whom consanguineous, thereby increasing the contribution of genetic causes. Patient exome data were first analyzed for rare (MAF\u2009<\u20090.005) transmitted or de novo variants. Population stratification of unrelated PCH patients and controls was determined by principle component analysis, and outliers identified using Mahalanobis distance 5% as cutoff. Patient and control exome data for genes biologically related to cilia (SYScilia database) were analyzed by mutation burden test. In 18% of probands, we identify a causal (pathogenic or likely pathogenic) variant of a known hydrocephalus gene, including genes for postnatal, syndromic hydrocephalus, not previously reported in isolated PCH. In a further 11%, we identify mutations in novel candidate genes. Through mutation burden tests, we demonstrate a significant burden of genetic variants in genes coding for proteins of the primary cilium in PCH patients compared to controls. Our study confirms the low contribution of Mendelian mutations in PCH and reports PCH as a phenotypic presentation of some known genes known for syndromic, postnatal hydrocephalus. Furthermore, this study identifies novel Mendelian candidate genes, and provides evidence for oligogenic inheritance implicating primary cilia in PCH.",
    "source": "pubmed_2019_2026",
    "category": "clinical"
  },
  {
    "PMID": "36852479",
    "title": "An oligogenic architecture underlying ecological and reproductive divergence in sympatric populations.",
    "authors": "Du\u0161ica Bri\u0161evac; Carolina M Peralta; Tobias S Kaiser",
    "journal": "eLife",
    "year": "2023",
    "doi": "10.7554/eLife.82825",
    "abstract": "The evolutionary trajectories and genetic architectures underlying ecological divergence with gene flow are poorly understood. Sympatric timing types of the intertidal insect Clunio marinus (Diptera) from Roscoff (France) differ in lunar reproductive timing. One type reproduces at full moon, the other at new moon, controlled by a circalunar clock of yet unknown molecular nature. Lunar reproductive timing is a magic trait for a sympatric speciation process, as it is both ecologically relevant and entails assortative mating. Here, we show that the difference in reproductive timing is controlled by at least four quantitative trait loci (QTL) on three different chromosomes. They are partly associated with complex inversions, but differentiation of the inversion haplotypes cannot explain the different phenotypes. The most differentiated locus in the entire genome, with QTL support, is the period locus, implying that this gene could not only be involved in circadian timing but also in lunar timing. Our data indicate that magic traits can be based on an oligogenic architecture and can be maintained by selection on several unlinked loci.",
    "source": "pubmed_2019_2026",
    "category": "clinical"
  },
  {
    "PMID": "36833286",
    "title": "Excluding Digenic Inheritance of PGAP2 and PGAP3 Variants in Mabry Syndrome (OMIM 239300) Patient: Phenotypic Spectrum Associated with PGAP2 Gene Variants in Hyperphosphatasia with Mental Retardation Syndrome-3 (HPMRS3).",
    "authors": "Miles D Thompson; Xueying Li; Michele Spencer-Manzon; Danielle M Andrade; Yoshiko Murakami et al. (7 authors)",
    "journal": "Genes",
    "year": "2023",
    "doi": "10.3390/genes14020359",
    "abstract": "We present a case report of a child with features of hyperphosphatasia with neurologic deficit (HPMRS) or Mabry syndrome (MIM 239300) with variants of unknown significance in two post-GPI attachments to proteins genes, PGAP2 and PGAP3, that underlie HPMRS 3 and 4. In addition to HPMRS 3 and 4, disruption of four phosphatidylinositol glycan (PIG) biosynthesis genes, PIGV, PIGO, PIGW and PIGY, result in HPMRS 1, 2, 5 and 6, respectively. Targeted exome panel sequencing identified homozygous variants of unknown significance (VUS) in PGAP2 c:284A>G and PGAP3 c:259G>A. To assay the pathogenicity of these variants, we conducted a rescue assay in PGAP2 and PGAP3 deficient CHO cell lines. Using a strong (pME) promoter, the PGAP2 variant did not rescue activity in CHO cells and the protein was not detected. Flow cytometric analysis showed that CD59 and CD55 expression on the PGAP2 deficient cell line was not restored by variant PGAP2. By contrast, activity of the PGAP3 variant was similar to wild-type. For this patient with Mabry syndrome, the phenotype is likely to be predominantly HPMRS3: resulting from autosomal recessive inheritance of NM_001256240.2 PGAP2 c:284A>G, p.Tyr95Cys. We discuss strategies for establishing evidence for putative digenic inheritance in GPI deficiency disorders.",
    "source": "pubmed_2019_2026",
    "category": "clinical"
  },
  {
    "PMID": "36799493",
    "title": "Complex Ataxia-Dementia Phenotype in Patients with Digenic TBP/STUB1 Spinocerebellar Ataxia.",
    "authors": "Lorenzo Nanetti; Stefania Magri; Mario Fichera; Anna Castaldo; Anna Nigri et al. (14 authors)",
    "journal": "Movement disorders : official journal of the Movement Disorder Society",
    "year": "2023",
    "doi": "10.1002/mds.29352",
    "abstract": "Spinocerebellar ataxias (SCAs) are autosomal dominant disorders with extensive clinical and genetic heterogeneity. We recently identified a form of SCA transmitted with a digenic pattern of inheritance caused by the concomitant presence of an intermediate-length expansion in TATA-box binding protein gene (TBP40-46 ) and a heterozygous pathogenic variant in the Stip1-homologous and U-Box containing protein 1 gene (STUB1). This SCATBP/STUB1 represents the first example of a cerebellar disorder in which digenic inheritance has been identified. We studied a large cohort of patients with SCATBP/STUB1 with the aim of describing specific clinical and neuroimaging features of this distinctive genotype. In this observational study, we recruited 65 affected and unaffected family members from 21 SCATBP/STUB1 families and from eight families with monogenic SCA17. Their characteristics and phenotypes were compared with those of 33 age-matched controls. SCATBP/STUB1 patients had multi-domain dementia with a more severe impairment in respect to patient carrying only fully expanded SCA17 alleles. Cerebellar volume and thickness of cerebellar cortex were reduced in SCATBP/STUB1 compared with SCA17 patients (P\u00a0=\u00a00.03; P\u00a0=\u00a00.008). Basal ganglia volumes were reduced in both patient groups, as compared with controls, whereas brainstem volumes were significantly reduced in SCATBP/STUB1 , but not in SCA17 patients. The identification of the complex SCATBP/STUB1 phenotype may impact on diagnosis and genetic counseling in the families with both hereditary and sporadic ataxia. The independent segregation of TBP and STUB1 alleles needs to be considered for recurrence risk and predictive genetic tests. \u00a9 2023 The Authors. Movement Disorders published by Wiley Periodicals LLC on behalf of International Parkinson and Movement Disorder Society.",
    "source": "pubmed_2019_2026",
    "category": "clinical"
  },
  {
    "PMID": "36793102",
    "title": "Next-generation sequencing of 500 POI patients identified novel responsible monogenic and oligogenic variants.",
    "authors": "Wei Luo; Hanni Ke; Shuyan Tang; Xue Jiao; Zhuqing Li et al. (9 authors)",
    "journal": "Journal of ovarian research",
    "year": "2023",
    "doi": "10.1186/s13048-023-01104-6",
    "abstract": "Premature ovarian insufficiency refers to the loss of ovarian function before 40\u00a0years of age. The etiology is heterogeneous, and genetic factors account for 20-25% of cases. However, how to transform genetic findings to clinical molecular diagnose remains a challenge. To identify potential causative variations for POI, a next generation sequencing panel with 28 known causative genes of POI was designed, and a large cohort of 500 Chinese Han patients was screened directly. Pathogenic evaluation of the identified variants and the phenotype analysis were performed according to monogenic or oligogenic variants. A total of 14.4% (72/500) of the patients carried 61 pathogenic or likely pathogenic variants in 19 of the genes in the panel. Interestingly, 58 variants (95.1%, 58/61) were firstly identified in patients with POI. FOXL2 harbored the highest occurrence frequency (3.2%, 16/500), among whom presented with isolated ovarian insufficiency instead of blepharophimosis-ptosis-epicanthus inversus syndrome. Moreover, luciferase reporter assay confirmed variant p.R349G, which account for 2.6% of POI cases, impaired the transcriptional repressive effect of FOXL2 on CYP17A1. The novel compound heterozygous variants in NOBOX and MSH4 were confirmed by pedigree haplotype analysis, and digenic heterozygous variants in MSH4 and MSH5 were firstly identified. Furthermore, nine patients (1.8%, 9/500) with digenic or multigenic pathogenic variants presented with delayed menarche, early onset of POI and high prevalence of primary amenorrhea compared with those with monogenic variation(s). The genetic architecture of POI has been enriched through the targeted gene panel in a large cohort of patients with POI. Specific variants in pleiotropic genes may result in isolated POI rather than syndromic POI, whereas oligogenic defects might have cumulative deleterious effects on the severity of POI phenotype.",
    "source": "pubmed_2019_2026",
    "category": "clinical"
  },
  {
    "PMID": "39703462",
    "title": "Severe Adult-Onset Non-Dystrophic Myotonia With Apnea and Laryngospasm Due to Digenic Inheritance of SCN4A and CLCN1 Variants: A Case Report.",
    "authors": "Madina Tugizova; Marta Margeta; Megan Richie; Douglas Pet; Laura Rosow et al. (7 authors)",
    "journal": "Neurology. Genetics",
    "year": "2025",
    "doi": "10.1212/NXG.0000000000200223",
    "abstract": "To report a case of adult-onset non-dystrophic myotonia complicated by recurrent episodes of laryngospasm. The patient is a 35-year-old man who was admitted to our hospital for recurrent episodes of apnea requiring endotracheal intubation with mechanical ventilation. He underwent extensive evaluation, including EMG, laryngoscopy, muscle biopsy, and genetic testing, which revealed a diagnosis of non-dystrophic myotonia. His myotonic disorder was due to the synergistic effects of a pathogenic CLCN1 variant and a newly reported SCN4A variant. His muscle biopsy demonstrated myofibrillar disorganization with Z-band streaming, which may reflect the severity of his clinical and electrographic myotonia. Treatment with mexiletine resulted in resolution of his episodes of laryngospasm and symptoms of myotonia in the extremities. Our case adds to the literature on the potentiating effects of chloride channelopathies on sodium channel myotonia. This is the first reported case of an adult-onset sodium channelopathy manifesting with respiratory failure due to laryngospasm. In addition, we present muscle biopsy findings that have not been described in the recent literature. This case also highlights that a myotonic disorder should be considered in the differential diagnosis for recurrent episodes of mixed hypoxic and hypercarbic respiratory failure.",
    "source": "pubmed_2019_2026",
    "category": "clinical"
  },
  {
    "PMID": "39667923",
    "title": "Clinical and Genetic Analysis of Digenic Muscular Dystrophy due to SRPK3 and TTN Variants in Two Siblings.",
    "authors": "Inna Sharkova; Artem Borovikov; Fedor Konovalov; Maria Nefedova; Olga Shchagina et al. (7 authors)",
    "journal": "Clinical genetics",
    "year": "2025",
    "doi": "10.1111/cge.14673",
    "abstract": "We present a family with two male siblings diagnosed with a newly described digenic myopathy, involving likely pathogenic loss-of-function variants in the SRPK3 and TTN genes: hemizygous p.(Pro68ArgfsTer55) and heterozygous p.(Trp14174Ter), respectively. Both siblings experienced prenatal disease onset, characterized by weak fetal movements, but showed significant clinical improvement over two last years of our follow-up. Key features included early onset, delayed motor development, and prominent axial and proximal weakness, while adult variants' carriers remained asymptomatic, without any myopathic or cardiac manifestations. Lower limb MRI revealed distinctive abnormalities, with different patterns between the siblings: the older brother showed more pronounced involvement of the thigh muscles, while the younger brother exhibited greater changes in the lower leg muscles. Given the early stage of the disease in our patients and the initial changes observed on MRI, we suggest that the semitendinosus and vastus lateralis muscles are primarily involved at the thigh level in SRPK3/TTN-myopathy. This case highlights the importance of considering digenic inheritance in neuromuscular disorders and underscores the necessity of comprehensive genetic analysis in similar cases.",
    "source": "pubmed_2019_2026",
    "category": "clinical"
  },
  {
    "PMID": "39606420",
    "title": "Genomic rare variant mechanisms for congenital cardiac laterality defect: A digenic model approach.",
    "authors": "Archana Rai; Jonathan Klonowski; Bo Yuan; Karen J Coveler; Zain Dardas et al. (20 authors)",
    "journal": "medRxiv : the preprint server for health sciences",
    "year": "2024",
    "doi": "10.1101/2024.11.19.24317385",
    "abstract": "Laterality defects are defined by perturbations in the usual left-right asymmetry of organs. Due to low known genetic etiology of congenital heart disease (CHD) cases (less than 40%), we used a digenic model approach for the identification of contributing variants in known laterality defect genes (N = 115) in the exome/genome sequencing (ES/GS) data from individuals with clinically diagnosed laterality defects. The unsolved ES/GS data were analyzed from three CHD cohorts: Baylor College of Medicine-Genomics Research to Elucidate the Genetics of Rare Diseases (BCM-GREGoR; N = 247 proband ES), Gabriella Miller Kids First Pediatric Research program (Kids First; N = 158 trio GS), and Pediatric Cardiac Genomics Consortium (PCGC; N = 163 trio ES), and trans-heterozygous digenic variants were identified in 2.8% (inherited digenic variants in 0.4%), 8.2%, and 13.5% cases respectively, which was significantly higher as compared to 602 control trios provided by the 1000 Genomes Project (p = 0.001, 1.4e-07, and 8.9e-13, respectively). Trans-heterozygous digenic variants were also identified in 0.4%, and 1.4% cases with non-laterality CHD in Kids First and PCGC datasets, respectively, which was not statistically significant as compared to control trios ( p = 1, and 0.059, respectively). Altogether, in laterality cohorts, 23% of digenic pairs were in the same structural complex of motile cilia. Out of 39 unique digenic pairs in laterality CHD, 29 are more likely to be potential digenic hits as predicted by DiGePred tool. These findings provide further evidence that digenic epistatic interaction can contribute to the complex genetics of laterality defects.",
    "source": "pubmed_2019_2026",
    "category": "tools"
  },
  {
    "PMID": "39439639",
    "title": "Digenic Inheritance of Hereditary Spherocytosis Type III and X-linked Agammaglobulinemia: Coexistence of Two Distinct Recessive Disorders in a Male Child.",
    "authors": "Khaled A Almutairy; Badriah G Alasmari; Syed Rayees",
    "journal": "Cureus",
    "year": "2024",
    "doi": "10.7759/cureus.69887",
    "abstract": "Hereditary spherocytosis (HS) is a common inherited hemolytic disease caused by mutations in genes encoding proteins crucial to the red blood cell (RBC) membrane, leading to a change in RBC shape from biconcave to spherical. There are five distinct types of hereditary spherocytosis, with types III and V being autosomal recessive and types I, II, and IV autosomal dominant. X-linked agammaglobulinemia (XLA) is a common inborn error of immunity\u00a0that impairs B cell maturation and differentiation. We report a case of a two-year-old Saudi boy with persistent anemia, recurrent chest infections, and a subgaleal abscess. A whole exome sequencing study revealed digenic inheritance of hereditary spherocytosis type III and XLA. Despite a variant of uncertain significance\u00a0in the Bruton's tyrosine kinase (BTK) gene, the patient's clinical and biochemical profile strongly indicated XLA. This case highlights how digenic inheritance can manifest as a complex phenotype, illustrating the challenges in diagnosing and managing patients with multigenic diseases.",
    "source": "pubmed_2019_2026",
    "category": "clinical"
  },
  {
    "PMID": "39202364",
    "title": "Exploring the Genotype-Phenotype Correlations in a Child with Inherited Seizure and Thrombocytopenia by Digenic Network Analysis.",
    "authors": "Shuanglong Lu; Zhixiao Niu; Xiaohong Qiao",
    "journal": "Genes",
    "year": "2024",
    "doi": "10.3390/genes15081004",
    "abstract": "Understanding the correlation between genotype and phenotype remains challenging for modern genetics. Digenic network analysis may provide useful models for understanding complex phenotypes that traditional Mendelian monogenic models cannot explain. Clinical data, whole exome sequencing data, in silico, and machine learning analysis were combined to construct a digenic network that may help unveil the complex genotype-phenotype correlations in a child presenting with inherited seizures and thrombocytopenia. The proband inherited a maternal heterozygous missense variant in SCN1A (NM_001165963.4:c.2722G>A) and a paternal heterozygous missense variant in MYH9 (NM_002473.6:c.3323A>C). In silico analysis showed that these two variants may be pathogenic for inherited seizures and thrombocytopenia in the proband. Moreover, focusing on 230 epilepsy-associated genes and 35 thrombopoiesis genes, variant call format data of the proband were analyzed using machine learning tools (VarCoPP 2.0) and Digenic Effect predictor. A digenic network was constructed, and SCN1A and MYH9 were found to be core genes in the network. Further analysis showed that MYH9 might be a modifier of SCN1A, and the variant in MYH9 might not only influence the severity of SCN1A-related seizure but also lead to thrombocytopenia in the bone marrow. In addition, another eight variants might also be co-factors that account for the proband's complex phenotypes. Our data show that as a supplement to the traditional Mendelian monogenic model, digenic network analysis may provide reasonable models for the explanation of complex genotype-phenotype correlations.",
    "source": "pubmed_2019_2026",
    "category": "clinical"
  },
  {
    "PMID": "39142003",
    "title": "Defining the landscape of TIA1 and SQSTM1 digenic myopathy.",
    "authors": "Paula Panos-Basterra; Julian Theuriet; Aleksandra Nadaj-Pakleza; Armelle Magot; Beatrice Lannes et al. (22 authors)",
    "journal": "Neuromuscular disorders : NMD",
    "year": "2024",
    "doi": "10.1016/j.nmd.2024.07.008",
    "abstract": "TIA1/SQSTM1 myopathy is one of the few digenic myopathies. We describe four new French adult male patients carrying the TIA1 p.Asn357Ser and SQSTM1 p.Pro392Leu variant and review the literature to include 20 additional cases to define the spectrum of the disease. These twenty-four patients (75% males) had late-onset (52,6 \u00b1 10,1 years), mainly asymmetric, distal ankle and hand finger extension weakness (75%), mild CK elevation (82.4%) and myopathic EMG. Two of the four French patients had sensorimotor axonal polyneuropathy and an additional one had neurogenic changes in muscle biopsy. Muscle biopsy showed rimmed vacuoles (44.4%), myofibrillar disorganization (16.7%) or both (38.9%), with P62/TDP43 aggregates. The TIA1 p.Asn357Ser variant was present in all patients and the SQSTM1 p.Pro392Leu was the most frequent (71%) of the four reported SQSTM1 variants. We reviewed the distal myopathy gene panels of Piti\u00e9-Salp\u00eatri\u00e8re's hospital cohort finding a prevalence of 11/414=2.7% of the TIA1 p.Asn357Ser variant, with two patients having an alternative diagnosis (TTN and MYH7) with atypical phenotypes, resembling some of the features seen in TIA1/SQSTM1 myopathy. Overall, TIA1/SQSTM1 myopathy has a homogenous phenotype reinforcing the pathogenicity of its digenic variants. We confirm an increased burden of the TIA1 p.Asn357Ser variant in distal myopathy patients which could act as a genetic modifier.",
    "source": "pubmed_2019_2026",
    "category": "clinical"
  },
  {
    "PMID": "39137047",
    "title": "Clinical, Pathological, and Genetic Characteristics of Patients with Digenic Alport Syndrome.",
    "authors": "Yuta Inoki; Tomoko Horinouchi; Tomohiko Yamamura; Shingo Ishimori; Yuta Ichikawa et al. (12 authors)",
    "journal": "Kidney360",
    "year": "2024",
    "doi": "10.34067/KID.0000000000000547",
    "abstract": "Patients with both COL4A3 and COL4A4 variants exhibited poor renal prognosis compared with those with autosomal dominant Alport syndrome. The proportion of patients with digenic Alport syndrome was 1.7% among all patients with Alport syndrome. Digenic Alport syndrome could be associated with poor renal prognosis. However, the characteristics of patients with digenic Alport syndrome remain ambiguous. We retrospectively investigated the clinical symptoms, pathological findings, genetic variants, and proportions of patients with digenic Alport syndrome. The ages at detection of proteinuria and development of ESKD were compared between patients with digenic Alport syndrome with disease-causing variants in COL4A3 and COL4A4 and those with autosomal dominant Alport syndrome (ADAS) previously analyzed by our group. Eighteen patients from nine families with digenic variants in COL4A3 and COL4A4 and four male and five female patients with digenic variants in COL4A5 and COL4A3 or COL4A4 were enrolled in this study. Next-generation sequencing revealed that the proportion of patients with digenic Alport syndrome was 1.7% among all patients with Alport syndrome. In patients with digenic variants in COL4A3 and COL4A4, the median ages at detection of proteinuria and ESKD were 10.0 and 57.0 years, respectively. Compared with the patients with ADAS, the age at detection of proteinuria tended to be earlier (10.0 versus 20.0 years; P = 0.073) and that at development of ESKD was significantly earlier (57.0 versus 72.0 years; P = 0.045) in patients with digenic Alport syndrome. Overall, patients with digenic Alport syndrome harboring COL4A3 and COL4A4 variants exhibited poor renal compared with the patients with ADAS. Therefore, timely identification of the two disease-causing variants is critical for the renal prognostic assessment and early treatment of patients with digenic Alport syndrome.",
    "source": "pubmed_2019_2026",
    "category": "clinical"
  },
  {
    "PMID": "38962685",
    "title": "Digenic Origin of Difference of Sex Development in a Patient Harbouring DHX37 and MAMLD1 Variants.",
    "authors": "Katia Margiotti; Francesco Libotte; Marco Fabiani; Alvaro Mesoraca; Claudio Giorlandino",
    "journal": "Case reports in pediatrics",
    "year": "2024",
    "doi": "10.1155/2024/4896940",
    "abstract": "The diagnostic process for identifying variations in sex development (DSD) remains challenging due to the limited availability of evidence pertaining to the association between phenotype and genotype. DSD incidence is reported as 2 in 10,000 births, and the etiology has been attributed to genetic causes. Case Presentation. The present study investigated genetic causes implicated in a case of a 15-year-old 46, XY patient, raised as a girl. Genetic analysis by clinical exome sequencing (CES) showed a digenic inheritance due to two known pathogenic mutations in the DHX37 gene and the MAMLD1 gene, while we excluded variants with pathogenic significance in 209 DSD-related genes. Based on our literature review, this is the first case with the combined presence of pathogenic mutations in the MAMLD1 gene and DHX37 gene in a patient with gonadal dysgenesis.",

    "category": "clinical"

  {
    "PMID": "38955653",
    "title": "Towards the recognition of oligogenic forms of type 2 diabetes.",
    "authors": "Lauriane Le Collen; Philippe Froguel; Am\u00e9lie Bonnefond",
    "journal": "Trends in endocrinology and metabolism: TEM",
    "year": "2025",
    "doi": "10.1016/j.tem.2024.06.006",
    "abstract": "The demarcation between monogenic and polygenic type 2 diabetes (T2D) is less distinct than previously believed. Notably, recent research has highlighted a new entity, that we suggest calling oligogenic forms of T2D, serving as a genetic link between these two forms. In this opinion article, we have reviewed scientific advances that suggest categorizing genes involved in oligogenic T2D. Research focused on polygenic T2D has faced challenges in deepening our comprehension of the pathophysiology of T2D due to the inability to directly establish causal links between a signal and the molecular mechanisms underlying the disease. However, the study of oligogenic forms of T2D has illuminated distinct causal connections between genes and disease risk, thereby indicating potential new drug targets.",

    "category": "review"
  },
  {
    "PMID": "38929805",
    "title": "Digenic Inheritance of Mutations in Homologous Recombination Genes in Cancer Patients.",
    "authors": "Maria Valeria Freire; Marie Martin; Karin Segers; Edith Sepulchre; Natacha Leroi et al. (13 authors)",
    "journal": "Journal of personalized medicine",
    "year": "2024",
    "doi": "10.3390/jpm14060584",
    "abstract": "BRCA1, BRCA2, ATM, and CHEK2 are known cancer predisposition genes (CPGs), but tumor risk in patients with simultaneous pathogenic variants (PVs) in CPGs remains largely unknown. In this study, we describe six patients from five families with multiple cancers who coinherited a combination of PVs in these genes. PVs were identified using NGS DNA sequencing and were confirmed by Sanger. Families 1, 2, and 3 presented PVs in BRCA2 and ATM, family 4 in BRCA2 and BRCA1, and family 5 in BRCA2 and CHEK2. PVs were identified using NGS DNA sequencing and were confirmed by Sanger. The first family included patients with kidney, prostate, and breast cancer, in addition to pancreatic adenocarcinomas. In the second family, a female had breast cancer, while a male from the third family had prostate, gastric, and pancreatic cancer. The fourth family included a male with pancreatic cancer, and the fifth family a female with breast cancer. The early age of diagnosis and the development of multiple cancers in the reported patients indicate a very high risk of cancer in double-heterozygous patients associated with PVs in HR-related CPGs. Therefore, in families with patients who differ from other family members in terms of phenotype, age of diagnosis, or type of cancer, the cascade testing needs to include the study of other CPGs.",

    "category": "clinical"

  {
    "PMID": "38869681",
    "title": "A pilot study of childhood-onset Takayasu arteritis using whole exome sequencing suggests oligogenic inheritance involving classical complement, collagen, and autoinflammatory pathways.",
    "authors": "Jayakanthan Kabeerdoss; Sumita Danda; Priyanka Srivastava; Reena Kerkhale; T Sathish Kumar et al. (7 authors)",
    "journal": "Clinical rheumatology",
    "year": "2024",
    "doi": "10.1007/s10067-024-07017-z",
    "abstract": "Takayasu arteritis (TA) is a chronic granulomatous inflammatory disease affecting the aorta and its branches. Paediatric TA (pTA) may present from 6\u00a0months after birth till the adolescent age group. Genetics and pathogenesis of pTA are not fully understood. Earlier studies reported monogenic mutation in NOD2, XIAP, and STAT1 genes in patients with pTA. TA, a relatively rare disease, is more common in geographical pockets, including India. We hypothesized that South Asian patients with pTA, namely, those of Indian subcontinent origin, may have clinically relevant and unique pathogenic variants involving one or more genes, especially those linked to genetically driven vasculitic illnesses, including autoinflammatory pathologies. Children with pTA fulfilling EULAR/PRINTO/PReS classification criteria and presenting with clinical symptoms to the Paediatric Rheumatology clinic of Christian Medical College, Vellore, were included. Blood samples were collected after getting informed consent from parents or guardians and assent forms from children. DNA was extracted from whole blood using the Qiagen DNA extraction kit. Initially, the common variant in Indian population, namely, ADA2 c.139G\u2009>\u2009A; p.Gly47Arg, was screened, followed by whole exome sequencing. Fourteen children were recruited for the study. Median age of patients was 11\u00a0years (4\u00a0months-14\u00a0years) with a male-to-female ratio of 4:10. Distribution of angiographic subsets by Numano's classification of included children were as follows: type 5 (n\u2009=\u20097), type 4 (n\u2009=\u20095), and type 3 (n\u2009=\u20092). We identified novel variants in ten different genes. This include variants in genes of classical complement pathway, namely, C2, C3, C6, C7, and C9, and other genes, namely, CYBA, SH3BP2, GUCY2C, CTC1, COL5A1, and NLPR3. Two of 14 patients have heterozygous pathogenic variants; this implies that combination of heterozygous variants in C3 and COL5A1 might lead to disease development, suggesting digenic inheritance. One patient has a homozygous variant in CYBA. None of the patients were identified to have ADA2 variants. Whole exome sequencing reveals combination of rare variants in genes C3, COL5A1, and CYBA associated with disease development in children with Takayasu Arteritis. Key Points \u2022 We identified novel variants in genes of classical complement pathway, namely, C2, C3, C6, C7, and C9, and other genes, namely, CYBA, SH3BP2, GUCY2C, CTC1, COL5A1, and NLPR3. \u2022 Two of 14 patients have heterozygous pathogenic variants in C3 and COL5A1; this may have implications in disease development, suggesting digenic inheritance. \u2022 One patient has homozygous variant in CYBA. \u2022 None of the patients were identified to have ADA2 variants.",
    "source": "pubmed_2019_2026",
    "category": "clinical"
  },
  {
    "PMID": "38854430",
    "title": "Genome-wide association analysis of the resistance to infectious hematopoietic necrosis virus in two rainbow trout aquaculture lines confirms oligogenic architecture with several moderate effect quantitative trait loci.",
    "authors": "Yniv Palti; Roger L Vallejo; Maureen K Purcell; Guangtu Gao; Kristy L Shewbridge et al. (11 authors)",
    "journal": "Frontiers in genetics",
    "year": "2024",
    "doi": "10.3389/fgene.2024.1394656",
    "abstract": "Infectious hematopoietic necrosis (IHN) is a disease of salmonid fish that is caused by the IHN virus (IHNV), which can cause substantial mortality and economic losses in rainbow trout aquaculture and fisheries enhancement hatchery programs. In a previous study on a commercial rainbow trout breeding line that has undergone selection, we found that genetic resistance to IHNV is controlled by the oligogenic inheritance of several moderate and many small effect quantitative trait loci (QTL). Here we used genome wide association analyses in two different commercial aquaculture lines that were na\u00efve to previous exposure to IHNV to determine whether QTL were shared across lines, and to investigate whether there were major effect loci that were still segregating in the na\u00efve lines. A total of 1,859 and 1,768 offspring from two commercial aquaculture strains were phenotyped for resistance to IHNV and genotyped with the rainbow trout Axiom 57K SNP array. Moderate heritability values (0.15-0.25) were estimated. Two statistical methods were used for genome wide association analyses in the two populations. No major QTL were detected despite the na\u00efve status of the two lines. Further, our analyses confirmed an oligogenic architecture for genetic resistance to IHNV in rainbow trout. Overall, 17 QTL with notable effect (\u22651.9% of the additive genetic variance) were detected in at least one of the two rainbow trout lines with at least one of the two statistical methods. Five of those QTL were mapped to overlapping or adjacent chromosomal regions in both lines, suggesting that some loci may be shared across commercial lines. Although some of the loci detected in this GWAS merit further investigation to better understand the biological basis of IHNV disease resistance across populations, the overall genetic architecture of IHNV resistance in the two rainbow trout lines suggests that genomic selection may be a more effective strategy for genetic improvement in this trait.",
    "source": "pubmed_2019_2026",
    "category": "clinical"

  {
    "PMID": "38805753",
    "title": "DUVEL: an active-learning annotated biomedical corpus for the recognition of oligogenic combinations.",
    "authors": "Charlotte Nachtegael; Jacopo De Stefani; Anthony Cnudde; Tom Lenaerts",
    "journal": "Database : the journal of biological databases and curation",
    "year": "2024",
    "doi": "10.1093/database/baae039",
    "abstract": "While biomedical relation extraction (bioRE) datasets have been instrumental in the development of methods to support biocuration of single variants from texts, no datasets are currently available for the extraction of digenic or even oligogenic variant relations, despite the reports in literature that epistatic effects between combinations of variants in different loci (or genes) are important to understand disease etiologies. This work presents the creation of a unique dataset of oligogenic variant combinations, geared to train tools to help in the curation of scientific literature. To overcome the hurdles associated with the number of unlabelled instances and the cost of expertise, active learning (AL) was used to optimize the annotation, thus getting assistance in finding the most informative subset of samples to label. By pre-annotating 85 full-text articles containing the relevant relations from the Oligogenic Diseases Database (OLIDA) with PubTator, text fragments featuring potential digenic variant combinations, i.e. gene-variant-gene-variant, were extracted. The resulting fragments of texts were annotated with ALAMBIC, an AL-based annotation platform. The resulting dataset, called DUVEL, is used to fine-tune four state-of-the-art biomedical language models: BiomedBERT, BiomedBERT-large, BioLinkBERT and BioM-BERT. More than 500\u2009000 text fragments were considered for annotation, finally resulting in a dataset with 8442 fragments, 794 of them being positive instances, covering 95% of the original annotated articles. When applied to gene-variant pair detection, BiomedBERT-large achieves the highest F1 score (0.84) after fine-tuning, demonstrating significant improvement compared to the non-fine-tuned model, underlining the relevance of the DUVEL dataset. This study shows how AL may play an important role in the creation of bioRE dataset relevant for biomedical curation applications. DUVEL provides a unique biomedical corpus focusing on 4-ary relations between two genes and two variants. It is made freely available for research on GitHub and Hugging Face. Database URL: https://huggingface.co/datasets/cnachteg/duvel or https://doi.org/10.57967/hf/1571.",
    "source": "pubmed_2019_2026",
    "category": "tools"
  },
  {
    "PMID": "38742143",
    "title": "Corrigendum to \"SEMA4D acts as a novel oligogenic pathogenic gene of idiopathic hypogonadotropic hypogonadism through the PlexinB1/MET/RND1/RHOA/RAF1/MAPK signaling axis\" [Genes & Diseases 10 (2023) 65-68].",
    "authors": "Daoqi Wang; Yonghua Niu; Jiahong Tan; Jiaxin Wang; Le Ling et al. (11 authors)",

  {
    "PMID": "38731822",
    "title": "Digenic Inheritance in Rare Disorders and Mitochondrial Disease-Crossing the Frontier to a More Comprehensive Understanding of Etiology.",
    "authors": "Christiane M Neuhofer; Holger Prokisch",
    "journal": "International journal of molecular sciences",
    "year": "2024",
    "doi": "10.3390/ijms25094602",
    "abstract": "Our understanding of rare disease genetics has been shaped by a monogenic disease model. While the traditional monogenic disease model has been successful in identifying numerous disease-associated genes and significantly enlarged our knowledge in the field of human genetics, it has limitations in explaining phenomena like phenotypic variability and reduced penetrance. Widening the perspective beyond Mendelian inheritance has the potential to enable a better understanding of disease complexity in rare disorders. Digenic inheritance is the simplest instance of a non-Mendelian disorder, characterized by the functional interplay of variants in two disease-contributing genes. Known digenic disease causes show a range of pathomechanisms underlying digenic interplay, including direct and indirect gene product interactions as well as epigenetic modifications. This review aims to systematically explore the background of digenic inheritance in rare disorders, the approaches and challenges when investigating digenic inheritance, and the current evidence for digenic inheritance in mitochondrial disorders.",
    "source": "pubmed_2019_2026",
    "category": "review"
  },
  {
    "PMID": "38603604",
    "title": "Prioritization of oligogenic variant combinations in whole exomes.",
    "authors": "Barbara Gravel; Alexandre Renaux; Sofia Papadimitriou; Guillaume Smits; Ann Now\u00e9 et al. (6 authors)",
    "journal": "Bioinformatics (Oxford, England)",
    "year": "2024",
    "doi": "10.1093/bioinformatics/btae184",
    "abstract": "Whole exome sequencing (WES) has emerged as a powerful tool for genetic research, enabling the collection of a tremendous amount of data about human genetic variation. However, properly identifying which variants are causative of a genetic disease remains an important challenge, often due to the number of variants that need to be screened. Expanding the screening to combinations of variants in two or more genes, as would be required under the oligogenic inheritance model, simply blows this problem out of proportion. We present here the High-throughput oligogenic prioritizer (Hop), a novel prioritization method that uses direct oligogenic information at the variant, gene and gene pair level to detect digenic variant combinations in WES data. This method leverages information from a knowledge graph, together with specialized pathogenicity predictions in order to effectively rank variant combinations based on how likely they are to explain the patient's phenotype. The performance of Hop is evaluated in cross-validation on 36\u00a0120 synthetic exomes for training and 14\u00a0280 additional synthetic exomes for independent testing. Whereas the known pathogenic variant combinations are found in the top 20 in approximately 60% of the cross-validation exomes, 71% are found in the same ranking range when considering the independent set. These results provide a significant improvement over alternative approaches that depend simply on a monogenic assessment of pathogenicity, including early attempts for digenic ranking using monogenic pathogenicity scores. Hop is available at https://github.com/oligogenic/HOP.",
    "source": "pubmed_2019_2026",
    "category": "tools"
  },
  {
    "PMID": "38593951",
    "title": "Prevalence of pathogenic variants and digenic disease in patients diagnosed with normosmic hypogonadotropic hypogonadism/Kallmann Syndrome.",
    "authors": "Alexandra Poch; Michael P Dougherty; Robert A Roman; Lynn Chorich; Zoe Hawkins et al. (8 authors)",
    "journal": "Molecular and cellular endocrinology",
    "year": "2024",
    "doi": "10.1016/j.mce.2024.112224",
    "abstract": "Hypogonadotropic hypogonadism (HH) is due to impaired gonadotropin releasing hormone (GnRH) action resulting in absent puberty and infertility. At least 44 genes have been identified to possess genetic variants in 40-50% of nHH/KS, and 2-20% have presumed digenic disease, but not all variants have been characterized in vitro. The prevalence of pathogenic (P)/likely pathogenic (LP) variants in monogenic and digenic nHH/KS is lower than reported. Cross-sectional study. University Research Laboratory. 158 patients with nHH/KS. Exome sequencing (ES) was performed and variants were filtered for 44 known genes using Varsome and confirmed by Sanger Sequencing. P/LP variants in nHH/KS genes. ES resulted in >370,000 variants, from which variants in 44 genes were filtered. Thirty-one confirmed P/LP variants in 10 genes (ANOS1, CHD7, DUSP6, FGFR1, HS6ST1, KISS1, PROKR2, SEMA3A, SEMA3E, TACR3), sufficient to cause disease, were identified in 30/158 (19%) patients. Only 2/158 (1.2%) patients had digenic variant combinations: a male with hemizygous ANOS1 and heterozygous TACR3 variants and a male with heterozygous SEMA3A and SEMA3E variants. Two patients (1.2%) had compound heterozygous GNRHR (autosomal recessive) variants-one P and one variant of uncertain significance (VUS). Five patients (3.2%) had heterozygous P/LP variants in either GNRHR or TACR3 (both autosomal recessive), but no second variant. Our prevalence of P/LP variants in nHH/KS was 19%, and digenicity was observed in 1.2%. These findings are less than those previously reported, and probably represent a more accurate estimation since VUS are not included.",
    "source": "pubmed_2019_2026",

  {
    "PMID": "38540378",
    "title": "Massive Parallel DNA Sequencing of Patients with Inherited Cardiomyopathies in Cyprus and Suggestion of Digenic or Oligogenic Inheritance.",
    "authors": "Constantina Koutsofti; Marios Ioannides; Christiana Polydorou; Gregory Papagregoriou; Apostolos Malatras et al. (17 authors)",
    "journal": "Genes",
    "year": "2024",
    "doi": "10.3390/genes15030319",
    "abstract": "Inherited cardiomyopathies represent a highly heterogeneous group of cardiac diseases. DNA variants in genes expressed in cardiomyocytes cause a diverse spectrum of cardiomyopathies, ultimately leading to heart failure, arrythmias, and sudden cardiac death. We applied massive parallel DNA sequencing using a 72-gene panel for studying inherited cardiomyopathies. We report on variants in 25 families, where pathogenicity was predicted by different computational approaches, databases, and an in-house filtering analysis. All variants were validated using Sanger sequencing. Familial segregation was tested when possible. We identified 41 different variants in 26 genes. Analytically, we identified fifteen variants previously reported in the Human Gene Mutation Database: twelve mentioned as disease-causing mutations (DM) and three as probable disease-causing mutations (DM?). Additionally, we identified 26 novel variants. We classified the forty-one variants as follows: twenty-eight (68.3%) as variants of uncertain significance, eight (19.5%) as likely pathogenic, and five (12.2%) as pathogenic. We genetically characterized families with a cardiac phenotype. The genetic heterogeneity and the multiplicity of candidate variants are making a definite molecular diagnosis challenging, especially when there is a suspicion of incomplete penetrance or digenic-oligogenic inheritance. This is the first systematic study of inherited cardiac conditions in Cyprus, enabling us to develop a genetic baseline and precision cardiology.",

    "PMID": "38478578",
    "title": "Digenic Leigh syndrome on the background of the m.11778G>A Leber hereditary optic neuropathy variant.",
    "authors": "Beryll Blickh\u00e4user; Sarah L Stenton; Christiane M Neuhofer; Elisa Floride; Victoria Nesbitt et al. (24 authors)",
    "journal": "Brain : a journal of neurology",
    "year": "2024",
    "doi": "10.1093/brain/awae057",
    "abstract": "Leigh syndrome spectrum (LSS) is a primary mitochondrial disorder defined neuropathologically by a subacute necrotizing encephalomyelopathy and characterized by bilateral basal ganglia and/or brainstem lesions. LSS is associated with variants in several mitochondrial DNA genes and more than 100 nuclear genes, most often related to mitochondrial complex I (CI) dysfunction. Rarely, LSS has been reported in association with primary Leber hereditary optic neuropathy (LHON) variants of the mitochondrial DNA, coding for CI subunits (m.3460G>A in MT-ND1, m.11778G>A in MT-ND4 and m.14484T>C in MT-ND6). The underlying mechanism by which these variants manifest as LSS, a severe neurodegenerative disease, as opposed to the LHON phenotype of isolated optic neuropathy, remains an open question. Here, we analyse the exome sequencing of six probands with LSS carrying primary LHON variants, and report digenic co-occurrence of the m.11778G > A variant with damaging heterozygous variants in nuclear disease genes encoding CI subunits as a plausible explanation. Our findings suggest a digenic mechanism of disease for m.11778G>A-associated LSS, consistent with recent reports of digenic disease in individuals manifesting with LSS due to biallelic variants in the recessive LHON-associated disease gene DNAJC30 in combination with heterozygous variants in CI subunits.",
    "source": "pubmed_2019_2026",
    "category": "clinical"

  {
    "PMID": "38467926",
    "title": "Renal coloboma syndrome/dominant optic atrophy with severe retinal atrophy and de novo digenic mutations in PAX2 and OPA1.",
    "authors": "Wataru Shimabukuro; Yasutsugu Chinen; Naoya Imanaga; Kumiko Yanagi; Tadashi Kaname et al. (6 authors)",
    "journal": "Pediatric nephrology (Berlin, Germany)",
    "year": "2024",
    "doi": "10.1007/s00467-024-06347-z",
    "abstract": "Renal coloboma syndrome (RCS) and dominant optic atrophy are mainly caused by heterozygous mutations in PAX2 and OPA1, respectively. We describe a patient with digenic mutations in PAX2 and OPA1. A female infant was born without perinatal abnormalities. Magnetic resonance imaging at 4\u00a0months of age showed bilateral microphthalmia and optic nerve hypoplasia. Appropriate body size was present at 2\u00a0years of age, and mental development was favorable. Color fundus photography revealed severe retinal atrophy in both eyes. Electroretinography showed slight responses in the right eye, but no responses in the left eye, suggesting a high risk of blindness. Urinalysis results were normal, creatinine-based estimated glomerular filtration rate was 63.5\u00a0mL/min/1.73 m2, and ultrasonography showed bilateral hypoplastic kidneys. Whole exome sequencing revealed de novo frameshift mutations in PAX2 and OPA1. Both variants were classified as pathogenic (PVS1, PS2, PM2) based on the guidelines from the American College of Medical Genetics and Genomics (ACMG). Genetic testing for ocular diseases should be considered for patients with suspected RCS and a high risk of total blindness.",

  {
    "PMID": "38429495",
    "title": "Digenic inheritance involving a muscle-specific protein kinase and the giant titin protein causes a skeletal muscle myopathy.",
    "authors": "Ana T\u00f6pf; Dan Cox; Irina T Zaharieva; Valeria Di Leo; Jaakko Sarparanta et al. (85 authors)",
    "journal": "Nature genetics",
    "year": "2024",
    "doi": "10.1038/s41588-023-01651-0",
    "abstract": "In digenic inheritance, pathogenic variants in two genes must be inherited together to cause disease. Only very few examples of digenic inheritance have been described in the neuromuscular disease field. Here we show that predicted deleterious variants in SRPK3, encoding the X-linked serine/argenine protein kinase 3, lead to a progressive early onset skeletal muscle myopathy only when in combination with heterozygous variants in the TTN gene. The co-occurrence of predicted deleterious SRPK3/TTN variants was not seen among 76,702 healthy male individuals, and statistical modeling strongly supported digenic inheritance as the best-fitting model. Furthermore, double-mutant zebrafish (srpk3-/-; ttn.1+/-) replicated the myopathic phenotype and showed myofibrillar disorganization. Transcriptome data suggest that the interaction of srpk3 and ttn.1 in zebrafish occurs at a post-transcriptional level. We propose that digenic inheritance of deleterious changes impacting both the protein kinase SRPK3 and the giant muscle protein titin causes a skeletal myopathy and might serve as a model for other genetic diseases.",

  {
    "PMID": "38342844",
    "title": "A Chinese Family with Digenic TBP/STUB1 Spinocerebellar Ataxia.",
    "authors": "Lili Liu; Juanjuan Chen; Guogao Zhang; Zhijian Lin; Di Chen et al. (6 authors)",
    "journal": "Cerebellum (London, England)",
    "year": "2024",
    "doi": "10.1007/s12311-024-01664-3",
    "abstract": "Spinocerebellar ataxias (SCAs) are inherited neurodegenerative diseases characterized by loss of balance, coordination, and slurred speech. Recently, a digenic mode of inheritance of TBP/STUB1 contributing to SCA was demonstrated. The clinical manifestations of SCATBP/STUB1 include not only ataxia but also obvious cognitive and behavioral impairment. Here, we describe a Chinese family with SCATBP/STUB1 and performed a literature search for similar cases. We identified a Chinese family with SCATBP/STUB1 and compare our clinical findings with other cases described in the literature so far. Four individuals in this family have been found to carry SCATBP/STUB1, of which three have clinical manifestations. A heterozygous deletion mutation in the STIP1-homologous and U-box containing protein 1 (STUB1) gene, NM_005861.4:c433_435del(p.K145del), was identified. The proband is a 34-year-old female with progressive dementia and dysarthria. The mother and uncle of the proband first presented with motor abnormalities and gradually developed cognitive impairment. The proband and her uncle showed cerebellar atrophy on MRI. The proband's brother carried digenic variants but was asymptomatic. SCATBP/STUB1 is a novel SCA subtype. The main clinical manifestations are motor, cognitive, and behavioral abnormalities. Brain MRI shows significant cerebellar atrophy and cortical thinning. The independent segregation of TBP and STUB1 alleles should be considered when evaluating patients with cognitive impairment and ataxia.",
    "source": "pubmed_2019_2026",
    "category": "clinical"
  },
  {
    "PMID": "38310280",
    "title": "Oligogenic basis of premature ovarian insufficiency: an observational study.",
    "authors": "Panpan Long; Le Wang; Hangjing Tan; Ruping Quan; Zihao Hu et al. (11 authors)",
    "journal": "Journal of ovarian research",
    "year": "2024",
    "doi": "10.1186/s13048-024-01351-1",
    "abstract": "The etiology of premature ovarian insufficiency, that is, the loss of ovarian activity before 40 years of age, is complex. Studies suggest that genetic factors are involved in 20-25% of cases. The aim of this study was to explore the oligogenic basis of premature ovarian insufficiency. Whole-exome sequencing of 93 patients with POI and whole-genome sequencing of 465 controls were performed. In the gene-burden analysis, multiple genetic variants, including those associated with DNA damage repair and meiosis, were more common in participants with premature ovarian insufficiency than in controls. The ORVAL-platform analysis confirmed the pathogenicity of the RAD52 and MSH6 combination. The results of this study indicate that oligogenic inheritance is an important cause of premature ovarian insufficiency and provide insights into the biological mechanisms underlying premature ovarian insufficiency.",

  {
    "PMID": "38297031",
    "title": "Oligogenic inheritance in severe adult obesity.",
    "authors": "Sumaya Almansoori; Suzanne I Alsters; Andrianos M Yiorkas; Nikman Adli Nor Hashim; Robin G Walters et al. (9 authors)",
    "journal": "International journal of obesity (2005)",
    "year": "2024",
    "doi": "10.1038/s41366-024-01476-9",
    "abstract": "The genetic architecture of extreme non-syndromic obesity in adults remains to be elucidated. A range of genes are known to cause monogenic obesity, but even when pathogenic mutations are present, there may be variable penetrance. Whole-exome sequencing (WES) was carried out on a 15-year-old male proband of Pakistani ancestry who had severe obesity. This was followed by family segregation analysis, using Sanger sequencing. We also undertook re-analysis of WES data from 91 unrelated adults with severe obesity (86% white European ancestry) from the Personalised Medicine for Morbid Obesity (PMMO) cohort, recruited from the UK National Health Service. We identified an oligogenic mode of inheritance of obesity in the proband's family-this provided the impetus to reanalyze existing sequence data in a separate dataset. Analysis of PMMO participant data revealed two further patients who carried more than one rare, predicted-deleterious mutation in a known monogenic obesity gene. In all three cases, the genes involved had known autosomal dominant inheritance, with incomplete penetrance. Oligogenic inheritance may explain some of the variable penetrance in Mendelian forms of obesity. We caution clinicians and researchers to avoid confining sequence analysis to individual genes and, in particular, not to stop looking when the first potentially-causative mutation is found.",
    "source": "pubmed_2019_2026",
    "category": "clinical"
  },
  {
    "PMID": "38279271",
    "title": "Missing Heritability in Albinism: Deep Characterization of a Hungarian Albinism Cohort Raises the Possibility of the Digenic Genetic Background of the Disease.",
    "authors": "Nikoletta Nagy; Margit Pal; Jozsef Kun; Bence Galik; Peter Urban et al. (17 authors)",
    "journal": "International journal of molecular sciences",
    "year": "2024",
    "doi": "10.3390/ijms25021271",
    "abstract": "Albinism is characterized by a variable degree of hypopigmentation affecting the skin and the hair, and causing ophthalmologic abnormalities. Its oculocutaneous, ocular and syndromic forms follow an autosomal or X-linked recessive mode of inheritance, and 22 disease-causing genes are implicated in their development. Our aim was to clarify the genetic background of a Hungarian albinism cohort. Using a 22-gene albinism panel, the genetic background of 11 of the 17 Hungarian patients was elucidated. In patients with unidentified genetic backgrounds (n = 6), whole exome sequencing was performed. Our investigations revealed a novel, previously unreported rare variant (N687S) of the two-pore channel two gene (TPCN2). The N687S variant of the encoded TPC2 protein is carried by a 15-year-old Hungarian male albinism patient and his clinically unaffected mother. Our segregational analysis and in vitro functional experiments suggest that the detected novel rare TPCN2 variant alone is not a disease-causing variant in albinism. Deep genetic analyses of the family revealed that the patient also carries a phenotype-modifying R305W variant of the OCA2 protein, and he is the only family member harboring this genotype. Our results raise the possibility that this digenic combination might contribute to the observed differences between the patient and the mother, and found the genetic background of the disease in his case.",
    "source": "pubmed_2019_2026",
    "category": "clinical"
  },
  {
    "PMID": "38224959",
    "title": "Digenic Inheritance of PROC and SERPINC1 Mutations Contributes to Multiple Sites Venous Thrombosis.",
    "authors": "Xiangui Li; Jiabao Zhu; Fanzhen Lv; Wenqi Ma; Weimin Zhou et al. (6 authors)",
    "journal": "Hamostaseologie",
    "year": "2024",
    "doi": "10.1055/a-2212-1565",
    "abstract": "Venous thromboembolism (VTE) represents a worldwide health challenge, impacting millions of people each year. The genesis of venous thrombosis is influenced in part by genetic components. Hereditary thrombosis is described as a genetically determined susceptibility to VTE. In the present study, a male patient was referred to our department presenting with multiple venous thrombosis events in different locations. Given a lack of identifiable risk factors, we aimed to investigate the possible genetic factor underlying venous thrombosis. Whole-exome sequencing was employed to examine genes linked to inherited thrombophilia in the proband. Putative variants were subsequently confirmed through Sanger sequencing within the family. The proband was identified as carrying two genetic mutations. One is the novel c.400G\u2009>\u2009C (p.E134Q) mutation affecting the final nucleotide of exon 5 in the PROC gene, potentially impacting splicing. The other is a previously reported heterozygous nonsense variant c.1016G\u2009>\u2009A (p.W339X) in the SERPINC1 gene. The proband inherited the former from her mother and the latter from her father. The presence of digenic inheritance in the patient reflects the complex phenotype of venous thrombosis and demonstrates the significance of an unbiased approach to detect pathogenic variants, especially in patients with a high risk of hereditary thrombosis.",
    "source": "pubmed_2019_2026",
    "category": "clinical"
  },
  {
    "PMID": "38179179",
    "title": "Novel Digenic Variants in COL4A4 and COL4A5 Causing X-Linked Alport Syndrome: A Case Report.",
    "authors": "Hideki Uedono; Katsuhito Mori; Shinya Nakatani; Kohei Watanabe; Rino Nakaya et al. (14 authors)",
    "journal": "Case reports in nephrology and dialysis",
    "year": "2024",
    "doi": "10.1159/000535493",
    "abstract": "Alport syndrome (AS) is a hereditary, progressive kidney disease characterized by structural abnormalities and dysfunction of the glomerular basement membrane (GBM). AS is classified as X-linked, autosomal, and digenic. The number of cases of digenic AS has increased, but the genotype-phenotype correlation of patient with digenic AS is still unclear. Here, we present a case of digenic AS with novel digenic missense variants in COL4A4 (c.827G>C, p.Gly276Ala) and COL4A5 (c.4369G>C, p.Gly1457Arg). The patient was a 29-year-old Japanese man suffering from persistent microscopic hematuria and proteinuria without kidney function impairment. Kidney biopsy showed focal interstitial foam cell infiltration, global and segmental glomerulosclerosis. Immunofluorescence staining for collagen IV \u03b15 was almost negative in the GBM and Bowman's capsule. Electron microscopy revealed irregular thickening with lamellation and segmental thinning of the GBM. Clinical and pathological findings were consistent with AS. Comprehensive next-generation sequencing revealed a heterozygous missense variant in COL4A4 (c.827G>C, p.Gly276Ala) in exon 1 and a hemizygous missense variant in COL4A5 (c.4369G>C, p.Gly1457Arg) in exon 49 on the patient's paternal and maternal alleles, respectively. The same digenic variants were detected in his sister, and she also showed a similar phenotype. After treatment with angiotensin-converting enzyme inhibitors, proteinuria decreased from 2.3 to 1.1 g/g creatinine, but occult blood persisted. During follow-up, kidney function has been preserved. The novel genotype of our case provides more information on the genotype-phenotype correlation of digenic XLAS, although long-term follow-up is required. The findings in the present case also indicate the importance of genetic tests for family members of a patient diagnosed with digenic AS.",
    "source": "pubmed_2019_2026",
    "category": "clinical"
  },
  {
    "PMID": "38131667",
    "title": "Digenic FLNA and UCHL1 variants resulting in a complex phenotype.",
    "authors": "Helena F Pernice; Luke F O'Donnell; Alexander M Rossor; Matilde Laura; Christopher J Record et al. (10 authors)",
    "journal": "Journal of the peripheral nervous system : JPNS",
    "year": "2024",
    "doi": "10.1111/jns.12611",
    "abstract": "X-linked variants in Filamin A (FLNA) are associated with the Ehlers-Danlos-syndrome-variant form of periventricular heterotopia, and autosomal dominant variants in ubiquitin C-terminal hydrolase L1 (UCHL1) are associated with a late-onset spastic ataxia, peripheral neuropathy and optic atrophy. Here we present a rare case involving both a novel heterozygous whole-gene deletion of UCHL1 and a heterozygous frameshift variant in the FLNA gene resulting in a complex phenotype. A 67-year-old female with a confirmed pathogenic variant in the FLNA gene, resulting in an enlarged aorta and joint pains, presented with a 4-year history of severe sensory ataxia, upper motor neuron signs, eye movement abnormalities and severe sensory loss. Neurophysiology including Somatosensory-evoked potentials confirmed the sensory loss as predominantly preganglionic with denervation. Genetic testing revealed a digenic cause of her complex presentation, confirming a pathogenic frameshift variant in the FLNA gene and a heterozygous loss of function deletion in the UCHL1 gene. To the best of our knowledge, this is the first case with concomitant pathogenic variants in the FLNA and UCHL1 genes which explain the complex phenotype. The severe preganglionic sensory loss is also a rare finding and expands the phenotype of UCHL1 variants.",
    "source": "pubmed_2019_2026",
    "category": "clinical"
  },
  {
    "PMID": "41608432",
    "title": "Identification of co-segregating GJA3 and CRYBA1 missense variants in a Chinese family with congenital cataract: a possible digenic etiology.",
    "authors": "Chenchen Zhou; Kunke Li; Zhenxing Zhou; Shuhui Jian; Ling Jin et al. (7 authors)",
    "journal": "Frontiers in medicine",
    "year": "2025",
    "doi": "10.3389/fmed.2025.1743231",
    "abstract": "Congenital cataract (CC), defined as lens opacity present at birth or in early infancy, is a major cause of reversible childhood blindness and shows marked genetic heterogeneity. This study aimed to investigate the genetic basis of CC in a multigenerational Chinese family. A four-generation family with CC was clinically characterized. Whole-exome sequencing was performed in the proband, followed by stepwise variant filtering based on minor allele frequency, predicted functional impact, known CC-associated genes, and an autosomal dominant inheritance model. Candidate variants were annotated and classified according to ACMG guidelines. Sanger sequencing was used to validate variants in two additional affected relatives. Two heterozygous missense variants were identified in known CC-associated genes: GJA3 c.776C > A (p.Ser259Tyr) and CRYBA1 c.346A > T (p.Ile116Phe). Both were extremely rare or absent in population databases and predicted to be damaging by multiple in silico tools. Sanger sequencing confirmed that the two variants co-occurred in all three affected family members tested, and no other rare, protein-altering variants meeting the filtering criteria were found in established cataract genes. According to ACMG guidelines, both variants remain classified as variants of uncertain significance, but their rarity, predicted functional impact and consistent co-occurrence in affected individuals support them as strong candidate variants that may jointly contribute to CC in this family and expand the spectrum of GJA3- and CRYBA1-associated changes.",
    "source": "pubmed_2019_2026",
    "category": "clinical"
  },
  {
    "PMID": "41465151",
    "title": "From Digenic to Monogenic Sex Determination in Insects: A Genetic Model Based on Imprinting and X Chromosome Elimination.",
    "authors": "Lucas S\u00e1nchez",
    "journal": "Genes",
    "year": "2025",
    "doi": "10.3390/genes16121478",
    "abstract": "Background/Objectives: In digenic populations, all females produce males and females in their offspring. Monogenic populations are composed of gynogenic (female-producing) and androgenic (male-producing) females. A theoretical population genetic model for evolution of digenic to monogenic populations is presented here. Methods: A controlling gene was associated with each of the four processes that characterise monogenic populations: (1) oogenesis is conventional, whereas spermatogenesis is unusual and it is characterised by the exclusive formation of X-bearing sperm (gene (s)), i.e., the paternal chromosomes are eliminated so that only the maternal ones are transmitted to the next generation; (2) the X chromosome that is eliminated in the zygote is the one inherited from the father (gene r); (3) an imprinting process occurs in the mother (gene g), which protects the maternally inherited X chromosome from elimination in the zygote and the whole maternal chromosome complement in spermatogenesis; (4) a maternal factor is produced during oogenesis (gene e), which inactivates the elimination factor [r] in the zygote, thus controlling the elimination of the paternal X chromosome. The sequences of emergence of the genes (e s r g) that transform a digenic population into a monogenic one were analysed. Results: The following evolutionary sequences were found: (1) the sequence (r s e) under dominant conditions of gene (s) and recessive conditions of gene (r); and (2) the sequences (s r e), (r s e), and (e s r) under recessive conditions of gene (s) and gene (r). It was also found that the process of genomic imprinting is a necessary condition for the generation of a monogenic population. Furthermore, a quantitative change in the interaction between the elimination factor and its maternal inhibitor modifies the genotypic formula of the monogenic state. Conclusions: The number and types of evolutionary transitions of a digenic to a monogenic population depends on the dominant or recessive characteristic of the newly emerging genes. The imprinting process must already be present in the digenic population from which the monogenic one evolves; otherwise, the population cannot reach the monogenic state.",
    "source": "pubmed_2019_2026",
    "category": "tools"
  },
  {
    "PMID": "41420254",
    "title": "Severe obesity as an oligogenic condition: evidence from 1714 adults seeking treatment in the UK National Health Service.",
    "authors": "Sumaya Almansoori; Hasnat A Amin; Suzanne I Alsters; Dale Handley; Andrianos M Yiorkas et al. (16 authors)",
    "journal": "Human genomics",
    "year": "2025",
    "doi": "10.1186/s40246-025-00895-7",
    "abstract": "Previous evidence has established genetics as an important contributing factor to severe (class III) obesity, which is a chronic, relapsing condition, with a high burden of comorbidity and mortality. We therefore designed a custom genotyping array to screen a cohort of UK patients seeking treatment for severe obesity in a cost-effective way. A total of 1,714 participants were genotyped using a custom AXIOM array, focusing on rare (minor allele frequency\u2009<\u20090.01) variants, with CADD-PHRED\u2009\u2265\u200915 in 78 genes known/suspected to cause Mendelian forms of obesity. Concordance analyses of 22 duplicate samples and 66 samples with whole exome sequence data revealed good genotyping reliability. We identified the proportion of study participants who carried, or were homozygous for, rare, predicted-deleterious variants in genes with dominant and recessive modes of inheritance (MOI), respectively. 27% of patients carried relevant mutations consistent with the expected MOI, which was very similar to the rate observed in the UKB 50\u00a0K whole exome sequencing dataset. However, the clinical obesity cohort was more likely to carry two or more such variants, in separate genes, than UK Biobank participants (17.1% vs. 13%, p\u2009=\u20090 0.018), which strongly indicates the possibility of oligogenic inheritance. In conclusion, our results provide evidence: that (i) custom genotyping arrays, used with improved algorithms can allow reliable, cost-effective screening for rare genetic variants; (ii) rare mutations in \u201cobesity genes\u201d may be at high prevalence among bariatric patients, as well as in the general population; and (iii) that severe obesity may have an oligogenic pattern of inheritance in some cases. The online version contains supplementary material available at 10.1186/s40246-025-00895-7.",
    "source": "pubmed_2019_2026",
    "category": "clinical"
  },
  {
    "PMID": "41401108",
    "title": "Composite Digenic Diabetes Linked to Heterozygous Variants of <italic>GCK</italic> and <italic>NEUROD1</italic>: A Case Report.",
    "authors": "Novella Rapini; Claudia Brufani; Annalisa Deodati; Mafalda Mucciolo; Marco G Baroni et al. (8 authors)",
    "journal": "Hormone research in paediatrics",
    "year": "2025",
    "doi": "10.1159/000550098",
    "abstract": "We wanted to establish the etiologic cause of diabetes in a female subject with mild hyperglycemia since childhood, that suddenly worsened in her late 40s. We retrieved the proband's laboratory data from the age of 5 years. We assessed type 1 diabetes autoantibodies and performed genetic screening by clinical exome. The proband showed stable hyperglycemia not requiring pharmacological therapy for 42 years. The proband's fasting plasma glucose increased from 120 to 130 mg/dL (6.1-7.2 mmol/L) to 150-159 mg/dL (8.3-8.8 mmol/L) at the age of 47 years. Four type 1 diabetes autoantibodies resulted repeatedly negative. A spontaneous glucokinase pathogenic variant (c.645C>A, p. Tyr215Ter) and a NEUROD1 variant (c.616dupC, p.His206ProfsTer38) were identified in the proband. Her mother, who carries the NEUROD1 variant, was diagnosed with diabetes by OGTT (120' = 211 mg/dL) when 77 years old. NEUROD1, a low penetrance maturity onset diabetes of the young (MODY) gene, is known to regulate gene transcription of GCK and SLC2A2, encoding for GLUT2, a functional partner of GCK in glucose sensing of the \u03b2 cell. We conclude that the low penetrance NEUROD1 variant is likely responsible of the peculiar trajectory of fasting glucose in a subject who presented with classical metabolic phenotype associated with glucokinase haploinsufficiency from childhood to adulthood.",
    "source": "pubmed_2019_2026",
    "category": "clinical"
  },
