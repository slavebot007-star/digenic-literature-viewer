  {
    "PMID": "34946792",
    "title": "Individual Oligogenic Background in p.D91A-SOD1 Amyotrophic Lateral Sclerosis Patients.",
    "authors": "Giulia Gentile; Benedetta Perrone; Giovanna Morello; Isabella Laura Simone; Sebastiano And\u00f2 et al. (7 authors)",
    "journal": "Genes",
    "year": "2021",
    "doi": "10.3390/genes12121843",
    "abstract": "The p.D91A is one of the most common ALS-causing SOD1 mutations and is known to be either recessive or dominant. The homozygous phenotype is characterized by prolonged survival and slow progression of disease, whereas the affected heterozygous phenotypes can vary. To date, no genetic protective factors located close to SOD1 have been associated with the mild progressive homozygous phenotype. Using Next Generation Sequencing (NGS), we characterized a small cohort of sporadic and familial p.D91A-SOD1 heterozygous (n = 2) or homozygous (n = 5) ALS patients, to reveal any additional contributing variant in 39 ALS-related genes. We detected unique sets of non-synonymous variants, four of which were of uncertain significance and several in untranslated regions of ALS-related genes. Our results supported an individual oligogenic background underlying both sporadic and familial p.D91A cases irrespective of their p.D91A mutant alleles. We suggest that a comprehensive genomic view of p.D91A-SOD1 ALS patients may be useful in identifying emerging variants and improving disease diagnosis as well as guiding precision medicine.",
    "source": "pubmed_2019_2026",
    "category": "clinical"
  },
  {
    "PMID": "34906500",
    "title": "Identification and quantification of oligogenic loss-of-function disorders.",
    "authors": "Arthur Stefanski; Eduardo P\u00e9rez-Palma; Marko Mrdjen; Megan McHugh; Costin Leu et al. (6 authors)",
    "journal": "Genetics in medicine : official journal of the American College of Medical Genetics",
    "year": "2022",
    "doi": "10.1016/j.gim.2021.10.026",
    "abstract": "Monogenic disorders can present clinically heterogeneous symptoms. We hypothesized that in patients with a monogenic disorder caused by a large deletion, frequently additional loss-of-function (LOF)-intolerant genes are affected, potentially contributing to the phenotype. We investigated the LOF-intolerant gene distribution across the genome and its association with benign population and pathogenic classified deletions from individuals with presumably monogenic disorders. For people with presumably monogenic epilepsy, we compared Human Phenotype Ontology terms in people with large and small deletions. We identified LOF-intolerant gene dense regions that were enriched for ClinVar and depleted for population copy number variants. Analysis of data from >143,000 individuals with a suspected monogenic disorder showed that 2.5% of haploinsufficiency disorder-associated deletions can affect at least 1 other LOF-intolerant gene. Focusing on epilepsy, we observed that 13.1% of pathogenic and likely pathogenic ClinVar deletions <3 megabase pair, covering the diagnostically most relevant genes, affected at least 1 additional LOF-intolerant gene. Those patients have potentially more complex phenotypes with increasing deletion size. We could systematically show that large deletions frequently affected admditional LOF-intolerant genes in addition to the established disease gene. Further research is needed to understand how additional potential disease-relevant genes influence monogenic disorders to improve clinical care and the efficacy of targeted therapies.",
    "source": "pubmed_2019_2026",
    "category": "clinical"
  },
  {
    "PMID": "34906452",
    "title": "Digenic inheritance of STUB1 variants and TBP polyglutamine expansions explains the incomplete penetrance of SCA17 and SCA48.",
    "authors": "Stefania Magri; Lorenzo Nanetti; Cinzia Gellera; Elisa Sarto; Elena Rizzo et al. (15 authors)",
    "journal": "Genetics in medicine : official journal of the American College of Medical Genetics",
    "year": "2022",
    "doi": "10.1016/j.gim.2021.08.003",
    "abstract": "This study aimed to unravel the genetic factors underlying missing heritability in spinocerebellar ataxia type 17 (SCA17) caused by polyglutamine-encoding CAG/CAA repeat expansions in the TBP gene. Alleles with >49 CAG/CAA repeats are fully penetrant. Most patients, however, carry intermediate TBP41-49 alleles that show incomplete penetrance. Using next-generation sequencing approaches, we investigated 40 SCA17/TBP41-54 index patients, their affected (n\u00a0= 55) and unaffected (n\u00a0= 51) relatives, and a cohort of patients with ataxia (n\u00a0= 292). All except 1 (30/31) of the index cases with TBP41-46 alleles carried a heterozygous pathogenic variant in the STUB1 gene associated with spinocerebellar ataxias SCAR16 (autosomal recessive) and SCA48 (autosomal dominant). No STUB1 variant was found in patients carrying TBP47-54 alleles. TBP41-46 expansions and STUB1 variants cosegregate in all affected family members, whereas the presence of either TBP41-46 expansions or STUB1 variants individually was never associated with the disease. Our data reveal an unexpected genetic interaction between STUB1 and TBP in the pathogenesis of SCA17 and raise questions on the existence of SCA48 as a monogenic disease with crucial implications for diagnosis and counseling. They provide a convincing explanation for the incomplete penetrance of intermediate TBP alleles and demonstrate a dual inheritance pattern for SCA17, which is a monogenic dominant disorder for TBP\u226547 alleles and a digenic TBP/STUB1 disease (SCA17-DI) for intermediate expansions.",
    "source": "pubmed_2019_2026",
    "category": "clinical"
  },
  {
    "PMID": "34868048",
    "title": "Digenic Inheritance: Evidence and Gaps in Hemophagocytic Lymphohistiocytosis.",
    "authors": "Erica A Steen; Michelle L Hermiston; Kim E Nichols; Lauren K Meyer",
    "journal": "Frontiers in immunology",
    "year": "2021",
    "doi": "10.3389/fimmu.2021.777851",
    "abstract": "Hemophagocytic lymphohistiocytosis (HLH) is a hyperinflammatory disorder characterized by the inability to properly terminate an immune response. Familial HLH (FHLH) and related immune dysregulation syndromes are associated with mutations in the genes PRF1, UNC13D, STX11, STXBP2, LYST, AP3B1, and RAB27A, all of which are required for the assembly, exocytosis, and function of cytotoxic granules within CD8+ T cells and natural killer (NK) cells. Loss-of-function mutations in these genes render the cytotoxicity pathway ineffective, thereby failing to eradicate immune stimuli, such as infectious pathogens or malignant cells. The resulting persistent immune system stimulation drives hypercytokinemia, ultimately leading to severe tissue inflammation and end-organ damage. Traditionally, a diagnosis of FHLH requires the identification of biallelic loss-of-function mutations in one of these degranulation pathway genes. However, this narrow definition fails to encompass patients with other genetic mechanisms underlying degranulation pathway dysfunction. In particular, mounting clinical evidence supports a potential digenic mode of inheritance of FHLH in which single loss-of-function mutations in two different degranulation pathway genes cooperate to impair pathway activity. Here, we review the functions of the FHLH-associated genes within the degranulation pathway and summarize clinical evidence supporting a model in which cumulative defects along this mechanistic pathway may underlie HLH.",
    "source": "pubmed_2019_2026",
    "category": "clinical"
  },
  {
    "PMID": "34857952",
    "title": "Paralog knockout profiling identifies DUSP4 and DUSP6 as a digenic dependence in MAPK pathway-driven cancers.",
    "authors": "Takahiro Ito; Michael J Young; Ruitong Li; Sidharth Jain; Andreas Wernitznig et al. (22 authors)",
    "journal": "Nature genetics",
    "year": "2021",
    "doi": "10.1038/s41588-021-00967-z",
    "abstract": "Although single-gene perturbation screens have revealed a number of new targets, vulnerabilities specific to frequently altered drivers have not been uncovered. An important question is whether the compensatory relationship between functionally redundant genes masks potential therapeutic targets in single-gene perturbation studies. To identify digenic dependencies, we developed a CRISPR paralog targeting library to investigate the viability effects of disrupting 3,284 genes, 5,065 paralog pairs and 815 paralog families. We identified that dual inactivation of DUSP4 and DUSP6 selectively impairs growth in NRAS and BRAF mutant cells through the hyperactivation of MAPK signaling. Furthermore, cells resistant to MAPK pathway therapeutics become cross-sensitized to DUSP4 and DUSP6 perturbations such that the mechanisms of resistance to the inhibitors reinforce this mechanism of vulnerability. Together, multigene perturbation technologies unveil previously unrecognized digenic vulnerabilities that may be leveraged as new therapeutic targets in cancer.",
    "source": "pubmed_2019_2026",
    "category": "clinical"
  },
  {
    "PMID": "34837689",
    "title": "PDigenic Mutations in Junctional Epidermolysis Bullosa in An Iranian Family.",
    "authors": "Kourosh Riahi; Farideh Ghanbari Mardasi; Farah Talebi; Farzad Jasemi; Javad Mohammadi Asl",
    "journal": "Cell journal",
    "year": "2021",
    "doi": "10.22074/cellj.2021.7208",
    "abstract": "In this study, we describe one Iranian patient who was diagnosed with Epidermolysis Bullosa (EB) because of mutations in three candidate genes, including 3 mutations. Two missense mutations in the LAMA3 (D3134H) and LAMB3 (Y339H) genes and also, a synonymous mutation in the ITGB4 (H422H) gene were identified that leads to the Junctional-EBHerlitz (JEB-Herlitz) clinical phenotype. The patient had a heterozygous LAMA3 mutation combined with a heterozygous mutation in LAMB3. Our results propose that these mutations produce novel protein-coding transcripts which explain the JEB-Herlitz phenotype in the patient. Interestingly, this is the first report indicating that a digenic inheritance in the LAMA3 and LAMB3 which is responsible for JEB-Herlitz. Also, this is the first digenic inheritance recognized in the JEB-Herlitz family. This study provides a new way to clarify the molecular mechanisms of LAMA3 and LAMB3 genes in JEB-Herlitz.",
    "source": "pubmed_2019_2026",
    "category": "clinical"
  },
  {
    "PMID": "34821546",
    "title": "Meckel Gruber and Joubert Syndrome Diagnosed Prenatally: Allelism between the Two Ciliopathies, Complexities of Mutation Types and Digenic Inheritance.",
    "authors": "Somya Srivastava; Rani Manisha; Aradhana Dwivedi; Harshita Agarwal; Deepti Saxena et al. (7 authors)",
    "journal": "Fetal and pediatric pathology",
    "year": "2022",
    "doi": "10.1080/15513815.2021.2007434",
    "abstract": "Background: Antenatally detected occipital encephalocele and polycystic kidneys are a common presentation of ciliopathies like Joubert syndrome and Meckel Gruber syndrome which have considerable genetic and phenotypic overlap. Case reports: We describe 3 cases of antenatally diagnosed occipital encephalocele and enlarged kidneys with fetal autopsy, histopathology & exome sequencing results. A novel nonsense variant in the CEP290 gene was reported in first case (Meckel syndrome). The second case shows the importance of fetal exome where the parents were carriers for 2 ciliopathy genes (TMEM138 & SDCCAG8). Diagnosis in this case was confirmed by fetal exome sequencing (Joubert syndrome). Multiexon deletion in TMEM67 and KIF14 present in trans was identified in the third case (Meckel syndrome), likely resulting in digenic inheritance. Conclusion: We report 2 cases of Meckel syndrome with a novel variant and multiexon deletion, and 1 case of Joubert syndrome which depicts the limitations of preconceptional carrier screening in ciliopathies due to overlapping phenotypes.",
    "source": "pubmed_2019_2026",
    "category": "clinical"
  },
  {
    "PMID": "34803902",
    "title": "Targeted Next-Generation Sequencing Indicates a Frequent Oligogenic Involvement in Primary Ovarian Insufficiency Onset.",
    "authors": "Raffaella Rossetti; Silvia Moleri; Fabiana Guizzardi; Davide Gentilini; Laura Libera et al. (10 authors)",
    "journal": "Frontiers in endocrinology",
    "year": "2021",
    "doi": "10.3389/fendo.2021.664645",
    "abstract": "Primary ovarian insufficiency (POI) is one of the major causes of female infertility associated with the premature loss of ovarian function in about 3.7% of women before the age of 40. This disorder is highly heterogeneous and can manifest with a wide range of clinical phenotypes, ranging from ovarian dysgenesis and primary amenorrhea to post-pubertal secondary amenorrhea, with elevated serum gonadotropins and hypoestrogenism. The ovarian defect still remains idiopathic in some cases; however, a strong genetic component has been demonstrated by the next-generation sequencing (NGS) approach of familiar and sporadic POI cases. As recent evidence suggested an oligogenic architecture for POI, we developed a target NGS panel with 295 genes including known candidates and novel genetic determinants potentially involved in POI pathogenesis. Sixty-four patients with early onset POI (range: 10-25 years) of our cohort have been screened with 90% of target coverage at 50\u00d7. Here, we report 48 analyzed patients with at least one genetic variant (75%) in the selected candidate genes. In particular, we found the following: 11/64 patients (17%) with two variants, 9/64 (14%) with three variants, 9/64 (14%) with four variants, 3/64 (5%) with five variants, and 2/64 (3%) with six variants. The most severe phenotypes were associated with either the major number of variations or a worse prediction in pathogenicity of variants. Bioinformatic gene ontology analysis identified the following major pathways likely affected by gene variants: 1) cell cycle, meiosis, and DNA repair; 2) extracellular matrix remodeling; 3) reproduction; 4) cell metabolism; 5) cell proliferation; 6) calcium homeostasis; 7) NOTCH signaling; 8) signal transduction; 9) WNT signaling; 10) cell death; and 11) ubiquitin modifications. Consistently, the identified pathways have been described in other studies dissecting the mechanisms of folliculogenesis in animal models of altered fertility. In conclusion, our results contribute to define POI as an oligogenic disease and suggest novel candidates to be investigated in patients with POI.",
    "source": "pubmed_2019_2026",
    "category": "clinical"
  },
  {
    "PMID": "34790974",
    "title": "A combinatorial oligogenic basis for the phenotypic plasticity between late-onset dilated and arrhythmogenic cardiomyopathy in a single family.",
    "authors": "Kimia Pourebrahim; John Garrity Marian; Yanli Tan; Jeffrey T Chang; Ali J Marian",
    "journal": "The journal of cardiovascular aging",
    "year": "2021",
    "doi": "10.20517/jca.2021.15",
    "abstract": "Primary dilated cardiomyopathy (DCM) and arrhythmogenic right ventricular cardiomyopathy (ARVC) are the two common and distinct forms of hereditary cardiomyopathies caused by defined pathogenic variants (PVs) typically in different sets of genes. DCM is characterized by left ventricular dilatation, dysfunction, and failure, whereas ARVC classically involves the right ventricle and is characterized by fibrofatty infiltration of the myocardium. DCM is caused primarily by the PVs in genes encoding sarcomere and cytoskeletal protein, while ARVC is mainly a disease of the desmosome proteins. DCM and ARVC exhibit partial phenotypic and genetic overlaps. To analyze the genetic basis of the phenotypic heterogeneity of cardiomyopathy in members of a single family. We recruited, clinically characterized, and performed whole-exome sequencing in five affected, three probably affected, and two clinically unaffected members of a single family. The family members mainly exhibited late-onset DCM associated with conduction defects and arrhythmias. One family member who died suddenly was diagnosed with the classic ARVC at autopsy and another presented with isolated ventricular tachycardia. A novel splicing (truncating) and a rare missense variant in the TTN gene, likely in cis, co-segregated with the phenotype in all affected and probably affected family members and were likely the causal variants. Several PVs and LPVs in other genes involved in cardiomyopathies and arrhythmias were also identified that seem to modify the expression of the phenotype. Notably, LPVs in the DSP and PKP2 genes, which are known genes for ARVC, were identified in the family member who also carried the TTN variants but developed the classic ARVC. The findings indicate the causal role of the TTN variants, exhibiting an age-dependent penetrance in late-onset DCM, and highlight the potential modifying role of the concomitant LPVs in additional genes on the expression of the phenotype, including a phenotypic switch from the anticipated DCM to ARVC. The findings support an oligogenic basis of the cardiac phenotype in hereditary cardiomyopathies. A comprehensive genetic analysis involving all PVs and LPVs along with detailed phenotypic characterization is necessary to gain insights into the molecular pathogenesis of hereditary cardiomyopathies.",
    "source": "pubmed_2019_2026",
    "category": "clinical"
  },
  {
    "PMID": "34755423",
    "title": "Digenic heterozygous mutations of KCNH2 and SCN5A induced young and early-onset long QT syndrome and sinoatrial node dysfunction.",
    "authors": "Zhe Yang; Yuting Ma; Jiana Huang; Jianzhong Xian; Yin Huang et al. (11 authors)",
    "journal": "Annals of noninvasive electrocardiology : the official journal of the International Society for Holter and Noninvasive Electrocardiology, Inc",
    "year": "2022",
    "doi": "10.1111/anec.12889",
    "abstract": "Long QT syndrome (LQTS) is a life-threatening inherited channelopathy, and prolonged QT intervals easily trigger malignant arrhythmias, especially torsades de pointes and ventricular fibrillation. The proband with overlapped phenotypes of LQTS and sinoatrial node dysfunction underwent some necessary examinations, including echocardiography, electrocardiogram (ECG), and Holter monitoring. Next, whole-exome sequencing was performed, and candidate genes were validated by Sanger sequencing. RNA secondary structure and protein physical-chemical parameter analyses were used to predict the possible structural change of the proteins induced by the mutations. We identified the digenic heterozygous mutations of KCNH2 p.307_308del (NM_001204798, c.921_923del) and SCN5A p.R1865H (NM_001160160, c.G5594A) in the female and young proband (II: 1) of LQTS and ventricular fibrillation with repeat syncope at rest. Subsequently, she occurred with obvious sinus arrest with persistent ventricular pacing of implantable cardioverter-defibrillator. The heterozygous SCN5Ap.R1865H was carried by her father and sister but not carried by I:2. II:1 carried with KCNH2 p.307_308del as a de novo mutation, but not existed in other family members. RNA secondary structure of KCNH2 p.307_308del showed a false regional double helix, and its amino acids' hydrophobicity was significantly weakened. For the Nav 1.5 protein property, SCN5A p.R1865H slightly increased the molecular weight and aliphatic index but reduced the instability index. The digenic heterozygous KCNH2 and SCN5A mutations were associated with young early-onset long QT syndrome and sinoatrial node dysfunction.",
    "source": "pubmed_2019_2026",
    "category": "clinical"
  },
  {
    "PMID": "34691137",
    "title": "Multiallelic Rare Variants in BBS Genes Support an Oligogenic Ciliopathy in a Non-obese Juvenile-Onset Syndromic Diabetic Patient: A Case Report.",
    "authors": "Hamza Dallali; Nadia Kheriji; Wafa Kammoun; Mehdi Mrad; Manel Soltani et al. (13 authors)",
    "journal": "Frontiers in genetics",
    "year": "2021",
    "doi": "10.3389/fgene.2021.664963",
    "abstract": "Juvenile-onset diabetes may occur in the context of a rare syndromic presentation, suggesting a monogenic etiology rather than a common multifactorial diabetes. In the present study, we report the case of a young diabetic Tunisian patient presenting learning problems, speech deficits, short stature, brachydactyly, and a normal weight. Whole exome sequencing analysis revealed five heterozygous genetic variants in BBS1, BBS4, BBS8, MKS1, and CEP290. These genes are involved in the regulation of cilium biogenesis and function. We analyzed variant combinations pathogenicity using the recently developed ORVAL tool, and we hypothesized that cumulative synergetic effects of these variants could explain the syndromic phenotype observed in our patient. Therefore, our investigation suggested a genetic diagnosis of Bardet-Biedl syndrome with an oligogenic inheritance pattern rather than a monogenic diabetes. Although there is no curative therapy for this ciliopathy at the moment, a genetic diagnosis may offer other supportive care options, including the prevention of other possible clinical manifestations of this syndrome, mainly renal abnormalities, obesity, liver fibrosis, and hypertension, as well as the genetic counseling for family members.",
    "source": "pubmed_2019_2026",
    "category": "clinical"
  },
  {
    "PMID": "34656527",
    "title": "Digenic Inheritance of a FOXC2 Mutation and Two PIEZO1 Mutations Underlies Congenital Lymphedema in a Multigeneration Family.",
    "authors": "Debbie J Mustacich; Li-Wen Lai; Michael J Bernas; Jazmine A Jones; Reginald J Myles et al. (10 authors)",
    "journal": "The American journal of medicine",
    "year": "2022",
    "doi": "10.1016/j.amjmed.2021.09.007",
    "abstract": "The lymphatic system is essential for maintaining the balance of interstitial fluid in tissues and for returning protein-rich fluids (lymph) to the bloodstream. Congenital lymphatic defects lead to accumulation of lymph in peripheral tissues and body cavities, termed primary lymphedema. To date, only a limited number of individual genes have been identified in association with primary lymphedema. However, variability of age of onset and severity of lymphatic abnormalities within some families suggests that multiple mutations or genes may be responsible, thus hampering efforts to identify individual associated genes. Whole exome sequencing (WES) was performed in 4 members of a large multigeneration family with highly variable lymphedema and followed by Sanger sequencing for identified mutations in 34 additional family members. Genotypes were correlated with clinical and lymphangioscintigraphic phenotypes. WES uncovered 2 different mechanotransducer PIEZO1 mutations and one FOXC2 transcription factor mutation in various combinations. Sanger sequencing confirmed the presence/absence of the 3 variants in affected and unaffected family members and co-segregation of one or more variants with disease. Genetic profiles did not clearly correlate with the highly variable severity of lymphatic abnormalities. WES in lymphedema families can uncover unexpected combinations of several lymphedema-associated mutations. These findings provide essential information for genetic counseling and reveal complex gene interactions in lymphatic developmental pathways. These can offer insights into the complex spectrum of clinical and lymphatic lymphedema phenotypes and potential targets for treatment.",
    "source": "pubmed_2019_2026",
    "category": "clinical"
  },
  {
    "PMID": "34617677",
    "title": "Grass pea natural variation reveals oligogenic resistance to Fusarium oxysporum f. sp. pisi.",
    "authors": "Ana Margarida Sampaio; Mara Lisa Alves; Priscila Pereira; Ehsan Valiollahi; Carmen Santos et al. (10 authors)",
    "journal": "The plant genome",
    "year": "2021",
    "doi": "10.1002/tpg2.20154",
    "abstract": "Grass pea (Lathyrus sativus L.) is an annual legume species, phylogenetically close to pea (Pisum sativum L.), that may be infected by Fusarium oxysporum f. sp. pisi (Fop), the causal agent of fusarium wilt in peas with vast worldwide yield losses. A range of responses varying from high resistance to susceptibility to this pathogen has been reported in grass pea germplasm. Nevertheless, the genetic basis of that diversity of responses is still unknown, hampering its breeding exploitation. To identify genomic regions controlling grass pea resistance to fusarium wilt, a genome-wide association study approach was applied on a grass pea worldwide collection of accessions inoculated with Fop race 2. Disease responses were scored in this collection that was also subjected to high-throughput based single nucleotide polymorphisms (SNP) screening through genotyping-by-sequencing. A total of 5,651 high-quality SNPs were considered for association mapping analysis, performed using mixed linear models accounting for population structure. Because of the absence of a fully assembled grass pea reference genome, SNP markers' genomic positions were retrieved from the pea's reference genome v1a. In total, 17 genomic regions were associated with three fusarium wilt response traits in grass pea, anticipating an oligogenic control. Seven of these regions were located on pea chromosomes 1, 6, and 7. The candidate genes underlying these regions were putatively involved in secondary and amino acid metabolism, RNA (regulation of transcription), transport, and development. This study revealed important fusarium wilt resistance favorable grass pea SNP alleles, allowing the development of molecular tools for precision disease resistance breeding.",
    "source": "pubmed_2019_2026",
    "category": "tools"
  },
  {
    "PMID": "34539727",
    "title": "Oligogenic Inheritance Underlying Incomplete Penetrance of PROKR2 Mutations in Hypogonadotropic Hypogonadism.",
    "authors": "Rahma Mkaouar; Lamia Cherif Ben Abdallah; Chokri Naouali; Saida Lahbib; Zinet Turki et al. (12 authors)",
    "journal": "Frontiers in genetics",
    "year": "2021",
    "doi": "10.3389/fgene.2021.665174",
    "abstract": "The role of the prokineticin 2 pathway in human reproduction, olfactory bulb morphogenesis, and gonadotropin-releasing hormone secretion is well established. Recent studies have highlighted the implication of di/oligogenic inheritance in this disorder. In the present study, we aimed to identify the genetic mechanisms that could explain incomplete penetrance in hypogonadotropic hypogonadism (HH). This study involved two unrelated Tunisian patients with HH, which was triggered by identifying a homozygous p.(Pro290Ser) mutation in the PROKR2 gene in a girl (HH1) with Kallmann syndrome (KS). The functional effect of this variant has previously been well demonstrated. Unexpectedly, her unaffected father (HH1P) and brother (HH1F) also carried this genetic variation at a homozygous state. In the second family, we identified a heterozygous p.(Lys205del) mutation in PROKR2, both in a male patient with normosmic idiopathic IHH (HH12) and his asymptomatic mother. Whole-exome sequencing in the three HH1 family members allowed the identification of additional variants in the prioritized genes. We then carried out digenic combination predictions using the oligogenic resource for variant analysis (ORVAL) software. For HH1, we found the highest number of disease-causing variant pairs. Notably, a CCDC141 variant (c.2803C > T) was involved in 18 pathogenic digenic combinations. The CCDC141 variant acts in an autosomal recessive inheritance mode, based on the digenic effect prediction data. For the second patient (HH12), prediction by ORVAL allowed the identification of an interesting pathogenic digenic combination between DUSP6 and SEMA7A genes, predicted as \"dual molecular diagnosis.\" The SEMA7A variant p.(Glu436Lys) is novel and predicted as a VUS by Varsome. Sanger validation revealed the absence of this variant in the healthy mother. We hypothesize that disease expression in HH12 could be induced by the digenic transmission of the SEMA7A and DUSP6 variants or a monogenic inheritance involving only the SEMA7A VUS if further functional assays allow its reclassification into pathogenic. Our findings confirm that homozygous loss-of-function genetic variations are insufficient to cause KS, and that oligogenism is most likely the main transmission mode involved in Congenital Hypogonadotropic Hypogonadism.",
    "source": "pubmed_2019_2026",
    "category": "clinical"
  },
  {
    "PMID": "34537773",
    "title": "Oligogenic Causes of Human Differences of Sex Development: Facing the Challenge of Genetic Complexity.",
    "authors": "Chrysanthi Kouri; Grit Sommer; Christa E Fl\u00fcck",
    "journal": "Hormone research in paediatrics",
    "year": "2023",
    "doi": "10.1159/000519691",
    "abstract": "Deviations of intrauterine sex determination and differentiation and postnatal sex development can result in a very heterogeneous group of differences of sex development (DSD) with a broad spectrum of phenotypes. Variants in genes involved in sexual development cause different types of DSD, but predicting the phenotype from an individual's genotype and vice versa remains challenging. Next Generation Sequencing (NGS) studies suggested that oligogenic inheritance contributes to the broad manifestation of DSD phenotypes. This review will focus on possible oligogenic inheritance in DSD identified by NGS studies with a special emphasis on NR5A1variants as an example of oligogenic origin associated with a broad range of DSD phenotypes. We thoroughly searched the literature for evidence regarding oligogenic inheritance in DSD diagnosis with NGS technology and describe the challenges to interpret contribution of these genes to DSD phenotypic variability and pathogenicity. Variants in common DSD genes like androgen receptor (AR), mitogen-activated protein kinase kinase kinase 1 (MAP3K1), Hydroxy-Delta-5-Steroid Dehydrogenase 3 Beta- And Steroid Delta-Isomerase 2 (HSD3B2), GATA Binding Protein 4 (GATA4), zinc finger protein friend of GATA family member 2 (ZFPM2), 17b-hydroxysteroid dehydrogenase type 3 (HSD17B3), mastermind-like domain-containing protein 1 (MAMLD1), and nuclear receptor subfamily 5 group A member 1 (NR5A1) have been detected in combination with additional variants in related genes in DSD patients with a broad range of phenotypes, implying a role of oligogenic inheritance in DSD, while still awaiting proof. Use of NGS approach for genetic diagnosis of DSD patients can reveal more complex genetic traits supporting the concept of oligogenic cause of DSD. However, assessing the pathomechanistic contribution of multiple gene variants on a DSD phenotype remains an unsolved conundrum.",
    "source": "pubmed_2019_2026",
    "category": "clinical"
  },
  {
    "PMID": "34529933",
    "title": "Identifying digenic disease genes via machine learning in the Undiagnosed Diseases Network.",
    "authors": "Souhrid Mukherjee; Joy D Cogan; John H Newman; John A Phillips; Rizwan Hamid et al. (7 authors)",
    "journal": "American journal of human genetics",
    "year": "2021",
    "doi": "10.1016/j.ajhg.2021.08.010",
    "abstract": "Rare diseases affect millions of people worldwide, and discovering their genetic causes is challenging. More than half of the individuals analyzed by the Undiagnosed Diseases Network (UDN) remain undiagnosed. The central hypothesis of this work is that many of these rare genetic disorders are caused by multiple variants in more than one gene. However, given the large number of variants in each individual genome, experimentally evaluating combinations of variants for potential to cause disease is currently infeasible. To address this challenge, we developed the digenic predictor (DiGePred), a random forest classifier for identifying candidate digenic disease gene pairs by features derived from biological networks, genomics, evolutionary history, and functional annotations. We trained the DiGePred classifier by using DIDA, the largest available database of known digenic-disease-causing gene pairs, and several sets of non-digenic gene pairs, including variant pairs derived from unaffected relatives of UDN individuals. DiGePred achieved high precision and recall in cross-validation and on a held-out test set (PR area under the curve > 77%), and we further demonstrate its utility by using digenic pairs from the recent literature. In contrast to other approaches, DiGePred also appropriately controls the number of false positives when applied in realistic clinical settings. Finally, to enable the rapid screening of variant gene pairs for digenic disease potential, we freely provide the predictions of DiGePred on all human gene pairs. Our work enables the discovery of genetic causes for rare non-monogenic diseases by providing a means to rapidly evaluate variant gene pairs for the potential to cause digenic disease.",
    "source": "pubmed_2019_2026",
    "category": "tools"
  },
  {
    "PMID": "34456971",
    "title": "Case Report: Expanding the Digenic Variants Involved in Thyroid Hormone Synthesis-10 New Cases of Congenital Hypothyroidism and a Literature Review.",
    "authors": "Rulai Yang; Yijun Lu; Chenxi Yang; Xiaoyu Wu; Junqi Feng et al. (8 authors)",
    "journal": "Frontiers in genetics",
    "year": "2021",
    "doi": "10.3389/fgene.2021.694683",
    "abstract": "Congenital hypothyroidism (CH) is the most common neonatal metabolic disorder. Although it has been understood to be a monogenic disease, some CH patients are reported to carry two or more variants at different genes. Here, ten permanent congenital hypothyroidism (PCH) patients were retrospectively reviewed, with elevated levels of serum thyroid-stimulating hormone and levothyroxine dependence during follow-up between 2015 and 2019. Each affected individual carried digenic variants, which were heterozygous at two of pathogenic genes. In total, five pathogenic genes, TSHR, TG, TPO, DUOX2 and DUOXA2, were simultaneously identified in subjects that were involved in the same metabolic pathway: thyroid hormone biosynthesis. There were digenic variants at TSHR and DUOX2 combined in three patients, DUOX2 and TG combined in two patients, DUOX2 and DUOXA2 combined in two patients, TG and DUOXA2 combined in two patients, and TG and TPO combined in one patient. Additionally, seven novel variants, TSHR c.679G>A, DUOX2 c.127A>T, c.608-619del, c.959T>C, TG c.2307G>A, and c.6759_6765del, and DUOXA2 c.93T>G, were identified in these PCH patients. Along with a literature review on digenic variants in patients with CH, our findings illustrated the complexity of genetic etiology in CH.",
    "source": "pubmed_2019_2026",
    "category": "clinical"
  },
  {
    "PMID": "34440333",
    "title": "Genotype Pattern Mining for Pairs of Interacting Variants Underlying Digenic Traits.",
    "authors": "Atsuko Okazaki; Sukanya Horpaopan; Qingrun Zhang; Matthew Randesi; Jurg Ott",
    "journal": "Genes",
    "year": "2021",
    "doi": "10.3390/genes12081160",
    "abstract": "Some genetic diseases (\"digenic traits\") are due to the interaction between two DNA variants, which presumably reflects biochemical interactions. For example, certain forms of Retinitis Pigmentosa, a type of blindness, occur in the presence of two mutant variants, one each in the ROM1 and RDS genes, while the occurrence of only one such variant results in a normal phenotype. Detecting variant pairs underlying digenic traits by standard genetic methods is difficult and is downright impossible when individual variants alone have minimal effects. Frequent pattern mining (FPM) methods are known to detect patterns of items. We make use of FPM approaches to find pairs of genotypes (from different variants) that can discriminate between cases and controls. Our method is based on genotype patterns of length two, and permutation testing allows assigning p-values to genotype patterns, where the null hypothesis refers to equal pattern frequencies in cases and controls. We compare different interaction search approaches and their properties on the basis of published datasets. Our implementation of FPM to case-control studies is freely available.",
    "source": "pubmed_2019_2026",
    "category": "clinical"
  },
  {
    "PMID": "34202200",
    "title": "NGS Analysis Revealed Digenic Heterozygous GCK and HNF1A Variants in a Child with Mild Hyperglycemia: A Case Report.",
    "authors": "Fernanda Iafusco; Giovanna Maione; Cristina Mazzaccara; Francesca Di Candia; Enza Mozzillo et al. (7 authors)",
    "journal": "Diagnostics (Basel, Switzerland)",
    "year": "2021",
    "doi": "10.3390/diagnostics11071164",
    "abstract": "Monogenic diabetes (MD) represents a heterogeneous group of disorders whose most frequent form is maturity-onset diabetes of the young (MODY). MD is predominantly caused by a mutation in a single gene. We report a case of a female patient with suspected MD and a positive family history for diabetes and obesity. In this patient, two gene variants have been identified by next-generation sequencing (NGS): one in the Glucokinase (GCK) gene reported in the Human Gene Mutation Database (HGMD) and in the literature associated with GCK/MODY, and the other in the hepatocyte nuclear factor 1A (HNF1A) gene not previously described. The GCK variant was also identified in the hyperglycemic father, whereas the HNF1A variant was present in the mother. This new case of digenic GCK/HNF1A variants identified in a hyperglycemic subject, evidences the importance of NGS analysis in patients with suspected MD. In fact, this methodology will allow us to both increase the number of diagnoses and to identify mutations in more than one gene, with a better understanding of the genetic cause, and the clinical course, of the disease.",
    "source": "pubmed_2019_2026",
    "category": "clinical"
  },
  {
    "PMID": "34194391",
    "title": "Evidence That Non-Syndromic Familial Tall Stature Has an Oligogenic Origin Including Ciliary Genes.",
    "authors": "Birgit Weiss; Birgit Eberle; Ralph Roeth; Christiaan de Bruin; Julian C Lui et al. (11 authors)",
    "journal": "Frontiers in endocrinology",
    "year": "2021",
    "doi": "10.3389/fendo.2021.660731",
    "abstract": "Human growth is a complex trait. A considerable number of gene defects have been shown to cause short stature, but there are only few examples of genetic causes of non-syndromic tall stature. Besides rare variants with large effects and common risk alleles with small effect size, oligogenic effects may contribute to this phenotype. Exome sequencing was carried out in a tall male (height 3.5 SDS) and his parents. Filtered damaging variants with high CADD scores were validated by Sanger sequencing in the trio and three other affected and one unaffected family members. Network analysis was carried out to assess links between the candidate genes, and the transcriptome of murine growth plate was analyzed by microarray as well as RNA Seq. Heterozygous gene variants in CEP104, CROCC, NEK1, TOM1L2, and TSTD2 predicted as damaging were found to be shared between the four tall family members. Three of the five genes (CEP104, CROCC, and NEK1) belong to the ciliary gene family. All genes are expressed in mouse growth plate. Pathway and network analyses indicated close functional connections. Together, these data expand the spectrum of genes with a role in linear growth and tall stature phenotypes.",
    "source": "pubmed_2019_2026",
    "category": "clinical"
  },
  {
    "PMID": "34161864",
    "title": "A case of digenic maturity onset diabetes of the young with heterozygous variants in both HNF1\u0391 and HNF1\u0392 genes.",
    "authors": "Konstantina Patouni; Ondrej Cinek; Stepanka Pruhova; Lenka Elblova; Maria Xatzipsalti et al. (7 authors)",
    "journal": "European journal of medical genetics",
    "year": "2021",
    "doi": "10.1016/j.ejmg.2021.104264",
    "abstract": "Maturity onset diabetes of the young (MODY) is the most commonly reported form of monogenic diabetes in the pediatric population. Only a few cases of digenic MODY have been reported up to now. A female patient was diagnosed with diabetes at the age of 7 years and was treated with insulin. A strong family history of diabetes was present in the maternal side of the family. The patient also presented hypomagnesemia, glomerulocystic kidney disease and a bicornuate uterus. Genetic testing of the patient revealed that she was a double heterozygous carrier of HNF1A gene variant c.685C\u00a0>\u00a0T; (p.Arg229Ter) and a whole gene deletion of the HNF1B gene. Her mother was a carrier of the same HNF1A variant. Digenic inheritance of MODY pathogenic variants is probably more common than currently reported in literature. The use of Next Generation Sequencing panels in testing strategies for MODY could unmask such cases that would otherwise remain undiagnosed.",
    "source": "pubmed_2019_2026",
    "category": "clinical"
  },
  {
    "PMID": "34149817",
    "title": "Oligogenic Inheritance of Monoallelic TRIP11, FKBP10, NEK1, TBX5, and NBAS Variants Leading to a Phenotype Similar to Odontochondrodysplasia.",
    "authors": "Alice Costantini; Helena Valta; Anne-Maarit Suomi; Outi M\u00e4kitie; Fulya Taylan",
    "journal": "Frontiers in genetics",
    "year": "2021",
    "doi": "10.3389/fgene.2021.680838",
    "abstract": "Skeletal dysplasias are often well characterized, and only a minority of the cases remain unsolved after a thorough analysis of pathogenic variants in over 400 genes that are presently known to cause monogenic skeletal diseases. Here, we describe an 11-year-old Finnish girl, born to unrelated healthy parents, who had severe short stature and a phenotype similar to odontochondrodysplasia (ODCD), a monogenic skeletal dysplasia caused by biallelic TRIP11 variants. The family had previously lost a fetus due to severe skeletal dysplasia. Exome sequencing and bioinformatic analysis revealed an oligogenic inheritance of a heterozygous nonsense mutation in TRIP11 and four likely pathogenic missense variants in FKBP10, TBX5, NEK1, and NBAS in the index patient. Interestingly, all these genes except TBX5 are known to cause skeletal dysplasia in an autosomal recessive manner. In contrast, the fetus was found homozygous for the TRIP11 mutation, and achondrogenesis type IA diagnosis was, thus, molecularly confirmed, indicating two different skeletal dysplasia forms in the family. To the best of our knowledge, this is the first report of an oligogenic inheritance model of a skeletal dysplasia in a Finnish family. Our findings may have implications for genetic counseling and for understanding the yet unsolved cases of rare skeletal dysplasias.",
    "source": "pubmed_2019_2026",
    "category": "clinical"
  },
  {
    "PMID": "34062169",
    "title": "Genetics of hypogonadotropic Hypogonadism-Human and mouse genes, inheritance, oligogenicity, and genetic counseling.",
    "authors": "Erica D Louden; Alexandra Poch; Hyung-Goo Kim; Afif Ben-Mahmoud; Soo-Hyun Kim et al. (6 authors)",
    "journal": "Molecular and cellular endocrinology",
    "year": "2021",
    "doi": "10.1016/j.mce.2021.111334",
    "abstract": "Hypogonadotropic hypogonadism, which may be normosmic (nHH) or anosmic/hyposmic, known as Kallmann syndrome (KS), is due to gonadotropin-releasing hormone deficiency, which results in absent puberty and infertility. Investigation of the genetic basis of nHH/KS over the past 35 years has yielded a substantial increase in our understanding, as variants in 44 genes in OMIM account for ~50% of cases. The first genes for KS (ANOS1) and nHH (GNRHR) were followed by the discovery that FGFR1 variants may cause either nHH or KS. Associated anomalies include midline facial defects, neurologic deficits, cardiac anomalies, and renal agenesis, among others. Mouse models for all but one gene (ANOS1) generally support findings in humans. About half of the known genes implicated in nHH/KS are inherited as autosomal dominant and half are autosomal recessive, whereas only 7% are X-linked recessive. Digenic and oligogenic inheritance has been reported in 2-20% of patients, most commonly with variants in genes that may result in either nHH or KS inherited in an autosomal dominant fashion. In vitro analyses have only been conducted for both gene variants in eight cases and for one gene variant in 20 cases. Rigorous confirmation that two gene variants in the same individual cause the nHH/KS phenotype is lacking for most. Clinical diagnosis is probably best accomplished by targeted next generation sequencing of the known candidate genes with confirmation by Sanger sequencing. Elucidation of the genetic basis of nHH/KS has resulted in an enhanced understanding of this disorder, as well as normal puberty, which makes genetic diagnosis clinically relevant.",
    "source": "pubmed_2019_2026",
    "category": "clinical"
  },
  {
    "PMID": "34058974",
    "title": "Characterizing the oligogenic architecture of plant growth phenotypes informs genomic selection approaches in a common wheat population.",
    "authors": "Noah DeWitt; Mohammed Guedira; Edwin Lauer; J Paul Murphy; David Marshall et al. (9 authors)",
    "journal": "BMC genomics",
    "year": "2021",
    "doi": "10.1186/s12864-021-07574-6",
    "abstract": "Genetic variation in growth over the course of the season is a major source of grain yield variation in wheat, and for this reason variants controlling heading date and plant height are among the best-characterized in wheat genetics. While the major variants for these traits have been cloned, the importance of these variants in contributing to genetic variation for plant growth over time is not fully understood. Here we develop a biparental population segregating for major variants for both plant height and flowering time to characterize the genetic architecture of the traits and identify additional novel QTL. We find that additive genetic variation for both traits is almost entirely associated with major and moderate-effect QTL, including four novel heading date QTL and four novel plant height QTL. FT2 and Vrn-A3 are proposed as candidate genes underlying QTL on chromosomes 3A and 7A, while Rht8 is mapped to chromosome 2D. These mapped QTL also underlie genetic variation in a longitudinal analysis of plant growth over time. The oligogenic architecture of these traits is further demonstrated by the superior trait prediction accuracy of QTL-based prediction models compared to polygenic genomic selection models. In a population constructed from two modern wheat cultivars adapted to the southeast U.S., almost all additive genetic variation in plant growth traits is associated with known major variants or novel moderate-effect QTL. Major transgressive segregation was observed in this population despite the similar plant height and heading date characters of the parental lines. This segregation is being driven primarily by a small number of mapped QTL, instead of by many small-effect, undetected QTL. As most breeding populations in the southeast U.S. segregate for known QTL for these traits, genetic variation in plant height and heading date in these populations likely emerges from similar combinations of major and moderate effect QTL. We can make more accurate and cost-effective prediction models by targeted genotyping of key SNPs.",
    "source": "pubmed_2019_2026",
    "category": "tools"
  },
  {
    "PMID": "34040631",
    "title": "Digenic Inheritance and Gene-Environment Interaction in a Patient With Hypertriglyceridemia and Acute Pancreatitis.",
    "authors": "Qi Yang; Na Pu; Xiao-Yao Li; Xiao-Lei Shi; Wei-Wei Chen et al. (15 authors)",
    "journal": "Frontiers in genetics",
    "year": "2021",
    "doi": "10.3389/fgene.2021.640859",
    "abstract": "The etiology of hypertriglyceridemia (HTG) and acute pancreatitis (AP) is complex. Herein, we dissected the underlying etiology in a patient with HTG and AP. The patient had a 20-year history of heavy alcohol consumption and an 8-year history of mild HTG. He was hospitalized for alcohol-triggered AP, with a plasma triglyceride (TG) level up to 21.4 mmol/L. A temporary rise in post-heparin LPL concentration (1.5-2.5 times of controls) was noted during the early days of AP whilst LPL activity was consistently low (50\u223c70% of controls). His TG level rapidly decreased to normal in response to treatment, and remained normal to borderline high during a \u223c3-year follow-up period during which he had abstained completely from alcohol. Sequencing of the five primary HTG genes (i.e., LPL, APOC2, APOA5, GPIHBP1 and LMF1) identified two heterozygous variants. One was the common APOA5 c.553G > T (p.Gly185Cys) variant, which has been previously associated with altered TG levels as well as HTG-induced acute pancreatitis (HTG-AP). The other was a rare variant in the LPL gene, c.756T > G (p.Ile252Met), which was predicted to be likely pathogenic and found experimentally to cause a 40% loss of LPL activity without affecting either protein synthesis or secretion. We provide evidence that both a gene-gene interaction (between the common APOA5 variant and the rare LPL variant) and a gene-environment interaction (between alcohol and digenic inheritance) might have contributed to the development of mild HTG and alcohol-triggered AP in the patient, thereby improving our understanding of the complex etiology of HTG and HTG-AP.",
    "source": "pubmed_2019_2026",
    "category": "clinical"
  },

    "abstract": "Limb-girdle muscular dystrophies (LGMD) are hereditary genetic disorders characterized by progressive muscle impairment which predominantly include proximal muscle weaknesses in the pelvic and shoulder girdles. This article describes an attempt to identify genetic cause(s) for a LGMD pedigree via a combination of whole exome sequencing and Sanger sequencing. Digenic variants, the titin gene (TTN) c.19481T>G (p.Leu6494Arg) and the trafficking protein particle complex 11 gene (TRAPPC11) c.3092C>G (p.Pro1031Arg), co-segregated with the disease phenotype in the family, suggesting their possible pathogenicity.",

  {
    "PMID": "33642439",
    "title": "A Resuscitated Case of Acute Myocardial Infarction with both Familial Hypercholesterolemia Phenotype Caused by Possibly Oligogenic Variants of the PCSK9 and ABCG5 Genes and Type I CD36 Deficiency.",
    "authors": "Ryo Nishikawa; Masato Furuhashi; Mika Hori; Masatsune Ogura; Mariko Harada-Shiba et al. (13 authors)",
    "journal": "Journal of atherosclerosis and thrombosis",
    "year": "2022",
    "doi": "10.5551/jat.58909",
    "abstract": "A 56-year-old postmenopausal woman with out-of-hospital cardiac arrest caused by acute myocardial infraction was successfully resuscitated by intensive treatments and recovered without any neurological disability. She was diagnosed as having familial hypercholesterolemia (FH) based on a markedly elevated low-density lipoprotein cholesterol (LDL-C) level and family history of premature coronary artery disease. Genetic testing in her family members showed that a variant of the proprotein convertase subtilisin/kexin type 9 (PCSK9) gene (c.2004C\uff1eA, p.S668R), which had been previously reported as having uncertain significance, was associated with FH, indicating that the variant is a potential candidate for the FH phenotype. Next-generation sequencing analysis for the proband also showed that there was a heterozygous mutation of the ATP-binding cassette sub-family G member 5 ( ABCG5) gene (c.1166G\uff1eA, R389H), which has been reported to increase LDL-C level and the risk of cardiovascular disease. She was also diagnosed as having type 1 CD36 deficiency based on a lack of myocardial uptake of 123I-labeled 15-(p-iodophenyl)-3-R,S-methyl-pentadecanoic acid in scintigraphy and the absence of CD36 antigen in both monocytes and platelets in flow cytometry. She had a homozygous mutation of the CD36 gene (c.1126-5_1127delTTTAGAT), which occurs in a canonical splice site (acceptor) and is predicted to disrupt or distort the normal gene product. To our knowledge, this is the first report of a heterozygous FH phenotype caused by possibly oligogenic variants of the PCSK9 and ABCG5 genes complicated with type I CD36 deficiency caused by a novel homozygous mutation. Both FH phenotype and CD36 deficiency might have caused extensive atherosclerosis, leading to acute myocardial infarction in the present case.",

    "authors": "Bindu I Somarajan; Shikha Gupta; Karthikeyan Mahalingam; Kishan Azmira; Viney Gupta",
    "journal": "Journal of pediatric genetics",
    "year": "2023",
    "doi": "10.1055/s-0040-1722213",
    "abstract": "Juvenile open-angle glaucoma (JOAG) is an uncommon subset of primary glaucoma with an onset before the age of 40 years. In this case report, we describe the cosegregation of MYOC , p.Pro370Leu and LTBP2 , p.Pro432Leu mutations in a family with JOAG. The family with autosomal dominant JOAG belonged to Northern India. The samples of proband and her parents were evaluated by whole exome sequencing. Sanger sequencing was conducted in all the study participants to check the mutations identified. Both MYOC and LTBP2 mutations were found to cosegregate in affected individuals leading to a severe JOAG phenotype, thereby suggesting a digenic inheritance of MYOC with LTBP2 in this family.",

  {
    "PMID": "33400704",
    "title": "Quantile regression in genomic selection for oligogenic traits in autogamous plants: A simulation study.",
    "authors": "Gabriela Fran\u00e7a Oliveira; Ana Carolina Campana Nascimento; Moys\u00e9s Nascimento; Isabela de Castro Sant'Anna; Juan Vicente Romero et al. (8 authors)",
    "journal": "PloS one",
    "year": "2021",
    "doi": "10.1371/journal.pone.0243666",
    "abstract": "This study assessed the efficiency of Genomic selection (GS) or genome-wide selection (GWS), based on Regularized Quantile Regression (RQR), in the selection of genotypes to breed autogamous plant populations with oligogenic traits. To this end, simulated data of an F2 population were used, with traits with different heritability levels (0.10, 0.20 and 0.40), controlled by four genes. The generations were advanced (up to F6) at two selection intensities (10% and 20%). The genomic genetic value was computed by RQR for different quantiles (0.10, 0.50 and 0.90), and by the traditional GWS methods, specifically RR-BLUP and BLASSO. A second objective was to find the statistical methodology that allows the fastest fixation of favorable alleles. In general, the results of the RQR model were better than or equal to those of traditional GWS methodologies, achieving the fixation of favorable alleles in most of the evaluated scenarios. At a heritability level of 0.40 and a selection intensity of 10%, RQR (0.50) was the only methodology that fixed the alleles quickly, i.e., in the fourth generation. Thus, it was concluded that the application of RQR in plant breeding, to simulated autogamous plant populations with oligogenic traits, could reduce time and consequently costs, due to the reduction of selfing generations to fix alleles in the evaluated scenarios.",
    "source": "pubmed_2019_2026",

  {
    "PMID": "36612224",
    "title": "Large Cancer Pedigree Involving Multiple Cancer Genes including Likely Digenic MSH2 and MSH6 Lynch Syndrome (LS) and an Instance of Recombinational Rescue from LS.",
    "authors": "Ingrid P Vogelaar; Stephanie Greer; Fan Wang; GiWon Shin; Billy Lau et al. (18 authors)",
    "journal": "Cancers",
    "year": "2022",
    "doi": "10.3390/cancers15010228",
    "abstract": "Lynch syndrome (LS), caused by heterozygous pathogenic variants affecting one of the mismatch repair (MMR) genes (MSH2, MLH1, MSH6, PMS2), confers moderate to high risks for colorectal, endometrial, and other cancers. We describe a four-generation, 13-branched pedigree in which multiple LS branches carry the MSH2 pathogenic variant c.2006G>T (p.Gly669Val), one branch has this and an additional novel MSH6 variant c.3936_4001+8dup (intronic), and other non-LS branches carry variants within other cancer-relevant genes (NBN, MC1R, PTPRJ). Both MSH2 c.2006G>T and MSH6 c.3936_4001+8dup caused aberrant RNA splicing in carriers, including out-of-frame exon-skipping, providing functional evidence of their pathogenicity. MSH2 and MSH6 are co-located on Chr2p21, but the two variants segregated independently (mapped in trans) within the digenic branch, with carriers of either or both variants. Thus, MSH2 c.2006G>T and MSH6 c.3936_4001+8dup independently confer LS with differing cancer risks among family members in the same branch. Carriers of both variants have near 100% risk of transmitting either one to offspring. Nevertheless, a female carrier of both variants did not transmit either to one son, due to a germline recombination within the intervening region. Genetic diagnosis, risk stratification, and counseling for cancer and inheritance were highly individualized in this family. The finding of multiple cancer-associated variants in this pedigree illustrates a need to consider offering multicancer gene panel testing, as opposed to targeted cascade testing, as additional cancer variants may be uncovered in relatives.",
    "source": "pubmed_2019_2026",
    "category": "clinical"
  },
  {
    "PMID": "36578772",
    "title": "Toward reporting standards for the pathogenicity of variant combinations involved in multilocus/oligogenic diseases.",
    "authors": "Sofia Papadimitriou; Barbara Gravel; Charlotte Nachtegael; Elfride De Baere; Bart Loeys et al. (8 authors)",
    "journal": "HGG advances",
    "year": "2023",
    "doi": "10.1016/j.xhgg.2022.100165",
    "abstract": "Although standards and guidelines for the interpretation of variants identified in genes that cause Mendelian disorders have been developed, this is not the case for more complex genetic models including variant combinations in multiple genes. During a large curation process conducted on 318 research articles presenting oligogenic variant combinations, we encountered several recurring issues concerning their proper reporting and pathogenicity assessment. These mainly concern the absence of strong evidence that refutes a monogenic model and the lack of a proper genetic and functional assessment of the joint effect of the involved variants. With the increasing accumulation of such cases, it has become essential to develop standards and guidelines on how these oligogenic/multilocus variant combinations should be interpreted, validated, and reported in order to provide high-quality data and supporting evidence to the scientific community.",
    "source": "pubmed_2019_2026",
    "category": "clinical"
  },
  {
    "PMID": "36476347",
    "title": "Spinocerebellar ataxia type 17-digenic TBP/STUB1 disease: neuropathologic features of an autopsied patient.",
    "authors": "Rie Saito; Yui Tada; Daisuke Oikawa; Yusuke Sato; Makiko Seto et al. (14 authors)",
    "journal": "Acta neuropathologica communications",
    "year": "2022",
    "doi": "10.1186/s40478-022-01486-6",
    "abstract": "Spinocerebellar ataxia (SCA) type 17-digenic TBP/STUB1 disease (SCA17-DI) has been recently segregated from SCA17, caused by digenic inheritance of two gene mutations - intermediate polyglutamine-encoding CAG/CAA repeat expansions (polyQ) in TBP (TBP41\u2009-\u200949) and STUB1 heterozygosity - the former being associated with SCA17, and the latter with SCA48 and SCAR16 (autosomal recessive). In SCA17, most patients carry intermediate TBP41\u2009-\u200949 alleles but show incomplete penetrance, and the missing heritability can be explained by a new entity whereby TBP41\u2009-\u200949 requires the STUB1 variant to be symptomatic. The STUB1 gene encodes the chaperone-associated E3 ubiquitin ligase (CHIP) involved in ubiquitin-mediated proteasomal control of protein homeostasis. However, reports of the neuropathology are limited and role of STUB1 mutations in SCA17-DI remain unknown. Here we report the clinicopathologic features of identical twin siblings, one of whom was autopsied and was found to carry an intermediate allele (41 and 38 CAG/CAA repeats) in TBP and a heterozygous missense mutation in STUB1 (p.P243L). These patients developed autosomal recessive Huntington's disease-like symptoms. Brain MRI showed diffuse atrophy of the cerebellum and T2WI revealed hyperintense lesions in the basal ganglia and periventricular deep white matter. The brain histopathology of the patient shared features characteristic of SCA17, such as degeneration of the cerebellar cortex and caudate nucleus, and presence of 1C2-positive neurons. Here we show that mutant CHIP fails to generate the polyubiquitin chain due to disrupted folding of the entire U box domain, thereby affecting the E3 activity of CHIP. When encountering patients with cerebellar ataxia, especially those with Huntington's disease-like symptoms, genetic testing for STUB1 as well as TBP should be conducted for diagnosis of SCA17-DI, even in cases of sporadic or autosomal recessive inheritance.",
    "source": "pubmed_2019_2026",
    "category": "clinical"
  },
  {
    "PMID": "36422518",
    "title": "Intermediate repeat expansions of TBP and STUB1: Genetic modifier or pure digenic inheritance in spinocerebellar ataxias?",
    "authors": "Mathieu Barbier; Claire-Sophie Davoine; Emilien Petit; Maximilien Porch\u00e9; L\u00e9na Guillot-Noel et al. (22 authors)",
    "journal": "Genetics in medicine : official journal of the American College of Medical Genetics",
    "year": "2023",
    "doi": "10.1016/j.gim.2022.10.009",
    "abstract": "CAG/CAA repeat expansions in TBP>49 are responsible for spinocerebellar ataxia (SCA) type 17 (SCA17). We previously detected cosegregation of STUB1 variants causing SCA48 with intermediate alleles of TBP in 2 families. This cosegregation questions the existence of SCA48 as a monogenic disease. We systematically sequenced TBP repeats in 34 probands of dominant ataxia families with STUB1 variants. In addition, we searched for pathogenic STUB1 variants in probands with expanded alleles of TBP>49 (n\u00a0= 2) or intermediate alleles of TBP\u226540 (n\u00a0= 47). STUB1 variants were found in half of the TBP40-49 cohort. Mirroring this finding, TBP40-49 alleles were detected in 40% of STUB1 probands. The longer the TBP repeat length, the more likely the occurrence of cognitive impairment (P\u00a0= .0129) and the faster the disease progression until death (P\u00a0= .0003). Importantly, 13 STUB1 probands presenting with the full SCA48 clinical phenotype had normal TBP37-39 alleles, excluding digenic inheritance as the sole mode. We show that intermediate TBP40-49 alleles act as disease modifiers of SCA48 rather than a STUB1/TBP digenic model. This distinction from what has been proposed before has crucial consequences for genetic counseling in SCA48.",
    "source": "pubmed_2019_2026",
    "category": "clinical"
  },
  {
    "PMID": "36291559",
    "title": "Teenage-Onset Colorectal Cancers in a Digenic Cancer Predisposition Syndrome Provide Clues for the Interaction between Mismatch Repair and Polymerase \u03b4 Proofreading Deficiency in Tumorigenesis.",
    "authors": "Esther Schamschula; Miriam Kinzel; Annekatrin Wernstedt; Klaus Oberhuber; Hendrik Gottschling et al. (11 authors)",
    "journal": "Biomolecules",
    "year": "2022",
    "doi": "10.3390/biom12101350",
    "abstract": "Colorectal cancer (CRC) in adolescents and young adults (AYA) is very rare. Known predisposition syndromes include Lynch syndrome (LS) due to highly penetrant MLH1 and MSH2 alleles, familial adenomatous polyposis (FAP), constitutional mismatch-repair deficiency (CMMRD), and polymerase proofreading-associated polyposis (PPAP). Yet, 60% of AYA-CRC cases remain unexplained. In two teenage siblings with multiple adenomas and CRC, we identified a maternally inherited heterozygous PMS2 exon 12 deletion, NM_000535.7:c.2007-786_2174+493del1447, and a paternally inherited POLD1 variant, NP_002682.2:p.Asp316Asn. Comprehensive molecular tumor analysis revealed ultra-mutation (>100 Mut/Mb) and a large contribution of COSMIC signature SBS20 in both siblings\u2019 CRCs, confirming their predisposition to AYA-CRC results from a high propensity for somatic MMR deficiency (MMRd) compounded by a constitutional Pol \u03b4 proofreading defect. COSMIC signature SBS20 as well as SBS26 in the index patient\u2019s CRC were associated with an early mutation burst, suggesting MMRd was an early event in tumorigenesis. The somatic second hits in PMS2 were through loss of heterozygosity (LOH) in both tumors, suggesting PPd-independent acquisition of MMRd. Taken together, these patients represent the first cases of cancer predisposition due to heterozygous variants in PMS2 and POLD1. Analysis of their CRCs supports that POLD1-mutated tumors acquire hypermutation only with concurrent MMRd.",
    "source": "pubmed_2019_2026",
    "category": "clinical"
  },
  {
    "PMID": "36192439",
    "title": "Assessing the digenic model in rare disorders using population sequencing data.",
    "authors": "Nerea Moreno-Ruiz; Oscar Lao; Juan Ignacio Ar\u00f3stegui; Hafid Laayouni; Ferran Casals",
    "journal": "European journal of human genetics : EJHG",
    "year": "2022",
    "doi": "10.1038/s41431-022-01191-x",
    "abstract": "An important fraction of patients with rare disorders remains with no clear genetic diagnostic, even after whole-exome or whole-genome sequencing, posing a difficulty in giving adequate treatment and genetic counseling. The analysis of genomic data in rare disorders mostly considers the presence of single gene variants in coding regions that follow a concrete monogenic mode of inheritance. A digenic inheritance, with variants in two functionally-related genes in the same individual, is a plausible alternative that might explain the genetic basis of the disease in some cases. In this case, digenic disease combinations should be absent or underrepresented in healthy individuals. We develop a framework to evaluate the significance of digenic combinations and test its statistical power in different scenarios. We suggest that this approach will be relevant with the advent of new sequencing efforts including hundreds of thousands of samples.",
    "source": "pubmed_2019_2026",
    "category": "clinical"

  {
    "PMID": "36110220",
    "title": "Novel Genomic Variants, Atypical Phenotypes and Evidence of a Digenic/Oligogenic Contribution to Disorders/Differences of Sex Development in a Large North African Cohort.",
    "authors": "Housna Zidoune; Asmahane Ladjouze; Djalila Chellat-Rezgoune; Asma Boukri; Scheher Aman Dib et al. (15 authors)",
    "journal": "Frontiers in genetics",
    "year": "2022",
    "doi": "10.3389/fgene.2022.900574",
    "abstract": "In a majority of individuals with disorders/differences of sex development (DSD) a genetic etiology is often elusive. However, new genes causing DSD are routinely reported and using the unbiased genomic approaches, such as whole exome sequencing (WES) should result in an increased diagnostic yield. Here, we performed WES on a large cohort of 125 individuals all of Algerian origin, who presented with a wide range of DSD phenotypes. The study excluded individuals with congenital adrenal hypoplasia (CAH) or chromosomal DSD. Parental consanguinity was reported in 36% of individuals. The genetic etiology was established in 49.6% (62/125) individuals of the total cohort, which includes 42.2% (35/83) of 46, XY non-syndromic DSD and 69.2% (27/39) of 46, XY syndromic DSD. No pathogenic variants were identified in the 46, XX DSD cases (0/3). Variants in the AR, HSD17B3, NR5A1 and SRD5A2 genes were the most common causes of DSD. Other variants were identified in genes associated with congenital hypogonadotropic hypogonadism (CHH), including the CHD7 and PROKR2. Previously unreported pathogenic/likely pathogenic variants (n = 30) involving 25 different genes were identified in 22.4% of the cohort. Remarkably 11.5% of the 46, XY DSD group carried variants classified as pathogenic/likely pathogenic variant in more than one gene known to cause DSD. The data indicates that variants in PLXNA3, a candidate CHH gene, is unlikely to be involved in CHH. The data also suggest that NR2F2 variants may cause 46, XY DSD.",
    "source": "pubmed_2019_2026",
    "category": "clinical"
  },
  {
    "PMID": "36051461",
    "title": "Quantitative trait loci mapping reveals an oligogenic architecture of a rapidly adapting trait during the European invasion of common ragweed.",
    "authors": "Diana Prapas; Romain Scalone; Jacqueline Lee; Kristin A Nurkowski; Sarah Bou-Assi et al. (8 authors)",
    "journal": "Evolutionary applications",
    "year": "2022",
    "doi": "10.1111/eva.13453",
    "abstract": "Biological invasions offer a unique opportunity to investigate evolution over contemporary timescales. Rapid adaptation to local climates during range expansion can be a major determinant of invasion success, yet fundamental questions remain about its genetic basis. This study sought to investigate the genetic basis of climate adaptation in invasive common ragweed (Ambrosia artemisiifolia). Flowering time adaptation is key to this annual species' invasion success, so much so that it has evolved repeated latitudinal clines in size and phenology across its native and introduced ranges despite high gene flow among populations. Here, we produced a high-density linkage map (4493 SNPs) and paired this with phenotypic data from an F2 mapping population (n\u00a0=\u2009336) to identify one major and two minor quantitative trait loci (QTL) underlying flowering time and height differentiation in this species. Within each QTL interval, several candidate flowering time genes were also identified. Notably, the major flowering time QTL detected in this study was found to overlap with a previously identified haploblock (putative inversion). Multiple genetic maps of this region identified evidence of suppressed recombination in specific genotypes, consistent with inversions. These discoveries support the expectation that a concentrated genetic architecture with fewer, larger, and more tightly linked alleles should underlie rapid local adaptation during invasion, particularly when divergently adapting populations experience high levels of gene flow.",
    "source": "pubmed_2019_2026",
    "category": "tools"
  },
  {
