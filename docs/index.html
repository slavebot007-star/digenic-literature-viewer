  {
    "PMID": "41168794",
    "title": "Novel EP300 and NSD1 variants in Chinese pediatric patients with Rubinstein-Taybi syndrome: evidence for oligogenic inheritance and phenotypic expansion.",
    "authors": "Xu Ningan; Wang Yefeng; Wu Xinghan; Zhao Sha",
    "journal": "BMC medical genomics",
    "year": "2025",
    "doi": "10.1186/s12920-025-02220-6",
    "abstract": "Rubinstein\u2013Taybi syndrome (RSTS) is an autosomal-dominant neurodevelopmental disorder caused by heterozygous loss-of-function variants in CREBBP or EP300. EP300-related cases often show milder clinical features, but their full phenotypic spectrum and the potential role of oligogenic inheritance remain unclear. We retrospectively studied seven Chinese pediatric RSTS patients. Genomic analyses included whole-exome sequencing (WES), chromosomal microarray analysis (CMA) and Sanger validation. Variants were classified by ACMG/AMP guidelines. Protein structural impacts were assessed by homology modeling. Phenotypic frequencies in our EP300-related patients were compared with published European/American cohorts using Fisher\u2019s exact test or \u03c7\u00b2 test (p\u2009<\u20090.05 as significant). Two de novo EP300 nonsense variants (c.3934\u00a0C\u2009>\u2009T, p.Arg1312Ter; c.2749\u00a0C\u2009>\u2009T, p.Gln917Ter) were identified; one of these patients also harbored a de novo NSD1 missense variant (c.5843G\u2009>\u2009A, p.Arg1948His). Five other patients carried pathogenic CREBBP variants or deletions. The patient with both EP300 and NSD1 variants exhibited additional anomalies (cryptorchidism, congenital cataracts, strabismus), suggesting synergistic epigenetic dysregulation. Homology models predicted truncation of the EP300 HAT and bromodomain regions and disruption of the NSD1 SET domain. Compared with European/American cohorts, our Chinese EP300-related patients had significantly higher rates of arched eyebrows, downslanting palpebral fissures and low-set ears (p\u2009<\u20090.05). To our knowledge, this is the first clinical evidence of an oligogenic inheritance pattern in RSTS involving both EP300 and NSD1. Our findings expand the genotypic and phenotypic landscape of RSTS in a Chinese population, delineate distinctions between EP300- and CREBBP-related cases, and underscore the value of comprehensive genomic analysis for accurate diagnosis, genetic counselling and personalized management. The online version contains supplementary material available at 10.1186/s12920-025-02220-6.",
    "source": "pubmed_2019_2026",
    "category": "clinical"
  },
  {
    "PMID": "41142505",
    "title": "Bone Marrow Failure Associated With Short Telomeres and Digenic Variants of Uncertain Significance in Telomere Biology Genes.",
    "authors": "Akhila Vadivelan; Geraldine Aubert; Julian A Martinez; Alan Ikeda; Satiro De Oliveira et al. (7 authors)",
    "journal": "Case reports in genetics",
    "year": "2025",
    "doi": "10.1155/crig/2075063",
    "abstract": "Telomere Biology Disorders (TBD) are a group of heritable disorders characterized by short telomeres. We report two patients that presented with bone marrow failure (BMF), who were identified to have low telomere length (TL) and variants of uncertain significance (VUS) in two different telomere genes inherited from their parents. At age 6, Patient 1 had stage 4 neuroblastoma. He was treated with chemotherapy, surgery, immunotherapy, and autologous stem cell rescue. At age 10, he developed pancytopenia. Bone marrow biopsy revealed hypocellular marrow and der (1; 7), associated with myelodysplastic syndrome. Germline genetic evaluation showed a pathogenic variant in DNAJC21 (from father) and VUS in NAF1 (c.1375C\u2009>\u2009T) (from father) and RTEL1 (c.533T\u2009>\u2009C) (from mother). The patient was found to have very low TL (VLTL) (< 1st percentile) in 4/6 white blood cell subsets. The patient's mother was found to have borderline low TL (VLTL) ( 1 and < 10th percentiles) in 4/6 subsets and VLTL in 1/6 subsets. Father had VLTL in 1/6 but normal TL in other subsets. Neither parent reported any symptoms of TBD. Patient 2 presented with a depressed skull fracture at age 15. He was found incidentally to have pancytopenia. Bone marrow biopsy showed hypocellular marrow and no cytogenetic abnormalities. The patient had VLTL in all 6/6 subsets. Genetic evaluation showed VUSs in TERT (c.3158-80G\u2009>\u2009A) (from mother), TINF2 (c.814T\u2009>\u2009C) (from mother) and SRP72 (c.1928C\u2009>\u2009T) (from father). Mother was also found to have VLTL in all 6 subsets but has reported good health except for premature graying of hair. These two patients presented with BMF, identified to have VUSs in more than one TBD-associated gene with functional evidence of shortened telomeres, highlighting the potential for a digenic mode of inheritance. Synergy between two VUSs could contribute to a penetrant phenotype and resulting in earlier or more severe onset of disease.",
    "source": "pubmed_2019_2026",
    "category": "clinical"
  },
  {
    "PMID": "41096698",
    "title": "Computational Evidence for Digenic Contribution of AIPL1 and BBS2 Rare Variants in Inherited Retinal Dystrophy.",
    "authors": "Simona Alibrandi; Concetta Scimone; Giorgia Abate; Sergio Zaccaria Scalinci; Antonina Sidoti et al. (6 authors)",
    "journal": "International journal of molecular sciences",
    "year": "2025",
    "doi": "10.3390/ijms26199430",
    "abstract": "Inherited retinal dystrophies (IRDs) are clinically and genetically heterogeneous disorders. Most IRDs follow a monogenic inheritance pattern. However, an increasing number of unresolved cases suggest the possible contribution of oligogenic or digenic mechanisms. Here, we report two ultra-rare missense variants-AIPL1 R302L and BBS2 P134R-that co-segregate with early-onset nonsyndromic retinal degeneration in affected individuals from a non-consanguineous family. We performed a multi-level computational investigation to assess whether these variants may act through a convergent pathogenic mechanism. Using AlphaFold2-predicted structures, we modeled both wild-type and mutant proteins, introduced point mutations, and performed energy minimization and validation. FoldX, DynaMut2, and DUET all predicted destabilizing effects at the variant sites, corroborated by local disruption of secondary structure and altered surface electrostatics. Comparative docking (via HDOCK and ClusPro) identified a putative interaction interface between the TPR domain of AIPL1 and the \u03b2-sheet face of BBS2. This interface was destabilized in the double-mutant model. At the systems level, transcriptomic profiling confirmed co-expression of AIPL1 and BBS2 in human retina and fetal eye, while functional enrichment analysis highlighted overlapping involvement in ciliary and proteostasis pathways. Network propagation suggested that the two proteins may converge on shared interactors relevant to photoreceptor maintenance. Collectively, these in silico results provide structural and systems-level support for a candidate digenic mechanism involving AIPL1 and BBS2. While experimental validation remains necessary, our study proposes a testable mechanistic hypothesis and underscores the value of computational approaches in uncovering complex genetic contributions to IRDs.",
    "source": "pubmed_2019_2026",
    "category": "clinical"
  },
  {
    "PMID": "41056817",
    "title": "Novel presentation of CACNA1C variant as neonatal complete atrioventricular block, heart failure and non-compaction cardiomyopathy with oligogenic influences.",
    "authors": "Sydney R Rooney; Brock Karolcik; Shawn West; Christopher Follansbee; Mousumi Moulik et al. (6 authors)",
    "journal": "Journal of electrocardiology",
    "year": "2025",
    "doi": "10.1016/j.jelectrocard.2025.154139",
    "abstract": "Pathogenic CACNA1C variants are associated with long QT syndrome, cardiac conduction disorders (CCD), short QT or Brugada syndromes, sudden cardiac death, and rarely hypertrophic cardiomyopathy. Neonatal complete AV block (CAVB) has not been previously reported in patients with CACNA1C-mutations. We present a neonate with CAVB, severe heart failure, and non-compaction cardiomyopathy, found to have a de novo, likely pathogenic, heterozygous CACNA1C variant and heterozygous variants of uncertain significance (VUS) in TNNI3K, GATA6, and PDHK1 genes. This case expands the CACNA1C-associated phenotype to include neonatal CAVB and suggests a potential oligogenic contribution to severe neonatal cardiac disease.",
    "source": "pubmed_2019_2026",
    "category": "clinical"
  },
  {
    "PMID": "40855356",
    "title": "Novel COL4A3-COL4A5 variants and digenic inheritance in pediatric Alport syndrome from Southwestern China.",
    "authors": "Ji-Yu Chen; Xue-Mei Jiang; Ya-Bin Liao; Yan-Hua Zhang; Mi-Feng Yang et al. (10 authors)",
    "journal": "Scientific reports",
    "year": "2025",
    "doi": "10.1038/s41598-025-17027-9",
    "abstract": "Alport syndrome is a hereditary glomerular disease driven by pathogenic variants in COL4A3-COL4A5 that compromise the \u03b13-\u03b14-\u03b15 type IV collagen scaffold, manifesting as persistent hematuria, proteinuria, and ultimately end-stage renal disease. Its pronounced phenotypic variability, low sensitivity of renal biopsy, and limited response to ACE inhibitors complicate accurate diagnosis and therapy. In a cohort of 40 pedigrees from southwest China, we discovered 21 novel COL4A3-COL4A5 mutations. Notably, two families carried rare digenic COL4A4/COL4A5 variants, providing strong evidence for dual-locus pathogenicity. Immunofluorescence of five mutation-positive patients revealed allele-specific depletion of \u03b13 and \u03b15 chains in the glomerular basement membrane, with frameshift and splice-site mutations eliciting more severe collagen loss than missense. Complementary AlphaFold modeling predicted that digenic variants induce greater destabilization of Gly-X-Y triple helices domain than monogenic lesions. Over three years, ACEI therapy achieved only sporadic partial remissions, underscoring the need for precision-guided treatment strategies. This study not only expands the genetic spectrum of Alport syndrome in China's ethnic minority populations but also elucidates the mechanistic impact of digenic inheritance.",
    "source": "pubmed_2019_2026",
    "category": "clinical"
  },
  {
    "PMID": "40865352",
    "title": "ADAM23 haploinsufficiency as a putative oligogenic contributor in an individual with focal epilepsy.",
    "authors": "Martin Krenn; Karl-Heinz Nenning; Susanne Aull-Watschinger; Ekaterina Pataraia; Matias Wagner et al. (6 authors)",
    "journal": "Seizure",
    "year": "2025",
    "doi": "10.1016/j.seizure.2025.08.027",
    "abstract": "ADAM23 is involved in neuronal excitability and interacts with LGI1, a known genetic risk factor for focal epilepsy. While ADAM23 has been linked to canine seizures, a recent gene-burden meta-analysis first nominated it as a risk gene for epilepsy in humans. Building on these findings, our study aimed to explore the significance of truncating ADAM23 variants in deeply phenotyped individuals with diverse seizure disorders. We screened the exome sequencing data from 389 individuals with various seizure phenotypes for truncating variants in ADAM23. This report focuses on one individual harboring a heterozygous frameshift variant in ADAM23, selected for detailed analysis due to intriguing additional genetic findings. We identified a heterozygous frameshift variant (c.428del, p.Asn143Ilefs*26) in ADAM23 (NM_003812.4) in a patient with drug-resistant, MRI-negative focal epilepsy accompanied by additional neurocognitive and behavioral issues. The ADAM23 variant was inherited from an unaffected parent. Notably, the same individual carried inherited, truncating variants in two other brain-expressed, loss-of-function-intolerant genes: TNRC6A and MAPK8IP3. These findings suggest that ADAM23 contributes to epilepsy with reduced penetrance, potentially influenced by oligogenic factors. Although descriptive and hypothesis-generating, our data underscore the complexity of currently unexplored genetic contributions to epilepsy.",
    "source": "pubmed_2019_2026",
    "category": "clinical"
  },
  {
    "PMID": "40735484",
    "title": "A case report of 'Two-Hit' digenic mutations in PAH: role of PADN in management.",
    "authors": "Zai-Qiang Zhang; Zhou-Qiang Qin; Sheng-Kui Zhu; Yu-Hong Zuo; Jia-Wang Ding",
    "journal": "Frontiers in pharmacology",
    "year": "2025",
    "doi": "10.3389/fphar.2025.1601777",
    "abstract": "Pulmonary arterial hypertension (PAH) is a severe cardiopulmonary disorder characterized by progressive elevation of pulmonary vascular resistance, resulting to right ventricular dysfunction and premature mortality. Although genetic mutations are increasingly recognized in PAH pathogenesis, cases involving digenic mutations remain exceptionally rare. We report the case of a 47-year-old female presenting with a 5-year history of exertional dyspnea, which progressively worsened over the preceding 2\u00a0months. Diagnostic imaging revealed pulmonary artery dilatation and right heart enlargement, and right heart catheterization confirmed PAH with a mean pulmonary arterial pressure of 43\u00a0mmHg. Whole exome sequencing identified a novel heterozygous mutation in FLNA (c.4754C>T, p.Thr1585Met) and a known heterozygous mutation in MMACHC (c.609G>A, p.Trp203Ter). The patient was initiated on PAH-specific therapy and pulmonary artery denervation (PADN) treatment. Over a 2-year follow-up period, her symptoms significantly improved, with no evidence of heart failure progression. This case highlights a rare instance of PAH associated with digenic mutations in FLNA and MMACHC. The patient demonstrated a favorable response to targeted PAH therapy and PADN treatment, highlighting the importance of genetic screening and personalized treatment strategies in PAH management.",
    "source": "pubmed_2019_2026",
    "category": "clinical"
  },
  {
    "PMID": "40645723",
    "title": "Digenic Overlap Syndrome Masquerading as Homozygous Familial Hypercholesterolemia.",
    "authors": "Samuel D Maidman; Chen Gurevitz; Robert S Rosenson",
    "journal": "JACC. Case reports",
    "year": "2025",
    "doi": "10.1016/j.jaccas.2025.104036",
    "abstract": "The development of tendinous xanthomas in childhood with a low-density lipoprotein (LDL) cholesterol level >400 mg/dL is characteristic of homozygous familial hypercholesterolemia (FH). We present the case of a patient with a severely elevated LDL cholesterol level and childhood-onset xanthomas who fulfilled clinical criteria for homozygous FH. However, genetic and absorption testing clarified his phenotype to be a unique digenic overlap of both heterozygous FH and heterozygous sitosterolemia with marked elevations in cholesterol absorption indices. Treatment with ezetimibe 10 mg daily resulted in a dramatic reduction in LDL cholesterol. Sitosterolemia, a rare autosomal recessive disorder of plant sterol hyperabsorption, can also result in xanthomatosis and thus can mimic FH. Although it is usually a homozygous disease, heterozygotes may exhibit intermediary phenotypes. Patients with severe hypercholesterolemia should undergo genetic and biochemical profiling for diagnostic confirmation and for ensuring that they receive optimal, personalized therapy.",
    "source": "pubmed_2019_2026",
    "category": "clinical"
  },
  {
    "PMID": "40634996",
    "title": "Identification of novel MYO19 variants in neonatal hypertrophic cardiomyopathy: a familial analysis revealing oligogenic contributors to disease severity.",
    "authors": "Hye-Won Cho; Hyeseon Kim; Jeong-Min Kim; Dong Mun Shin; Oc-Hee Kim et al. (12 authors)",
    "journal": "Orphanet journal of rare diseases",
    "year": "2025",
    "doi": "10.1186/s13023-025-03871-5",
    "abstract": "Pediatric hypertrophic cardiomyopathy (HCM) is a rare condition, particularly in neonates, and is characterized by rapid and extensive myocardial hypertrophy, often leading to severe clinical outcomes. HCM can arise from variants in sarcomeric genes, which are essential for myocardial contractions, as well as non-sarcomeric gene variants. Although genetic modifiers and oligogenic inheritance have been implicated in congenital heart disease and cardiomyopathy, their complexity in HCM has not been fully elucidated, especially in familial cases with variable phenotypes. Hence, this study aims to investigate the genetic architecture in a family with a history of cardiac disease and neonatal HCM, focusing on oligogenic inheritance of non-sarcomeric variants. Clinical data and blood samples were collected for genetic analysis. Whole genome sequencing (WGS) and bioinformatic analyses identified compound heterozygous variants in the MYO19 gene. Maternally inherited variants were analyzed because the proband's mother was also diagnosed with HCM. WGS was performed on the patient's maternal grandfather and aunt, who have cardiac disease, revealing candidate genetic variants that may contribute to the cardiac phenotype. Compound heterozygous MYO19 variants were identified in the neonatal patient. Missense c.203C\u2009>\u2009G (p.A68G) and frameshift c.275_276del (p.E92Vfs*19) variants were identified, which were located in the myosin motor domain, a functionally crucial region of the MYO19 protein. Maternally inherited missense variants were identified in SURF1 and ETFDH. All three genes are associated with mitochondrial function, and in silico prediction tools suggest that these variants are likely damaging. Other candidate genetic variants possibly contributing to the cardiac phenotype were also detected in the extended maternal family. To the best of our knowledge, this study represents the first report proposing MYO19 as a candidate gene for HCM and highlights the potential role of oligogenic inheritance in the etiology of the disease. Furthermore, plausible candidate variants of other mitochondria-related genes, such as MYO19, SURF1, and ETFDH, were identified, and other family members were investigated to support the pathogenesis of HCM further. Given the limited understanding of the genetics of pediatric HCM, these findings contribute valuable insights into its genetic basis in pediatric patients.",
    "source": "pubmed_2019_2026",
    "category": "clinical"
  },

  {
    "PMID": "40543504",
    "title": "Genomic rare variant mechanisms for congenital cardiac laterality defect: A digenic model approach.",
    "authors": "Archana Rai; Jonathan Klonowski; Bo Yuan; Karen J Coveler; Zain Dardas et al. (20 authors)",
    "journal": "American journal of human genetics",
    "year": "2025",
    "doi": "10.1016/j.ajhg.2025.05.014",
    "abstract": "Laterality defects are defined by perturbations in the usual left-right asymmetry of organs. The genetic etiology that underlies congenital heart disease (CHD) is often unknown (less than 40%), so we used a digenic model approach for the identification of contributing variants in known laterality-defect-associated genes (n = 115) in the exome/genome sequencing (ES/GS) data from individuals with clinically diagnosed laterality defects. The unsolved ES/GS data were analyzed from three CHD cohorts: Baylor College of Medicine-Genomics Research to Elucidate the Genetics of Rare Diseases (BCM-GREGoR; n= 251 proband ES), Gabriella Miller Kids First Pediatric Research Program (Kids First; n = 158 trio GS), and Pediatric Cardiac Genomics Consortium (PCGC; n = 163 trio ES). trans-heterozygous digenic variants were identified in 2.8% (inherited digenic variants in 0.4%), 8.2%, and 13.5% of individuals, respectively; this was significantly higher than in 602 control trios provided by the 1000 Genomes Project (p = 0.001, 1.4e-07, and 8.9e-13, respectively). trans-heterozygous digenic variants were also identified in 0.4% and 1.4% of individuals with non-laterality CHD in Kids First and PCGC datasets, respectively, which was not statistically significant as compared to control trios (p = 1 and 0.059, respectively). Altogether, in laterality cohorts, 23% of digenic pairs were in the same structural complex of motile cilia. Out of 39 unique digenic pairs in laterality CHD, 29 are more likely to be potential digenic hits as predicted by the DiGePred tool. These findings provide further evidence that digenic epistatic interactions can contribute to the complex genetics of laterality defects.",
    "source": "pubmed_2019_2026",
    "category": "tools"
  },
  {
    "PMID": "40374006",
    "title": "The interaction of UBR4, LRP1, and OPHN1 in refractory epilepsy: Drosophila model to investigate the oligogenic effect on epilepsy.",
    "authors": "Rui-Na Huang; Si-Yuan Luo; Tao Huang; Xiong-Sheng Li; Fan-Chao Zhou et al. (11 authors)",
    "journal": "Neurobiology of disease",
    "year": "2025",
    "doi": "10.1016/j.nbd.2025.106955",
    "abstract": "Refractory epilepsy is an intractable neurological disorder that can be associated with oligogenic/polygenic etiologies. Through trio-based whole-exome sequencing analysis, we identified a clinical case of refractory epilepsy with three candidate gene variants: UBR4, LRP1, and OPHN1. Utilizing the Gal4-UAS system and double-balancer tool, we generated single, double, and triple knockdown Drosophila models to investigate the interactions of the three candidate genes. Seizure behavioral experiments combined with logistic regression analysis revealed the individual epileptogenicity and significant synergistic epileptogenic effects of the three mutations. By constructing a SHAP-XGBoost machine learning model integrating seizure behavior data with knockdown efficiency metrics, we discovered that LRP1 mutation served as the primary effector in the oligogenic system. Based on transcriptome analysis, main related processes of oxidative stress and metabolic imbalance together with expressional dysregulation separately of 48, 52, and 43 epilepsy-associated genes were discovered to confirm the epileptogenicity of OPHN1 knockdown, UBR4-LRP1 knockdown, and UBR4-LRP1-OPHN1 knockdown. Up-regulation of COX7AL and ND-B8 enriched in metabolic pathways and down-regulation of Diedel enriched in extracellular space component were indicated to be responsible for the significant epileptogenicity of the oligogenic knockdown. For this clinical instance, epileptic pharmacoresistance was considered to be triggered by a combination of KIF gene family, SLC gene family, and ASIC gene family. This study established a novel framework to clarify the multiple genetic structure of epileptogenicity in refractory epilepsy with oligogenic background, which could be critical to translational medicine and precision therapy development.",
    "source": "pubmed_2019_2026",
    "category": "clinical"
  },

    "PMID": "40260945",

  {
    "PMID": "40184228",
    "title": "Protective effect of CACNA1A deficiency in oligogenic refractory epilepsy with CACNA1A-CELSR2 digenic mutations.",
    "authors": "Chu-Qiao Liu; Mei-Zhen Sun; Yong-Miao Lin; Xi-Xing Zhang; Rui-Na Huang et al. (18 authors)",
    "journal": "Epilepsia",
    "year": "2025",
    "doi": "10.1111/epi.18390",
    "abstract": "The vast majority of refractory epilepsy cases have a complex oligogenic/polygenic origin, which presents a challenge to precision medicine in individual patients. Nonetheless, the high workload and lack of effective guidelines have limited the number of in-depth animal studies. Whole-exon sequencing identified a case with refractory epilepsy caused by a combination of two rare and de novo heterozygous variants in CACNA1A and CELSR2, respectively. Polygenic mutation flies were established and logistic regression were applied to study the gene-gene interaction and quantify the seizure-risk weight of epilepsy-associated genes in a polygenic background. In addition, calcium imaging, pharmacology, and transgenic rescue experiments were used to explore the mechanism and the precision medicine strategy for this model. Seizure-like activity was mitigated in the Cacna1a-Celsr2 digenic knockdown flies, whereas it was aggravated in the Cacna1a knockin-Celsr2 knockdown flies, and all relevant monogenic mutation flies showed seizures. Logistic regression suggested that the Cacna1a deficiency provided a protective effect against seizures in Celsr2 knockdown flies. The severe seizures from Cacna1a knockin-Celsr2 knockdown, the genotype mimicking that of the patient, can be completely rescued by inhibiting the calcium channel via genetic (Cacna1a knockdown) or pharmacologic (pregabalin) treatment during a limited period of development. Calcium imaging results suggested a synaptic cleft balance mechanism for the protective effect of CACNA1A deficiency in the polygenic background. CACNA1A presented multiple effects on epileptogenesis in diverse genetic backgrounds and provided an effective preclinical approach to clarify the net impact of polygenic variants for designing a precisive medicine strategy against refractory epilepsy.",
    "source": "pubmed_2019_2026",
    "category": "clinical"
  },
  {
    "PMID": "40170896",
    "title": "Combined impact of CHCHD10 p.Gly66Val and three other variants suggests oligogenic contributions to ALS.",
    "authors": "YiYing Wang; YuXin Mi; Hui Wang; JingSi Jiang; Le Mao et al. (8 authors)",
    "journal": "Frontiers in neurology",
    "year": "2025",
    "doi": "10.3389/fneur.2025.1438207",
    "abstract": "Amyotrophic lateral sclerosis (ALS) is a severe neurodegenerative disease characterized by a progressive loss of motor neurons and muscle atrophy. Genetic factors are known to play important roles in ALS and concomitant presence of rare variants in ALS patients have been increasingly reported. In order to explore the genetic variants in ALS patients within the context of oligogenic inheritance and to elucidate the clinical heterogeneity observed in these patients, we conducted whole-genome sequencing on 34 familial ALS (FALS) probands. In one proband, we identified a CHCHD10 p.Gly66Val variant, along with three additional variants: UNC13A p.Leu1034Val, SUSD1 p.Trp704Ser, and SQSTM1 p.His359del. This patient exhibited a slow disease progression and a prolonged survival duration, consistent with the clinical features of ALS patients with CHCHD10 variants. This suggests that the CHCHD10 p.Gly66Val variant may play a predominant role in shaping the patient's phenotype, while the other variants may primarily contribute to ALS occurrence. Variants in CHCHD10 have been found in ALS and other neurodegenerative diseases, exhibiting significant clinical variability. However, the combinatorial effect of CHCHD10 and other ALS-related gene variants has not been fully studied. Our findings suggest that the combined impact of these four variants contributes to this patient's ALS phenotype, distinguishing it from other, less severe neuromuscular disorders associated with CHCHD10 mutations. Overall, this study further supports the oligogenic pathogenic basis of ALS and offers new insights into understanding the intricate clinical presentations associated with CHCHD10 variants.",
    "source": "pubmed_2019_2026",
    "category": "clinical"
  },
  {
    "PMID": "40160220",
    "title": "Digenic variant interpretation with hypothesis-driven explainable AI.",
    "authors": "Federica De Paoli; Giovanna Nicora; Silvia Berardelli; Andrea Gazzo; Riccardo Bellazzi et al. (9 authors)",
    "journal": "NAR genomics and bioinformatics",
    "year": "2025",
    "doi": "10.1093/nargab/lqaf029",
    "abstract": "The digenic inheritance hypothesis holds the potential to enhance diagnostic yield in rare diseases. Computational approaches capable of accurately interpreting and prioritizing digenic combinations of variants based on the proband's phenotypes and family information can provide valuable assistance during the diagnostic process. We developed diVas, a hypothesis-driven machine learning approach that interprets genomic variants across different gene pairs. DiVas demonstrates strong performance in both classifying and prioritizing causative digenic combinations of rare variants within the top positions across 11 cases with the complete list of variants available (73% sensitivity and a median ranking of 3). Furthermore, it achieves a sensitivity of 0.81 when applied to 645 published causative digenic combinations. Additionally, diVas leverages\u00a0explainable artificial intelligence\u00a0to elucidate the digenic disease mechanism for predicted positive pairs.",
    "source": "pubmed_2019_2026",
    "category": "clinical"
  },
  {
    "PMID": "40128994",
    "title": "Oligogenic Familial Hypercholesterolemia Treated by Combination Therapy of Statin, Ezetimibe, PCSK9 Inhibitor, and Lomitapide.",
    "authors": "Nobuko Kojima; Hayato Tada; Masayuki Takamura",
    "journal": "Internal medicine (Tokyo, Japan)",
    "year": "2025",
    "doi": "10.2169/internalmedicine.5025-24",
    "abstract": "We encountered a 40-year-old man diagnosed with homozygous familial hypercholesterolemia (FH) based on clinical findings. The initial low-density lipoprotein (LDL)-cholesterol level was 393 mg/dL. He underwent coronary artery bypass graft (CABG) surgery for three-vessel disease. Genetic testing revealed a pathogenic variant in the LDL receptor (LDLR) and a missense variant in apolipoprotein E (APOE), known as APOE4, leading to the diagnosis of oligogenic FH. His LDL-cholesterol level was well controlled by the introduction of a proprotein convertase subtilisin/kexin type 9 (PCSK9) inhibitor and lomitapide (approximately 30 mg/dL). Combination therapy is effective in reducing LDL levels.",
    "source": "pubmed_2019_2026",
    "category": "clinical"
  },
  {
    "PMID": "40037090",
    "title": "Oligogenic analysis across broad phenotypes of 46,XY differences in sex development associated with NR5A1/SF-1 variants: findings from the international SF1next study.",
    "authors": "Chrysanthi Kouri; Idoia Martinez de Lapiscina; Rawda Naamneh-Elzenaty; Grit Sommer; Kay-Sara Sauter et al. (6 authors)",
    "journal": "EBioMedicine",
    "year": "2025",
    "doi": "10.1016/j.ebiom.2025.105624",
    "abstract": "Oligogenic inheritance has been suggested as a possible mechanism to explain the broad phenotype observed in individuals with differences of sex development (DSD) harbouring NR5A1/SF-1 variants. We investigated genetic patterns of possible oligogenicity in a cohort of 30 individuals with NR5A1/SF-1 variants and 46,XY DSD recruited from the international SF1next study, using whole exome sequencing (WES) on family trios whenever available. WES data were analysed using a tailored filtering algorithm designed to identify rare variants in DSD and SF-1-related genes. Identified variants were subsequently tested using the Oligogenic Resource for Variant Analysis (ORVAL) bioinformatics platform for a possible combined pathogenicity with the individual NR5A1/SF-1 variant. In 73% (22/30) of the individuals with NR5A1/SF-1 related 46,XY DSD, we identified one to seven additional variants, predominantly in known DSD-related genes, that might contribute to the phenotype. We found identical variants in eight unrelated individuals with DSD in DSD-related genes (e.g., TBCE, FLNB, GLI3 and PDGFRA) and different variants in eight genes frequently associated with DSD (e.g., CDH23, FLNB, GLI2, KAT6B, MYO7A, PKD1, SPRY4 and ZFPM2) in 15 index cases. Our study also identified combinations with NR5A1/SF-1 variants and variants in novel candidate genes. These findings highlight the complex genetic landscape of DSD associated with NR5A1/SF-1, where in several cases, the use of advanced genetic testing and filtering with specific algorithms and machine learning tools revealed additional genetic hits that may contribute to the phenotype. Swiss National Science Foundation and Boveri Foundation Zurich.",
    "source": "pubmed_2019_2026",
    "category": "tools"
  },
  {
    "PMID": "40009698",
    "title": "BCKDHA-BCKDHB digenic gene therapy restores metabolic homeostasis in two mouse models and a calf with classic maple syrup urine disease.",
    "authors": "Jiaming Wang; Laura E Poskitt; Jillian Gallagher; Erik G Puffenberger; R Max Wynn et al. (32 authors)",
    "journal": "Science translational medicine",
    "year": "2025",
    "doi": "10.1126/scitranslmed.ads0539",
    "abstract": "Classic maple syrup urine disease (MSUD) results from biallelic mutations in genes that encode the branched-chain \u03b1-ketoacid dehydrogenase E1\u03b1 (BCKDHA), E1\u03b2 (BCKDHB), or dihydrolipoamide branched-chain transacylase (DBT) subunits, which interact to form the mitochondrial BCKDH complex that decarboxylates ketoacid derivatives of leucine, isoleucine, and valine. MSUD is an inborn error of metabolism characterized by recurrent life-threatening neurologic crises and progressive brain injury that can only be managed with an exacting prescription diet or allogeneic liver transplant. To develop a gene replacement therapy for MSUD, we designed a dual-function recombinant adeno-associated virus serotype 9 (rAAV9) vector to deliver codon-optimized BCKDHA and BCKDHB (rAAV9.hA-BiP-hB) to the liver, muscle, heart, and brain. rAAV9.hA-BiP-hB restored coexpression of BCKDHA and BCKDHB as well as BCKDH holoenzyme activity in BCKDHA-/- HEK293T cells and did not perturb physiologic branched-chain amino acid homeostasis in wild-type mice at a systemic dose of 2.7 \u00d7 1014 vector genomes per kilogram. In two models of severe MSUD (Bckdha-/- and Bckdhb-/- mice) and a newborn calf homozygous for BCKDHA c.248C>T, one postnatal injection prevented perinatal death, normalized growth, restored coordinated expression of BCKDHA and BCKDHB in the skeletal muscle, liver, heart, and brain, and stabilized MSUD biomarkers in the face of high protein ingestion. In summary, we developed a one-time BCKDHA-BCKDHB systemic dual-gene replacement strategy that holds promise as a therapeutic alternative to prescription diet and liver transplant for treatment of MSUD types 1A and 1B, the two most common forms of MSUD in humans.",
    "source": "pubmed_2019_2026",
    "category": "clinical"
  },
  {
    "PMID": "39989454",
    "title": "Digenic impairments of haploinsufficient genes in patients with craniosynostosis.",
    "authors": "Jung Woo Yu; Jihoon G Yoon; Chaerim Han; Shin Hye Noh; Dong Min Shin et al. (9 authors)",
    "journal": "JCI insight",
    "year": "2025",
    "doi": "10.1172/jci.insight.176985",
    "abstract": "Craniosynostosis (CRS) is characterized by the development of abnormal cranial suture ossification and premature fusion. Despite the identification of several associated genetic disorders, the genetic determinants of CRS remain poorly understood. In this study, we conducted integrative analyses on 225 exomes, comprising 121 CRS probands and 104 parental exomes (52 trios). These analyses encompassed de novo and pathogenic variants, and digenic combinations within haploinsufficient genes harboring rare variants. Our analysis unveils a shared molecular network between genes associated with CRS and those linked to skeletal and neurodevelopmental disorders, with a notable enrichment of deleterious variants within haploinsufficient genes. Additionally, we identified a unique digenic pair (IL6ST and TRPS1) within haploinsufficient genes that was present in 2 patients with nonsyndromic CRS but absent in parents or 1,048 population controls. In vitro experiments provided evidence that the identified missense variants were hypomorphs, and accelerated bone mineralization could result from the additive effects of diminished IL6ST and TRPS1 activities in osteoblasts. Overall, our study underscores the important role of rare variations in haploinsufficient genes and suggests that in a subset of undiagnosed patients, the CRS phenotype may arise from multiple genetic variations.",
    "source": "pubmed_2019_2026",
    "category": "clinical"
  },
  {
    "PMID": "39983722",
    "title": "Deciphering the digenic architecture of congenital heart disease using trio exome sequencing data.",
    "authors": "Meltem Ece Kars; David Stein; Peter D Stenson; David N Cooper; Wendy K Chung et al. (11 authors)",
    "journal": "American journal of human genetics",
    "year": "2025",
    "doi": "10.1016/j.ajhg.2025.01.024",
    "abstract": "Congenital heart disease (CHD) is the most common congenital anomaly and a leading cause of infant morbidity and mortality. Despite extensive exploration of the monogenic causes of CHD over the last decades, \u223c55% of cases still lack a molecular diagnosis. Investigating digenic interactions, the simplest form of oligogenic interactions, using high-throughput sequencing data can elucidate additional genetic factors contributing to the disease. Here, we conducted a comprehensive analysis of digenic interactions in CHD by utilizing a large CHD trio exome sequencing cohort, comprising 3,910 CHD and 3,644 control trios. We extracted pairs of presumably deleterious rare variants observed in CHD-affected and unaffected children but not in a single parent. Burden testing of gene pairs derived from these variant pairs revealed 29 nominally significant gene pairs. These gene pairs showed a significant enrichment for known CHD genes (p\u00a0<\u00a01.0\u00a0\u00d7\u00a010-4) and exhibited a shorter average biological distance to known CHD genes than expected by chance (p\u00a0= 3.0\u00a0\u00d7\u00a010-4). Utilizing three complementary biological relatedness approaches including network analyses, biological distance calculations, and candidate gene prioritization methods, we prioritized 10 final gene pairs that are likely to underlie CHD. Analysis of bulk RNA-sequencing data showed that these genes are highly expressed in the developing embryonic heart (p\u00a0<\u00a01\u00a0\u00d7\u00a010-4). In conclusion, our findings suggest the potential role of digenic interactions in CHD pathogenesis and provide insights into unresolved molecular diagnoses. We suggest that the application of the digenic approach to additional disease cohorts will significantly enhance genetic discovery rates.",
    "source": "pubmed_2019_2026",
    "category": "tools"
  },
  {
    "PMID": "39947885",
    "title": "Oligogenic structure of amyotrophic lateral sclerosis has genetic testing, counselling and therapeutic implications.",
    "authors": "Alfredo Iacoangeli; Allison A Dilliott; Ahmad Al Khleifat; Peter M Andersen; Nazl\u0131 A Ba\u015fak et al. (33 authors)",
    "journal": "Journal of neurology, neurosurgery, and psychiatry",
    "year": "2025",
    "doi": "10.1136/jnnp-2024-335364",
    "abstract": "Despite several studies suggesting a potential oligogenic risk model in amyotrophic lateral sclerosis (ALS), case-control statistical evidence implicating oligogenicity with disease risk or clinical outcomes is limited. Considering its direct clinical and therapeutic implications, we aim to perform a large-scale robust investigation of oligogenicity in ALS risk and in the disease clinical course. We leveraged Project MinE genome sequencing datasets (6711 cases and 2391 controls) to identify associations between oligogenicity in known ALS genes and disease risk, as well as clinical outcomes. In both the discovery and replication cohorts, we observed that the risk imparted from carrying multiple ALS rare variants was significantly greater than the risk associated with carrying only a single rare variant, both in the presence and absence of variants in the most well-established ALS genes. However, in contrast to risk, the relationships between oligogenicity and ALS clinical outcomes, such as age of onset and survival, did not follow the same pattern. Our findings represent the first large-scale, case-control assessment of oligogenicity in ALS and show that oligogenic events involving known ALS risk genes are relevant for disease risk in ~6% of ALS but not necessarily for disease onset and survival. This must be considered in genetic counselling and testing by ensuring to use comprehensive gene panels even when a pathogenic variant has already been identified. Moreover, in the age of stratified medication and gene therapy, it supports the need for a complete genetic profile for the correct choice of therapy in all ALS patients.",
    "source": "pubmed_2019_2026",
    "category": "clinical"
  },
  {
    "PMID": "39908333",
    "title": "Metastatic malignant cylindroma arising on a background of digenic inheritance of BRCA2 and CYLD pathogenic variants targeted with PARP inhibition.",
    "authors": "William Fostier; Akhtar Husain; Shirin Namini; Bipin Mathew; Georgie Holt et al. (10 authors)",
    "journal": "Clinical and experimental dermatology",
    "year": "2025",
    "doi": "10.1093/ced/llaf064",
    "abstract": "CYLD cutaneous syndrome (CCS) is caused by germline heterozygous pathogenic variants in CYLD and results in the progressive formation of cylindromas, spiradenomas or trichoepitheliomas. Malignant cylindroma is a rare skin adnexal tumour occurring in CCS, which can metastasize with lethal outcomes and has limited genomic characterization. BRCA2 loss in CCS is not described and may modulate the cutaneous cancer risk of CCS. To establish whether BRCA deficiency drives metastatic malignant cylindroma and to report the phenotype of three siblings with digenic inheritance of CYLD and BRCA2 pathogenic variants (PVs), one of whom developed metastatic cylindroma at 28\u2005years old. A kindred study reporting seven members of a family with CCS was conducted in a tertiary hospital setting within the United Kingdom from April 2021 to February 2023. Clinical phenotype, pathological, radiological and genetic findings and treatment data were -collected. Whole-genome sequencing of the primary malignant cylindroma occurring in one patient was performed to identify targetable driver mutations and signatures. Malignant cylindroma arose in one (proband) of the two male siblings with digenic inheritance of BRCA2 (c.5158insT) and CYLD (c.2689-2A>G) pathogenic variants. A further female sibling with digenic inheritance of the same BRCA2 and CYLD PVs developed early breast cancer. Whole-genome sequencing of the primary malignant cylindroma in the affected patient showed loss of heterozygosity of both BRCA2 and CYLD. Bioinformatic analysis confirmed homologous repair deficiency (HRD). These data supported the use of the PARP [poly(ADP-ribose) polymerase] inhibitor rucaparib to target HRD in a non-canonical BRCA-deficient skin cancer. Digenic inheritance of pathogenic variants in cancer-predisposing genes should prompt clinicians to be vigilant for atypical malignant presentations. We demonstrate that rapid whole-genome sequencing can inform the treatment of metastatic malignant cylindroma and identify novel systemic therapies.",
    "source": "pubmed_2019_2026",
    "category": "clinical"
  },

  {
    "PMID": "39809934",
    "title": "Oligogenic effect is associated with the clinical heterogeneity of autosomal dominant deafness-15.",
    "authors": "Jianyan Pan; Hua Teng; Fang Liu; Siyi Chen; Yaning Liu et al. (9 authors)",
    "journal": "Scientific reports",
    "year": "2025",
    "doi": "10.1038/s41598-025-85881-8",
    "abstract": "Autosomal dominant deafness-15 which is caused by mutation in the POU4F3 gene, has been reported with a wide degree of clinical heterogeneity, even between intrafamilial members. However, the reason is still elusive. In this study, A four-generation Chinese family with 11 patients manifesting late-onset progressive non-syndromic hearing loss was recruited. The phenotype of hearing loss in this family showed a large variability in terms of onset age and progression speed. A novel mutation (c.706\u00a0C\u2009>\u2009T, p.L236F) was identified by the whole exome sequencing, and its pathogenicity was confirmed by altering the subcellular localization of POU4F3. In addition, we found that two individuals with earlier age of onset and more rapid progression of hearing loss carry additional pathogenic variants in other deafness genes (III-7, STRC:c.4057\u00a0C\u2009>\u2009T; IV-1, GJB2:c.109G\u2009>\u2009A; CDC14A:c.935G\u2009>\u2009A). By using the real time quantitative PCR, western blot, luciferase assays and electrophoretic mobility-shift assay, POU4F3 was proved to directly regulate the expression of STRC, GJB2 and CDC14A respectively. ChIP-seq further revealed that POU4F3 can also bind to a series of deafness genes. In summary we expanded the mutation spectrum of POU4F3 by identifying a novel mutation and its pathogenicity. Meanwhile, three genes STRC, GJB2 and CDC14A were validated as POU4F3 new targets, implicating that the variants in the three genes may play a role of genetic modifier to generate a synergistic and enhancement effect on the progression of DFNA15.",
    "source": "pubmed_2019_2026",
    "category": "clinical"
  },
  {
    "PMID": "39792217",
    "title": "Oligogenic risk score for Gilles de la Tourette syndrome reveals a genetic continuum of tic disorders.",
    "authors": "Malgorzata Borczyk; Jakub P Fichna; Marcin Piechota; S\u0142awomir Go\u0142da; Mateusz Zi\u0119ba et al. (10 authors)",
    "journal": "Journal of applied genetics",
    "year": "2025",
    "doi": "10.1007/s13353-024-00930-8",
    "abstract": "Gilles de la Tourette syndrome (GTS) and other tic disorders (TDs) have a substantial genetic component with their heritability estimated at between 60 and 80%. Here we propose an oligogenic risk score of TDs using whole-genome sequencing (WGS) data from a group of Polish GTS patients, their families, and control samples (n\u2009=\u2009278). In this study, we first reviewed the literature to obtain a preliminary list of 84 GTS/TD candidate genes. From this list, 10 final risk score genes were selected based on single-gene burden tests (SKAT p\u2009<\u20090.05) between unrelated GTS cases (n\u2009=\u200937) and synthetic control samples based on a database of local allele frequencies. These 10 genes were CHADL, DRD2, MAOA, PCDH10, HTR2A, SLITRK5, SORCS3, KCNQ5, CDH9, and CHD8. Variants in and in the vicinity (\u00b1\u200920 kbp) of the ten risk genes (n\u2009=\u20097654) with a median minor allele frequency in the non-Finnish European population of 0.02 were integrated into an additive classifier. This risk score was then applied to healthy and GTS-affected individuals from 23 families and 100 unrelated healthy samples from the Polish population (AUC-ROC\u2009=\u20090.62, p\u2009=\u20090.02). Application of the algorithm to a group of patients with other tic disorders revealed a continuous increase of the oligogenic score with healthy individuals with the lowest mean, then patients with other tic disorders, then GTS patients, and finally with severe GTS cases with the highest oligogenic score. We have further compared our WGS results with the summary statistics of the Psychiatric Genomics Consortium genome-wide association study (PGC GWAS) of TDs and found no signal overlap except for the CHADL gene locus. Polygenic risk scores from common variants of GTS GWAS show no difference between patient and control groups, except for the comparison between patients with non-GTS TDs and patients with severe GTS. Overall, we leveraged WGS data to construct a GTS/TD risk score based on variants that may cooperatively contribute to the aetiology of these disorders. This study provides evidence that typical and severe adult GTS as well as other tic disorders may exist on a single spectrum in terms of their genetic background.",
    "source": "pubmed_2019_2026",
    "category": "tools"
  },
  {
    "PMID": "39787321",
    "title": "Digenic Inheritance Mode in Congenital Hypothyroidism Due to Thyroid Dysgenesis: HYPOTYGEN Translational Cohort Study.",
    "authors": "Athanasia Stoupa; Dulanjalee Kariyawasam; Fabienne Jabot-Hanin; Adrien Nguyen-Quoc; Sylvain Hanein et al. (27 authors)",
    "journal": "The Journal of clinical endocrinology and metabolism",
    "year": "2025",
    "doi": "10.1210/clinem/dgaf004",
    "abstract": "Congenital hypothyroidism (CH) is the most common neonatal endocrine disorder and is chiefly caused by thyroid dysgenesis (CHTD). The inheritance mode of the disease remains complex. Gain insight into the inheritance mode of CHTD. Prospective multicenter nationwide translational study in France including 514 patients with CH diagnosed through systematic newborn screening (HYPOTYGEN cohort). We focused on CHTD cases and studied their clinical and molecular phenotypes. Targeted next-generation sequencing using a 78-gene panel, including genes involved in thyroid development, function, transport, metabolism and action of thyroid hormones. Statistical analysis, familial segregation, and in vitro functional studies focusing on cell migration have been performed. We analyzed the clinical phenotypes of 458 patients with CH. Cardiac and renal malformations were present in 7.7% (14/182) and 3.9% (7/178) of patients, respectively. Genetic analysis was performed on 292 patients of the cohort, based on criteria for ethnicity and availability of DNA samples for index cases and their parents. A disease-causing mutation in 1 of the 10 known genes for CHTD was identified in 20/292 (6.8%) patients. We found a digenic mode of inheritance in 16 (5.5%) patients, each carrying a variant in a thyroid development gene and a variant in the H2O2 generation complex gene DUOX2/DUOXA2. Familial segregation analysis and in vitro functional studies supported this model. This work expands our understanding of the molecular causes of CHTD by demonstrating that digenic inheritance can be implicated, with deleterious variants in thyroid development and DUOX2/DUOXA2 genes. The complexity of this model implies a revision of the genetic landscape of CHTD and specific clinical care of patients during long-term follow-up.",
    "source": "pubmed_2019_2026",
    "category": "clinical"
  },
  {
    "PMID": "41693194",
    "title": "Severe congenital hyperinsulinism with progressive neurological deterioration due to novel HADH-GHSR digenic mutations: the first case report.",
    "authors": "Azzeddine Laaraje; Abdelilah Radi; Aomar Agadr; Rachid Abilkassem",
    "journal": "Pediatric endocrinology, diabetes, and metabolism",
    "year": "2025",
    "doi": "10.5114/pedm.2025.153731",
    "abstract": "Congenital hyperinsulinism (CHI) represents a\u00a0complex group of genetic disorders causing inappropriate insulin secretion. We report the first case of severe CHI caused by a\u00a0novel combination of HADH and GHSR mutations, leading to an unusually severe neurological phenotype. A male infant presented at 24 days of life with severe hypoglycemic seizures (0.3 mmol/l), inappropriate hyperinsulinemia (10.31 \u00b5UI/ml), and elevated C-peptide (2.64 \u00b5g/l). His clinical course was marked by progressive neurological deterioration, evolving from neonatal seizures to West syndrome at 12 months, and subsequently to Lennox-Gastaut syndrome at 3 years. Genetic analysis revealed a\u00a0previously undescribed combination of a\u00a0homozygous HADH deletion (5.25 kb, exons 3-4) and a\u00a0heterozygous GHSR missense variant (c.611C>A, p.Ala204Glu). Therapeutic management was particularly challenging in a\u00a0resource-limited setting, with unavailability of essential medications such as diazoxide. Despite intensive management with medium-chain triglyceride-enriched formula, levocarnitine, and nocturnal cornstarch, glycemic control remained suboptimal. At 7 years, the patient presents severe psychomotor delay (-4 SD for weight and height) and drug-resistant epilepsy. This case highlights the potential for severe phenotypes in digenic CHI and suggests synergistic effects between fatty acid metabolism and hormonal signaling pathways in glucose homeostasis, opening new perspectives for understanding complex forms of CHI.",
    "source": "pubmed_2019_2026",
    "category": "clinical"
  },
  {
    "PMID": "41728227",
    "title": "Digenic sarcomeric variants in paediatric dilated cardiomyopathy and maternal peripartum cardiomyopathy: a familial case report.",
    "authors": "Hakan Kurt; Z\u00fclal \u00dclger Tutar; Ert\u00fcrk Levent; Burcug\u00fcl Karasulu Beci; Eser Do\u011fan",
    "journal": "European heart journal. Case reports",
    "year": "2026",
    "doi": "10.1093/ehjcr/ytag105",
    "abstract": "Left ventricular non-compaction (LVNC) can be observed as a phenotypic trait in patients with dilated cardiomyopathy. Familial cases have been increasingly recognized, with sarcomeric gene mutations-particularly in MYH7 and MYBPC3-playing a significant role. Peripartum cardiomyopathy (PPCM) may also share overlapping genetic architecture with inherited cardiomyopathies. We report a 7-year-old girl with a clinical diagnosis of dilated cardiomyopathy with LVNC since infancy. Genetic analysis revealed two heterozygous missense variants in sarcomeric genes associated with inherited cardiomyopathies: MYH7: c.4186C>T (p.Arg1396Trp) and MYBPC3: c.2672G>A (p.Arg891Gln), both classified as variants of uncertain significance. Segregation analysis showed that the MYH7 variant was maternally inherited and the MYBPC3 variant paternally inherited. Notably, the mother developed PPCM 4 months postpartum, with an ejection fraction (EF) of 35%-40%, and was found to carry the same MYH7 variant. The father remained asymptomatic. This case highlights a potential familial cardiomyopathy syndrome with phenotypic variability: the child presenting with an dilated cardiomyopathy with LVNC phenotype and the mother with PPCM. The presence of distinct cardiomyopathy phenotypes within the same family carrying shared and separate sarcomeric variants suggests a possible genotype-phenotype correlation, emphasizing the importance of comprehensive genetic screening and long-term familial surveillance in such cases. This report highlights the clinical relevance of identifying digenic sarcomeric variants in paediatric cardiomyopathy, particularly when associated with a positive maternal history of PPCM. Familial evaluation and recognition of genotypic overlap may aid in risk stratification and management.",
    "source": "pubmed_2019_2026",
    "category": "clinical"
  },
  {
    "PMID": "41608432",
    "title": "Identification of co-segregating GJA3 and CRYBA1 missense variants in a Chinese family with congenital cataract: a possible digenic etiology.",
    "authors": "Chenchen Zhou; Kunke Li; Zhenxing Zhou; Shuhui Jian; Ling Jin et al. (7 authors)",
    "journal": "Frontiers in medicine",
    "year": "2025",
    "doi": "10.3389/fmed.2025.1743231",
    "abstract": "Congenital cataract (CC), defined as lens opacity present at birth or in early infancy, is a major cause of reversible childhood blindness and shows marked genetic heterogeneity. This study aimed to investigate the genetic basis of CC in a multigenerational Chinese family. A four-generation family with CC was clinically characterized. Whole-exome sequencing was performed in the proband, followed by stepwise variant filtering based on minor allele frequency, predicted functional impact, known CC-associated genes, and an autosomal dominant inheritance model. Candidate variants were annotated and classified according to ACMG guidelines. Sanger sequencing was used to validate variants in two additional affected relatives. Two heterozygous missense variants were identified in known CC-associated genes: GJA3 c.776C > A (p.Ser259Tyr) and CRYBA1 c.346A > T (p.Ile116Phe). Both were extremely rare or absent in population databases and predicted to be damaging by multiple in silico tools. Sanger sequencing confirmed that the two variants co-occurred in all three affected family members tested, and no other rare, protein-altering variants meeting the filtering criteria were found in established cataract genes. According to ACMG guidelines, both variants remain classified as variants of uncertain significance, but their rarity, predicted functional impact and consistent co-occurrence in affected individuals support them as strong candidate variants that may jointly contribute to CC in this family and expand the spectrum of GJA3- and CRYBA1-associated changes.",

  },
  {
    "PMID": "41584387",
    "title": "Digenic Functional B12 and Folate Defect Mimicking Myelodysplasia.",
    "authors": "Thomas Cluzeau; Abderrahim Oussalah; Ma\u00ebl Silva Rodriguez; Mourad Na\u00efmi",

    "abstract": "A digenic defect involving CUBN and MTHFR produced functional B12/folate deficiency in a patient with pancytopenia and neurological signs, mimicking myelodysplasia. Genetic and metabolic screening revealed elevated methylmalonic acid/homocysteine, with rapid remission post-parenteral B12. This case highlights the need for metabolic/genetic workup in atypical cytopenias.",

  {
    "PMID": "41520226",
    "title": "Benchmarking knowledge graph embedding models for the prediction of oligogenic combinations.",
    "authors": "Inas Bosch; Barbara Gravel; Alexandre Renaux; Ann Now\u00e9; Maris Laan et al. (6 authors)",
    "journal": "Briefings in bioinformatics",
    "year": "2026",
    "doi": "10.1093/bib/bbaf712",
    "abstract": "Identifying the potential oligogenic causes of rare diseases remains a challenge, notwithstanding the advancements made in the last decade. While a variety of predictive and ranking approaches have been proposed, their precision remains limited, as only a small number of high-quality training cases are available and it remains difficult to know which features may be most relevant for the design of new predictors. We hypothesize here that structured biological information, which provides an integration of various relevant biological networks and ontologies in a single heterogeneous knowledge graph, can make a difference as it allows for learning a relevant genetic representation through KGE methods. An exhaustive benchmarking is performed here wherein we assess the performance of various state-of-the-art embedding models for the task of identifying potentially pathogenic gene pairs. The results obtained show that these KGE provide highly accurate predictions, leading to an Area Under the Precision-Recall Curve of up to $0.93$, representing also a significant advancement over previous approaches for predicting gene pairs involved in oligogenic diseases. We show nonetheless that care needs to be taken in the cross-validation when using embeddings, as data leakage between folds in embedding space will reveal overly optimistic results. The further evaluation of the methods on a holdout set as well as on a group of new male infertility cases show that three Translational Distance models (TransE, MurE, and RotatE) and two of the Semantic Matching models (DisMult and QuatE) provide the better results. The analysis is concluded by comparing all known gene combinations for these top-ranking models, examining their similarities and differences. Overall, KGE provide a predictive advancement but new steps will need to be taken generate explanations as to why the pairs are relevant for oligogenic diseases.",
    "source": "pubmed_2019_2026",
    "category": "tools"
  },
  {
    "PMID": "41386981",
    "title": "The oligogenic inheritance test GCOD detects risk genes and their interactions in congenital heart defects.",
    "authors": "Maureen Pittman; Kihyun Lee; Franco Felix; Yu Huang; Adrienne Lam et al. (8 authors)",
    "journal": "Genome research",
    "year": "2026",
    "doi": "10.1101/gr.281141.125",
    "abstract": "Exome sequencing of thousands of families has revealed many risk genes for congenital heart defects (CHDs), yet most cases cannot be explained by a single causal mutation. Even within the same family, individuals carrying a particular mutation in a known risk gene often demonstrate variable phenotypes, suggesting the presence of genetic modifiers. To explore oligogenic causes of CHD without assessing billions of variant combinations, we develop an efficient, simulation-based method to detect gene sets that carry co-occurring damaging variants in probands at a higher rate than expected given parental genotypes. We implement this approach in software called Gene Combinations in Oligogenic Disease (GCOD) and apply it to a cohort of 3377 CHD trios with exome sequencing. This analysis detects 160 gene pairs in which damaging variants are transmitted with higher-than-expected frequency to CHD probands but rarely or never appear in combination in their unaffected parents. Stratifying by specific phenotypes and considering gene combinations of higher orders yields an additional 6026 gene sets. Genes found in oligogenic sets are overrepresented in pathways related to heart development and often co-occur in sets of cell type marker genes from single-cell expression data. Compound heterozygosity of the newly identified digenic pair Gata6-Por leads to higher CHD incidence in mice compared with single hemizygotes, validating predicted genetic interactions. As genome sequencing is applied to more families and other disorders, GCOD will enable detection of increasingly large, novel gene combinations, shedding light on combinatorial causes of genetic diseases.",
    "source": "pubmed_2019_2026",
    "category": "clinical"
  },
  {
    "PMID": "41205671",
    "title": "A new digenic inheritance of proteasome-associated autoinflammatory syndrome involving the PSMA6 gene.",
    "authors": "D\u00e9borah M\u00e9chin; Maud Tusseau; Martin Broly; Damien Sanlaville; S\u00e9bastien Viel et al. (10 authors)",
    "journal": "The journal of allergy and clinical immunology. In practice",
    "year": "2026",
    "doi": "10.1016/j.jaip.2025.10.039",
    "abstract": "",
    "source": "pubmed_2019_2026",
    "category": "clinical"
  }
];

    let currentCategory = 'all';
    let searchQuery = '';
    let yearFilter = '';
    let sortOrder = 'newest';

    function renderPapers() {
      const container = document.getElementById('papers-container');
      
      let filtered = papersData.filter(p => {
        // Category filter
        if (currentCategory !== 'all' && p.category !== currentCategory) return false;
        
        // Year filter
        if (yearFilter && p.year != yearFilter) return false;
        
        // Search filter
        if (searchQuery) {
          const query = searchQuery.toLowerCase();
          const text = (p.title + ' ' + p.authors + ' ' + p.journal + ' ' + p.abstract).toLowerCase();
          return text.includes(query);
        }
        
        return true;
      });
      
      // Sort
      filtered.sort((a, b) => {
        if (sortOrder === 'newest') {
          return (b.year || 0) - (a.year || 0);
        } else {
          return (a.year || 0) - (b.year || 0);
        }
      });
      
      if (filtered.length === 0) {
        container.innerHTML = '<div class="no-results">No papers found matching your criteria.</div>';
        return;
      }
      
      container.innerHTML = filtered.map(paper => `
        <div class="paper-card" data-category="${paper.category}">
          <div class="paper-header">
            <div class="paper-meta">
              <span class="paper-year">${paper.year || 'N/A'}</span>
              <span class="category-badge ${paper.category}">${paper.category}</span>
            </div>
          </div>
          <div class="paper-title-container">
            <div class="paper-title">${paper.title}</div>
            <button class="copy-btn" onclick="copyToClipboard('${paper.PMID}', this)">📋 Copy PMID</button>
          </div>
          <div class="paper-authors">${paper.authors}</div>
          <div class="paper-journal">${paper.journal}</div>
          ${paper.abstract ? `<div class="paper-abstract">${paper.abstract}</div>` : ''}
          <div class="paper-links">
            ${paper.PMID ? `<a href="https://pubmed.ncbi.nlm.nih.gov/${paper.PMID}/" target="_blank">🔗 PubMed</a>` : ''}
            ${paper.DOI ? `<a href="https://doi.org/${paper.DOI}" target="_blank">📄 DOI</a>` : ''}
          </div>
        </div>
      `).join('');
    }

    function filterByCategory(category) {
      currentCategory = category;
      document.querySelectorAll('.category-tab').forEach(tab => {
        tab.classList.toggle('active', tab.dataset.category === category);
      });
      renderPapers();
    }

    function copyToClipboard(text, btn) {
      navigator.clipboard.writeText(text).then(() => {
        btn.textContent = '✓ Copied!';
        btn.classList.add('copied');
        showToast();
        setTimeout(() => {
          btn.textContent = '📋 Copy PMID';
          btn.classList.remove('copied');
        }, 2000);
      });
    }

    function showToast() {
      const toast = document.getElementById('toast');
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2000);
    }

    function exportData() {
      const dataStr = JSON.stringify(papersData, null, 2);
      const blob = new Blob([dataStr], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'digenic_oligogenic_papers.json';
      a.click();
      URL.revokeObjectURL(url);
    }

    // Event listeners
    document.getElementById('search-input').addEventListener('input', (e) => {
      searchQuery = e.target.value;
      renderPapers();
    });

    document.getElementById('year-input').addEventListener('input', (e) => {
      yearFilter = e.target.value;
      renderPapers();
    });

    document.getElementById('sort-order').addEventListener('change', (e) => {
      sortOrder = e.target.value;
      renderPapers();
    });

    // Initial render
    renderPapers();
  </script>
</body>
</html>
