  {
    "PMID": "35891796",
    "title": "An accurate prediction model of digenic interaction for estimating pathogenic gene pairs of human diseases.",
    "authors": "Yangyang Yuan; Liubin Zhang; Qihan Long; Hui Jiang; Miaoxin Li",
    "journal": "Computational and structural biotechnology journal",
    "year": "2022",
    "doi": "10.1016/j.csbj.2022.07.011",
    "abstract": "Increasing evidence shows that genetic interaction across the entire genome may explain a non-trivial fraction of genetic diseases. Digenic interaction is the simplest manifestation of genetic interaction among genes. However, systematic exploration of digenic interactive effects on the whole genome is often discouraged by the high dimension burden. Thus, numerous digenic interactions are yet to be identified for many diseases. Here, we propose a Digenic Interaction Effect Predictor (DIEP), an accurate machine-learning approach to identify the genome-wide pathogenic coding gene pairs with digenic interaction effects. This approach achieved high accuracy and sensitivity in independent testing datasets, outperforming another gene-level digenic predictor (DiGePred). DIEP was also able to discriminate digenic interaction effect from bi-locus effects dual molecular diagnosis (pseudo-digenic). Using DIEP, we provided a valuable resource of genome-wide digenic interactions and demonstrated the enrichment of the digenic interaction effect in Mendelian and Oligogenic diseases. Therefore, DIEP will play a useful role in facilitating the genomic mapping of interactive causal genes for human diseases.",
    "source": "pubmed_2019_2026",
    "category": "tools"
  },
  {
    "PMID": "35812163",
    "title": "FUS-P525L Juvenile Amyotrophic Lateral Sclerosis and Intellectual Disability: Evidence for Association and Oligogenic Inheritance.",
    "authors": "Orly Goldstein; Talya Inbar; Merav Kedmi; Mali Gana-Weisz; Beatrice Abramovich et al. (7 authors)",
    "journal": "Neurology. Genetics",
    "year": "2022",
    "doi": "10.1212/NXG.0000000000200009",
    "abstract": "Amyotrophic lateral sclerosis (ALS) is characterized by upper and lower motor neuron degeneration, with juvenile ALS (jALS) defined as disease with age at onset (AAO) before 25 years. We aimed to identify the genetic basis of 2 unrelated patients with jALS with very rapid deterioration and early age intellectual disability (ID) and to assess association of genetic findings with both phenotypes in a large cohort of patients with ALS and controls, and in the literature. Exome sequencing was performed in 2 unrelated probands and their parents. Trio analyses included de novo, rare homozygosity, and compound heterozygosity analyses. A TaqMan genotyping assay was used to genotype ALS cohorts. A systematic literature review was conducted and additional information from authors obtained to assess prevalence of fused in sarcoma (FUS)-ALS associated with ID. A de novo mutation FUS-P525L was identified in both patients. Additional variations were identified in other genes related to intellectual disabilities. Among 8 additional unrelated juvenile patients, one carried the same FUS mutation and had a similar medical history of mild ID and fulminant ALS, whereas the others did not carry any FUS coding mutations and had no reported learning or intellectual disabilities (p = 0.0083). In addition, 486 patients with ALS with AAO \u226525 years were negative for this mutation. An extensive literature review showed that among all patients with FUS-related ALS with full phenotype reports, 10.3% exhibited additional learning/intellectual disabilities. FUS-P525L mutation was identified in 3 among 10 patients with jALS (30%) in our clinical cohort, all with a very aggressive disease course and ID. Together with literature reports, these results support a novel association between mutations in FUS and early life ID. Additional variations identified in genes related to ID and brain development in our patients (GPT2, DNAH10, and SCUBE2) may suggest a complex oligogenic inheritance for this phenotype. We propose that this mutation should be screened in patients with ALS with very early AAO, aggressive disease course, and sporadic occurrence, especially when ALS is accompanied by ID.",
    "source": "pubmed_2019_2026",
    "category": "clinical"
  },
  {
    "PMID": "35741735",
    "title": "Potential Composite Digenic Contribution of NPC1 and NOD2 Leading to Atypical Lethal Niemann-Pick Type C with Initial Crohn's Disease-like Presentation: Genotype-Phenotype Correlation Study.",
    "authors": "Bilal Azab; Omar Rabab'h; Dunia Aburizeg; Hashim Mohammad; Zain Dardas et al. (10 authors)",
    "journal": "Genes",
    "year": "2022",
    "doi": "10.3390/genes13060973",
    "abstract": "Niemann-Pick disease type C (NPC) is an autosomal recessive neurovisceral disease characterized by progressive neurodegeneration with variable involvement of multisystemic abnormalities. Crohn's disease (CD) is an inflammatory bowel disease (IBD) with a multifactorial etiology influenced by variants in NOD2. Here, we investigated a patient with plausible multisystemic overlapping manifestations of both NPC and CD. Her initial hospitalization was due to a prolonged fever and non-bloody diarrhea. A few months later, she presented with recurrent skin tags and anal fissures. Later, her neurological and pulmonary systems progressively deteriorated, leading to her death at the age of three and a half years. Differential diagnosis of her disease encompassed a battery of clinical testing and genetic investigations. The patient's clinical diagnosis was inconclusive. Specifically, the histopathological findings were directed towards an IBD disease. Nevertheless, the diagnosis of IBD was not consistent with the patient's subsequent neurological and pulmonary deterioration. Consequently, we utilized a genetic analysis approach to guide the diagnosis of this vague condition. Our phenotype-genotype association attempts led to the identification of candidate disease-causing variants in both NOD2 and NPC1. In this study, we propose a potential composite digenic impact of these two genes as the underlying molecular etiology. This work lays the foundation for future functional and mechanistic studies to unravel the digenic role of NOD2 and NPC1.",
    "source": "pubmed_2019_2026",
    "category": "clinical"
  },
  {
    "PMID": "35675912",
    "title": "Digenic Alport Syndrome.",
    "authors": "Judy Savige; Alessandra Renieri; Elisabet Ars; Sergio Daga; Anna Maria Pinto et al. (12 authors)",
    "journal": "Clinical journal of the American Society of Nephrology : CJASN",
    "year": "2022",
    "doi": "10.2215/CJN.03120322",
    "abstract": "Digenic Alport syndrome refers to the inheritance of pathogenic variants in COL4A5 plus COL4A3 or COL4A4 or in COL4A3 plus COL4A4 Where digenic Alport syndrome includes a pathogenic COL4A5 variant, the consequences depend on the sex of the affected individual, COL4A5 variant \"severity,\" and the nature of the COL4A3 or COL4A4 change. A man with a pathogenic COL4A5 variant has all his collagen IV \u03b13\u03b14\u03b15-heterotrimers affected, and an additional COL4A3 or COL4A4 variant may not worsen disease. A woman with a pathogenic COL4A5 variant has on average 50% of her heterotrimers affected, which is increased to 75% with a further COL4A3 or COL4A4 variant and associated with a higher risk of proteinuria. In digenic Alport syndrome with pathogenic COL4A3 and COL4A4 variants, 75% of the heterotrimers are affected. The COL4A3 and COL4A4 genes occur head-to-head on chromosome 2, and inheritance is autosomal dominant when both variants affect the same chromosome (in cis) or recessive when they affect different chromosomes (in trans). This form of digenic disease results in increased proteinuria and a median age of kidney failure intermediate between autosomal dominant and autosomal recessive Alport syndrome. Previous guidelines have suggested that all pathogenic or likely pathogenic digenic variants should be identified and reported. Affected family members should be identified, treated, and discouraged from kidney donation. Inheritance within a family is easier to predict if the two variants are considered independently and if COL4A3 and COL4A4 variants are known to be inherited on the same or different chromosomes.",
    "source": "pubmed_2019_2026",
    "category": "clinical"
  },
  {
    "PMID": "35668055",
    "title": "Rare CACNA1H and RELN variants interact through mTORC1 pathway in oligogenic autism spectrum disorder.",
    "authors": "Andr\u00e9 Lu\u00edz Teles E Silva; Talita Glaser; Karina Griesi-Oliveira; Juliana Corr\u00eaa-Velloso; Jaqueline Yu Ting Wang et al. (13 authors)",
    "journal": "Translational psychiatry",
    "year": "2022",
    "doi": "10.1038/s41398-022-01997-9",
    "abstract": "Oligogenic inheritance of autism spectrum disorder (ASD) has been supported by several studies. However, little is known about how the risk variants interact and converge on causative neurobiological pathways. We identified in an ASD proband deleterious compound heterozygous missense variants in the Reelin (RELN) gene, and a de novo splicing variant in the Cav3.2 calcium channel (CACNA1H) gene. Here, by using iPSC-derived neural progenitor cells (NPCs) and a heterologous expression system, we show that the variant in Cav3.2 leads to increased calcium influx into cells, which overactivates mTORC1 pathway and, consequently, further exacerbates the impairment of Reelin signaling. Also, we show that Cav3.2/mTORC1 overactivation induces proliferation of NPCs and that both mutant Cav3.2 and Reelin cause abnormal migration of these cells. Finally, analysis of the sequencing data from two ASD cohorts-a Brazilian cohort of 861 samples, 291 with ASD; the MSSNG cohort of 11,181 samples, 5,102 with ASD-revealed that the co-occurrence of risk variants in both alleles of Reelin pathway genes and in one allele of calcium channel genes confer significant liability for ASD. Our results support the notion that genes with co-occurring deleterious variants tend to have interconnected pathways underlying oligogenic forms of ASD.",
    "source": "pubmed_2019_2026",
    "category": "clinical"
  },
  {
    "PMID": "35581032",
    "title": "Machine learning approaches to explore digenic inheritance.",
    "authors": "Atsuko Okazaki; Jurg Ott",
    "journal": "Trends in genetics : TIG",
    "year": "2022",
    "doi": "10.1016/j.tig.2022.04.009",
    "abstract": "Some rare genetic disorders, such as retinitis pigmentosa or Alport syndrome, are caused by the co-inheritance of DNA variants at two different genetic loci (digenic inheritance). To capture the effects of these disease-causing variants and their possible interactive effects, various statistical methods have been developed in human genetics. Analogous developments have taken place in the field of machine learning, particularly for the field that is now called Big Data. In the past, these two areas have grown independently and have started to converge only in recent years. We discuss an overview of each of the two fields, paying special attention to machine learning methods for uncovering the combined effects of pairs of variants on human disease.",
    "source": "pubmed_2019_2026",
    "category": "clinical"
  },
  {
    "PMID": "35451961",
    "title": "Oligogenic heterozygous inheritance of sperm abnormalities in mouse.",
    "authors": "Guillaume Martinez; Charles Coutton; Corinne Loeuillet; Caroline Cazin; Jana Muro\u0148ov\u00e1 et al. (17 authors)",
    "journal": "eLife",
    "year": "2022",
    "doi": "10.7554/eLife.75373",
    "abstract": "Male infertility is an important health concern that is expected to have a major genetic etiology. Although high-throughput sequencing has linked gene defects to more than 50% of rare and severe sperm anomalies, less than 20% of common and moderate forms are explained. We hypothesized that this low success rate could at least be partly due to oligogenic defects - the accumulation of several rare heterozygous variants in distinct, but functionally connected, genes. Here, we compared fertility and sperm parameters in male mice harboring one to four heterozygous truncating mutations of genes linked to multiple morphological anomalies of the flagellum (MMAF) syndrome. Results indicated progressively deteriorating sperm morphology and motility with increasing numbers of heterozygous mutations. This first evidence of oligogenic inheritance in failed spermatogenesis strongly suggests that oligogenic heterozygosity could explain a significant proportion of asthenoteratozoospermia cases. The findings presented pave the way to further studies in mice and man.",
    "source": "pubmed_2019_2026",
    "category": "clinical"
  },
  {
    "PMID": "35418949",
    "title": "Can Digenic, Tri-Allelic Inheritance of Variants in STAR and CYP11A1 Give Rise to Primary Adrenal Insufficiency? A Case Report.",
    "authors": "Naseer Ali; Avinaash Vickram Maharaj; Federica Buonocore; John C Achermann; Louise A Metherell",
    "journal": "Frontiers in endocrinology",
    "year": "2022",
    "doi": "10.3389/fendo.2022.860055",
    "abstract": "An eight-year old South Asian boy presenting with progressive hyperpigmentation was found to have primary adrenal insufficiency (PAI) in the form of isolated glucocorticoid deficiency. Follow up of this boy for nine years, until the age of 17 years showed normal pubertal onset and progression. Molecular evaluation, by targeted next generation sequencing of candidate genes linked to PAI revealed changes in two genes that are intricately linked in the early stages of steroid biosynthesis: compound heterozygous variants in STAR, c.465+1G>A and p.(E99K), plus a heterozygous rs6161 change in CYP11A1. No variants in other known causal genes were detected. The proband's mother was heterozygous for the c.465+1G>A STAR and rs6161 CYP11A1 variants, while the father was homozygous for the p.(E99K) alteration in STAR but wild-type for CYP11A1. Both parents had normal adrenal cortical function as revealed by short Synacthen tests. The STAR variant c.465+1G>A will lead to abnormal splicing of exon 4 in mRNA and the addition of the p.(E99K) variant, predicted damaging by SIFT and CADD, may be sufficient to cause PAI but this is by no means certain given that the unaffected father is homozygous for the latter change. The rs6161 CYP11A1 variant [c.940G>A, p.(E314K)] has recently been demonstrated to cause PAI in conjunction with a severe rare disruptive change on the other allele, however sequencing of the coding region of CYP11A1 revealed no further changes in this subject. We wondered whether the phenotype of isolated glucocorticoid deficiency had arisen in this child due to tri-allelic inheritance of a heterozygous CYP11A1 change along with the two STAR variants each of which contribute a partial loss-of-function burden that, when combined, is sufficient to cause PAI or if the loss-of-function c.465+1G>A combined with the presumed partial loss-of-function p.(E99K) in STAR could be causative.",
    "source": "pubmed_2019_2026",
    "category": "clinical"
  },
  {
    "PMID": "35411390",
    "title": "Scaling up oligogenic diseases research with OLIDA: the Oligogenic Diseases Database.",
    "authors": "Charlotte Nachtegael; Barbara Gravel; Arnau Dillen; Guillaume Smits; Ann Now\u00e9 et al. (7 authors)",
    "journal": "Database : the journal of biological databases and curation",
    "year": "2022",
    "doi": "10.1093/database/baac023",
    "abstract": "Improving the understanding of the oligogenic nature of diseases requires access to high-quality, well-curated Findable, Accessible, Interoperable, Reusable (FAIR) data. Although first steps were taken with the development of the Digenic Diseases Database, leading to novel computational advancements to assist the field, these were also linked with a number of limitations, for instance, the ad hoc curation protocol and the inclusion of only digenic cases. The OLIgogenic diseases DAtabase (OLIDA) presents a novel, transparent and rigorous curation protocol, introducing a confidence scoring mechanism for the published oligogenic literature. The application of this protocol on the oligogenic literature generated a new repository containing 916 oligogenic variant combinations linked to 159 distinct diseases. Information extracted from the scientific literature is supplemented with current knowledge support obtained from public databases. Each entry is an oligogenic combination linked to a disease, labelled with a confidence score based on the level of genetic and functional evidence that supports its involvement in this disease. These scores allow users to assess the relevance and proof of pathogenicity of each oligogenic combination in the database, constituting markers for reporting improvements on disease-causing oligogenic variant combinations. OLIDA follows the FAIR principles, providing detailed documentation, easy data access through its application programming interface and website, use of unique identifiers and links to existing ontologies. https://olida.ibsquare.be.",
    "source": "pubmed_2019_2026",
    "category": "tools"
  },
  {
    "PMID": "35410794",
    "title": "Rare variants and the oligogenic architecture of autism.",
    "authors": "Tianyun Wang; Peiyao A Zhao; Evan E Eichler",
    "journal": "Trends in genetics : TIG",
    "year": "2022",
    "doi": "10.1016/j.tig.2022.03.009",
    "abstract": "Most large-scale genetic studies of autism have focused on the discovery of genes by proving an enrichment of de novo mutations (DNMs) in autism probands or characterizing polygenic risk based on the association of common variants. We present evidence in support of an oligogenic model where two or more ultrarare mutations of more modest effect are preferentially transmitted to children with autism. Such private gene-disruptive mutations are enriched in families where there are multiple affected individuals, emerged two or three generations ago, and map to genes not previously associated with autism. Although no single gene has reached statistical significance, this class of variation should be considered along with genetic and nongenetic factors to better explain the etiology of this complex trait.",
    "source": "pubmed_2019_2026",
    "category": "clinical"
  },
  {
    "PMID": "35341025",
    "title": "Identification of two variants in AGRN and RPL3L genes in a patient with catecholaminergic polymorphic ventricular tachycardia suggesting new candidate disease genes and digenic inheritance.",
    "authors": "Hager Jaouadi; Sonia Chabrak; Saida Lahbib; Sonia Abdelhak; St\u00e9phane Zaffran",
    "journal": "Clinical case reports",
    "year": "2022",
    "doi": "10.1002/ccr3.5339",
    "abstract": "Catecholaminergic polymorphic ventricular tachycardia (CPVT) is an arrhythmogenic syndrome characterized by life-threatening arrhythmias, a normal resting electrocardiogram and the absence of overt structural heart abnormalities. Mutations in RyR2\u00a0gene account for the large part of CPVT cases. Less frequently, mutations in CASQ2\u00a0gene have been linked to the recessive form of the disease. Overall, approximately 35% of CPVT patients remain without a genetic etiology implying that other genes might be found causative of the disease. Here, we present a 6-year-old boy born to first-degree related parents, with a typical phenotype of CPVT and a family history of sudden cardiac death of his brother at 7\u00a0years. A trio-based whole exome sequencing was performed, and we identified a homozygous variant in AGRN gene and a heterozygous variant in RPL3L gene. We hypothesized that the presence of the homozygous variant in AGRN accounts for the CPVT phenotype in this family and the heterozygous variant in RPL3L gene may act as a modifier gene. Further studies are needed to determine the role of these genes in CPVT.",

  {
    "PMID": "35323704",
    "title": "Whole Exome/Genome Sequencing Joint Analysis of a Family with Oligogenic Familial Hypercholesterolemia.",
    "authors": "Youmna Ghaleb; Sandy Elbitar; Anne Philippi; Petra El Khoury; Yara Azar et al. (31 authors)",
    "journal": "Metabolites",
    "year": "2022",
    "doi": "10.3390/metabo12030262",
    "abstract": "Autosomal Dominant Hypercholesterolemia (ADH) is a genetic disorder caused by pathogenic variants in LDLR, APOB, PCSK9 and APOE genes. We sought to identify new candidate genes responsible for the ADH phenotype in patients without pathogenic variants in the known ADH-causing genes by focusing on a French family with affected and non-affected members who presented a high ADH polygenic risk score (wPRS). Linkage analysis, whole exome and whole genome sequencing resulted in the identification of variants p.(Pro398Ala) in CYP7A1, p.(Val1382Phe) in LRP6 and p.(Ser202His) in LDLRAP1. A total of 6 other variants were identified in 6 of 160 unrelated ADH probands: p.(Ala13Val) and p.(Aps347Asn) in CYP7A1; p.(Tyr972Cys), p.(Thr1479Ile) and p.(Ser1612Phe) in LRP6; and p.(Ser202LeufsTer19) in LDLRAP1. All six probands presented a moderate wPRS. Serum analyses of carriers of the p.(Pro398Ala) variant in CYP7A1 showed no differences in the synthesis of bile acids compared to the serums of non-carriers. Functional studies of the four LRP6 mutants in HEK293T cells resulted in contradictory results excluding a major effect of each variant alone. Within the family, none of the heterozygous for only the LDLRAP1 p.(Ser202His) variant presented ADH. Altogether, each variant individually does not result in elevated LDL-C; however, the oligogenic combination of two or three variants reveals the ADH phenotype.",
    "source": "pubmed_2019_2026",
    "category": "clinical"
  },
  {
    "PMID": "35301265",
    "title": "A general framework for identifying oligogenic combinations of rare variants in complex disorders.",
    "authors": "Vijay Kumar Pounraja; Santhosh Girirajan",
    "journal": "Genome research",
    "year": "2022",
    "doi": "10.1101/gr.276348.121",
    "abstract": "Genetic studies of complex disorders such as autism and intellectual disability (ID) are often based on enrichment of individual rare variants or their aggregate burden in affected individuals compared to controls. However, these studies overlook the influence of combinations of rare variants that may not be deleterious on their own due to statistical challenges resulting from rarity and combinatorial explosion when enumerating variant combinations, limiting our ability to study oligogenic basis for these disorders. Here, we present RareComb, a framework that combines the Apriori algorithm and statistical inference to identify specific combinations of mutated genes associated with complex phenotypes. RareComb overcomes computational barriers and exhaustively evaluates variant combinations to identify nonadditive relationships between simultaneously mutated genes. Using RareComb, we analyzed 6189 individuals with autism and identified 718 combinations significantly associated with ID, and carriers of these combinations showed lower IQ than expected in an independent cohort of 1878 individuals. These combinations were enriched for nervous system genes such as NIN and NGF, showed complex inheritance patterns, and were depleted in unaffected siblings. We found that an affected individual can carry many oligogenic combinations, each contributing to the same phenotype or distinct phenotypes at varying effect sizes. We also used this framework to identify combinations associated with multiple comorbid phenotypes, including mutations of COL28A1 and MFSD2B for ID and schizophrenia and ABCA4, DNAH10 and MC1R for ID and anxiety/depression. Our framework identifies a key component of missing heritability and provides a novel paradigm to untangle the genetic architecture of complex disorders.",
    "source": "pubmed_2019_2026",
    "category": "clinical"

    "PMID": "38882238",
    "title": "Digenic Analysis Finds Highly Interactive Genetic Variants Underlying Polygenic Traits.",
    "authors": "Gao Wang; Jurg Ott",
    "journal": "Medical research archives",
    "year": "2023",
    "doi": "10.18103/mra.v11i10.4604",
    "abstract": "We briefly review our recently published approach to mining digenic genotype patterns, which consist of two genotypes each originating in a different DNA variant. We do this for a genetic case-control study by evaluating all possible pairs of genotypes, distributing the workload over numerous CPUs (threads) in a high-performance computing environment and apply our methods to two known datasets, age-related macular degeneration (AMD) and Parkinson Disease (PD). Based on a list of (e.g., 100,000) genotype pairs with largest genotype pair frequency differences between cases and controls, we determine the number  N u   of unique variants occurring in this list. For each unique variant, we find the number of genotype pairs it participates in, which identifies a set of variants \"connected\" with the given unique variant. Among the total of variants \"connected\" with all unique variants, only a subset of variants is unique. The ratio of all connected variants divided by that subset of variants is a measure for the overall density or connectedness of variants interacting with each other. We find that variants for the AMD data are much more interconnected than those for PD, at least based on the 100,000 genotype pairs with largest chi-square we investigated. Further, for each of the  N u   unique variants, we use the number of variants connected with it as a test statistic, weighted by the inverse of the rank at which the unique variant first occurred in the original list of genotype patterns. This weighing scheme ties the number of connections to the genetics of the trait and allows us to obtain, for each of the  N u   unique variants, an empirical significance level by permuting ranks. We find 12 and 8 significant, highly connected variants for AMD and PD, respectively, some of which have previously been identified by other machine learning methods, thus providing credence to our approach. Among the 100,000 genotype pairs investigated for each of AMD and PD, significant variants showed connections with up to 7,093 and 3,777 other variants, respectively. Our approach has been implemented in a freely available piece of software, the Digenic Network Test. Thus, our statistical genetics method can provide important information on the genetic architecture of polygenic traits.",
    "source": "pubmed_2019_2026",
    "category": "tools"
  },

  {
    "PMID": "38259908",
    "title": "Virus induced gene silencing confirms oligogenic inheritance of brown stem rot resistance in soybean.",
    "authors": "Chantal E McCabe; Lori M Lincoln; Jamie A O'Rourke; Michelle A Graham",
    "journal": "Frontiers in plant science",
    "year": "2023",
    "doi": "10.3389/fpls.2023.1292605",
    "abstract": "Brown Stem Rot (BSR), caused by the soil borne fungal pathogen Phialophora gregata, can reduce soybean yields by as much as 38%. Previous allelism studies identified three Resistant to brown stem Rot genes (Rbs1, Rbs2, and Rbs3), all mapping to large, overlapping regions on soybean chromosome 16. However, recent fine-mapping and genome wide association studies (GWAS) suggest Rbs1, Rbs2, and Rbs3 are alleles of a single Rbs locus. To address this conflict, we characterized the Rbs locus using the Williams82 reference genome (Wm82.a4.v1). We identified 120 Receptor-Like Proteins (RLPs), with hallmarks of disease resistance receptor-like proteins (RLPs), which formed five distinct clusters. We developed virus induced gene silencing (VIGS) constructs to target each of the clusters, hypothesizing that silencing the correct RLP cluster would result in a loss of resistance phenotype. The VIGS constructs were tested against P. gregata resistant genotypes L78-4094 (Rbs1), PI 437833 (Rbs2), or PI 437970 (Rbs3), infected with P. gregata or mock infected. No loss of resistance phenotype was observed. We then developed VIGS constructs targeting two RLP clusters with a single construct. Construct B1a/B2 silenced P. gregata resistance in L78-4094, confirming at least two genes confer Rbs1-mediated resistance to P. gregata. Failure of B1a/B2 to silence resistance in PI 437833 and PI 437970 suggests additional genes confer BSR resistance in these lines. To identify differentially expressed genes (DEGs) responding to silencing, we conducted RNA-seq of leaf, stem and root samples from B1a/B2 and empty vector control plants infected with P. gregata or mock infected. B1a/B2 silencing induced DEGs associated with cell wall biogenesis, lipid oxidation, the unfolded protein response and iron homeostasis and repressed numerous DEGs involved in defense and defense signaling. These findings will improve integration of Rbs resistance into elite germplasm and provide novel insights into fungal disease resistance.",
    "source": "pubmed_2019_2026",
    "category": "clinical"
  },
  {
    "PMID": "38148819",
    "title": "Digenic CHD7 and SMCHD1 inheritance Unveils phenotypic variability in a family mainly presenting with hypogonadotropic hypogonadism.",
    "authors": "Tian Wang; Wu Ren; Fangfang Fu; Hairong Wang; Yan Li et al. (6 authors)",
    "journal": "Heliyon",
    "year": "2024",
    "doi": "10.1016/j.heliyon.2023.e23272",
    "abstract": "CHARGE syndrome is a congenital hereditary condition involving multiple systems. Patients are easily misdiagnosed with idiopathic hypogonadotropic hypogonadism (IHH) due to the overlap of clinical manifestations. An accurate clinical diagnosis remains challenging when the predominant clinical manifestation resembles hypogonadotropic hypogonadism. This original research is conducted based on the genetic finding and analysis of clinical cases. Whole-exome sequencing (WES) and in-silico analyse were performed on two sisters to investigate the pathogenesis in this family. Homology modelling was conducted to evaluate structural changes in the variants. WES and Sanger sequencing revealed two siblings carrying a nonsense mutation (NM_017780.4: c.115C\u00a0>\u00a0T) in exon 2 of CHD7 inherited from a mildly affected mother and a missense mutation (NM_015295.3: c.2582T\u00a0>\u00a0C) in exon 20 of SMCHD1 inherited from an asymptomatic father. The nonsense mutation in CHD7 was predicted to generate nonsense-mediated decay, whereas the missense mutation in SMCHD1 decreased protein stability. We identified digenic CHD7 and SMCHD1 mutations in IHH-associated diseases for the first time and verified the synergistic role of oligogenic inheritance. It was also determined that WES is an effective tool for distinguishing diseases with overlapping features and establishing a molecular diagnosis for cases with digenic or oligogenic hereditary disorders, which is beneficial for timely treatment, and family genetic counseling.",
    "source": "pubmed_2019_2026",
    "category": "clinical"
  },
  {
    "PMID": "38016875",
    "title": "Distal myopathy due to digenic inheritance of TIA1 and SQSTM1 variants in two unrelated Spanish patients.",
    "authors": "Laura Bermejo-Guerrero; Carlos Pablo de Fuenmayor Fern\u00e1ndez-de la Hoz; Lidia Gonz\u00e1lez-Quereda; Alba Segarra-Casas; Velina Nedkova et al. (11 authors)",
    "journal": "Neuromuscular disorders : NMD",
    "year": "2023",
    "doi": "10.1016/j.nmd.2023.10.016",
    "abstract": "Welander distal myopathy typically manifests in late adulthood and is caused by the founder TIA1 c.1150G>A (p.Glu384Lys) variant in families of Swedish and Finnish descent. Recently, a similar phenotype has been attributed to the digenic inheritance of TIA1 c.1070A>G (p.Asn357Ser) and SQSTM1 c.1175C>T (p.Pro392Leu) variants. We describe two unrelated Spanish patients presenting with slowly progressive gait disturbance, distal-predominant weakness, and mildly elevated creatine kinase (CK) levels since their 6th decade. Electromyography revealed abnormal spontaneous activity and a myopathic pattern. Muscle magnetic resonance imaging (MRI) showed marked fatty replacement in distal leg muscles. A muscle biopsy, performed on one patient, revealed myopathic changes with rimmed vacuoles. Both patients carried the TIA1 p.Asn357Ser and SQSTM1 p.Pro392Leu variants. Digenic inheritance is supported by evidence from unrelated pedigrees and a plausible biological interaction between both proteins in protein quality control processes. Recent functional studies and additional case descriptions further support this. Clinical suspicion is necessary to seek both variants.",
    "source": "pubmed_2019_2026",
    "category": "clinical"
  },
  {
    "PMID": "37953885",
    "title": "An interpretable Alzheimer's disease oligogenic risk score informed by neuroimaging biomarkers improves risk prediction and stratification.",
    "authors": "Erica H Suh; Garam Lee; Sang-Hyuk Jung; Zixuan Wen; Jingxuan Bao et al. (12 authors)",
    "journal": "Frontiers in aging neuroscience",
    "year": "2023",
    "doi": "10.3389/fnagi.2023.1281748",
    "abstract": "Stratification of Alzheimer's disease (AD) patients into risk subgroups using Polygenic Risk Scores (PRS) presents novel opportunities for the development of clinical trials and disease-modifying therapies. However, the heterogeneous nature of AD continues to pose significant challenges for the clinical broadscale use of PRS. PRS remains unfit in demonstrating sufficient accuracy in risk prediction, particularly for individuals with mild cognitive impairment (MCI), and in allowing feasible interpretation of specific genes or SNPs contributing to disease risk. We propose adORS, a novel oligogenic risk score for AD, to better predict risk of disease by using an optimized list of relevant genetic risk factors. Using whole genome sequencing data from the Alzheimer's Disease Neuroimaging Initiative (ADNI) cohort (n\u2009 =\u2009 1,545), we selected 20 genes that exhibited the strongest correlations with FDG-PET and AV45-PET, recognized neuroimaging biomarkers that detect functional brain changes in AD. This subset of genes was incorporated into adORS to assess, in comparison to PRS, the prediction accuracy of CN vs. AD classification and MCI conversion prediction, risk stratification of the ADNI cohort, and interpretability of the genetic information included in the scores. adORS improved AUC scores over PRS in both CN vs. AD classification and MCI conversion prediction. The oligogenic model also refined risk-based stratification, even without the assistance of APOE, thus reflecting the true prevalence rate of the ADNI cohort compared to PRS. Interpretation analysis shows that genes included in adORS, such as ATF6, EFCAB11, ING5, SIK3, and CD46, have been observed in similar neurodegenerative disorders and/or are supported by AD-related literature. Compared to conventional PRS, adORS may prove to be a more appropriate choice of differentiating patients into high or low genetic risk of AD in clinical studies or settings. Additionally, the ability to interpret specific genetic information allows the focus to be shifted from general relative risk based on a given population to the information that adORS can provide for a single individual, thus permitting the possibility of personalized treatments for AD.",
    "source": "pubmed_2019_2026",
    "category": "clinical"
  },
  {
    "PMID": "37937686",
    "title": "Digenic inheritance accounts for phenotypic variability in amelogenesis imperfecta.",
    "authors": "Yi Yang; Man Qin; Yuming Zhao; Xin Wang",
    "journal": "Clinical genetics",
    "year": "2024",
    "doi": "10.1111/cge.14449",
    "abstract": "Amelogenesis imperfecta (AI) represents a group of clinically and genetically heterogeneous disorders that affect enamel formation and mineralization. Although AI is commonly considered a monogenic disorder, digenic inheritance is rarely reported. In this study, we recruited two nonconsanguineous Chinese families exhibiting diverse phenotypes of enamel defects among affected family members. Digenic variants were discovered in both probands. In family 1, the proband inherited a paternal frameshift variant in LAMA3 (NM_198129.4:c.3712dup) and a maternal deletion encompassing the entire AMELX gene. This resulted in a combined hypoplastic and hypomineralized AI phenotype, which was distinct from the parents' manifestations. In family 2, whole-exome sequencing analysis revealed the proband carried a maternal heterozygous splicing variant in COL17A1 (NC_000010.11 (NM_000494.3): c.4156\u2009+\u20092dup) and compound heterozygous variants in RELT (paternal: NM_032871.4:c.260A\u2009>\u2009T; maternal: NM_032871.4:c.521\u2009T\u2009>\u2009G). These genetic changes caused the abundant irregular enamel defects observed in the proband, whereas other affected family members carrying heterozygous variants in both COL17A1 and RELT displayed only horizontal grooves as their phenotype. The pathogenicity of the novel COL17A1 splice site variant was confirmed through RT-PCR and minigene assay. This study enhances our understanding by highlighting the potential association between the co-occurrence of variants in two genes and variable phenotypes observed in AI patients.",
    "source": "pubmed_2019_2026",
    "category": "clinical"
  },
  {
    "PMID": "37897121",
    "title": "Probable digenic inheritance of Diamond-Blackfan anemia.",
    "authors": "Yutaka Furuta; Rory J Tinker; Alican Gulsevin; Serena M Neumann; Rizwan Hamid et al. (11 authors)",
    "journal": "American journal of medical genetics. Part A",
    "year": "2024",
    "doi": "10.1002/ajmg.a.63454",
    "abstract": "A 26-year-old female proband with a clinical diagnosis and consistent phenotype of Diamond-Blackfan anemia (DBA, OMIM 105650) without an identified genotype was referred to the Undiagnosed Diseases Network. DBA is classically associated with monoallelic variants that have an autosomal-dominant or -recessive mode of inheritance. Intriguingly, her case was solved by a detection of a digenic interaction between non-allelic RPS19 and RPL27 variants. This was confirmed with a machine learning structural model, co-segregation analysis, and RNA sequencing. This is the first report of DBA caused by a digenic effect of two non-allelic variants demonstrated by machine learning structural model. This case suggests that atypical phenotypic presentations of DBA may be caused by digenic inheritance in some individuals. We also conclude that a machine learning structural model can be useful in detecting digenic models of possible interactions between products encoded by alleles of different genes inherited from non-affected carrier parents that can result in DBA with an unrealized 25% recurrence risk.",
    "source": "pubmed_2019_2026",
    "category": "clinical"
  },
  {
    "PMID": "37832355",
    "title": "Generation and characterization of induced pluripotent stem cells from a Parkinson's disease patient carrying the digenic LRRK2 p.G2019S and GBA1 p.N409S mutations.",
    "authors": "Christiane Oleksy; Fran\u00e7ois Massart; Stefano Goldwurm; Alessia Arado; Giuseppe Arena et al. (7 authors)",
    "journal": "Stem cell research",
    "year": "2023",
    "doi": "10.1016/j.scr.2023.103212",
    "abstract": "We describe an induced pluripotent stem cell (iPSC) line that was derived from fibroblasts obtained from a Parkinson's disease (PD) patient carrying the p.G2019S mutation in the LRRK2 gene and the p.N409S mutation in the GBA1 gene. iPSCs were generated via Sendai virus transduction of Yamanaka factors. The presence of GBA1 p.N409S and LRRK2 p.G2019S was confirmed by Sanger sequencing. The iPSCs express pluripotency markers, are capable of in vitro differentiation into the three germ layers and have a normal karyotype. The newly generated line will be used for in vitro PD modeling by investigating the role of each mutation in iPSC-derived dopaminergic neurons.",

  {
    "PMID": "37730861",
    "title": "An Italian MODY family with proband and son carrying variants in GCK and HFN1A: is it a true case of digenic MODY?",
    "authors": "Daniela Lucchesi; Emioli Randazzo; Stefano Del Prato; Cristina Bianchi",
    "journal": "Acta diabetologica",
    "year": "2024",
    "doi": "10.1007/s00592-023-02171-3",
    "abstract": "Maturity Onset Diabetes of the Young (MODY) is a monogenic autosomal dominant disorder affecting 1-5 % of all patients with diabetes mellitus. In Caucasians, GCK and HNF1A mutations are the most common cause of MODY. Here, we report two family members carrying a genetic variant of both GCK and HNF1A gene and their nine year clinical follow-up. Our report urges physicians to be cautious when variants in two genes are found in a single patient and suggests that collaboration with MODY genetics experts is necessary for correct diagnosis and treatment.",

  {
    "PMID": "37693313",
    "title": "A multi-threaded approach to genotype pattern mining for detecting digenic disease genes.",
    "authors": "Qingrun Zhang; Muskan Bhatia; Taesung Park; Jurg Ott",
    "journal": "Frontiers in genetics",
    "year": "2023",
    "doi": "10.3389/fgene.2023.1222517",
    "abstract": "To locate disease-causing DNA variants on the human gene map, the customary approach has been to carry out a genome-wide association study for one variant after another by testing for genotype frequency differences between individuals affected and unaffected with disease. So-called digenic traits are due to the combined effects of two variants, often on different chromosomes, while individual variants may have little or no effect on disease. Machine learning approaches have been developed to find variant pairs underlying digenic traits. However, many of these methods have large memory requirements so that only small datasets can be analyzed. The increasing availability of desktop computers with large numbers of processors and suitable programming to distribute the workload evenly over all processors in a machine make a new and relatively straightforward approach possible, that is, to evaluate all existing variant and genotype pairs for disease association. We present a prototype of such a method with two components, Vpairs and Gpairs, and demonstrate its advantages over existing implementations of such well-known algorithms as Apriori and FP-growth. We apply these methods to published case-control datasets on age-related macular degeneration and Parkinson disease and construct an ROC curve for a large set of genotype patterns.",
    "source": "pubmed_2019_2026",
    "category": "tools"
  },
  {
    "PMID": "37582836",
    "title": "Treatment of monogenic and digenic dominant genetic hearing loss by CRISPR-Cas9 ribonucleoprotein delivery in vivo.",
    "authors": "Yong Tao; Veronica Lamas; Wan Du; Wenliang Zhu; Yiran Li et al. (19 authors)",
    "journal": "Nature communications",
    "year": "2023",
    "doi": "10.1038/s41467-023-40476-7",
    "abstract": "Mutations in Atp2b2, an outer hair cell gene, cause dominant hearing loss in humans. Using a mouse model Atp2b2Obl/+, with a dominant hearing loss mutation (Oblivion), we show that liposome-mediated in vivo delivery of CRISPR-Cas9 ribonucleoprotein complexes leads to specific editing of the Obl allele. Large deletions encompassing the Obl locus and indels were identified as the result of editing. In vivo genome editing promotes outer hair cell survival and restores their function, leading to hearing recovery. We further show that in a double-dominant mutant mouse model, in which the Tmc1 Beethoven mutation and the Atp2b2 Oblivion mutation cause digenic genetic hearing loss, Cas9/sgRNA delivery targeting both mutations leads to partial hearing recovery. These findings suggest that liposome-RNP delivery can be used as a strategy to recover hearing with dominant mutations in OHC genes and with digenic mutations in the auditory hair cells, potentially expanding therapeutics of gene editing to treat hearing loss.",
    "source": "pubmed_2019_2026",
    "category": "clinical"
  },
  {
    "PMID": "37577973",
    "title": "An oligogenic case of severe neonatal thrombocytopenia and a purportedly benign variant in GFI1B requiring reinterpretation.",
    "authors": "Max Frenkel; April Hall; M Stephen Meyn; Carol A Diamond",
    "journal": "Platelets",
    "year": "2023",
    "doi": "10.1080/09537104.2023.2237592",
    "abstract": "Although thrombocytopenia in neonatal intensive care patients is rarely due to inherited disorders, the number of genetic variants implicated in platelet defects has grown dramatically with increasing genome-wide sequencing. Here we describe a case of severe, oligogenic neonatal thrombocytopenia and reinterpret a reportedly benign mutation that is likely pathogenic. Despite this patient's synonymous mutation (GFI1B 576 C>T, Phe192=) being annotated as benign, GFI1B is a well-known regulator of megakaryopoiesis, this variant alters splicing and megakaryocyte maturation, and our analysis of existing genome-wide associated studies demonstrates that it likely causes gray platelet syndrome. This variant has not been reported in a case of life-threatening thrombocytopenia. We propose that the severity of this patient's phenotype is due to synergistic epistasis between the intrinsic platelet defect caused by this mutation and her concomitant inherited PMM2 congenital glycosylation disorder neither of which have been associated with such a severe phenotype. This case highlights the importance of whole-exome/genome sequencing for critically ill patients, reexamining variant interpretation when clinically indicated, and the need to study diverse genetic variation in hematopoiesis.",
    "source": "pubmed_2019_2026",
    "category": "clinical"
  },
  {
    "PMID": "37550847",
    "title": "A theory of oligogenic adaptation of a quantitative trait.",
    "authors": "Ilse H\u00f6llinger; Benjamin W\u00f6lfl; Joachim Hermisson",
    "journal": "Genetics",
    "year": "2023",
    "doi": "10.1093/genetics/iyad139",
    "abstract": "Rapid phenotypic adaptation is widespread in nature, but the underlying genetic dynamics remain controversial. Whereas population genetics envisages sequential beneficial substitutions, quantitative genetics assumes a collective response through subtle shifts in allele frequencies. This dichotomy of a monogenic and a highly polygenic view of adaptation raises the question of a middle ground, as well as the factors controlling the transition. Here, we consider an additive quantitative trait with equal locus effects under Gaussian stabilizing selection that adapts to a new trait optimum after an environmental change. We present an analytical framework based on Yule branching processes to describe how phenotypic adaptation is achieved by collective changes in allele frequencies at the underlying loci. In particular, we derive an approximation for the joint allele-frequency distribution conditioned on the trait mean as a comprehensive descriptor of the adaptive architecture. Depending on the model parameters, this architecture reproduces the well-known patterns of sequential, monogenic sweeps, or of subtle, polygenic frequency shifts. Between these endpoints, we observe oligogenic architecture types that exhibit characteristic patterns of partial sweeps. We find that a single compound parameter, the population-scaled background mutation rate \u0398bg, is the most important predictor of the type of adaptation, while selection strength, the number of loci in the genetic basis, and linkage only play a minor role.",
    "source": "pubmed_2019_2026",
    "category": "tools"
  },
  {
    "PMID": "37511534",
    "title": "Whole Genome Sequencing Revealed Inherited Rare Oligogenic Variants Contributing to Schizophrenia and Major Depressive Disorder in Two Families.",
    "authors": "I-Hang Chung; Yu-Shu Huang; Ting-Hsuan Fang; Chia-Hsiang Chen",
    "journal": "International journal of molecular sciences",
    "year": "2023",
    "doi": "10.3390/ijms241411777",
    "abstract": "Schizophrenia and affective disorder are two major complex mental disorders with high heritability. Evidence shows that rare variants with significant clinical impacts contribute to the genetic liability of these two disorders. Also, rare variants associated with schizophrenia and affective disorders are highly personalized; each patient may carry different variants. We used whole genome sequencing analysis to study the genetic basis of two families with schizophrenia and major depressive disorder. We did not detect de novo, autosomal dominant, or recessive pathogenic or likely pathogenic variants associated with psychiatric disorders in these two families. Nevertheless, we identified multiple rare inherited variants with unknown significance in the probands. In family 1, with singleton schizophrenia, we detected four rare variants in genes implicated in schizophrenia, including p.Arg1627Trp of LAMA2, p.Pro1338Ser of CSMD1, p.Arg691Gly of TLR4, and Arg182X of AGTR2. The p.Arg691Gly of TLR4 was inherited from the father, while the other three were inherited from the mother. In family 2, with two affected sisters diagnosed with major depressive disorder, we detected three rare variants shared by the two sisters in three genes implicated in affective disorders, including p.Ala4551Gly of FAT1, p.Val231Leu of HOMER3, and p.Ile185Met of GPM6B. These three rare variants were assumed to be inherited from their parents. Prompted by these findings, we suggest that these rare inherited variants may interact with each other and lead to psychiatric conditions in these two families. Our observations support the conclusion that inherited rare variants may contribute to the heritability of psychiatric disorders.",

    "title": "Clinical and Functional Assessment of Digenicity in Renal Phosphate Wasting.",
    "authors": "Friederike Petzold; Ria Sch\u00f6nauer; Andreas Werner; Jan Halbritter",
    "journal": "Nutrients",
    "year": "2023",
    "doi": "10.3390/nu15092081",
    "abstract": "Apart from increased fluid intake, patients with kidney stone disease (KSD) due to renal phosphate wasting require specific metaphylaxis. NaPi2a, NaPi2c, and NHERF1 regulate plasma phosphate concentration by reabsorbing phosphate in proximal kidney tubules and have been found altered in monogenic hypophosphatemia with a risk of KSD. In this study, we aimed at assessing the combined genetic alterations impacting NaPi2a, NaPi2c, and NHERF1. Therefore, we screened our hereditary KSD registry for cases of oligo- and digenicity, conducted reverse phenotyping, and undertook functional studies. As a result, we identified three patients from two families with digenic alterations in NaPi2a, NaPi2c, and NHERF1. In family 1, the index patient, who presented with severe renal calcifications and a bone mineralization disorder, carried digenic alterations affecting both NaPi transporter 2a and 2c. Functional analysis confirmed an additive genetic effect. In family 2, the index patient presented with kidney function decline, distinct musculature-related symptoms, and intracellular ATP depletion. Genetically, this individual was found to harbor variants in both NaPi2c and NHERF1 pointing towards genetic interaction. In summary, digenicity and gene dosage are likely to impact the severity of renal phosphate wasting and should be taken into account in terms of metaphylaxis through phosphate substitution.",
    "source": "pubmed_2019_2026",

  {
    "PMID": "37431782",
    "title": "Mutation profile of Bardet-Biedl syndrome patients from India: Implicative role of multiallelic rare variants and oligogenic inheritance pattern.",
    "authors": "Harshavardhini Gnanasekaran; Sathya Priya Chandrasekhar; Suganya Kandeeban; Porkodi Periyasamy; Muna Bhende et al. (11 authors)",
    "journal": "Clinical genetics",
    "year": "2023",
    "doi": "10.1111/cge.14398",
    "abstract": "Bardet-Biedl syndrome (BBS), a rare primary form of ciliopathy, with heterogeneous clinical and genetic presentation is characterized by rod cone dystrophy, obesity, polydactyly, urogenital abnormalities, and cognitive impairment. Here, we delineate the genetic profile in a cohort of 108 BBS patients from India by targeted gene sequencing-based approach for a panel of ciliopathy (including BBS) and other inherited retinal disease genes. We report here a higher frequency of BBS10 and BBS1 gene variations. A different spectrum of variations including a putatively novel gene TSPOAP1, for BBS was identified. Increased percentage frequency of digenic variants (36%) in the disease cohort, role of modifiers in familial cases are some of the salient observations in this work. This study appends the knowledge of BBS genetics pertaining to patients from India. We observed a different molecular epidemiology of BBS patients in this study cohort compared to other reports, which emphasizes the need for molecular testing in affected patients.",

  {
    "PMID": "37372384",
    "title": "Digenic Congenital Hypogonadotropic Hypogonadism Due to Heterozygous GNRH1 p.R31C and AMHR2 p.G445_L453del Variants.",
    "authors": "Bronwyn G A Stuckey; Timothy W Jones; Bryan K Ward; Scott G Wilson",
    "journal": "Genes",
    "year": "2023",
    "doi": "10.3390/genes14061204",
    "abstract": "A 28-year-old man with congenital hypogonadotropic hypogonadism (CHH) was found to be heterozygous for the GNRH1 p.R31C mutation, reported in the literature as pathogenic and dominant. The same mutation was found in his son at birth, but the testing of the infant at 64 days confirmed the hormonal changes associated with minipuberty. This led to further genetic sequencing of the patient and his son, which found a second variant, AMHR2 p.G445_L453del, in the heterozygous form, reported as pathogenic in the patient but not in his son. This suggests a digenic cause of the patient's CHH. Together, these mutations are postulated to contribute to CHH by the lack of anti-M\u00fcllerian hormone (AMH) signalling, leading to the impaired migration of gonadotrophin releasing hormone (GnRH) neurons, the lack of the AMH effect on GnRH secretion, and altered GnRH decapeptide with reduced binding to GnRH receptors. This led us to the conclusion that the observed GNRH1 mutation in the heterozygous state is not certain to be dominant or, at least, exhibits incomplete penetrance and variable expressivity. This report also emphasises the opportunity afforded by the time window of minipuberty in assessing the inherited genetic disorders of hypothalamic function.",
    "source": "pubmed_2019_2026",
    "category": "clinical"
  },
  {
    "PMID": "37186395",
    "title": "Hypercholesterolemia induced by spontaneous oligogenic mutations in rhesus macaques (Macaca mulatta).",
    "authors": "Akiko Takenaka; Juri Suzuki; Hiroyuki Tanaka; Kumiko Hibino; Yoshiro Kamanaka et al. (11 authors)",
    "journal": "Journal of medical primatology",
    "year": "2023",
    "doi": "10.1111/jmp.12642",
    "abstract": "A rhesus macaque with the fourth highest plasma cholesterol (CH) levels of 501 breeding macaques was identified 22\u2009years ago. Seven offspring with gene mutations causing hypercholesterolemia were obtained. Activity of low-density lipoprotein receptor (LDLR), plasma CH levels and mRNA expression levels of LDLR were measured after administration of 0.1% (0.27\u2009mg/kcal) or 0.3% CH. Activity of p. (Cys82Tyr) of LDLR was 71% and 42% in the heterozygotes and a homozygote, respectively. The mRNA expression level of LDLR in the p. (Val241Ile) of membrane-bound transcription factor protease, site 2 (MBTPS2, S2P protein) was 0.83 times lower than normal levels. LDLR mRNA levels were increased for up to 4\u2009weeks by administration of 0.3% CH before suddenly decreasing to 80% of the baseline levels after 6\u2009weeks. Oligogenic mutations of p. (Cys82Tyr) in LDLR and p. (Val241Ile) in MBTPS2 (S2P) caused hypercholesterolemia exceeding cardiovascular risk levels under a 0.1% CH diet.",
    "source": "pubmed_2019_2026",
    "category": "clinical"
  },
  {
    "PMID": "37180804",
    "title": "A genetic and developmental biological approach for a family with complex congenital heart diseases-evidence of digenic inheritance.",
    "authors": "Yu Yoshida; Keiko Uchida; Kazuki Kodo; Reina Ishizaki-Asami; Jun Maeda et al. (12 authors)",
    "journal": "Frontiers in cardiovascular medicine",
    "year": "2023",
    "doi": "10.3389/fcvm.2023.1135141",
    "abstract": "Congenital heart disease (CHD) is caused by cardiovascular developmental defects and has a global prevalence of \u223c1%. The etiology of CHD is multifactorial and remains generally unknown, despite advances in analytical techniques based on next-generation sequencing (NGS). The aim of our study was to elucidate the multi-genetic origin and pathogenesis of an intriguing familial case with complex CHD. We performed an original trio-based gene panel analysis using NGS of the family, including two siblings with CHD of single ventricular phenotype, and their unaffected parents. The pathogenicity of the detected rare variants was investigated in silico, and the functional effects of the variants were confirmed in vitro using luciferase assays. The combinatorial effect of gene alterations of the putative responsible genes was tested in vivo using genetically engineered mutant mice. NGS-based gene panel analyses revealed two heterozygous rare variants in NODAL and in TBX20 common to the siblings and to just one of parents. Both variants were suspected pathogenic in silico, and decreased transcriptional activities of downstream signaling pathways were observed in vitro. The analyses of Nodal and Tbx20 double mutant mice demonstrated that Nodal+/-Tbx20-/- embryos showed more severe defects than Nodal+/+Tbx20-/- embryos during early heart development. The expression of Pitx2, a known downstream target of Nodal, was downregulated in Tbx20-/- mutants. Two rare variants on NODAL and TBX20 genes detected in this family were considered to be loss-of-function mutations. Our results suggest that NODAL and TBX20 may be complementary for the cardiac development, and a combinatorial loss-of-function of NODAL and TBX20 could be implicated in digenic inherence as the etiology of complex CHD associated with single ventricle defects in this family.",
    "source": "pubmed_2019_2026",
    "category": "clinical"
  },
  {
    "PMID": "37102726",
    "title": "Oligogenic Control of Quantitative Resistance Against Powdery Mildew Revealed in Portuguese Common Bean Germplasm.",
    "authors": "Susana T Leit\u00e3o; Francisco A Mendes; Diego Rubiales; Maria Carlota Vaz Patto",
    "journal": "Plant disease",
    "year": "2023",
    "doi": "10.1094/PDIS-02-23-0313-RE",
    "abstract": "Common bean (Phaseolus vulgaris L.) is one of the most important food legumes worldwide, and its production is severely affected by fungal diseases such as powdery mildew. Portugal has a diverse germplasm, with accessions of Andean, Mesoamerican, and admixed origin, making it a valuable resource for common bean genetic studies. In this work, we evaluated the response of a Portuguese collection of 146 common bean accessions to Erysiphe diffusa infection, observing a wide range of disease severity and different levels of compatible and incompatible reactions, revealing the presence of different resistance mechanisms. We identified 11 incompletely hypersensitive resistant and 80 partially resistant accessions. We performed a genome-wide association study to clarify its genetic control, resulting in the identification of eight disease severity-associated single-nucleotide polymorphisms, spread across chromosomes Pv03, Pv09, and Pv10. Two of the associations were unique to partial resistance and one to incomplete hypersensitive resistance. The proportion of variance explained by each association varied between 15 and 86%. The absence of a major locus, together with the relatively small number of loci controlling disease severity, suggested an oligogenic inheritance of both types of resistance. Seven candidate genes were proposed, including a disease resistance protein (toll interleukin 1 receptor-nucleotide binding site-leucine-rich repeat class), an NF-Y transcription factor complex component, and an ABC-2 type transporter family protein. This work contributes with new resistance sources and genomic targets valuable to develop selection molecular tools and support powdery mildew resistance precision breeding in common bean.",
    "source": "pubmed_2019_2026",
    "category": "tools"
  },
